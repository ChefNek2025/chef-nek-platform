<script>
(function () {
  const manifest = {
    name: "Chef Nek Pro",
    short_name: "Chef Nek",
    description: "Restaurant management platform — From Struggling to Thriving",
    start_url: "https://chef-nek-platform.vercel.app/",
    display: "standalone",
    background_color: "#1D9E75",
    theme_color: "#1D9E75",
    orientation: "portrait",
    icons: [
      {
        src: "https://i.ibb.co/srCVgm3/IMG-8789.jpg",
        sizes: "192x192",
        type: "image/jpeg"
      },
      {
        src: "https://i.ibb.co/srCVgm3/IMG-8789.jpg",
        sizes: "512x512",
        type: "image/jpeg"
      }
    ]
  };

  const blob = new Blob([JSON.stringify(manifest)], {
    type: "application/json"
  });

  const url = URL.createObjectURL(blob);

  const link = document.createElement("link");
  link.rel = "manifest";
  link.href = url;

  document.head.appendChild(link);
})();
</script>
