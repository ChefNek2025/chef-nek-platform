        <button onclick="document.getElementById('proc-add-form').style.display='none'" style="height:42px;padding:0 16px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--ink-muted);cursor:pointer;font-family:var(--font-body);">Cancel</button>
      </div>
    </div>`;
}

window.saveProcedure = async function() {
  const title = document.getElementById('proc-title')?.value.trim();
  const category = document.getElementById('proc-category')?.value.trim() || 'General';
  const desc = document.getElementById('proc-desc')?.value.trim() || '';
  const url = document.getElementById('proc-url')?.value.trim() || '';
  const text = document.getElementById('proc-content')?.value.trim() || '';
  if (!title) { showToast('Title required','error'); return; }
  if (!url && !text) { showToast('Add a link or paste content','error'); return; }
  const rid = currentRestaurantId();
  try {
    await addDoc(collection(db,'procedures'), { title, category, desc, url, content: text, restaurantId: rid, createdAt: serverTimestamp() });
    showToast('Document saved!');
    document.getElementById('proc-add-form').style.display = 'none';
    loadProcedures(window._userData);
  } catch(e) { showToast('Error saving','error'); }
}

let procActiveCategory = 'All';
async function loadProcedures(userData) {
  const listEl = document.getElementById('proc-list');
  const filterEl = document.getElementById('proc-filter');
  if (!listEl) return;
  listEl.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  try {
    const rid = currentRestaurantId();
    const snap = await getDocs(query(collection(db,'procedures'), where('restaurantId','==',rid)));
    if (snap.empty) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No documents yet</div><div class="empty-state-sub">' + (isAdmin ? 'Add your first document above' : 'Chef Nek will add your documents soon') + '</div></div>';
      return;
    }
    const docs = snap.docs.map(d=>({id:d.id,...d.data()}));
    window._allProcedures = docs;
    const cats = ['All',...new Set(docs.map(d=>d.category||'General'))].sort((a,b)=>a==='All'?-1:a.localeCompare(b));
    if (filterEl) {
      filterEl.innerHTML = cats.map(cat => {
        const active = cat === procActiveCategory;
        return '<button data-cat="' + cat + '" onclick="filterProcedures(this.dataset.cat)" style="height:34px;padding:0 16px;border-radius:100px;border:0.5px solid ' + (active?'var(--green)':'var(--border)') + ';background:' + (active?'var(--green)':'var(--white)') + ';color:' + (active?'#fff':'var(--ink-soft)') + ';font-family:var(--font-body);font-size:0.8rem;cursor:pointer;">' + cat + '</button>';
      }).join('');
    }
    renderProcedureList(docs);
  } catch(e) { listEl.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading.</p></div>'; }
}

window.filterProcedures = function(cat) { if(typeof cat === "object") cat = cat.dataset?.cat || "All";
  procActiveCategory = cat;
  document.getElementById('proc-filter')?.querySelectorAll('button').forEach(b => {
    const active = b.textContent === cat;
    b.style.background = active ? 'var(--green)' : 'var(--white)';
    b.style.color = active ? '#fff' : 'var(--ink-soft)';
    b.style.borderColor = active ? 'var(--green)' : 'var(--border)';
  });
  renderProcedureList(window._allProcedures || []);
}

function renderProcedureList(docs) {
  const listEl = document.getElementById('proc-list');
  if (!listEl) return;
  const filtered = procActiveCategory === 'All' ? docs : docs.filter(d=>(d.category||'General')===procActiveCategory);
  if (!filtered.length) { listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No documents here</div></div>'; return; }
  const groups = {};
  filtered.forEach(d => { const c=d.category||'General'; if(!groups[c]) groups[c]=[]; groups[c].push(d); });
  listEl.innerHTML = Object.entries(groups).sort().map(([cat,items]) => `
    <div style="margin-bottom:24px;">
      <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);">${cat}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
        ${items.map(doc => `
          <div class="card" style="cursor:pointer;" onclick="viewProcedure('${doc.id}')">
            <div style="display:flex;align-items:flex-start;gap:12px;">
              <div style="width:40px;height:40px;border-radius:10px;background:#F5F0FF;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#5B3DB5" stroke-width="1.5"><rect x="2" y="1" width="14" height="16" rx="2"/><line x1="5" y1="6" x2="13" y2="6"/><line x1="5" y1="9" x2="13" y2="9"/><line x1="5" y1="12" x2="9" y2="12"/></svg>
              </div>
              <div style="flex:1;">
                <div style="font-weight:600;color:var(--ink);margin-bottom:4px;">${doc.title}</div>
                ${doc.desc ? '<div style="font-size:0.78rem;color:var(--ink-muted);">' + doc.desc + '</div>' : ''}
                <div style="margin-top:6px;"><span style="font-size:0.68rem;background:#F5F0FF;color:#5B3DB5;padding:2px 8px;border-radius:20px;">${doc.category||'General'}</span>${doc.url ? ' <span style="font-size:0.68rem;color:var(--green);">Link</span>' : ''}${doc.content ? ' <span style="font-size:0.68rem;color:var(--ink-muted);">Text</span>' : ''}</div>
              </div>
              ${isAdmin ? `<div style="display:flex;gap:4px;"><button onclick="event.stopPropagation();deleteProcedure('${doc.id}')" style="height:26px;padding:0 8px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:11px;cursor:pointer;">Del</button></div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

window.viewProcedure = function(docId) {
  const proc = (window._allProcedures||[]).find(d=>d.id===docId);
  if (!proc) return;
  if (proc.url) { window.open(proc.url, '_blank'); return; }
  if (!proc.content) return;
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;';
  const header = document.createElement('div');
  header.style.cssText = 'background:linear-gradient(135deg,#5B3DB5,#3D2580);padding:20px 24px;border-radius:20px 20px 0 0;display:flex;justify-content:space-between;align-items:center;';
  header.innerHTML = '<div><div style="font-size:0.7rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.1em;">' + (proc.category||'General') + '</div><div style="font-size:1.1rem;font-weight:700;color:#fff;">' + proc.title + '</div></div>';
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕';
  closeBtn.style.cssText = 'background:rgba(255,255,255,0.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:0.9rem;';
  closeBtn.onclick = () => modal.remove();
  header.appendChild(closeBtn);
  const body = document.createElement('div');
  body.style.cssText = 'padding:24px;';
  const lines = proc.content.split('\n');
  body.innerHTML = lines.map(line => {
    const t = line.trim();
    if (!t) return '<div style="height:8px;"></div>';
    if (t === t.toUpperCase() && t.length > 2 && /[A-Z]/.test(t)) return '<div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin:14px 0 6px;border-bottom:2px solid var(--border);padding-bottom:4px;">' + t + '</div>';
    if (/^\d+[.)]\s/.test(t)) { const txt = t.replace(/^\d+[.)]\s*/,''); const num = t.match(/^\d+/)[0]; return '<div style="display:flex;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);"><span style="width:22px;height:22px;background:var(--green);color:#fff;border-radius:6px;font-size:0.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + num + '</span><span style="font-size:0.875rem;color:var(--ink);line-height:1.6;">' + txt + '</span></div>'; }
    if (/^[-•*]/.test(t)) return '<div style="display:flex;gap:8px;padding:5px 0;"><span style="width:6px;height:6px;border-radius:50%;background:var(--green);margin-top:7px;flex-shrink:0;"></span><span style="font-size:0.875rem;color:var(--ink);line-height:1.6;">' + t.replace(/^[-•*]\s*/,'') + '</span></div>';
    return '<div style="font-size:0.875rem;color:var(--ink);line-height:1.7;padding:2px 0;">' + t + '</div>';
  }).join('');
  box.appendChild(header);
  box.appendChild(body);
  modal.appendChild(box);
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
}

window.deleteProcedure = async function(docId) {
  if (!confirm('Delete this document?')) return;
  try {
    await deleteDoc(doc(db,'procedures',docId));
    showToast('Deleted!');
    loadProcedures(window._userData);
  } catch(e) { showToast('Error','error'); }
}

function renderChecklists(main, userData) {
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  window._clTodayKey = new Date().toISOString().split('T')[0];
  main.innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Opening & Closing</h1>
      <p class="page-sub">${today}</p>

        <button id="cl-tab-closing" onclick="switchCLTab('closing')" style="flex:1;height:40px;border-radius:8px;border:none;font-family:var(--font-body);font-size:0.875rem;cursor:pointer;background:transparent;color:var(--ink-muted);">Closing</button>

window.switchCLTab = function(tab) {
  window._clTab = tab;
  document.getElementById('cl-panel-opening').style.display = tab==='opening' ? 'block' : 'none';
  document.getElementById('cl-panel-closing').style.display = tab==='closing' ? 'block' : 'none';
  const openBtn = document.getElementById('cl-tab-opening');
  const closeBtn = document.getElementById('cl-tab-closing');
  if (openBtn) { openBtn.style.background = tab==='opening' ? 'var(--green)' : 'transparent'; openBtn.style.color = tab==='opening' ? '#fff' : 'var(--ink-muted)'; openBtn.style.fontWeight = tab==='opening' ? '600' : '400'; }
  if (closeBtn) { closeBtn.style.background = tab==='closing' ? 'var(--ink)' : 'transparent'; closeBtn.style.color = tab==='closing' ? '#fff' : 'var(--ink-muted)'; closeBtn.style.fontWeight = tab==='closing' ? '600' : '400'; }
  loadChecklistItems(tab, window._userData);
}

async function loadChecklistItems(type, userData) {
  const contentEl = document.getElementById('cl-' + type + '-content');
  if (!contentEl) return;
  contentEl.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  const restaurantId = currentRestaurantId() || userData.uid;
  const todayKey = window._clTodayKey;
  const color = type==='opening' ? '#1D9E75' : '#C17F3A';
  try {
    const itemsSnap = await getDocs(query(collection(db,'clItems'), where('type','==',type), where('restaurantId','==',restaurantId)));
    const items = itemsSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));
    const checksSnap = await getDocs(query(collection(db,'clChecks'), where('restaurantId','==',restaurantId), where('type','==',type), where('date','==',todayKey)));
    const checks = {};
    checksSnap.docs.forEach(d => { const x=d.data(); checks[x.itemId]=x; });
    const signoffSnap = await getDocs(query(collection(db,'clSignoffs'), where('restaurantId','==',restaurantId), where('type','==',type), where('date','==',todayKey)));
    const signoff = signoffSnap.docs.length > 0 ? signoffSnap.docs[0].data() : null;
    const doneCount = items.filter(i=>checks[i.id]).length;
    const allDone = items.length > 0 && doneCount === items.length;

    contentEl.innerHTML = '';
    // Progress
    const prog = document.createElement('div');
    prog.className = 'card';
    prog.style.marginBottom = '16px';
    prog.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'
      + '<div style="font-family:var(--font-display);font-size:1.3rem;font-weight:700;color:var(--ink);">' + doneCount + '<span style="font-size:0.9rem;color:var(--ink-muted);">/' + items.length + ' done</span></div>'
      + (signoff ? '<span style="font-size:0.78rem;color:var(--green);font-weight:600;">✓ Signed off by ' + signoff.by + '</span>' : '') + '</div>'
      + '<div style="height:8px;background:var(--cream);border-radius:4px;overflow:hidden;"><div style="height:100%;width:' + (items.length?Math.round(doneCount/items.length*100):0) + '%;background:' + color + ';border-radius:4px;transition:width 0.4s;"></div></div>';
    contentEl.appendChild(prog);

    // Add item button (admin)
    if (isAdmin) {
      const addBtn = document.createElement('button');
      addBtn.textContent = '+ Add item';
      addBtn.style.cssText = 'height:40px;padding:0 18px;border-radius:10px;border:2px dashed var(--border);background:transparent;color:var(--ink-muted);font-family:var(--font-body);font-size:0.875rem;cursor:pointer;margin-bottom:16px;width:100%;';
      addBtn.onclick = () => showAddCLItem(type, restaurantId, color);
      contentEl.appendChild(addBtn);
    }

    // Items
    if (!items.length) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<div class="empty-state-title">No ' + type + ' items yet</div><div class="empty-state-sub">' + (isAdmin ? 'Click Add item above' : 'Chef Nek will set this up soon') + '</div>';
      contentEl.appendChild(empty);
    } else {
      items.forEach(item => {
        const chk = checks[item.id];
        const card = document.createElement('div');
        card.style.cssText = 'background:var(--white);border-radius:14px;border:1.5px solid ' + (chk?color:'var(--border)') + ';padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:border-color 0.2s;';
        const cb = document.createElement('div');
        cb.style.cssText = 'width:28px;height:28px;border-radius:8px;border:2px solid ' + (chk?color:'var(--border)') + ';background:' + (chk?color:'transparent') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all 0.2s;';
        cb.innerHTML = chk ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 5,10 12,3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>' : '';
        cb.onclick = () => toggleCLCheck(item.id, type, restaurantId, !chk);
        const info = document.createElement('div');
        info.style.flex = '1';
        info.innerHTML = '<div style="font-size:0.9rem;font-weight:' + (chk?'600':'500') + ';color:var(--ink);">' + item.name + '</div>'
          + (item.note ? '<div style="font-size:0.75rem;color:var(--ink-muted);margin-top:2px;">' + item.note + '</div>' : '')
          + (chk ? '<div style="font-size:0.72rem;color:' + color + ';margin-top:4px;">Done by ' + chk.by + ' · ' + chk.time + '</div>' : '');
        card.appendChild(cb);
        card.appendChild(info);
        if (isAdmin) {
          const delBtn = document.createElement('button');
          delBtn.textContent = 'Del';
          delBtn.style.cssText = 'height:26px;padding:0 8px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:11px;cursor:pointer;font-family:var(--font-body);';
          delBtn.onclick = async () => { if(!confirm('Delete?')) return; await deleteDoc(doc(db,'clItems',item.id)); loadChecklistItems(type,userData); };
          card.appendChild(delBtn);
        }
        contentEl.appendChild(card);
      });
    }

    // Sign off button
    if (allDone && !signoff) {
      const signBtn = document.createElement('button');
      signBtn.style.cssText = 'width:100%;height:50px;border-radius:14px;border:none;background:' + color + ';color:#fff;font-family:var(--font-body);font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:8px;';
      signBtn.textContent = 'Sign off — enter your name to complete';
      signBtn.onclick = () => signOffChecklist(type, restaurantId);
      contentEl.appendChild(signBtn);
    } else if (signoff) {
      const signed = document.createElement('div');
      signed.style.cssText = 'text-align:center;padding:14px;background:var(--green-light);border-radius:12px;margin-top:8px;font-size:0.85rem;font-weight:600;color:var(--green-dark);';
      signed.textContent = '✓ Signed off by ' + signoff.by + ' at ' + signoff.time;
      contentEl.appendChild(signed);
    }
  } catch(e) {
    console.error(e);
    contentEl.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading.</p></div>';
  }
}

function showAddCLItem(type, restaurantId, color) {

  modal.id = 'cl-add-modal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px;width:100%;max-width:420px;padding:28px;';
  box.innerHTML = '<div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:16px;">Add ' + (type==='opening'?'Opening':'Closing') + ' Item</div>'
    + '<div style="display:flex;flex-direction:column;gap:10px;"><input type="text" id="cl-new-name" class="form-input-small" placeholder="Task name *">'
    + '<input type="text" id="cl-new-note" class="form-input-small" placeholder="Note (optional)"></div>'
    + '<div style="display:flex;gap:8px;margin-top:16px;">'
    + '<button onclick="saveCLItem(\"' + type + '\",\"' + restaurantId + '\")" style="flex:1;height:44px;background:' + color + ';color:#fff;border:none;border-radius:10px;font-family:var(--font-body);font-weight:700;cursor:pointer;">Add item</button>'
    + '<button onclick="closeCLAddModal()" style="height:44px;padding:0 16px;border-radius:10px;border:0.5px solid var(--border);background:transparent;color:var(--ink-muted);cursor:pointer;font-family:var(--font-body);">Cancel</button></div>';

window.closeCLAddModal = function() { document.getElementById('cl-add-modal')?.remove(); }

window.saveCLItem = async function(type, restaurantId) {
  const name = document.getElementById('cl-new-name')?.value.trim();
  const note = document.getElementById('cl-new-note')?.value.trim() || '';
  if (!name) { showToast('Task name required','error'); return; }
  try {
    const snap = await getDocs(query(collection(db,'clItems'), where('type','==',type), where('restaurantId','==',restaurantId)));
    await addDoc(collection(db,'clItems'), { name, note, type, restaurantId, order: snap.size, createdAt: serverTimestamp() });
    showToast('Item added!');
    document.getElementById('cl-add-modal')?.remove();
    loadChecklistItems(type, window._userData);
  } catch(e) { showToast('Error','error'); }
}

window.toggleCLCheck = async function(itemId, type, restaurantId, isDone) {
  const todayKey = window._clTodayKey;
  if (isDone) {
    const name = prompt('Your name:');
    if (!name) return;
    const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    await addDoc(collection(db,'clChecks'), { itemId, type, restaurantId, date: todayKey, by: name.trim(), time, checkedAt: serverTimestamp() });
    showToast('✅ Checked!');
  } else {
    const snap = await getDocs(query(collection(db,'clChecks'), where('itemId','==',itemId), where('date','==',todayKey)));
    for (const d of snap.docs) await deleteDoc(doc(db,'clChecks',d.id));
    showToast('Unchecked');
  }
  loadChecklistItems(type, window._userData);
}

window.signOffChecklist = async function(type, restaurantId) {
  const name = prompt('Enter your name to sign off:');
  if (!name) return;
  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const todayKey = window._clTodayKey;
  await addDoc(collection(db,'clSignoffs'), { type, restaurantId, date: todayKey, by: name.trim(), time, signedAt: serverTimestamp() });
  showToast(name + ' signed off!');
  loadChecklistItems(type, window._userData);
}

async function loadStationGuide(userData) {
  const listEl = document.getElementById('sg-list');
  if (!listEl) return;
  listEl.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  const restaurantId = currentRestaurantId() || userData.uid;
  try {
    const snap = await getDocs(query(collection(db,'stationDishes'), where('restaurantId','==',restaurantId)));
    if (snap.empty) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No dishes yet</div><div class="empty-state-sub">' + (isAdmin ? 'Click Add dish above' : 'Chef Nek will set this up soon') + '</div></div>';
      return;
    }
    const dishes = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.category||'').localeCompare(b.category||''));
    window._sgDishes = dishes;
    const cats = ['All',...new Set(dishes.map(d=>d.category||'General'))].sort((a,b)=>a==='All'?-1:a.localeCompare(b));
    window._sgCat = window._sgCat || 'All';
    const filterEl = document.getElementById('sg-filter');
    if (filterEl) filterEl.innerHTML = cats.map(cat => '<button data-cat="' + cat + '" onclick="filterSG(this.dataset.cat)" style="height:34px;padding:0 16px;border-radius:100px;border:0.5px solid ' + (cat===window._sgCat?'var(--green)':'var(--border)') + ';background:' + (cat===window._sgCat?'var(--green)':'var(--white)') + ';color:' + (cat===window._sgCat?'#fff':'var(--ink-soft)') + ';font-family:var(--font-body);font-size:0.8rem;cursor:pointer;">' + cat + '</button>').join('');
    renderStationList(dishes);
  } catch(e) { listEl.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading.</p></div>'; }
}

window.filterSG = function(cat) {
  window._sgCat = cat;
  document.getElementById('sg-filter')?.querySelectorAll('button').forEach(b => {
    const active = b.textContent === cat;
    b.style.background = active?'var(--green)':'var(--white)';
    b.style.color = active?'#fff':'var(--ink-soft)';
    b.style.borderColor = active?'var(--green)':'var(--border)';
  });
  renderStationList(window._sgDishes||[]);
}

function renderStationList(dishes) {
  const listEl = document.getElementById('sg-list');
  if (!listEl) return;
  const cat = window._sgCat || 'All';
  const filtered = cat==='All' ? dishes : dishes.filter(d=>(d.category||'General')===cat);
  if (!filtered.length) { listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No dishes here</div></div>'; return; }
  const groups = {};
  filtered.forEach(d => { const c=d.category||'General'; if(!groups[c]) groups[c]=[]; groups[c].push(d); });
  listEl.innerHTML = '';
  Object.entries(groups).sort().forEach(([catName, items]) => {
    const sec = document.createElement('div');
    sec.style.marginBottom = '28px';
    sec.innerHTML = '<div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border);">' + catName + '</div>';
    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;';
    items.forEach(dish => {
      const card = document.createElement('div');
      card.style.cssText = 'background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;';
      card.onmouseenter = () => { card.style.transform='translateY(-3px)'; card.style.boxShadow='0 8px 24px rgba(26,26,20,0.1)'; };
      card.onmouseleave = () => { card.style.transform=''; card.style.boxShadow=''; };
      card.onclick = () => openStationDish(dish.id);
      if (dish.photoUrl) card.innerHTML = '<div style="height:150px;overflow:hidden;"><img src="' + dish.photoUrl + '" style="width:100%;height:100%;object-fit:cover;" loading="lazy"></div>';
      const body = document.createElement('div');
      body.style.padding = '14px 16px 16px';
      body.innerHTML = '<div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:4px;">' + dish.name + '</div>';
      if (dish.prepTime) body.innerHTML += '<div style="font-size:0.72rem;color:var(--ink-muted);margin-bottom:8px;">Prep: ' + dish.prepTime + '</div>';
      if (dish.steps) {
        const steps = dish.steps.split('\n').filter(s=>s.trim()).slice(0,2);
        body.innerHTML += steps.map((s,i) => '<div style="display:flex;gap:8px;margin-bottom:4px;"><span style="width:18px;height:18px;border-radius:4px;background:var(--amber-light);color:#854F0B;font-size:0.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + (i+1) + '</span><span style="font-size:0.78rem;color:var(--ink-soft);line-height:1.4;">' + s.replace(/^\d+[.)]\s*/,'').substring(0,55) + '</span></div>').join('');
      }
      if (isAdmin) {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);';
        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.style.cssText = 'height:28px;padding:0 10px;border-radius:6px;border:0.5px solid var(--border);background:var(--cream);color:var(--ink-soft);font-size:11px;cursor:pointer;font-family:var(--font-body);';
        editBtn.onclick = (e) => { e.stopPropagation(); showEditStationDish(dish); };
        const delBtn = document.createElement('button');
        delBtn.textContent = 'Delete';
        delBtn.style.cssText = 'height:28px;padding:0 10px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:11px;cursor:pointer;font-family:var(--font-body);';
        delBtn.onclick = async (e) => { e.stopPropagation(); if(!confirm('Delete?')) return; await deleteDoc(doc(db,'stationDishes',dish.id)); showToast('Deleted!'); loadStationGuide(window._userData); };
        row.appendChild(editBtn);
        row.appendChild(delBtn);
        body.appendChild(row);
      }
      card.appendChild(body);
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    listEl.appendChild(sec);
  });
}

window.uploadAMIPhoto = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('ami-photo-preview');
  const img = document.getElementById('ami-photo-preview-img');
  const urlInput = document.getElementById('ami-photo');
  const reader = new FileReader();
  reader.onload = e => {
    if (img) img.src = e.target.result;
    if (preview) preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
  showToast('Uploading photo...');
  try {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch('https://api.imgbb.com/1/upload?key=2607f98fd74e91661681ef5b362c36f2', { method:'POST', body:formData });
    const data = await res.json();
    if (data.success) {
      if (urlInput) urlInput.value = data.data.url;
      if (img) img.src = data.data.url;
      showToast('Photo uploaded!');
    }
  } catch(e) { showToast('Photo ready!'); }
}

async function saveMenuItem() {
  const name = document.getElementById('ami-name')?.value.trim();
  const catSel = document.getElementById('ami-category');
  let category = catSel?.value === 'custom'
    ? document.getElementById('ami-custom-cat')?.value.trim()
    : catSel?.value;
  const price = document.getElementById('ami-price')?.value.trim();
  const notes = document.getElementById('ami-notes')?.value.trim();
  const photoUrl = document.getElementById('ami-photo')?.value.trim();
  const restaurantId = isAdmin
    ? document.getElementById('ami-restaurant')?.value
    : window._userData?.uid;

  if (!name) { showToast('Item name required','error'); return; }
  if (!restaurantId) { showToast('Select a restaurant','error'); return; }
  if (!category) category = 'General';

  try {
    await addDoc(collection(db,'recipes'), {
      name, category, price, notes, photoUrl,
      restaurantId, createdAt: serverTimestamp()
    });
    showToast('✅ ' + name + ' added to menu!');
    document.getElementById('add-menu-item-modal')?.remove();
    // Refresh the menu preview
    if (window.updateMenuPreview) window.updateMenuPreview();
    if (window.loadMenuDesign) window.loadMenuDesign(window._userData);
  } catch(e) {
    console.error(e);
    showToast('Error saving item','error');
  }
}

  window.handleSignOut && window.handleSignOut();
}
window.handleSignOut = async function() {
  try {
    window._viewingRestaurantId = null;
    window._viewingClientName = null;
    await signOut(auth);
  } catch(e) { showToast('Error signing out','error'); }
}

// 2. Delete recipe category
window.deleteRecipeCategory = async function(catName) {
  if (!confirm('Delete the "' + catName + '" category and ALL recipes in it?')) return;
  try {
    const rid = currentRestaurantId();
    const snap = await getDocs(query(collection(db,'recipes'), where('restaurantId','==',rid), where('category','==',catName)));
    for (const d of snap.docs) await deleteDoc(doc(db,'recipes',d.id));
    showToast(catName + ' deleted!');
    activeCategory = 'All';
    loadRecipes(window._userData);
  } catch(e) { showToast('Error deleting','error'); }
}

// 3. QR Code
window.showQRCode = function() {
  const rid = window._menuViewingRestaurantId || currentRestaurantId();
  const url = 'https://chef-nek-platform.vercel.app/#menu/' + rid;
  const qrDiv = document.getElementById('qr-display');
  if (!qrDiv) return;
  if (qrDiv.style.display === 'none' || !qrDiv.style.display) {
    qrDiv.style.display = 'block';
    qrDiv.innerHTML = '<div style="text-align:center;padding:16px;">'
      + '<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url) + '" style="width:200px;height:200px;border-radius:12px;" alt="QR Code">'
      + '<div style="font-size:0.75rem;color:var(--ink-muted);margin-top:8px;word-break:break-all;">' + url + '</div>'
      + '<button onclick="copyQRLink()" style="margin-top:8px;height:34px;padding:0 16px;border-radius:8px;border:0.5px solid var(--border);background:var(--cream);color:var(--ink-soft);font-family:var(--font-body);font-size:0.8rem;cursor:pointer;">Copy link</button>'
      + '</div>';
  } else {
    qrDiv.style.display = 'none';
  }
}
window.generateQR = window.showQRCode;
window.copyQRLink = function() {
  const rid = window._menuViewingRestaurantId || currentRestaurantId();
  const url = 'https://chef-nek-platform.vercel.app/#menu/' + rid;
  navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
}

// 4. Update checklist item
window.updateCLItem = async function(itemId, type, restaurantId) {
  const name = document.getElementById('cl-edit-name-' + itemId)?.value.trim();
  const note = document.getElementById('cl-edit-note-' + itemId)?.value.trim() || '';
  const critical = document.getElementById('cl-edit-critical-' + itemId)?.checked || false;
  if (!name) { showToast('Task name required','error'); return; }
  try {
    await setDoc(doc(db,'clItems',itemId), {name, note, critical}, {merge:true});
    showToast('Updated!');
    loadChecklistItems(type, window._userData);
  } catch(e) { showToast('Error','error'); }
}

// 5. Upload station guide photo
window.uploadSGPhoto = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('sg-photo-preview');
  const previewImg = document.getElementById('sg-photo-preview-img');
  const urlInput = document.getElementById('sg-photo');
  const statusEl = document.getElementById('sg-photo-status');
  const reader = new FileReader();
  reader.onload = e => {
    if (previewImg) previewImg.src = e.target.result;
    if (preview) preview.style.display = 'flex';
  };
  reader.readAsDataURL(file);
  if (statusEl) statusEl.textContent = 'Uploading...';
  showToast('Uploading photo...');
  try {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch('https://api.imgbb.com/1/upload?key=2607f98fd74e91661681ef5b362c36f2', {method:'POST',body:formData});
    const data = await res.json();
    if (data.success) {
      if (urlInput) urlInput.value = data.data.url;
      if (previewImg) previewImg.src = data.data.url;
      if (statusEl) statusEl.textContent = 'Uploaded!';
      showToast('Photo uploaded!');
    } else {
      if (urlInput) urlInput.value = previewImg?.src || '';
      if (statusEl) statusEl.textContent = 'Photo ready';
    }
  } catch(e) {
    if (urlInput && previewImg) urlInput.value = previewImg.src;
    if (statusEl) statusEl.textContent = 'Photo ready';
    showToast('Photo ready!');
  }
}
window.clearSGPhoto = function() {
  const urlInput = document.getElementById('sg-photo');
  const preview = document.getElementById('sg-photo-preview');
  const img = document.getElementById('sg-photo-preview-img');
  if (urlInput) urlInput.value = '';
  if (img) img.src = '';
  if (preview) preview.style.display = 'none';
}

async function previewMigration() {
  const fromId = document.getElementById('mig-from')?.value;
  const toId = document.getElementById('mig-to')?.value;
  const preview = document.getElementById('mig-preview');
  if (!fromId || !toId) { showToast('Select both accounts','error'); return; }
  if (fromId === toId) { showToast('Source and destination must be different','error'); return; }
  preview.style.display = 'block';
  preview.textContent = 'Counting data...';
  try {
    const counts = {};
    if (document.getElementById('mig-cl')?.checked) {
      const snap = await getDocs(query(collection(db,'clItems'), where('restaurantId','==',fromId)));
      counts['Opening/Closing items'] = snap.size;
    }
    if (document.getElementById('mig-sg')?.checked) {
      const snap = await getDocs(query(collection(db,'stationDishes'), where('restaurantId','==',fromId)));
      counts['Station Guide dishes'] = snap.size;
    }
    if (document.getElementById('mig-proc')?.checked) {
      const snap = await getDocs(query(collection(db,'procedures'), where('restaurantId','==',fromId)));
      counts['Procedures'] = snap.size;
    }
    if (document.getElementById('mig-prep')?.checked) {
      const snap = await getDocs(query(collection(db,'prepCategories'), where('restaurantId','==',fromId)));
      counts['Prep categories'] = snap.size;
    }
    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    if (total === 0) {
      preview.innerHTML = '⚠️ No data found under the source account for selected types.';
      preview.style.background = '#FFF8E1';
      preview.style.color = '#854F0B';
    } else {
      preview.style.background = 'var(--green-light)';
      preview.style.color = 'var(--green-dark)';
      preview.innerHTML = '✅ Found <strong>' + total + ' items</strong> to move:<br>'
        + Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>'• ' + v + ' ' + k).join('<br>');
    }
  } catch(e) { preview.textContent = 'Error: ' + e.message; }
}

async function runMigration() {
  const fromId = document.getElementById('mig-from')?.value;
  const toId = document.getElementById('mig-to')?.value;
  const result = document.getElementById('mig-result');
  const btn = document.getElementById('mig-move-btn');
  if (!fromId || !toId) { showToast('Select both accounts','error'); return; }
  if (fromId === toId) { showToast('Source and destination must be different','error'); return; }
  if (!confirm('Move all selected data from source to destination? This cannot be undone.')) return;
  
  if (btn) { btn.textContent = 'Moving...'; btn.disabled = true; }
  let moved = 0;

  try {
    // Helper: move all docs in a collection
    async function migrateCollection(collName) {
      const snap = await getDocs(query(collection(db, collName), where('restaurantId','==',fromId)));
      for (const d of snap.docs) {
        await setDoc(doc(db, collName, d.id), {restaurantId: toId}, {merge:true});
        moved++;
      }
      return snap.size;
    }

    if (document.getElementById('mig-cl')?.checked) await migrateCollection('clItems');
    if (document.getElementById('mig-sg')?.checked) await migrateCollection('stationDishes');
    if (document.getElementById('mig-proc')?.checked) await migrateCollection('procedures');
    if (document.getElementById('mig-prep')?.checked) {
      // Also migrate prepItems linked to those categories
      const catSnap = await getDocs(query(collection(db,'prepCategories'), where('restaurantId','==',fromId)));
      for (const d of catSnap.docs) {
        await setDoc(doc(db,'prepCategories',d.id), {restaurantId: toId}, {merge:true});
        moved++;
      }
    }

    if (result) {
      result.style.display = 'block';
      result.style.background = 'var(--green-light)';
      result.style.color = 'var(--green-dark)';
      result.innerHTML = '🎉 Done! Moved <strong>' + moved + ' items</strong> successfully.<br><span style="font-size:0.78rem;font-weight:400;">Reload the page to see the changes.</span>';
    }
    if (btn) { btn.textContent = '✅ Done!'; btn.style.background = 'var(--green-dark)'; }
    showToast('Data moved successfully!');
  } catch(e) {
    console.error(e);
    showToast('Error during migration: ' + e.message, 'error');
    if (btn) { btn.textContent = 'Move data'; btn.disabled = false; }
  }
}

// ============================================
// AUTH HANDLERS
// ============================================
window.handleLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value.trim();
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!email || !password) { errorEl.textContent = 'Please enter your email and password.'; errorEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  errorEl.style.display = 'none';
  try {
    window._adminPassword = password;
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    errorEl.textContent = 'Incorrect email or password. Please try again.';
    errorEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

window.handleRegister = async function() {
  const restaurantName = document.getElementById('reg-restaurant').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value.trim();
  const errorEl = document.getElementById('reg-error');
  const btn = document.getElementById('reg-btn');
  if (!restaurantName || !email || !password) { errorEl.textContent = 'All fields are required.'; errorEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Creating account...';
  errorEl.style.display = 'none';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, 'users', cred.user.uid), {
      restaurantName, email, isAdmin: false,
      status: 'new', createdAt: serverTimestamp()
    });
  } catch(e) {
    errorEl.textContent = e.message;
    errorEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Create account';
  }
}


window.handleForgotPassword = async function() {
  const email = document.getElementById('reset-email').value.trim();
  const errorEl = document.getElementById('reset-error');
  const successEl = document.getElementById('reset-success');
  const btn = document.getElementById('reset-btn');
  if (!email || !email.includes('@')) {
    errorEl.textContent = 'Please enter a valid email address.';
    errorEl.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Sending...';
  errorEl.style.display = 'none';
  try {
    await sendPasswordResetEmail(auth, email);
    successEl.style.display = 'block';
    btn.textContent = 'Email sent!';
    btn.style.background = 'var(--green-dark)';
  } catch(e) {
    errorEl.textContent = 'No account found with that email. Please check and try again.';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
}

window.handleSignOut = async function() {
  await signOut(auth);
  currentPage = 'dashboard';
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

window.printPage = function(type) {
  const titles = {
    recipes: 'Recipe Book',
    preplist: "Today's Prep List",
    inventory: 'Inventory List'
  };
  const restaurantName = window._userData ? (window._userData.restaurantName || '') : '';
  const date = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  // Add print header temporarily
  const header = document.createElement('div');
  header.className = 'print-header';
  header.id = 'temp-print-header';
  header.innerHTML = `
    <div style="text-align:center;padding:0 0 20px;border-bottom:2px solid #1D9E75;margin-bottom:20px;">
      <div style="font-size:1.5rem;font-weight:700;color:#1A1A14;">Chef Nek Pro</div>
      <div style="font-size:1.1rem;color:#1D9E75;margin:4px 0;">${restaurantName}</div>
      <div style="font-size:0.875rem;color:#8A8A7A;">${titles[type]} — ${date}</div>
    </div>
  `;
  document.querySelector('.main-content').prepend(header);
  window.print();
  setTimeout(() => header.remove(), 500);
}

// ============================================
// PWA INSTALL PROMPT
// ============================================
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  const existing = document.getElementById('install-banner');
  if (existing) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:14px 20px;border-radius:14px;display:flex;align-items:center;gap:14px;font-family:var(--font-body);font-size:0.875rem;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,0.3);max-width:340px;width:90%;';
  banner.innerHTML = `
    <div>
      <div style="font-weight:500;margin-bottom:2px;">Install Chef Nek Pro</div>
      <div style="font-size:0.8rem;color:rgba(255,255,255,0.6);">Add to your home screen for quick access</div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <button onclick="installApp()" style="height:34px;padding:0 14px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:0.8rem;font-weight:500;cursor:pointer;">Install</button>
      <button onclick="document.getElementById('install-banner').remove()" style="height:34px;padding:0 10px;background:rgba(255,255,255,0.1);color:#fff;border:none;border-radius:8px;font-size:0.8rem;cursor:pointer;">✕</button>
    </div>
  `;
  document.body.appendChild(banner);
}

window.installApp = async function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner')?.remove();
  if (outcome === 'accepted') showToast('Chef Nek Pro installed! Check your home screen.');
}

window.addEventListener('appinstalled', () => {
  showToast('Chef Nek Pro installed successfully!');
  document.getElementById('install-banner')?.remove();
});

// PUBLIC MENU HASH ROUTING
const _hashRid = (function() {
  const h = window.location.hash;
  if (h && h.startsWith('#menu/')) return h.replace('#menu/', '').trim();
  return null;
})();

if (_hashRid) {
  document.getElementById('root').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;background:#FAF7F2;"><div class="loading-spinner"></div><div style="font-size:0.875rem;color:#8A8A7A;">Loading menu...</div></div>';
  loadPublicMenuPage(_hashRid);
} else {
  setTimeout(() => {
    const root = document.getElementById('root');
    if (root && root.querySelector('.loading-screen')) renderLogin();
  }, 8000);
}

async function loadPublicMenuPage(rid) {
  const root = document.getElementById('root');
  try {
    const userDoc = await getDoc(doc(db,'users',rid));
    const restaurant = userDoc.exists() ? userDoc.data() : {};
    const restaurantName = restaurant.restaurantName || 'Our Menu';
    document.title = restaurantName + ' — Menu';
    const settingsDoc = await getDoc(doc(db,'menuSettings',rid));
    const settings = settingsDoc.exists() ? settingsDoc.data() : {};
    const recipesSnap = await getDocs(query(collection(db,'recipes'),where('restaurantId','==',rid)));
    const recipes = recipesSnap.docs.map(d=>({id:d.id,...d.data()}));
    const accent = settings.accentColor || '#1D9E75';
    const font = settings.font || 'Playfair Display';
    const categories = {};
    recipes.forEach(r => { const c=r.category||'Menu'; if(!categories[c]) categories[c]=[]; categories[c].push(r); });
    document.body.style.background = '#FAF7F2';
    let html = '<div style="min-height:100vh;background:#FAF7F2;">';
    html += '<div style="padding:40px 24px 32px;text-align:center;border-bottom:1px solid rgba(26,26,20,0.08);">';
    html += '<div style="font-family:'+font+',Georgia,serif;font-size:2rem;font-weight:700;color:#1A1A14;margin-bottom:6px;">'+restaurantName+'</div>';
    if(settings.tagline) html += '<div style="font-size:0.875rem;color:#8A8A7A;font-style:italic;">'+settings.tagline+'</div>';
    html += '</div><div style="max-width:680px;margin:0 auto;padding:32px 20px;">';
    Object.entries(categories).forEach(([cat,items]) => {
      html += '<div style="margin-bottom:32px;">';
      html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;"><div style="flex:1;height:1px;background:'+accent+';opacity:0.3;"></div><div style="font-size:0.8rem;font-weight:700;color:'+accent+';letter-spacing:0.1em;text-transform:uppercase;">'+cat+'</div><div style="flex:1;height:1px;background:'+accent+';opacity:0.3;"></div></div>';
      items.forEach(item => {
        html += '<div style="display:flex;gap:14px;padding:14px 0;border-bottom:1px solid rgba(26,26,20,0.06);">';
        if(item.photoUrl) html += '<img src="'+item.photoUrl+'" style="width:70px;height:70px;object-fit:cover;border-radius:10px;flex-shrink:0;" loading="lazy">';
        html += '<div style="flex:1;"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;"><div style="font-family:'+font+',Georgia,serif;font-size:1rem;font-weight:700;color:#1A1A14;">'+item.name+'</div>';
        if(item.price) html += '<div style="font-size:1rem;font-weight:700;color:'+accent+';white-space:nowrap;">$'+item.price+'</div>';
        html += '</div>';
        if(item.notes) html += '<div style="font-size:0.8rem;color:#8A8A7A;margin-top:4px;line-height:1.6;">'+item.notes.substring(0,100)+'</div>';
        html += '</div></div>';
      });
      html += '</div>';
    });
    html += '</div><div style="text-align:center;padding:20px;"><a href="https://chef-nek-pro.vercel.app" style="font-size:0.72rem;color:#8A8A7A;text-decoration:none;">Powered by Chef Nek Pro</a></div></div>';
    root.innerHTML = html;
  } catch(e) {
    root.innerHTML = '<div style="text-align:center;padding:60px 20px;"><h2>Unable to load menu</h2><p style="color:#8A8A7A;margin-top:8px;">Please try again.</p></div>';
  }
}

onAuthStateChanged(auth, async (user) => {
  if (_hashRid) return;
  // Safety timeout — if loading takes more than 8 seconds, show login
  const loadingTimeout = setTimeout(() => {
    const root = document.getElementById('root');
    if (root && root.querySelector('.loading-screen')) {
      console.log('Loading timeout — showing login');
      renderLogin();
    }
  }, 8000);

  if (user) {
    currentUser = user;
    try {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      let userData;
      if (userDoc.exists()) {
        userData = { uid: user.uid, email: user.email, ...userDoc.data() };
      } else {
        userData = { uid: user.uid, email: user.email, restaurantName: 'Chef Nek Admin', isAdmin: true };
        await setDoc(doc(db, 'users', user.uid), { email: user.email, isAdmin: true, restaurantName: 'Chef Nek Admin' });
      }
      clearTimeout(loadingTimeout);
      isAdmin = userData.isAdmin || user.email === ADMIN_EMAIL;
      renderApp(userData);
    } catch(e) {
      renderLogin();
    }
  } else {
    currentUser = null;
    renderLogin();
  }
});
