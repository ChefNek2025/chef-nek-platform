<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --amber: #F2A623;
    --amber-light: #FAEEDA;
    --cream: #FAF7F2;
    --ink: #1A1A14;
    --ink-soft: #4A4A3A;
    --ink-muted: #8A8A7A;
    --border: rgba(26,26,20,0.1);
    --white: #FFFFFF;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }
  html, body { height: 100%; font-family: var(--font-body); background: var(--cream); color: var(--ink); }
  #root { height: 100%; }

  /* ── iOS SPLASH SCREEN ── */
  @media (display-mode: standalone) {
    body { -webkit-user-select: none; user-select: none; }
    .sidebar { padding-top: env(safe-area-inset-top, 0); }
    .main-content { padding-bottom: env(safe-area-inset-bottom, 0); }
  }

  /* ── INSTALL BANNER ── */
  .install-banner {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--ink); color: #fff;
    padding: 14px 20px 20px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 9999; gap: 12px; flex-wrap: wrap;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.3);
    animation: slideUpBanner 0.4s cubic-bezier(0.16,1,0.3,1);
    padding-bottom: calc(20px + env(safe-area-inset-bottom, 0));
  }
  @keyframes slideUpBanner {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .install-banner-icon { width:52px;height:52px;border-radius:14px;flex-shrink:0;overflow:hidden; }
  .install-banner-icon img { width:100%;height:100%;object-fit:cover; }
  .install-banner-text { flex:1; }
  .install-banner-title { font-weight:700;font-size:0.95rem;margin-bottom:2px; }
  .install-banner-sub { font-size:0.78rem;color:rgba(255,255,255,0.55); }
  .install-banner-btn { height:38px;padding:0 20px;background:var(--green);color:#fff;border:none;border-radius:100px;font-family:var(--font-body);font-size:0.875rem;font-weight:700;cursor:pointer;white-space:nowrap; }
  .install-banner-dismiss { height:38px;padding:0 14px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:none;border-radius:100px;font-family:var(--font-body);font-size:0.875rem;cursor:pointer; }

  /* ── iOS INSTALL INSTRUCTIONS ── */
  .ios-install-modal { position:fixed;bottom:0;left:0;right:0;background:#1A1A14;border-radius:24px 24px 0 0;padding:24px;z-index:99999;box-shadow:0 -8px 40px rgba(0,0,0,0.4);animation:slideUpBanner 0.4s cubic-bezier(0.16,1,0.3,1); padding-bottom:calc(24px + env(safe-area-inset-bottom,0)); }

  /* ── LOADING ── */
  .loading-screen {
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: var(--cream);
  }
  .loading-logo { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--ink); }
  .loading-logo span { color: var(--green); }
  .loading-spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid var(--green-light);
    border-top-color: var(--green);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LOGIN PAGE ── */
  .login-page {
    min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
  }
  @media(max-width:768px) { .login-page { grid-template-columns: 1fr; } }
  .login-left {
    background: var(--green);
    display: flex; flex-direction: column;
    justify-content: center; padding: 60px;
    position: relative; overflow: hidden;
  }
  .login-left::before {
    content: ''; position: absolute;
    width: 400px; height: 400px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    top: -100px; right: -100px;
  }
  .login-left::after {
    content: ''; position: absolute;
    width: 300px; height: 300px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    bottom: -80px; left: -80px;
  }
  .login-brand { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 12px; }
  .login-brand span { opacity: 0.75; }
  .login-tagline { font-size: 1.1rem; font-weight: 300; color: rgba(255,255,255,0.8); line-height: 1.65; max-width: 340px; margin-bottom: 48px; }
  .login-feature { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .login-feature-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.6); flex-shrink: 0; }
  .login-feature-text { font-size: 0.9rem; color: rgba(255,255,255,0.75); }
  .login-right {
    display: flex; flex-direction: column;
    justify-content: center; padding: 60px;
    background: var(--white);
  }
  .login-form-title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
  .login-form-sub { font-size: 0.9rem; color: var(--ink-muted); margin-bottom: 36px; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--ink-soft); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-input {
    width: 100%; height: 48px; padding: 0 16px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-family: var(--font-body); font-size: 0.9375rem;
    color: var(--ink); background: var(--cream); outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--green); background: var(--white); }
  .form-input.error { border-color: var(--red); }
  .form-btn {
    width: 100%; height: 50px;
    background: var(--green); color: #fff;
    font-family: var(--font-body); font-size: 1rem; font-weight: 500;
    border: none; border-radius: 10px; cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    margin-top: 8px;
  }
  .form-btn:hover { background: var(--green-dark); transform: translateY(-1px); }
  .form-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .form-error { background: var(--red-light); color: var(--red); font-size: 0.875rem; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }

  /* ── APP LAYOUT ── */
  .app-layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  @media(max-width:768px) { .app-layout { grid-template-columns: 1fr; } }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--ink); display: flex; flex-direction: column;
    padding: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-logo-text { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: #fff; }
  .sidebar-logo-text span { color: var(--green); }
  .sidebar-restaurant { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-restaurant-label { font-size: 0.7rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .sidebar-restaurant-name { font-size: 0.9rem; font-weight: 500; color: #fff; }
  .sidebar-nav { flex: 1; padding: 16px 12px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    font-size: 0.875rem; color: rgba(255,255,255,0.6);
    cursor: pointer; margin-bottom: 2px;
    transition: background 0.15s, color 0.15s;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
  .nav-item.active { background: var(--green); color: #fff; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-section-label { font-size: 0.7rem; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 0.08em; padding: 12px 12px 6px; }
  .sidebar-bottom { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .signout-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    font-size: 0.875rem; color: rgba(255,255,255,0.4);
    cursor: pointer; width: 100%; border: none; background: none;
    transition: color 0.15s;
  }
  .signout-btn:hover { color: rgba(255,255,255,0.8); }

  /* ── MAIN CONTENT ── */
  .main-content { background: var(--cream); overflow-y: auto; }
  .page-header { padding: 32px 36px 0; margin-bottom: 28px; }
  .page-title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .page-sub { font-size: 0.9rem; color: var(--ink-muted); }
  .page-body { padding: 0 36px 36px; }
  @media(max-width:768px) { .page-header { padding: 20px 20px 0; } .page-body { padding: 0 20px 20px; } }

  /* ── STAT CARDS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border-radius: 14px; padding: 20px; border: 0.5px solid var(--border); }
  .stat-card-label { font-size: 0.75rem; font-weight: 500; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .stat-card-value { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--ink); line-height: 1; }
  .stat-card-value.green { color: var(--green); }
  .stat-card-value.amber { color: var(--amber); }
  .stat-card-sub { font-size: 0.8rem; color: var(--ink-muted); margin-top: 4px; }

  /* ── CARDS ── */
  .card { background: var(--white); border-radius: 16px; border: 0.5px solid var(--border); padding: 24px; margin-bottom: 20px; }
  .card-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 16px; }

  /* ── QUICK LINKS ── */
  .quick-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .quick-card {
    background: var(--cream); border-radius: 14px; padding: 20px;
    border: 0.5px solid var(--border); cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column; gap: 10px;
    text-align: left;
  }
  .quick-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(26,26,20,0.08); }
  .quick-card-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .quick-card-icon svg { width: 18px; height: 18px; }
  .quick-card-title { font-size: 0.9375rem; font-weight: 500; color: var(--ink); }
  .quick-card-sub { font-size: 0.8rem; color: var(--ink-muted); }

  /* ── ADMIN CLIENT LIST ── */
  .client-table { width: 100%; border-collapse: collapse; }
  .client-table th { text-align: left; font-size: 0.75rem; font-weight: 500; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 0 12px 12px; }
  .client-table td { padding: 12px; border-top: 0.5px solid var(--border); font-size: 0.9rem; color: var(--ink-soft); vertical-align: middle; }
  .client-table tr:hover td { background: var(--cream); }
  .client-name-cell { font-weight: 500; color: var(--ink); }
  .status-badge { display: inline-block; font-size: 0.75rem; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .status-active { background: var(--green-light); color: var(--green-dark); }
  .status-new { background: var(--amber-light); color: #854F0B; }

  /* ── ADD CLIENT FORM ── */
  .add-client-form { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:600px) { .add-client-form { grid-template-columns: 1fr; } }
  .form-btn-small {
    height: 42px; padding: 0 20px;
    background: var(--green); color: #fff;
    font-family: var(--font-body); font-size: 0.875rem; font-weight: 500;
    border: none; border-radius: 8px; cursor: pointer;
    transition: background 0.2s; white-space: nowrap;
  }
  .form-btn-small:hover { background: var(--green-dark); }
  .form-btn-small:disabled { opacity: 0.6; cursor: not-allowed; }
  .form-input-small {
    width: 100%; height: 42px; padding: 0 14px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: var(--font-body); font-size: 0.875rem;
    color: var(--ink); background: var(--cream); outline: none;
    transition: border-color 0.2s;
  }
  .form-input-small:focus { border-color: var(--green); background: var(--white); }

  /* ── SUCCESS / ERROR TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 14px 20px; border-radius: 12px;
    font-size: 0.9rem; font-weight: 500;
    animation: slideUp 0.3s ease; z-index: 1000;
    max-width: 320px;
  }
  .toast.success { background: var(--green); color: #fff; }
  .toast.error { background: var(--red); color: #fff; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 48px 20px; }
  .empty-state-icon { width: 56px; height: 56px; border-radius: 16px; background: var(--green-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .empty-state-icon svg { width: 24px; height: 24px; }
  .empty-state-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .empty-state-sub { font-size: 0.875rem; color: var(--ink-muted); }


  /* ── PREP LIST PRO STYLES ── */
  .prep-week-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .week-label { font-size:0.9rem; font-weight:500; color:var(--ink); }
  .week-btn { height:34px; padding:0 14px; border-radius:8px; border:0.5px solid var(--border); background:var(--white); color:var(--ink-soft); font-size:0.8125rem; cursor:pointer; transition:background 0.15s; }
  .week-btn:hover { background:var(--green-light); color:var(--green-dark); }
  .prep-category { background:var(--white); border-radius:16px; border:0.5px solid var(--border); margin-bottom:16px; overflow:hidden; }
  .prep-cat-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; cursor:pointer; user-select:none; transition:background 0.15s; border-radius:16px; }
  .prep-cat-chevron { font-size:18px; color:var(--ink-muted); transition:transform 0.2s; font-weight:300; }
  .prep-cat-chevron.open { transform:rotate(90deg); color:var(--green); }
  .prep-cat-header:hover { background:var(--cream); }
  .prep-cat-title { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:10px; }
  .prep-cat-meta { display:flex; align-items:center; gap:10px; }
  .prep-cat-progress { font-size:0.8rem; color:var(--ink-muted); }

  .prep-cat-body { border-top:0.5px solid var(--border); }
  .prep-cat-assign { padding:10px 18px; background:var(--cream); display:flex; align-items:center; gap:10px; border-bottom:0.5px solid var(--border); flex-wrap:wrap; }
  .prep-cat-assign-label { font-size:0.8rem; color:var(--ink-muted); }
  .prep-cat-assign-name { font-size:0.8rem; font-weight:500; color:var(--ink); }
  .prep-item-row { display:grid; grid-template-columns:1fr 80px repeat(7,54px); gap:4px; align-items:center; padding:8px 18px; border-bottom:0.5px solid var(--border); }
  .prep-item-row:last-child { border-bottom:none; }
  .prep-item-row.critical-row { background:#FCEBEB; border-left:3px solid #E24B4A; }
  .prep-item-name { font-size:0.875rem; color:var(--ink); display:flex; align-items:center; gap:6px; }
  .prep-item-qty { font-size:0.8rem; color:var(--ink-muted); text-align:center; }
  .day-header { font-size:0.7rem; font-weight:500; color:var(--ink-muted); text-align:center; text-transform:uppercase; }
  .day-check-empty { width:32px; height:32px; border-radius:8px; border:1.5px solid var(--border); background:var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; margin:0 auto; }
  .day-check-empty.today { border-color:var(--green); border-width:2px; background:rgba(29,158,117,0.05); }
  .day-check-empty:hover { border-color:var(--green); background:var(--green-light); }
  .day-check-done { display:flex; flex-direction:column; align-items:center; justify-content:center; width:50px; height:46px; background:var(--green); border:1.5px solid var(--green); border-radius:8px; cursor:pointer; padding:2px; transition:all 0.15s; margin:0 auto; }
  .day-check-done:hover { background:#0F6E56; }
  .day-check-done .chk-tick { font-size:0.65rem; color:#fff; line-height:1.2; }
  .day-check-done .chk-name { font-size:0.6rem; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:46px; line-height:1.2; text-align:center; }
  .day-check-done .chk-time { font-size:0.52rem; color:rgba(255,255,255,0.85); line-height:1.2; text-align:center; }
  .day-check { width:32px; height:32px; border-radius:8px; border:1.5px solid var(--border); background:var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; margin:0 auto; }
  .day-check.checked { background:var(--green); border-color:var(--green); }
  .day-check.today { border-color:var(--green); border-width:2px; }
  .day-check svg { display:none; width:12px; height:12px; }
  .day-check.checked svg { display:block; }
  .prep-cat-footer { padding:12px 18px; background:var(--cream); border-top:0.5px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .approve-btn { height:36px; padding:0 18px; background:var(--green); color:#fff; border:none; border-radius:8px; font-size:0.8125rem; font-weight:500; cursor:pointer; transition:background 0.15s; }
  .approve-btn:hover { background:var(--green-dark); }
  .approve-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .approved-stamp { display:flex; align-items:center; gap:6px; font-size:0.8rem; color:var(--green-dark); font-weight:500; }
  .prep-header-row { display:grid; grid-template-columns:1fr 80px repeat(7,54px); gap:4px; padding:6px 18px; background:var(--cream); border-bottom:0.5px solid var(--border); }
  .critical-alert { background:#FCEBEB; border:1px solid #F09595; border-radius:12px; padding:14px 18px; margin-bottom:16px; display:flex; align-items:flex-start; gap:12px; }

  /* ── MENU DESIGN STYLES ── */
  .menu-preview { background:var(--white); border-radius:16px; border:0.5px solid var(--border); overflow:hidden; }

async function loadGlobalClientSelect() {
  const sel = document.getElementById('global-client-select');
  if (!sel) return;
  try {
    const snap = await getDocs(collection(db, 'users'));
    const clients = snap.docs
      .filter(d => !d.data().isAdmin)
      .sort((a,b) => (a.data().restaurantName||'').localeCompare(b.data().restaurantName||''));
    sel.innerHTML = '<option value="">All clients (admin view)</option>';
    clients.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.data().restaurantName || d.data().email;
      sel.appendChild(opt);
    });
    // Restore existing selection
    if (window._viewingRestaurantId) sel.value = window._viewingRestaurantId;
  } catch(e) {}
}

window.switchGlobalClient = function(restaurantId) {
  window._viewingRestaurantId = restaurantId || null;
  // Show/hide the viewing badge in sidebar
  const badge = document.getElementById('viewing-client-badge');
  if (badge) badge.remove();
  if (restaurantId) {
    const sel = document.getElementById('global-client-select');
    const name = sel?.options[sel?.selectedIndex]?.text || '';
    const sidebarRes = document.querySelector('.sidebar-restaurant');
    if (sidebarRes) {
      const b = document.createElement('div');
      b.id = 'viewing-client-badge';
      b.style.cssText = 'margin-top:6px;padding:5px 10px;background:var(--green);border-radius:7px;font-size:0.72rem;color:#fff;font-weight:500;';
      b.textContent = '👁 ' + name;
      sidebarRes.appendChild(b);
    }
  }
  // Reload current page with new client context
  renderPage(window._userData);
}

// ============================================
// NAVIGATE
// ============================================
window.navigate = function(page) {
  currentPage = page;
  const navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(item => item.classList.remove('active'));
  const activeItem = Array.from(navItems).find(item => item.getAttribute('onclick') === `navigate('${page}')`);
  if (activeItem) activeItem.classList.add('active');
  renderPage(window._userData);
}

// ============================================
// RENDER PAGE
// ============================================
function renderPage(userData) {
  window._userData = userData;
  const main = document.getElementById('main-content');
  if (!main) return;
  switch(currentPage) {
    case 'dashboard': renderDashboard(main, userData); break;
    case 'recipes':   renderRecipes(main, userData); break;
    case 'preplist':  renderPrepList(main, userData); break;
    case 'inventory': renderInventory(main, userData); break;
    case 'menudesign': renderMenuDesign(main, userData); break;
    case 'procedures': renderProcedures(main, userData); break;
    case 'checklists': renderChecklists(main, userData); break;
    case 'stationguide': renderStationGuide(main, userData); break;
    case 'clients':   renderClients(main, userData); break;
    default:          renderDashboard(main, userData);
  }
}

    const r = document.getElementById('stat-recipes');
    const t = document.getElementById('stat-tasks');
    const i = document.getElementById('stat-inventory');
    if (r) r.textContent = recipesSnap.size;
    if (t) t.textContent = tasksSnap.size;
    if (i) i.textContent = inventorySnap.size;
  } catch(e) {}
}

      b.style.borderColor = b.dataset.cat === cat ? 'var(--green)' : 'var(--border)';
      b.style.fontWeight = b.dataset.cat === cat ? '500' : '400';
    });
  }
  renderRecipeList(allRecipes);

function renderRecipeList(recipes) {
  const list = document.getElementById('recipes-list');
  const categoryOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks','General'];
  const filtered = activeCategory === 'All' ? recipes : recipes.filter(r => (r.category||'General') === activeCategory);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-title">No recipes in this category</div></div>`;
    return;
  }

  // Group by category in order
  if (activeCategory === 'All') {
    const groups = {};
    filtered.forEach(r => {
      const cat = r.category || 'General';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(r);
    });
    const sortedGroups = Object.entries(groups).sort(([a], [b]) => {
      const ai = categoryOrder.indexOf(a);
      const bi = categoryOrder.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    list.innerHTML = sortedGroups.map(([cat, items]) => `
      <div style="margin-bottom:8px;">
        <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);padding:8px 0 10px;border-bottom:2px solid var(--green);margin-bottom:12px;display:flex;align-items:center;gap:10px;">
          ${cat}
          <span style="font-size:0.75rem;font-weight:400;color:var(--ink-muted);font-family:var(--font-body);">${items.length} item${items.length>1?'s':''}</span>
        </div>
        ${items.map(r => recipeCard(r)).join('')}
      </div>
    `).join('');
  } else {
    list.innerHTML = filtered.map(r => recipeCard(r)).join('');
  }
}

async function loadRecipes(userData) {
  const list = document.getElementById('recipes-list');
  try {
    const rid = currentRestaurantId();
    const q = rid
      ? query(collection(db, 'recipes'), where('restaurantId', '==', rid))
      : query(collection(db, 'recipes'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    if (snap.empty) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="2" width="18" height="20" rx="3"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="12" y2="16"/></svg></div>
          <div class="empty-state-title">No recipes yet</div>
          <div class="empty-state-sub">${isAdmin ? 'Add your first recipe above' : 'Chef Nek will add your recipes soon'}</div>
        </div>`;
      return;
    }

    // Store all recipes and build filters
    allRecipes = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Build category filter buttons
    const categoryOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];
    const cats = ['All', ...new Set(allRecipes.map(r => r.category || 'General').filter(Boolean))].sort((a,b) => {
      if (a==='All') return -1; if (b==='All') return 1;
      return (categoryOrder.indexOf(a)===-1?99:categoryOrder.indexOf(a)) - (categoryOrder.indexOf(b)===-1?99:categoryOrder.indexOf(b));
    });
    const filterDiv = document.getElementById('category-filters');
    if (filterDiv) {
      filterDiv.innerHTML = cats.map(cat => `
        <button data-cat="${cat}" onclick="filterCategory('${cat}')" style="height:34px;padding:0 16px;border-radius:100px;border:0.5px solid ${cat===activeCategory?'var(--green)':'var(--border)'};background:${cat===activeCategory?'var(--green)':'var(--white)'};color:${cat===activeCategory?'#fff':'var(--ink-soft)'};font-family:var(--font-body);font-size:0.8125rem;font-weight:${cat===activeCategory?'500':'400'};cursor:pointer;transition:all 0.15s;white-space:nowrap;">
          ${cat}
        </button>`).join('');
    }
    renderRecipeList(allRecipes);
  } catch(e) {
    list.innerHTML = `<div class="card"><p style="color:var(--ink-muted);">Error loading recipes. Please try again.</p></div>`;
  }
}



window.uploadPhoto = async function(input, urlFieldId, previewId) {
  const file = input.files[0];
  if (!file) return;
  const previewDiv = document.getElementById(previewId);
  const previewImg = document.getElementById(previewId + '-img');
  const urlField = document.getElementById(urlFieldId);

  // Show local preview immediately
  const reader = new FileReader();
  reader.onload = e => {
    if (previewImg) previewImg.src = e.target.result;
    if (previewDiv) previewDiv.style.display = 'flex';
    previewDiv.style.alignItems = 'center';
  };
  reader.readAsDataURL(file);

  // Upload to ImgBB free API
  showToast('Uploading photo...', 'success');
  try {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch('https://api.imgbb.com/1/upload?key=2607f98fd74e91661681ef5b362c36f2', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    if (data.success) {
      urlField.value = data.data.url;
      if (previewImg) previewImg.src = data.data.url;
      showToast('Photo uploaded!');
    } else {
      // Fallback — use base64 local preview
      urlField.value = document.getElementById(previewId + '-img').src;
      showToast('Photo ready — save the recipe!');
    }
  } catch(e) {
    // Fallback — use the local preview
    urlField.value = document.getElementById(previewId + '-img') ? document.getElementById(previewId + '-img').src : '';
    showToast('Photo ready — save the recipe!');
  }
}

window.handleSectionSelect = function(select) {

    customInput.focus();
    customInput.value = '';
    // Add back button
    if (!document.getElementById('section-back-btn')) {
      const btn = document.createElement('button');
      btn.id = 'section-back-btn';
      btn.textContent = '← Back';
      btn.style.cssText = 'height:42px;padding:0 12px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--ink-soft);font-size:12px;cursor:pointer;margin-top:4px;';
      btn.onclick = function() {
        customInput.style.display = 'none';
        select.style.display = 'block';
        select.value = '';
        btn.remove();
      };
      customInput.parentElement.appendChild(btn);
    }
  } else {
    customInput.value = select.value;
    customInput.style.display = 'none';
  }
}

  const container = document.getElementById('menu-preview-container');
  if (container) container.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  // Load their settings and recipes
  try {
    const settingsDoc = await getDoc(doc(db, 'menuSettings', restaurantId));
    const settings = settingsDoc.exists() ? settingsDoc.data() : {};
    const theme = settings.theme || 'dark-stone';
    const color = settings.accentColor || '#1D9E75';

    const userDoc = await getDoc(doc(db, 'users', restaurantId));

    const catOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];
    const groups = {};
    recipes.forEach(r => { const cat = r.category||'Other'; if(!groups[cat]) groups[cat]=[]; groups[cat].push(r); });
    const sortedGroups = Object.entries(groups).sort(([a],[b]) => (catOrder.indexOf(a)===-1?99:catOrder.indexOf(a))-(catOrder.indexOf(b)===-1?99:catOrder.indexOf(b)));
    if (container) container.innerHTML = buildMenuHTML(theme, color, clientData, settings, sortedGroups);
  } catch(e) {

async function loadPrepCategories(userData) {
  const listEl = document.getElementById('prep-categories-list');
  const alertZone = document.getElementById('critical-alert-zone');
  // Remember which categories are open
  const openPrepCats = new Set();
  document.querySelectorAll('[id^="cat-body-"]').forEach(el => {
    if (el.style.display === 'block') openPrepCats.add(el.id.replace('cat-body-',''));
  });
  const weekStart = window._weekStart;
  const today = new Date().toISOString().split('T')[0];
  const todayIdx = new Date().getDay();
  const todayCol = todayIdx === 0 ? 6 : todayIdx - 1;
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  try {
    const rid = currentRestaurantId() || userData.uid;
    const q = query(collection(db, 'prepCategories'), where('restaurantId','==', rid));
    const catSnap = await getDocs(q);

    if (catSnap.empty) {
      listEl.innerHTML = `
        <div style="text-align:center;padding:48px 20px;">
          <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:8px;">No prep categories yet</div>
          <div style="font-size:0.875rem;color:var(--ink-muted);">${isAdmin ? 'Add your first category above' : 'Chef Nek will set up your prep list soon'}</div>
        </div>`;
      return;
    }

    const cats = catSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.order||0) - (b.order||0));
    let criticalMissed = [];
    let html = '';

    for (const cat of cats) {
      const itemsSnap = await getDocs(
        query(collection(db, 'prepItems'),
          where('categoryId','==', cat.id))
      );
      const items = itemsSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.name||'').localeCompare(b.name||''));

      // Get checks for this week
      const checksSnap = await getDocs(
        query(collection(db, 'prepChecks'),
          where('categoryId','==', cat.id))
      );
      // Filter by weekStart in JS
      const allCheckDocs = checksSnap.docs.filter(d => d.data().weekStart === weekStart);
      const checks = {};
      allCheckDocs.forEach(d => { checks[d.data().itemId + '_' + d.data().dayIdx] = d.data(); });

      // Get approval
      const approvalSnap = await getDocs(
        query(collection(db, 'prepApprovals'),
          where('categoryId','==', cat.id))
      );
      const approvalDocs = approvalSnap.docs.filter(d => d.data().weekStart === weekStart && d.data().dayIdx === todayCol);
      const approved = approvalDocs.length > 0 ? approvalDocs[0].data() : null;

      // Check critical items for today — unchecked = missed
      items.filter(i => i.critical).forEach(i => {
        const checkedToday = checks[i.id + '_' + todayCol];
        if (!checkedToday) criticalMissed.push({ name: i.name, cat: cat.name });
      });

      const doneToday = items.filter(i => checks[i.id + '_' + todayCol]).length;
      const totalItems = items.length;

      html += `
        <div class="prep-category" id="prep-cat-${cat.id}">
          <div class="prep-cat-header" onclick="toggleCat('${cat.id}')">
            <div class="prep-cat-title">
              ${cat.name}
              ${items.filter(i=>i.critical).length > 0 ? `<span style="font-size:0.7rem;background:#FCEBEB;color:#A32D2D;padding:2px 8px;border-radius:20px;font-weight:500;">🚨 ${items.filter(i=>i.critical).length} critical</span>` : ''}
            </div>
            <div class="prep-cat-meta">
              <span class="prep-cat-progress" style="color:${doneToday===totalItems && totalItems>0 ? 'var(--green)' : 'var(--ink-muted)'};">${doneToday===totalItems && totalItems>0 ? '✅' : ''} ${doneToday}/${totalItems} today</span>

window.editPrepItem = function(id, name, qty, critical) {
  const form = document.getElementById('edit-prep-item-' + id);
  if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

window.savePrepItem = async function(id) {
  const name = document.getElementById('edit-item-name-' + id).value.trim();
  const qty = document.getElementById('edit-item-qty-' + id).value.trim();
  const critical = document.getElementById('edit-item-critical-' + id).checked;
  if (!name) { showToast('Item name required', 'error'); return; }
  try {
    await setDoc(doc(db, 'prepItems', id), { name, qty, critical }, { merge: true });
    showToast('Item updated!');
    loadPrepCategories(window._userData);
  } catch(e) { showToast('Error updating item', 'error'); }
}

window.deletePrepItem = async function(id) {
  if (!confirm('Delete this prep item?')) return;
  try {
    const { deleteDoc: dd } =
    await dd(doc(db, 'prepItems', id));
    showToast('Item deleted');
    loadPrepCategories(window._userData);
  } catch(e) { showToast('Error deleting item', 'error'); }
}

window.toggleCat = function(id) {
  const body = document.getElementById('cat-body-'+id);
  const chev = document.getElementById('chevron-'+id);
  const isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  chev.classList.toggle('open', !isOpen);
}

let _pendingCheck = null;

window.togglePrepCheck = async function(itemId, catId, restaurantId, dayIdx, weekStart, el) {
  try {
    const isChecked = el.classList.contains('day-check-done') || el.dataset.checked === 'true';
    if (isChecked) {
      const snap = await getDocs(query(collection(db,'prepChecks'), where('itemId','==',itemId)));
      const toDelete = snap.docs.filter(d => d.data().dayIdx === dayIdx && d.data().weekStart === weekStart);
      for (const d of toDelete) {
  await dd(doc(db,'prepChecks',d.id));
      }
      loadPrepCategories(window._userData);
    } else {
      _pendingCheck = { itemId, catId, restaurantId, dayIdx, weekStart };
      showStaffPicker(restaurantId);
    }
  } catch(e) {
    console.error('togglePrepCheck error:', e);
    showToast('Error', 'error');
  }
}

function showStaffPicker(restaurantId) {
  injectStaffPicker();
  setTimeout(() => {
    const overlay = document.getElementById('staff-picker-overlay');
    if (!overlay) return;
    const input = document.getElementById('staff-custom-name');
    if (input) input.value = '';
    overlay.style.cssText = 'display:flex;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:99999;align-items:center;justify-content:center;padding:20px;';
    loadStaffNames(restaurantId);
  }, 50);
}

async function loadStaffNames(restaurantId) {
  const grid = document.getElementById('staff-picker-grid');
  if (!grid) return;
  grid.innerHTML = '<div style="font-size:0.8rem;color:var(--ink-muted);grid-column:span 2;padding:8px 0;">Loading...</div>';
  try {
    const staffSnap = await getDocs(query(collection(db,'staffNames'), where('restaurantId','==',restaurantId)));
    const names = [...new Set(staffSnap.docs.map(d => d.data().name).filter(Boolean))];
    if (names.length === 0) {
      grid.innerHTML = '<div style="font-size:0.8rem;color:var(--ink-muted);grid-column:span 2;padding:4px 0;">Type a name below to get started</div>';
    } else {
      grid.innerHTML = names.map(n => `
        <button class="staff-btn" onclick="selectStaffName('${n.replace(/'/g,"&#39;")}')">
          <div style="font-size:1.1rem;">👤</div>
          <div>${n}</div>
        </button>`).join('');
    }
  } catch(e) {
    grid.innerHTML = '<div style="font-size:0.8rem;color:var(--ink-muted);grid-column:span 2;">Type a name below</div>';
  }
}

window.selectStaffName = async function(name) {
  await completeCheck(name, false);
}

window.confirmStaffName = async function() {
  const input = document.getElementById('staff-custom-name');
  const name = input ? input.value.trim() : '';
  if (!name) { showToast('Please enter your name', 'error'); return; }
  await completeCheck(name, true);
}

async function completeCheck(name, saveNew) {
  if (!_pendingCheck) { showToast('Error — please try again', 'error'); return; }
  const { itemId, catId, restaurantId, dayIdx, weekStart } = _pendingCheck;
  _pendingCheck = null;
  // Hide overlay
  const overlay = document.getElementById('staff-picker-overlay');
  if (overlay) overlay.style.display = 'none';
  // Save name for future
  if (saveNew) {
    try {
      const existing = await getDocs(query(collection(db,'staffNames'), where('restaurantId','==',restaurantId), where('name','==',name)));
      if (existing.empty) {
        await addDoc(collection(db,'staffNames'), { name, restaurantId, createdAt: serverTimestamp() });
      }
    } catch(e) { console.log('Name save error (non-critical):', e); }
  }
  // Save the check
  try {
    const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    await addDoc(collection(db,'prepChecks'), {
      itemId, catId, restaurantId, dayIdx, weekStart,
      by: name.trim(), time, checkedAt: serverTimestamp()
    });
    showToast('✅ ' + name + ' checked this off!');
    loadPrepCategories(window._userData);
  } catch(e) {
    console.error('completeCheck error:', e);
    showToast('Error saving — check internet connection', 'error');
  }
}

window.closeStaffPicker = function() {
  const ov = document.getElementById('staff-picker-overlay');
  if (ov) ov.style.display = 'none';
  _pendingCheck = null;
}

// ── Inject staff picker into DOM after page loads ──
function injectStaffPicker() {
  if (document.getElementById('staff-picker-overlay')) return;
  const div = document.createElement('div');
  div.id = 'staff-picker-overlay';
  div.className = 'staff-picker-overlay';
  div.style.display = 'none';
  div.innerHTML = `
    <div class="staff-picker-modal" onclick="event.stopPropagation()">
      <div class="staff-picker-title">Who completed this?</div>
      <div class="staff-picker-sub" id="staff-picker-item-name">Select your name below</div>
      <div class="staff-picker-grid" id="staff-picker-grid">
        <div style="font-size:0.8rem;color:var(--ink-muted);grid-column:span 2;padding:8px 0;">Loading...</div>
      </div>
      <div style="margin-bottom:10px;">
        <div style="font-size:0.75rem;color:var(--ink-muted);margin-bottom:6px;">Not listed? Type your name:</div>
        <div style="display:flex;gap:8px;">
          <input type="text" id="staff-custom-name" class="form-input-small" placeholder="Your name..." style="flex:1;">
          <button onclick="confirmStaffName()" class="form-btn-small" style="white-space:nowrap;">Done</button>
        </div>
      </div>
      <button class="staff-picker-cancel" onclick="closeStaffPicker()">Cancel</button>
    </div>`;
  div.addEventListener('click', function(e) {
    if (e.target === div) closeStaffPicker();
  });
  // Add Enter key listener after DOM ready
  div.querySelector('#staff-custom-name') && div.querySelector('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmStaffName();
  });
  document.body.appendChild(div);
}
// Call immediately
injectStaffPicker();

window.approvePrepCategory = async function(catId, restaurantId, weekStart, dayIdx) {
  const name = window._userData?.ownerName || window._userData?.restaurantName || 'Manager';
  if (!name) return;
  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  try {
    await addDoc(collection(db,'prepApprovals'),{
      catId, categoryId: catId, restaurantId, weekStart, dayIdx,
      by: name.trim(), time, approvedAt: serverTimestamp()
    });
    showToast('✅ Prep approved by '+name+'!');
    loadPrepCategories(window._userData);
  } catch(e) { showToast('Error approving', 'error'); }
}

window.addPrepItem = async function(catId, restaurantId) {
  const name = document.getElementById('new-item-name-'+catId).value.trim();
  const qty = document.getElementById('new-item-qty-'+catId).value.trim();
  const critical = document.getElementById('new-item-critical-'+catId).checked;

    await addDoc(collection(db,'prepItems'),{

}

window.deletePrepCategory = async function(catId) {

let menuAccentColor = '#1D9E75';

window.selectMenuColor = function(color) {
  menuAccentColor = color;
  document.querySelectorAll('#color-picker div').forEach(el => {
    el.style.border = '2px solid transparent';
    el.style.transform = 'scale(1)';

window.uploadMenuLogo = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('logo-preview');
    const img = document.getElementById('logo-preview-img');
    if (preview) preview.style.display = 'block';
    if (img) img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  showToast('Uploading logo...');
  try {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch('https://api.imgbb.com/1/upload?key=2607f98fd74e91661681ef5b362c36f2', { method:'POST', body:formData });
    const data = await res.json();
    if (data.success) {
      menuLogoUrl = data.data.url;
      const urlInput = document.getElementById('menu-logo-url');
      if (urlInput) urlInput.value = menuLogoUrl;
      showToast('Logo uploaded!');
    }
  } catch(e) {
    const img = document.getElementById('logo-preview-img');
    if (img) menuLogoUrl = img.src;
    showToast('Logo ready!');
  }
}

window.previewLogoUrl = function(url) {
  menuLogoUrl = url;
  if (url) {
    const preview = document.getElementById('logo-preview');
    const img = document.getElementById('logo-preview-img');
    if (preview) preview.style.display = 'block';
    if (img) img.src = url;
  }
}

// ── LIVE PREVIEW UPDATE ──
window.updateMenuPreview = async function() {
  const selectEl = document.getElementById('menu-restaurant-select');
  const restaurantId = (isAdmin && selectEl && selectEl.value) ? selectEl.value : window._userData.uid;
  if (!restaurantId) return;
  const container = document.getElementById('menu-preview-container');
  if (!container) return;
  try {
    const settingsDoc = await getDoc(doc(db, 'menuSettings', restaurantId));
    const settings = settingsDoc.exists() ? settingsDoc.data() : {};
    const theme = window._selectedTheme || settings.theme || 'dark-stone';
    const color = menuAccentColor || settings.accentColor || '#1D9E75';
    const userDoc = await getDoc(doc(db, 'users', restaurantId));
    const clientData = userDoc.exists() ? { uid: restaurantId, ...userDoc.data() } : { uid: restaurantId, restaurantName: 'Restaurant' };
    const recipesSnap = await getDocs(query(collection(db, 'recipes'), where('restaurantId','==', restaurantId)));
    const recipes = recipesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const catOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];
    const groups = {};
    recipes.forEach(r => { const cat = r.category||'Other'; if(!groups[cat]) groups[cat]=[]; groups[cat].push(r); });
    const sortedGroups = Object.entries(groups).sort(([a],[b]) => (catOrder.indexOf(a)===-1?99:catOrder.indexOf(a))-(catOrder.indexOf(b)===-1?99:catOrder.indexOf(b)));
    container.innerHTML = buildMenuHTML(theme, color, clientData, settings, sortedGroups);
  } catch(e) { console.error('Preview update error:', e); }
}

window.selectTheme = function(theme) {
  document.querySelectorAll('#theme-picker > div').forEach(el => {
    el.style.borderColor = 'var(--border)';

  if (el) { el.style.borderColor = 'var(--green)'; el.style.background = 'var(--green-light)'; }

  updateMenuPreview();
}

async function loadMenuDesign(userData) {
  const container = document.getElementById('menu-preview-container');
  const restaurantId = userData.uid;

  try {
    // Load settings
    const settingsDoc = await getDoc(doc(db, 'menuSettings', restaurantId));
    const settings = settingsDoc.exists() ? settingsDoc.data() : {};
    const color = settings.accentColor || '#1D9E75';
    menuAccentColor = color;
    const theme = settings.theme || 'dark-stone';
    window._selectedTheme = theme;
    // Highlight selected theme
    setTimeout(() => { if(window.selectTheme) window.selectTheme(theme); }, 100);

    // Pre-fill settings form
    if (document.getElementById('menu-tagline')) document.getElementById('menu-tagline').value = settings.tagline || '';
    if (document.getElementById('menu-address')) document.getElementById('menu-address').value = settings.address || '';
    if (document.getElementById('menu-phone')) document.getElementById('menu-phone').value = settings.phone || '';
    if (document.getElementById('menu-hours')) document.getElementById('menu-hours').value = settings.hours || '';
    if (document.getElementById('menu-instagram')) document.getElementById('menu-instagram').value = settings.instagram || '';
    if (document.getElementById('menu-hero-photo')) document.getElementById('menu-hero-photo').value = settings.heroPhoto || '';

    // Highlight selected color
    const colorEl = document.getElementById('color-'+color.replace('#',''));
    if (colorEl) { colorEl.style.border = '3px solid var(--ink)'; colorEl.style.transform = 'scale(1.2)'; }

    // Load recipes
    const recipesSnap = await getDocs(
      query(collection(db, 'recipes'), where('restaurantId','==', restaurantId))
    );
    const recipes = recipesSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    if (recipes.length === 0) {
      container.innerHTML = `
        <div class="menu-preview" style="padding:40px;text-align:center;">
          <div style="font-size:2rem;margin-bottom:12px;">🍽️</div>
          <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:8px;">No recipes yet</div>
          <div style="font-size:0.875rem;color:var(--ink-muted);">Add recipes to your recipe book first — they'll appear here automatically</div>
        </div>`;
      return;
    }

    // Group by category
    const catOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];
    const groups = {};
    recipes.forEach(r => {
      const cat = r.category || 'Other';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(r);
    });
    const sortedGroups = Object.entries(groups).sort(([a],[b]) => {
      return (catOrder.indexOf(a)===-1?99:catOrder.indexOf(a)) - (catOrder.indexOf(b)===-1?99:catOrder.indexOf(b));
    });

    // Build menu HTML based on theme
    const menuHTML = buildMenuHTML(theme, color, userData, settings, sortedGroups);
    container.innerHTML = menuHTML;



  } catch(e) {
    console.error(e);
    container.innerHTML = `<div class="card"><p style="color:var(--ink-muted);">Error loading menu. Please refresh.</p></div>`;
  }
}

window.setPrintTypeFull = function() { window.setPrintType('full'); }

window.setPrintType = function(type) {
  const catSel = document.getElementById('print-cat-select');
  const fullBtn = document.getElementById('ptype-full');
  const catBtn = document.getElementById('ptype-category');
  if (type === 'full') {
    if (catSel) catSel.style.display = 'none';
    if (fullBtn) { fullBtn.style.border='2px solid var(--green)'; fullBtn.style.background='var(--green-light)'; fullBtn.style.color='var(--green-dark)'; fullBtn.style.fontWeight='600'; }
    if (catBtn) { catBtn.style.border='1.5px solid var(--border)'; catBtn.style.background='transparent'; catBtn.style.color='var(--ink-muted)'; catBtn.style.fontWeight='400'; }
  } else {
    if (catSel) catSel.style.display = 'block';

    if (fullBtn) { fullBtn.style.border='1.5px solid var(--border)'; fullBtn.style.background='transparent'; fullBtn.style.color='var(--ink-muted)'; fullBtn.style.fontWeight='400'; }

}

window.toggleAllPrintCats = function(checked) {

async function executePrint(recipes, allCats, rid) {
  const isFull = document.getElementById('ptype-full')?.style.fontWeight === '600' ||
    document.getElementById('ptype-category')?.style.fontWeight !== '600';
  const showPhotos = document.getElementById('popt-photos')?.checked !== false;
  const showDesc = document.getElementById('popt-desc')?.checked !== false;
  const showPrice = document.getElementById('popt-price')?.checked !== false;

  // Get selected categories
  let selectedCats;
  if (isFull) {
    selectedCats = allCats;
  } else {
    selectedCats = [...document.querySelectorAll('.print-cat-cb:checked')].map(cb => cb.dataset.cat);
  }
  if (!selectedCats.length) { showToast('Select at least one category','error'); return; }

  // Load settings for restaurant name
  const settingsDoc = await getDoc(doc(db,'menuSettings',rid));
  const settings = settingsDoc.exists() ? settingsDoc.data() : {};
  const userDoc = await getDoc(doc(db,'users',rid));
  const restaurantName = userDoc.exists() ? userDoc.data().restaurantName : settings.restaurantName || 'Our Menu';

  // Filter recipes
  const filteredRecipes = recipes.filter(r => selectedCats.includes(r.category||'General'));
  const categoryOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];

  // Group by category
  const groups = {};
  filteredRecipes.forEach(r => { const c=r.category||'General'; if(!groups[c]) groups[c]=[]; groups[c].push(r); });
  const sortedGroups = Object.entries(groups).sort(([a],[b])=>{
    const ai=categoryOrder.indexOf(a)===-1?99:categoryOrder.indexOf(a);
    const bi=categoryOrder.indexOf(b)===-1?99:categoryOrder.indexOf(b);
    return ai-bi;
  });

  // Build print HTML
  const accentColor = settings.accentColor || '#1D9E75';
  const font = settings.font || 'Georgia';

  let html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + restaurantName + ' — Menu</title>'
    + '<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">'
    + '<style>'
    + '* { box-sizing:border-box; margin:0; padding:0; }'
    + 'body { font-family:Inter,sans-serif; background:#fff; padding:32px; color:#1A1A14; }'
    + '.menu-header { text-align:center; padding-bottom:24px; margin-bottom:32px; border-bottom:3px solid ' + accentColor + '; }'
    + '.menu-header h1 { font-family:"Playfair Display",Georgia,serif; font-size:28pt; font-weight:900; color:#1A1A14; margin-bottom:6px; }'
    + '.menu-header .tagline { font-size:10pt; color:#888; font-style:italic; }'
    + '.menu-header .info { font-size:9pt; color:#666; margin-top:8px; }'
    + '.category { margin-bottom:28px; page-break-inside:avoid; }'
    + '.category-title { font-family:"Playfair Display",Georgia,serif; font-size:13pt; font-weight:700; color:' + accentColor + '; letter-spacing:0.1em; text-transform:uppercase; border-bottom:1.5px solid ' + accentColor + '; padding-bottom:6px; margin-bottom:14px; }'
    + '.item { display:flex; gap:14px; align-items:flex-start; padding:10px 0; border-bottom:0.5px solid #f0f0f0; page-break-inside:avoid; }'
    + '.item:last-child { border-bottom:none; }'
    + '.item-photo { width:70px; height:70px; object-fit:cover; border-radius:8px; flex-shrink:0; }'
    + '.item-body { flex:1; }'
    + '.item-name-row { display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:3px; }'
    + '.item-name { font-size:11pt; font-weight:600; color:#1A1A14; }'
    + '.item-price { font-size:11pt; font-weight:700; color:' + accentColor + '; white-space:nowrap; }'
    + '.item-desc { font-size:9pt; color:#666; line-height:1.6; }'
    + '.footer { text-align:center; margin-top:32px; padding-top:16px; border-top:1px solid #eee; font-size:8pt; color:#aaa; }'
    + '@media print { @page { margin:0.6in; } body { padding:0; } }'
    + '</style></head><body>'
    + '<div class="menu-header">'
    + '<h1>' + restaurantName + '</h1>'
    + (settings.tagline ? '<div class="tagline">"' + settings.tagline + '"</div>' : '')
    + '<div class="info">'
    + [settings.hours, settings.phone, settings.address].filter(Boolean).join(' &nbsp;·&nbsp; ')
    + '</div></div>';

  sortedGroups.forEach(([cat, items]) => {
    html += '<div class="category">';
    html += '<div class="category-title">' + cat + '</div>';
    items.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(item => {
      html += '<div class="item">';
      if (showPhotos && item.photoUrl) {
        html += '<img class="item-photo" src="' + item.photoUrl + '">';
      }
      html += '<div class="item-body">';
      html += '<div class="item-name-row">';
      html += '<div class="item-name">' + item.name + '</div>';
      if (showPrice && item.price) html += '<div class="item-price">$' + item.price + '</div>';
      html += '</div>';
      if (showDesc && item.notes) html += '<div class="item-desc">' + item.notes + '</div>';
      html += '</div></div>';
    });
    html += '</div>';
  });

  const date = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  html += '<div class="footer">Printed ' + date + ' · Powered by Chef Nek Pro</div>';
  html += '</body></html>';

  document.getElementById('print-menu-modal')?.remove();
  const win = window.open('','_blank','width=850,height=700');
  win.document.write(html);
  win.document.close();
  setTimeout(() => { win.focus(); win.print(); }, 800);
}

// ── INVENTORY SEARCH + FILTER ──
let invActiveFilter = 'all';
let invSearchTerm = '';

window.setInvFilter = function(filter) {
  invActiveFilter = filter;
  const btns = ['all','frozen','low','out','ok'];
  btns.forEach(f => {
    const btn = document.getElementById('inv-filter-'+f);
    if (!btn) return;
    const isActive = f === filter;
    btn.style.background = isActive ? 'var(--green)' : 'var(--white)';
    btn.style.color = isActive ? '#fff' : 'var(--ink-soft)';
    btn.style.borderColor = isActive ? 'var(--green)' : 'var(--border)';
    btn.style.fontWeight = isActive ? '500' : '400';
  });
  applyInvFilter();
}

window.filterInventory = function() {
  invSearchTerm = document.getElementById('inv-search').value.toLowerCase().trim();
  const clearBtn = document.getElementById('inv-search-clear');
  if (clearBtn) clearBtn.style.display = invSearchTerm ? 'block' : 'none';
  applyInvFilter();
}

window.clearInvSearch = function() {
  document.getElementById('inv-search').value = '';
  invSearchTerm = '';
  document.getElementById('inv-search-clear').style.display = 'none';
  applyInvFilter();
}

function applyInvFilter() {
  const categories = document.querySelectorAll('.inv-category');
  let totalVisible = 0;

  categories.forEach(cat => {
    const rows = cat.querySelectorAll('.inv-item-row');
    let catVisible = 0;

    rows.forEach(row => {
      const name = row.querySelector('.inv-item-name') ? row.querySelector('.inv-item-name').textContent.toLowerCase() : '';
      const isFrozen = row.querySelector('.inv-item-name') && row.querySelector('.inv-item-name').parentElement.innerHTML.includes('❄️');
      const isOut = row.classList.contains('critical-stock');
      const isLow = row.classList.contains('low-stock');
      const isOk = !isOut && !isLow;

      const matchesSearch = !invSearchTerm || name.includes(invSearchTerm);
      const matchesFilter =
        invActiveFilter === 'all' ||
        (invActiveFilter === 'frozen' && isFrozen) ||
        (invActiveFilter === 'out' && isOut) ||
        (invActiveFilter === 'low' && (isLow || isOut)) ||
        (invActiveFilter === 'ok' && isOk);

      const visible = matchesSearch && matchesFilter;
      row.style.display = visible ? '' : 'none';
      if (visible) catVisible++;
    });

    totalVisible += catVisible;

    // Show/hide category based on matches
    const body = cat.querySelector('[id^="inv-cat-body-"]');
    if (invSearchTerm || invActiveFilter !== 'all') {
      cat.style.display = catVisible > 0 ? '' : 'none';
      if (body && catVisible > 0) body.style.display = 'block';
      // Update chevron
      const chev = cat.querySelector('[id^="inv-chevron-"]');
      if (chev && catVisible > 0) chev.classList.add('open');
    } else {
      cat.style.display = '';
    }
  });

  // Update results label
  const label = document.getElementById('inv-search-results-label');
  if (label) {
    if (invSearchTerm || invActiveFilter !== 'all') {
      label.style.display = 'block';
      label.textContent = totalVisible + ' item' + (totalVisible !== 1 ? 's' : '') + ' found' + (invSearchTerm ? ' for "' + invSearchTerm + '"' : '') + (invActiveFilter !== 'all' ? ' · ' + invActiveFilter + ' filter active' : '');
    } else {
      label.style.display = 'none';
    }
  }
}

async function loadInvCategories(userData) {
  const listEl = document.getElementById('inv-categories-list');
  const alertZone = document.getElementById('inv-alert-zone');
  // Remember which categories are open
  const openInvCats = new Set();
  document.querySelectorAll('[id^="inv-cat-body-"]').forEach(el => {
    if (el.style.display === 'block') openInvCats.add(el.id.replace('inv-cat-body-',''));
  });
  try {
    const invRid = currentRestaurantId() || userData.uid;
    const q = query(collection(db, 'invCategories'), where('restaurantId','==', invRid));
    const catSnap = await getDocs(q);

    if (catSnap.empty) {
      listEl.innerHTML = `
        <div style="text-align:center;padding:48px 20px;">
          <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:8px;">No inventory categories yet</div>
          <div style="font-size:0.875rem;color:var(--ink-muted);">${isAdmin ? 'Add your first category above' : 'Chef Nek will set up your inventory soon'}</div>

    }

    const cats = catSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.order||0)-(b.order||0));
    let lowStockAlerts = [];
    let html = '';

    for (const cat of cats) {
      const itemsSnap = await getDocs(
        query(collection(db, 'invItems'), where('categoryId','==', cat.id))

      const items = itemsSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.name||'').localeCompare(b.name||''));
      const lowItems = items.filter(i => i.currentQty <= i.alertAt);
      const criticalItems = items.filter(i => i.currentQty === 0);
      lowItems.forEach(i => lowStockAlerts.push({ name: i.name, cat: cat.name, qty: i.currentQty, unit: i.unit }));

      html += `
        <div class="inv-category" id="inv-cat-${cat.id}">

              ${cat.name}
              ${criticalItems.length > 0 ? `<span style="font-size:0.7rem;background:#FCEBEB;color:#A32D2D;padding:2px 8px;border-radius:20px;font-weight:500;">🚨 ${criticalItems.length} out of stock</span>` : ''}
              ${lowItems.length > 0 && criticalItems.length === 0 ? `<span style="font-size:0.7rem;background:var(--amber-light);color:#854F0B;padding:2px 8px;border-radius:20px;font-weight:500;">⚠ ${lowItems.length} low</span>` : ''}
            </div>
            <div class="inv-cat-meta">
              <span style="font-size:0.8rem;color:var(--ink-muted);">${items.length} items</span>
              <span class="inv-cat-chevron" id="inv-chevron-${cat.id}">›</span>
            </div>
          </div>
          <div class="inv-cat-body" id="inv-cat-body-${cat.id}">
            ${isAdmin ? `
            <div style="padding:8px 18px;background:var(--cream);border-bottom:0.5px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <button onclick="deleteInvCategory('${cat.id}')" style="font-size:11px;padding:3px 10px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;cursor:pointer;">Delete category</button>
            </div>` : ''}
            <div class="inv-header-row">
              <div class="inv-col-label">Item</div>
              <div class="inv-col-label">Unit</div>
              <div class="inv-col-label">Quantity</div>
              <div class="inv-col-label">Status</div>
            </div>
            ${items.map(item => {
              const isLow = item.currentQty <= item.alertAt;
              const isOut = item.currentQty === 0;
              return `
                <div class="inv-item-row ${isOut ? 'critical-stock' : isLow ? 'low-stock' : ''}" id="inv-row-${item.id}" data-alert-at="${item.alertAt||0}">
                  <div>
                    <div class="inv-item-name">
                      ${item.frozen ? '<span style="font-size:0.75rem;background:#E6F1FB;color:#185FA5;padding:2px 8px;border-radius:20px;margin-right:6px;">❄️ Frozen</span>' : ''}
                      ${item.name}
                    </div>
                    ${isAdmin ? `<div style="display:flex;gap:4px;margin-top:4px;">
                      <button onclick="editInvItem('${item.id}')" style="height:18px;padding:0 8px;border-radius:5px;border:0.5px solid var(--border);background:var(--cream);color:var(--ink-soft);font-size:10px;cursor:pointer;">Edit</button>
                      <button onclick="deleteInvItem('${item.id}')" style="height:18px;padding:0 8px;border-radius:5px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:10px;cursor:pointer;">Del</button>
                    </div>` : ''}
                    <div id="edit-inv-item-${item.id}" style="display:none;margin-top:8px;">
                      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;">
                        <input type="text" id="edit-inv-name-${item.id}" value="${item.name}" class="form-input-small" placeholder="Item name">
                        <input type="text" id="edit-inv-unit-${item.id}" value="${item.unit||''}" class="form-input-small" placeholder="Unit">
                        <input type="number" id="edit-inv-alert-${item.id}" value="${item.alertAt||0}" class="form-input-small" placeholder="Alert at qty">
                        <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;cursor:pointer;grid-column:span 2;">
                          <input type="checkbox" id="edit-inv-frozen-${item.id}" ${item.frozen?'checked':''} style="accent-color:#185FA5;width:14px;height:14px;">
                          <span style="color:#185FA5;font-weight:500;">❄️ Frozen item</span>
                        </label>
                      </div>
                      <div style="display:flex;gap:6px;">
                        <button onclick="saveInvItem('${item.id}')" class="form-btn-small">Save</button>
                        <button onclick="document.getElementById('edit-inv-item-${item.id}').style.display='none'" style="height:36px;padding:0 12px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--ink-soft);font-size:0.8rem;cursor:pointer;">Cancel</button>
                      </div>
                    </div>
                  </div>
                  <div class="inv-item-unit">${item.unit||'—'}</div>
                  <div class="inv-qty-controls">
                    <button class="inv-qty-btn" id="inv-minus-${item.id}" onclick="invStep('${item.id}', -1)" ${(item.currentQty||0)===0?'disabled':''} style="${(item.currentQty||0)===0?'opacity:0.3;cursor:not-allowed;':''}">−</button>
                    <span class="inv-qty-val" id="inv-qty-val-${item.id}" data-qty="${item.currentQty||0}" style="color:${isOut?'var(--red)':isLow?'var(--amber)':'var(--ink)'};font-weight:${isOut||isLow?'700':'500'};">${item.currentQty||0}</span>
                    <button class="inv-qty-btn" id="inv-plus-${item.id}" onclick="invStep('${item.id}', 1)">+</button>
                  </div>
                  <div>
                    <span class="inv-status" id="inv-status-${item.id}" style="background:${isOut?'#FCEBEB':isLow?'var(--amber-light)':'var(--green-light)'};color:${isOut?'#A32D2D':isLow?'#854F0B':'#0F6E56'};">
                      ${isOut ? '🚨 Out' : isLow ? '⚠ Low' : '✓ OK'}
                    </span>
                  </div>
                </div>`;
            }).join('')}
            ${isAdmin ? `
            <div style="padding:12px 18px;border-top:0.5px solid var(--border);background:var(--cream);">
              <div style="display:grid;grid-template-columns:1fr 1fr 80px 80px;gap:8px;margin-bottom:8px;">
                <input type="text" id="new-inv-item-name-${cat.id}" class="form-input-small" placeholder="Item name (e.g. Chicken breast)">
                <input type="text" id="new-inv-item-unit-${cat.id}" class="form-input-small" placeholder="Unit (e.g. lbs, pcs)">
                <input type="number" id="new-inv-item-qty-${cat.id}" class="form-input-small" placeholder="Qty" min="0">
                <input type="number" id="new-inv-item-alert-${cat.id}" class="form-input-small" placeholder="Alert" min="0">

              <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;cursor:pointer;">
                  <input type="checkbox" id="new-inv-item-frozen-${cat.id}" style="accent-color:#185FA5;width:14px;height:14px;">
                  <span style="color:#185FA5;font-weight:500;">❄️ Frozen item</span>

                <button onclick="addInvItem('${cat.id}','${cat.restaurantId}')" class="form-btn-small">+ Add item</button>
              </div>
            </div>` : ''}
          </div>
        </div>`;
    }

    listEl.innerHTML = html;

    // Restore open categories
    openInvCats.forEach(catId => {
      const body = document.getElementById('inv-cat-body-'+catId);
      const chev = document.getElementById('inv-chevron-'+catId);
      if (body) { body.style.display = 'block'; }
      if (chev) { chev.classList.add('open'); }
    });

    // Show low stock alert banner
    if (lowStockAlerts.length > 0 && alertZone) {

          <div style="font-size:1.5rem;flex-shrink:0;">⚠️</div>

window.toggleInvCat = function(id) {
  const body = document.getElementById('inv-cat-body-'+id);
  const chev = document.getElementById('inv-chevron-'+id);
  const isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  chev.classList.toggle('open', !isOpen);
}

window.invStep = function(itemId, delta) {
  const valEl = document.getElementById('inv-qty-val-' + itemId);
  const currentQty = parseInt(valEl?.dataset.qty || valEl?.textContent || 0);
  const newQty = currentQty + delta;
  if (newQty < 0) return;
  window.updateInvQty(itemId, newQty);
}

window.updateInvQty = async function(itemId, newQty) {
  if (newQty < 0) return;
  try {
    await setDoc(doc(db, 'invItems', itemId), { currentQty: newQty }, { merge: true });
    // Update UI instantly — no full reload
    const valEl = document.getElementById('inv-qty-val-'+itemId);
    const rowEl = document.getElementById('inv-row-'+itemId);
    const minusEl = document.getElementById('inv-minus-'+itemId);
    const alertAt = parseInt(rowEl?.dataset.alertAt || 0);
    const isOut = newQty === 0;
    const isLow = newQty <= alertAt && !isOut;
    if (valEl) {
      valEl.textContent = newQty;
      valEl.dataset.qty = newQty;
      valEl.style.color = isOut ? 'var(--red)' : isLow ? 'var(--amber)' : 'var(--ink)';
      valEl.style.fontWeight = isOut||isLow ? '700' : '500';
    }
    if (rowEl) {
      rowEl.classList.remove('low-stock','critical-stock');
      if (isOut) rowEl.classList.add('critical-stock');
      else if (isLow) rowEl.classList.add('low-stock');
    }
    // Update status badge
    const statusEl = document.getElementById('inv-status-'+itemId);
    if (statusEl) {
      statusEl.textContent = isOut ? '🚨 Out' : isLow ? '⚠ Low' : '✓ OK';
      statusEl.style.background = isOut ? '#FCEBEB' : isLow ? 'var(--amber-light)' : 'var(--green-light)';
      statusEl.style.color = isOut ? '#A32D2D' : isLow ? '#854F0B' : '#0F6E56';
    }
    if (minusEl) minusEl.disabled = newQty === 0;
  } catch(e) { showToast('Error updating quantity', 'error'); }
}

window.addInvItem = async function(catId, restaurantId) {
  const name = document.getElementById('new-inv-item-name-'+catId).value.trim();
  const unit = document.getElementById('new-inv-item-unit-'+catId).value.trim();
  const currentQty = parseFloat(document.getElementById('new-inv-item-qty-'+catId).value) || 0;
  const alertAt = parseFloat(document.getElementById('new-inv-item-alert-'+catId).value) || 0;
  const frozen = document.getElementById('new-inv-item-frozen-'+catId) ? document.getElementById('new-inv-item-frozen-'+catId).checked : false;
  if (!name) { showToast('Item name required', 'error'); return; }
  try {
    await addDoc(collection(db, 'invItems'), {
      name, unit, currentQty, alertAt, frozen, categoryId: catId, restaurantId, createdAt: serverTimestamp()
    });
    showToast('Item added!');
    document.getElementById('new-inv-item-name-'+catId).value = '';
    document.getElementById('new-inv-item-unit-'+catId).value = '';
    document.getElementById('new-inv-item-qty-'+catId).value = '';
    document.getElementById('new-inv-item-alert-'+catId).value = '';
    if (document.getElementById('new-inv-item-frozen-'+catId)) document.getElementById('new-inv-item-frozen-'+catId).checked = false;
    loadInvCategories(window._userData);
  } catch(e) { showToast('Error adding item', 'error'); }
}

  const unit = document.getElementById('edit-inv-unit-'+id).value.trim();
  const alertAt = parseFloat(document.getElementById('edit-inv-alert-'+id).value) || 0;
  const frozen = document.getElementById('edit-inv-frozen-'+id) ? document.getElementById('edit-inv-frozen-'+id).checked : false;
  if (!name) { showToast('Item name required', 'error'); return; }
  try {
    await setDoc(doc(db, 'invItems', id), { name, unit, alertAt, frozen }, { merge: true });
    showToast('Item updated!');

  } catch(e) { showToast('Error updating item', 'error'); }
}

window.deleteInvItem = async function(id) {
  if (!confirm('Delete this item?')) return;
  try {
    const { deleteDoc: dd } =
    await dd(doc(db, 'invItems', id));

async function createClientAccount() {
  const restaurant = document.getElementById('new-client-restaurant')?.value.trim();
  const owner = document.getElementById('new-client-owner')?.value.trim() || '';
  const email = document.getElementById('new-client-email')?.value.trim();
  const password = document.getElementById('new-client-password')?.value.trim();
  const btn = document.getElementById('add-client-modal-btn');
  if (!restaurant || !email || !password) { showToast('Fill all required fields', 'error'); return; }
  if (password.length < 6) { showToast('Password must be 6+ characters', 'error'); return; }
  if (btn) { btn.textContent = 'Creating...'; btn.disabled = true; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, 'users', cred.user.uid), {
      email, restaurantName: restaurant, ownerName: owner,
      isAdmin: false, status: 'active', createdAt: serverTimestamp()
    });
    showToast(restaurant + ' account created!');
    document.getElementById('add-client-modal')?.remove();
    loadClients();
  } catch(e) {
    if (btn) { btn.textContent = 'Create account'; btn.disabled = false; }
    showToast(e.message || 'Error creating account', 'error');
  }
}

async function loadClients() {
  const listEl = document.getElementById('clients-list');
  if (!listEl) return;
  try {
    const snap = await getDocs(collection(db, 'users'));
    const clients = snap.docs
      .filter(d => !d.data().isAdmin)
      .map(d => ({id: d.id, ...d.data()}))
      .sort((a,b) => (a.restaurantName||'').localeCompare(b.restaurantName||''));

    if (clients.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No clients yet</div><div class="empty-state-sub">Click "+ Add client" to create the first restaurant account</div></div>';
      return;
    }

    listEl.innerHTML = '';

    // Stats
    const activeCount = clients.filter(c=>c.status!=='suspended').length;
    const paidCount = clients.filter(c=>c.paymentStatus==='paid').length;
    const totalRevenue = clients.reduce((s,c)=>s+(c.monthlyFee||0),0);
    const stats = document.createElement('div');
    stats.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;';
    stats.innerHTML = '<div class="stat-card"><div class="stat-card-label">Total clients</div><div class="stat-card-value green">' + clients.length + '</div></div>'
      + '<div class="stat-card"><div class="stat-card-label">Active</div><div class="stat-card-value">' + activeCount + '</div></div>'
      + '<div class="stat-card"><div class="stat-card-label">Monthly revenue</div><div class="stat-card-value amber">$' + totalRevenue + '</div></div>';
    listEl.appendChild(stats);

    clients.forEach(client => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.cssText = 'margin-bottom:12px;cursor:pointer;transition:border-color 0.2s,box-shadow 0.2s;';
      card.title = 'Click to view ' + (client.restaurantName||'client') + ' dashboard';
      card.onmouseenter = () => { card.style.borderColor='var(--green)'; card.style.boxShadow='0 4px 20px rgba(29,158,117,0.12)'; };
      card.onmouseleave = () => { card.style.borderColor=''; card.style.boxShadow=''; };
      card.onclick = (e) => {
        if (e.target.tagName === 'BUTTON') return;
        viewClientDashboard(client);
      };

      const status = client.status || 'active';
      const payStatus = client.paymentStatus || 'unpaid';
      const statusColor = status==='active' ? '#1D9E75' : '#E24B4A';
      const statusBg = status==='active' ? 'var(--green-light)' : '#FCEBEB';
      const payColor = payStatus==='paid' ? '#1D9E75' : payStatus==='overdue' ? '#E24B4A' : '#B5860A';
      const payBg = payStatus==='paid' ? 'var(--green-light)' : payStatus==='overdue' ? '#FCEBEB' : '#FFF8E1';

      // Top row: name + badges
      const top = document.createElement('div');
      top.style.cssText = 'display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:10px;';
      top.innerHTML = '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">'
        + '<div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);">' + (client.restaurantName||'Unnamed') + '</div>'
        + '<span style="font-size:0.65rem;background:var(--green-light);color:var(--green-dark);padding:2px 8px;border-radius:20px;font-weight:600;">Click to view</span>'
        + '<span style="font-size:0.65rem;background:'+statusBg+';color:'+statusColor+';padding:2px 8px;border-radius:20px;font-weight:700;">' + (status==='active'?'Active':'Suspended') + '</span>'
        + '<span style="font-size:0.65rem;background:'+payBg+';color:'+payColor+';padding:2px 8px;border-radius:20px;font-weight:700;">' + (payStatus==='paid'?'Paid':payStatus==='overdue'?'Overdue':'Unpaid') + '</span>'
        + '</div>'
        + '<div style="font-size:0.8rem;color:var(--ink-muted);">' + (client.email||'') + '</div>';
      card.appendChild(top);

      // Action buttons
      const actions = document.createElement('div');
      actions.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;border-top:0.5px solid var(--border);padding-top:10px;margin-top:4px;';

      const mkBtn = (label, color, bg, border, fn) => {
        const b = document.createElement('button');
        b.textContent = label;
        b.style.cssText = 'height:32px;padding:0 12px;border-radius:8px;border:0.5px solid '+border+';background:'+bg+';color:'+color+';font-family:var(--font-body);font-size:0.78rem;cursor:pointer;font-weight:500;';
        b.onclick = fn;
        return b;
      };

      actions.appendChild(mkBtn('View menu', 'var(--ink-soft)', 'var(--cream)', 'var(--border)', () => { window._menuViewingRestaurantId=client.id; navigate('menudesign'); }));
      actions.appendChild(mkBtn(status==='active'?'Suspend':'Activate', status==='active'?'#B5860A':'var(--green-dark)', status==='active'?'#FFF8E1':'var(--green-light)', status==='active'?'#F2A623':'var(--green)', () => toggleClientStatus(client.id, client.restaurantName, status)));
      actions.appendChild(mkBtn(payStatus==='paid'?'Mark unpaid':'Mark paid', payStatus==='paid'?'var(--ink-muted)':'var(--green-dark)', payStatus==='paid'?'var(--cream)':'var(--green-light)', payStatus==='paid'?'var(--border)':'var(--green)', () => togglePaymentStatus(client.id, client.restaurantName, payStatus)));
      actions.appendChild(mkBtn('Receipt', '#5B3DB5', '#F3EEFF', '#5B3DB5', () => showReceiptModal(client)));
      actions.appendChild(mkBtn('Reset password', 'var(--ink-soft)', 'var(--cream)', 'var(--border)', () => resetClientPassword(client.email, client.restaurantName)));
      actions.appendChild(mkBtn('Delete', '#A32D2D', '#FCEBEB', '#F09595', () => deleteClient(client.id, client.restaurantName)));

      card.appendChild(actions);
      listEl.appendChild(card);
    });
  } catch(e) {
    console.error(e);
    listEl.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading clients.</p></div>';
  }
}
