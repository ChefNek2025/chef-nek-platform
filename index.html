<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD Bar — Prep & Inventory Import</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,sans-serif; background:#F8F7F2; color:#1A1A14; padding:24px 16px; max-width:680px; margin:0 auto; }
  h1 { font-size:1.4rem; font-weight:800; margin-bottom:4px; }
  .sub { font-size:0.85rem; color:#8A8A7A; margin-bottom:24px; }
  .card { background:#fff; border-radius:16px; border:1px solid #E8E8E0; padding:20px; margin-bottom:16px; }
  .card-title { font-size:1rem; font-weight:700; margin-bottom:14px; display:flex;align-items:center;gap:8px; }
  label { font-size:0.75rem; font-weight:600; color:#4A4A3A; display:block; margin-bottom:5px; }
  input { width:100%; height:42px; border:1.5px solid #E0E0D8; border-radius:8px; padding:0 12px; font-size:0.875rem; font-family:inherit; outline:none; margin-bottom:12px; }
  input:focus { border-color:#1D9E75; }
  .btn { width:100%; height:46px; border-radius:12px; border:none; font-family:inherit; font-size:0.875rem; font-weight:700; cursor:pointer; }
  .btn-green { background:#1D9E75; color:#fff; }
  .btn-green:disabled { opacity:0.5; cursor:not-allowed; }
  .btn-amber { background:#F2A623; color:#fff; margin-top:8px; }
  .progress { height:6px; background:#E8E8E0; border-radius:3px; overflow:hidden; margin:12px 0; display:none; }
  .progress-fill { height:100%; background:#1D9E75; border-radius:3px; transition:width 0.3s; width:0; }
  .status { padding:10px 14px; border-radius:10px; font-size:0.82rem; font-weight:600; margin-top:8px; display:none; }
  .success { background:#E0F5EC; color:#0A6B3A; }
  .error { background:#FCEBEB; color:#A32D2D; }
  .item-list { display:flex; flex-direction:column; gap:4px; margin-top:10px; max-height:280px; overflow-y:auto; }
  .item-row { display:flex; justify-content:space-between; align-items:center; padding:6px 10px; background:#F8F7F2; border-radius:8px; font-size:0.82rem; }
  .cat-label { font-size:0.68rem; font-weight:700; color:#1D9E75; text-transform:uppercase; letter-spacing:0.08em; padding:8px 0 3px; }
</style>
</head>
<body>

<h1>🦁 JD Bar & Restaurant</h1>
<p class="sub">Prep List & Inventory Import · Chef Nek Pro</p>

<div class="card">
  <label>Firebase Restaurant ID (JD Bar UID)</label>
  <input type="text" id="rid" placeholder="Paste JD Bar's Firebase UID here">
</div>

<!-- PREP LIST -->
<div class="card">
  <div class="card-title">📋 Prep List <span style="font-size:0.75rem;font-weight:400;color:#8A8A7A;">(32 items across 5 categories)</span></div>
  <div class="item-list" id="prep-preview"></div>
  <div class="progress" id="prep-progress"><div class="progress-fill" id="prep-fill"></div></div>
  <div class="status" id="prep-status"></div>
  <button class="btn btn-green" id="prep-btn" onclick="importPrep()" style="margin-top:14px;">📋 Import Prep List</button>
</div>

<!-- INVENTORY -->
<div class="card">
  <div class="card-title">📦 Inventory <span style="font-size:0.75rem;font-weight:400;color:#8A8A7A;">(38 items across 6 categories)</span></div>
  <div class="item-list" id="inv-preview"></div>
  <div class="progress" id="inv-progress"><div class="progress-fill" id="inv-fill"></div></div>
  <div class="status" id="inv-status"></div>
  <button class="btn btn-amber" id="inv-btn" onclick="importInventory()" style="margin-top:14px;">📦 Import Inventory</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getFirestore, collection, addDoc, serverTimestamp, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
const db = getFirestore(initializeApp({ apiKey:"AIzaSyCbX-lJSCX2XU4UKOA-6RvvOdBiU_CFTl0", authDomain:"chef-nek-pro-dad86.firebaseapp.com", projectId:"chef-nek-pro-dad86" }));

// ── PREP LIST ──────────────────────────────
const PREP_DATA = [
  { category:'Proteins', items:[
    'Marinate beef for Tibs (Derek, Lega, Awaze) — 15 lbs',
    'Prepare Kitfo — mince and season with Niter Kibbeh & mitmita — 8 lbs',
    'Slice beef for Gored Gored — cube into 1" pieces — 5 lbs',
    'Prep Kurt Sega — slice premium raw beef into thin strips — 4 lbs',
    'Clean and prep beef tripe for Melase & Senber — 4 lbs',
    'Prep beef tongue for Melase & Senber — slice and clean — 3 lbs',
    'Marinate Ferari Tibs chicken breast — cube and season — 6 lbs',
    'Prep Goden Tibs beef ribs — portion and season — 8 lbs',
    'Prepare ground beef for Gas Light — season with spices — 4 lbs',
    'Prep Sega Firfir beef — slice and pre-cook — 4 lbs',
  ]},
  { category:'Sauces & Spice Blends', items:[
    'Make Niter Kibbeh (Ethiopian spiced clarified butter) — 2 lbs',
    'Prepare Awaze sauce — blend and season — 2 quarts',
    'Mix mitmita spice blend — 1 lb',
    'Prepare berbere spice mix — 1 lb',
    'Make Ayib (Ethiopian cottage cheese) — 3 lbs',
    'Prep Kocho (fermented enset flatbread portions) — 20 portions',
  ]},
  { category:'Vegetables & Aromatics', items:[
    'Dice onions fine — 10 lbs',
    'Slice jalapeños — 3 lbs',
    'Dice tomatoes — 5 lbs',
    'Slice green peppers — 3 lbs',
    'Mince garlic — 1 lb',
    'Pick and clean collard greens — 4 lbs',
    'Portion rosemary sprigs — 1 bunch',
  ]},
  { category:'Injera & Bread', items:[
    'Bake fresh injera — 50 pieces',
    'Prep Kocho portions for service — 20 pieces',
    'Slice fresh bread for Kitfo Sandwich — 20 portions',
  ]},
  { category:'Station Setup', items:[
    'Clean and season clay pots for JD Specials',
    'Set up hot holding station — check temps above 140°F',
    'Pre-portion specialty plates for JD Special combos',
    'Stock garnish station — herbs and accompaniments',
    'Prep cold holding for raw beef dishes (Kurt Sega, Gored Gored)',
    'Check all Ethiopian spice jars — refill as needed',
  ]},
];

// ── INVENTORY ──────────────────────────────
const INV_DATA = [
  { category:'Raw Proteins', items:[
    'Beef tenderloin (for Tibs, Kurt Sega, Gored Gored)',
    'Beef tripe (for Melase & Senber, Dulet)',
    'Beef tongue (for Melase & Senber)',
    'Beef ribs / prime rib (for Goden Tibs)',
    'Ground beef (for Gas Light)',
    'Chicken breast (for Ferari Tibs)',
    'Beef short rib (for Derek Tibs)',
    'Beef loin for Kitfo (premium ground)',
  ]},
  { category:'Ethiopian Pantry', items:[
    'Berbere spice blend',
    'Mitmita spice',
    'Niter Kibbeh (Ethiopian spiced butter)',
    'Kocho (fermented enset bread)',
    'Tej (Ethiopian honey wine)',
    'Ayib (Ethiopian cottage cheese)',
    'Injera (teff flatbread)',
    'Teff flour (for injera)',
    'Cardamom pods',
    'Turmeric',
    'Fenugreek',
  ]},
  { category:'Vegetables & Produce', items:[
    'Yellow onions',
    'Jalapeño peppers',
    'Roma tomatoes',
    'Green bell peppers',
    'Garlic bulbs',
    'Collard greens',
    'Fresh rosemary',
    'Fresh ginger',
  ]},
  { category:'Oils & Dairy', items:[
    'Unsalted butter (for Niter Kibbeh)',
    'Clarified butter (Ghee)',
    'Whole milk (for Ayib)',
    'Vegetable oil',
  ]},
  { category:'Dry Goods & Bread', items:[
    'Fresh bread loaves (for Kitfo Sandwich)',
    'Teff grain',
    'Salt — kosher',
    'Black pepper',
    'Cardamom — ground',
  ]},
  { category:'Bar & Beverages', items:[
    'Tej (Ethiopian honey wine)',
    'Tella (Ethiopian beer)',
    'Still water — cases',
    'Sparkling water — cases',
    'Ethiopian coffee beans',
    'Coffee filters',
    'Incense (for traditional coffee ceremony)',
  ]},
];

// Build previews
function buildPreview(data, elId) {
  const el = document.getElementById(elId);
  data.forEach(cat => {
    const cl = document.createElement('div');
    cl.className = 'cat-label';
    cl.textContent = cat.category;
    el.appendChild(cl);
    cat.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'item-row';
      const text = item.includes('—') ? item.split('—')[0].trim() : item;
      const note = item.includes('—') ? item.split('—').slice(1).join('—').trim() : '';
      row.innerHTML = '<span>' + text + '</span>' + (note ? '<span style="color:#8A8A7A;font-size:0.72rem;max-width:200px;text-align:right;">' + note + '</span>' : '');
      el.appendChild(row);
    });
  });
}
buildPreview(PREP_DATA, 'prep-preview');
buildPreview(INV_DATA, 'inv-preview');

// IMPORT PREP
window.importPrep = async function() {
  const rid = document.getElementById('rid').value.trim();
  if (!rid) { alert('Enter the Restaurant ID first!'); return; }
  const btn = document.getElementById('prep-btn');
  const bar = document.getElementById('prep-progress');
  const fill = document.getElementById('prep-fill');
  const status = document.getElementById('prep-status');
  btn.disabled = true; btn.textContent = 'Importing...';
  bar.style.display = 'block';

  // Create categories first
  let done = 0;
  const total = PREP_DATA.reduce((s,c) => s + c.items.length, 0) + PREP_DATA.length;

  for (const cat of PREP_DATA) {
    try {
      const catRef = await addDoc(collection(db,'prepCategories'), {
        name: cat.category, restaurantId: rid, createdAt: serverTimestamp()
      });
      done++;
      fill.style.width = Math.round(done/total*100) + '%';

      for (const item of cat.items) {
        const name = item.includes('—') ? item.split('—')[0].trim() : item;
        const note = item.includes('—') ? item.split('—').slice(1).join('—').trim() : '';
        await addDoc(collection(db,'prepItems'), {
          name, note, categoryId: catRef.id, restaurantId: rid,
          createdAt: serverTimestamp()
        });
        done++;
        fill.style.width = Math.round(done/total*100) + '%';
      }
    } catch(e) { console.error(e); }
    await new Promise(r => setTimeout(r, 80));
  }

  status.style.display = 'block';
  status.className = 'status success';
  status.textContent = '✅ Prep list imported! ' + done + ' items added to ' + rid;
  btn.textContent = '✅ Prep list done!';
}

// IMPORT INVENTORY
window.importInventory = async function() {
  const rid = document.getElementById('rid').value.trim();
  if (!rid) { alert('Enter the Restaurant ID first!'); return; }
  const btn = document.getElementById('inv-btn');
  const bar = document.getElementById('inv-progress');
  const fill = document.getElementById('inv-fill');
  const status = document.getElementById('inv-status');
  btn.disabled = true; btn.textContent = 'Importing...';
  bar.style.display = 'block';

  let done = 0;
  const total = INV_DATA.reduce((s,c) => s + c.items.length, 0) + INV_DATA.length;

  for (const cat of INV_DATA) {
    try {
      const catRef = await addDoc(collection(db,'invCategories'), {
        name: cat.category, restaurantId: rid, createdAt: serverTimestamp()
      });
      done++;
      fill.style.width = Math.round(done/total*100) + '%';

      for (const item of cat.items) {
        const name = item.includes('(') ? item.split('(')[0].trim() : item;
        const note = item.includes('(') ? '(' + item.split('(').slice(1).join('(') : '';
        await addDoc(collection(db,'invItems'), {
          name, note, categoryId: catRef.id, restaurantId: rid,
          currentQty: 0, unit: 'unit', createdAt: serverTimestamp()
        });
        done++;
        fill.style.width = Math.round(done/total*100) + '%';
      }
    } catch(e) { console.error(e); }
    await new Promise(r => setTimeout(r, 80));
  }

  status.style.display = 'block';
  status.className = 'status success';
  status.textContent = '✅ Inventory imported! ' + done + ' items added to ' + rid;
  btn.textContent = '✅ Inventory done!';
}
</script>
</body>
</html>
