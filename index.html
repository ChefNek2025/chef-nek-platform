<!DOCTYPE html>
<!-- Chef Nek Pro v4.12 - Name chips update -->
<html lang="en">
<head>
<meta charset="UTF-8">

<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Nek Pro — Platform</title>
<!-- PWA Support -->
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chef Nek Pro">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Chef Nek Pro">
<link rel="manifest" href="manifest.json">
<!-- App Icons -->
<link rel="apple-touch-icon" href="https://i.ibb.co/srCVgm3/IMG-8789.jpg">
<link rel="icon" type="image/png" href="https://i.ibb.co/srCVgm3/IMG-8789.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --amber: #F2A623;
    --amber-light: #FAEEDA;
    --cream: #FAF7F2;
    --ink: #1A1A14;
    --ink-soft: #4A4A3A;
    --ink-muted: #8A8A7A;
    --border: rgba(26,26,20,0.1);
    --white: #FFFFFF;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }
  html, body { height: 100%; font-family: var(--font-body); background: var(--cream); color: var(--ink); }
  #root { height: 100%; }

  /* ── LOADING ── */
  .loading-screen {
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: var(--cream);
  }
  .loading-logo { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--ink); }
  .loading-logo span { color: var(--green); }
  .loading-spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid var(--green-light);
    border-top-color: var(--green);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LOGIN PAGE ── */
  .login-page {
    min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
  }
  @media(max-width:768px) { .login-page { grid-template-columns: 1fr; } }
  .login-left {
    background: var(--green);
    display: flex; flex-direction: column;
    justify-content: center; padding: 60px;
    position: relative; overflow: hidden;
  }
  .login-left::before {
    content: ''; position: absolute;
    width: 400px; height: 400px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    top: -100px; right: -100px;
  }
  .login-left::after {
    content: ''; position: absolute;
    width: 300px; height: 300px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    bottom: -80px; left: -80px;
  }
  .login-brand { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 12px; }
  .login-brand span { opacity: 0.75; }
  .login-tagline { font-size: 1.1rem; font-weight: 300; color: rgba(255,255,255,0.8); line-height: 1.65; max-width: 340px; margin-bottom: 48px; }
  .login-feature { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .login-feature-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.6); flex-shrink: 0; }
  .login-feature-text { font-size: 0.9rem; color: rgba(255,255,255,0.75); }
  .login-right {
    display: flex; flex-direction: column;
    justify-content: center; padding: 60px;
    background: var(--white);
  }
  .login-form-title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
  .login-form-sub { font-size: 0.9rem; color: var(--ink-muted); margin-bottom: 36px; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--ink-soft); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-input {
    width: 100%; height: 48px; padding: 0 16px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-family: var(--font-body); font-size: 0.9375rem;
    color: var(--ink); background: var(--cream); outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--green); background: var(--white); }
  .form-input.error { border-color: var(--red); }
  .form-btn {
    width: 100%; height: 50px;
    background: var(--green); color: #fff;
    font-family: var(--font-body); font-size: 1rem; font-weight: 500;
    border: none; border-radius: 10px; cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    margin-top: 8px;
  }
  .form-btn:hover { background: var(--green-dark); transform: translateY(-1px); }
  .form-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .form-error { background: var(--red-light); color: var(--red); font-size: 0.875rem; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }

  /* ── APP LAYOUT ── */
  .app-layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  @media(max-width:768px) { .app-layout { grid-template-columns: 1fr; } }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--ink); display: flex; flex-direction: column;
    padding: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-logo-text { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: #fff; }
  .sidebar-logo-text span { color: var(--green); }
  .sidebar-restaurant { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-restaurant-label { font-size: 0.7rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .sidebar-restaurant-name { font-size: 0.9rem; font-weight: 500; color: #fff; }
  .sidebar-nav { flex: 1; padding: 16px 12px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    font-size: 0.875rem; color: rgba(255,255,255,0.6);
    cursor: pointer; margin-bottom: 2px;
    transition: background 0.15s, color 0.15s;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
  .nav-item.active { background: var(--green); color: #fff; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-section-label { font-size: 0.7rem; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 0.08em; padding: 12px 12px 6px; }
  .sidebar-bottom { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .signout-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    font-size: 0.875rem; color: rgba(255,255,255,0.4);
    cursor: pointer; width: 100%; border: none; background: none;
    transition: color 0.15s;
  }
  .signout-btn:hover { color: rgba(255,255,255,0.8); }

  /* ── MAIN CONTENT ── */
  .main-content { background: var(--cream); overflow-y: auto; }
  .page-header { padding: 32px 36px 0; margin-bottom: 28px; }
  .page-title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .page-sub { font-size: 0.9rem; color: var(--ink-muted); }
  .page-body { padding: 0 36px 36px; }
  @media(max-width:768px) { .page-header { padding: 20px 20px 0; } .page-body { padding: 0 20px 20px; } }

  /* ── STAT CARDS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border-radius: 14px; padding: 20px; border: 0.5px solid var(--border); }
  .stat-card-label { font-size: 0.75rem; font-weight: 500; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .stat-card-value { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--ink); line-height: 1; }
  .stat-card-value.green { color: var(--green); }
  .stat-card-value.amber { color: var(--amber); }
  .stat-card-sub { font-size: 0.8rem; color: var(--ink-muted); margin-top: 4px; }

  /* ── CARDS ── */
  .card { background: var(--white); border-radius: 16px; border: 0.5px solid var(--border); padding: 24px; margin-bottom: 20px; }
  .card-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 16px; }

  /* ── QUICK LINKS ── */
  .quick-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .quick-card {
    background: var(--cream); border-radius: 14px; padding: 20px;
    border: 0.5px solid var(--border); cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column; gap: 10px;
    text-align: left;
  }
  .quick-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(26,26,20,0.08); }
  .quick-card-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .quick-card-icon svg { width: 18px; height: 18px; }
  .quick-card-title { font-size: 0.9375rem; font-weight: 500; color: var(--ink); }
  .quick-card-sub { font-size: 0.8rem; color: var(--ink-muted); }

  /* ── ADMIN CLIENT LIST ── */
  .client-table { width: 100%; border-collapse: collapse; }
  .client-table th { text-align: left; font-size: 0.75rem; font-weight: 500; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 0 12px 12px; }
  .client-table td { padding: 12px; border-top: 0.5px solid var(--border); font-size: 0.9rem; color: var(--ink-soft); vertical-align: middle; }
  .client-table tr:hover td { background: var(--cream); }
  .client-name-cell { font-weight: 500; color: var(--ink); }
  .status-badge { display: inline-block; font-size: 0.75rem; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .status-active { background: var(--green-light); color: var(--green-dark); }
  .status-new { background: var(--amber-light); color: #854F0B; }

  /* ── ADD CLIENT FORM ── */
  .add-client-form { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:600px) { .add-client-form { grid-template-columns: 1fr; } }
  .form-btn-small {
    height: 42px; padding: 0 20px;
    background: var(--green); color: #fff;
    font-family: var(--font-body); font-size: 0.875rem; font-weight: 500;
    border: none; border-radius: 8px; cursor: pointer;
    transition: background 0.2s; white-space: nowrap;
  }
  .form-btn-small:hover { background: var(--green-dark); }
  .form-btn-small:disabled { opacity: 0.6; cursor: not-allowed; }
  .form-input-small {
    width: 100%; height: 42px; padding: 0 14px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: var(--font-body); font-size: 0.875rem;
    color: var(--ink); background: var(--cream); outline: none;
    transition: border-color 0.2s;
  }
  .form-input-small:focus { border-color: var(--green); background: var(--white); }

  /* ── SUCCESS / ERROR TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 14px 20px; border-radius: 12px;
    font-size: 0.9rem; font-weight: 500;
    animation: slideUp 0.3s ease; z-index: 1000;
    max-width: 320px;
  }
  .toast.success { background: var(--green); color: #fff; }
  .toast.error { background: var(--red); color: #fff; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 48px 20px; }
  .empty-state-icon { width: 56px; height: 56px; border-radius: 16px; background: var(--green-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .empty-state-icon svg { width: 24px; height: 24px; }
  .empty-state-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .empty-state-sub { font-size: 0.875rem; color: var(--ink-muted); }


  /* ── PREP LIST PRO STYLES ── */
  .prep-week-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .week-label { font-size:0.9rem; font-weight:500; color:var(--ink); }
  .week-btn { height:34px; padding:0 14px; border-radius:8px; border:0.5px solid var(--border); background:var(--white); color:var(--ink-soft); font-size:0.8125rem; cursor:pointer; transition:background 0.15s; }
  .week-btn:hover { background:var(--green-light); color:var(--green-dark); }
  .prep-category { background:var(--white); border-radius:16px; border:0.5px solid var(--border); margin-bottom:16px; overflow:hidden; }
  .prep-cat-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; cursor:pointer; user-select:none; transition:background 0.15s; border-radius:16px; }
  .prep-cat-chevron { font-size:18px; color:var(--ink-muted); transition:transform 0.2s; font-weight:300; }
  .prep-cat-chevron.open { transform:rotate(90deg); color:var(--green); }
  .prep-cat-header:hover { background:var(--cream); }
  .prep-cat-title { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:10px; }
  .prep-cat-meta { display:flex; align-items:center; gap:10px; }
  .prep-cat-progress { font-size:0.8rem; color:var(--ink-muted); }

  .prep-cat-body { border-top:0.5px solid var(--border); }
  .prep-cat-assign { padding:10px 18px; background:var(--cream); display:flex; align-items:center; gap:10px; border-bottom:0.5px solid var(--border); flex-wrap:wrap; }
  .prep-cat-assign-label { font-size:0.8rem; color:var(--ink-muted); }
  .prep-cat-assign-name { font-size:0.8rem; font-weight:500; color:var(--ink); }
  .prep-item-row { display:grid; grid-template-columns:1fr 80px repeat(7,54px); gap:4px; align-items:center; padding:8px 18px; border-bottom:0.5px solid var(--border); }
  .prep-item-row:last-child { border-bottom:none; }
  .prep-item-row.critical-row { background:#FCEBEB; border-left:3px solid #E24B4A; }
  .prep-item-name { font-size:0.875rem; color:var(--ink); display:flex; align-items:center; gap:6px; }
  .prep-item-qty { font-size:0.8rem; color:var(--ink-muted); text-align:center; }
  .day-header { font-size:0.7rem; font-weight:500; color:var(--ink-muted); text-align:center; text-transform:uppercase; }
  .day-check-empty { width:32px; height:32px; border-radius:8px; border:1.5px solid var(--border); background:var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; margin:0 auto; }
  .day-check-empty.today { border-color:var(--green); border-width:2px; background:rgba(29,158,117,0.05); }
  .day-check-empty:hover { border-color:var(--green); background:var(--green-light); }
  .day-check-done { display:flex; flex-direction:column; align-items:center; justify-content:center; width:50px; height:46px; background:var(--green); border:1.5px solid var(--green); border-radius:8px; cursor:pointer; padding:2px; transition:all 0.15s; margin:0 auto; }
  .day-check-done:hover { background:#0F6E56; }
  .day-check-done .chk-tick { font-size:0.65rem; color:#fff; line-height:1.2; }
  .day-check-done .chk-name { font-size:0.6rem; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:46px; line-height:1.2; text-align:center; }
  .day-check-done .chk-time { font-size:0.52rem; color:rgba(255,255,255,0.85); line-height:1.2; text-align:center; }
  .day-check { width:32px; height:32px; border-radius:8px; border:1.5px solid var(--border); background:var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; margin:0 auto; }
  .day-check.checked { background:var(--green); border-color:var(--green); }
  .day-check.today { border-color:var(--green); border-width:2px; }
  .day-check svg { display:none; width:12px; height:12px; }
  .day-check.checked svg { display:block; }
  .prep-cat-footer { padding:12px 18px; background:var(--cream); border-top:0.5px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .approve-btn { height:36px; padding:0 18px; background:var(--green); color:#fff; border:none; border-radius:8px; font-size:0.8125rem; font-weight:500; cursor:pointer; transition:background 0.15s; }
  .approve-btn:hover { background:var(--green-dark); }
  .approve-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .approved-stamp { display:flex; align-items:center; gap:6px; font-size:0.8rem; color:var(--green-dark); font-weight:500; }
  .prep-header-row { display:grid; grid-template-columns:1fr 80px repeat(7,54px); gap:4px; padding:6px 18px; background:var(--cream); border-bottom:0.5px solid var(--border); }
  .critical-alert { background:#FCEBEB; border:1px solid #F09595; border-radius:12px; padding:14px 18px; margin-bottom:16px; display:flex; align-items:flex-start; gap:12px; }

  /* ── MENU DESIGN STYLES ── */
  .menu-preview { background:var(--white); border-radius:16px; border:0.5px solid var(--border); overflow:hidden; }
  .menu-preview-header { padding:32px; text-align:center; }
  .menu-preview-cat { padding:0 24px 24px; }
  .menu-preview-cat-title { font-family:var(--font-display); font-size:1.1rem; font-weight:700; padding:12px 0; border-bottom:2px solid; margin-bottom:16px; }
  .menu-preview-item { display:flex; align-items:flex-start; gap:14px; padding:12px 0; border-bottom:0.5px solid var(--border); }
  .menu-preview-item:last-child { border-bottom:none; }
  .menu-preview-item-photo { width:70px; height:60px; object-fit:cover; border-radius:8px; flex-shrink:0; }
  .menu-preview-item-info { flex:1; }
  .menu-preview-item-name { font-weight:600; font-size:0.9rem; color:var(--ink); margin-bottom:3px; }
  .menu-preview-item-desc { font-size:0.8rem; color:var(--ink-muted); line-height:1.5; }
  .menu-preview-item-price { font-weight:700; font-size:1rem; white-space:nowrap; flex-shrink:0; }
  .qr-box { background:var(--white); border:0.5px solid var(--border); border-radius:16px; padding:24px; text-align:center; }

  /* ── STAFF PICKER STYLES ── */
  .staff-picker-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px; }
  .staff-picker-modal { background:var(--white); border-radius:20px; padding:24px; width:100%; max-width:320px; box-shadow:0 8px 40px rgba(0,0,0,0.15); }
  .staff-picker-title { font-family:var(--font-display); font-size:0.9rem; font-weight:700; color:var(--ink); margin-bottom:4px; }
  .staff-picker-sub { font-size:0.78rem; color:var(--ink-muted); margin-bottom:16px; line-height:1.5; }
  .staff-picker-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .staff-btn { padding:14px 8px; border-radius:12px; border:1.5px solid var(--border); background:var(--cream); color:var(--ink); font-family:var(--font-body); font-size:0.85rem; font-weight:500; cursor:pointer; text-align:center; transition:all 0.15s; }
  .staff-btn:hover { border-color:var(--green); background:var(--green-light); color:var(--green-dark); transform:scale(1.02); }
  .staff-picker-cancel { width:100%; height:40px; border-radius:10px; border:0.5px solid var(--border); background:transparent; color:var(--ink-muted); font-family:var(--font-body); font-size:0.875rem; cursor:pointer; margin-top:8px; }

  /* ── PREP CRITICAL STYLES ── */
  @keyframes criticalPulse { 0%,100%{background:rgba(252,235,235,0.5);} 50%{background:rgba(252,235,235,1);} }
  .critical-missed-banner { background:linear-gradient(135deg,#FCEBEB,#FFF0F0); border:1px solid #F09595; border-radius:12px; padding:14px 18px; margin-bottom:16px; }
  .critical-missed-banner-title { font-size:0.875rem; font-weight:700; color:#A32D2D; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .critical-missed-item { display:flex; align-items:center; gap:8px; font-size:0.8rem; color:#A32D2D; padding:4px 0; border-bottom:0.5px solid rgba(240,149,149,0.3); }
  .critical-missed-item:last-child { border-bottom:none; }

  /* ── INVENTORY PRO STYLES ── */

window.handleLogin = async function() {
  const email = document.getElementById('login-email')?.value.trim();
  const password = document.getElementById('login-password')?.value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  if (!email || !password) {
    if (errEl) { errEl.textContent = 'Please enter email and password.'; errEl.style.display = 'block'; }
    return;
  }
  if (btn) { btn.textContent = 'Signing in...'; btn.disabled = true; }
  if (errEl) errEl.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, password);
    // onAuthStateChanged will handle the rest
  } catch(e) {
    if (btn) { btn.textContent = 'Sign in'; btn.disabled = false; }
    if (errEl) {
      errEl.textContent = e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential'
        ? 'Incorrect email or password. Please try again.'
        : 'Sign in failed. Please check your details.';
      errEl.style.display = 'block';
    }
  }
}

window.handleRegister = async function() {
  const restaurant = document.getElementById('reg-restaurant')?.value.trim();
  const owner = document.getElementById('reg-owner')?.value.trim();
  const email = document.getElementById('reg-email')?.value.trim();
  const password = document.getElementById('reg-password')?.value;
  const btn = document.getElementById('reg-btn');
  const errEl = document.getElementById('reg-error');
  if (!restaurant || !owner || !email || !password) {
    if (errEl) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; }
    return;
  }
  if (password.length < 6) {
    if (errEl) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; }
    return;
  }
  if (btn) { btn.textContent = 'Creating account...'; btn.disabled = true; }
  if (errEl) errEl.style.display = 'none';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, 'users', cred.user.uid), {
      email, restaurantName: restaurant, ownerName: owner,
      isAdmin: false, createdAt: serverTimestamp()
    });
    // onAuthStateChanged will handle redirect
  } catch(e) {
    if (btn) { btn.textContent = 'Create account'; btn.disabled = false; }
    if (errEl) {
      errEl.textContent = e.code === 'auth/email-already-in-use'
        ? 'This email is already registered. Try signing in.'
        : 'Registration failed. Please try again.';
      errEl.style.display = 'block';
    }
  }
}

window.handleForgotPassword = async function() {

  const btn = document.getElementById('reset-btn');
  const errEl = document.getElementById('reset-error');
  const successEl = document.getElementById('reset-success');
  if (!email) {

    return;
  }
  if (btn) { btn.textContent = 'Sending...'; btn.disabled = true; }
  if (errEl) errEl.style.display = 'none';
  try {
    await sendPasswordResetEmail(auth, email);
    if (successEl) successEl.style.display = 'block';
    if (btn) { btn.textContent = 'Send reset link'; btn.disabled = false; }
  } catch(e) {
    if (btn) { btn.textContent = 'Send reset link'; btn.disabled = false; }
    if (errEl) { errEl.textContent = 'Could not send reset email. Check your email address.'; errEl.style.display = 'block'; }
  }
}

window.navigate = function(page) {
  currentPage = page;
  const navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(item => item.classList.remove('active'));
  const activeItem = Array.from(navItems).find(item => item.getAttribute('onclick') === `navigate('${page}')`);
  if (activeItem) activeItem.classList.add('active');
  renderPage(window._userData);
}

// ============================================
// RENDER PAGE
// ============================================
function renderPage(userData) {
  window._userData = userData;
  const main = document.getElementById('main-content');
  if (!main) return;
  switch(currentPage) {
    case 'dashboard': renderDashboard(main, userData); break;
    case 'recipes':   renderRecipes(main, userData); break;
    case 'preplist':  renderPrepList(main, userData); break;
    case 'inventory': renderInventory(main, userData); break;
    case 'menudesign': renderMenuDesign(main, userData); break;
    case 'procedures': renderProcedures(main, userData); break;
    case 'checklists': renderChecklists(main, userData); break;
    case 'stationguide': renderStationGuide(main, userData); break;
    case 'clients':   renderClients(main, userData); break;
    default:          renderDashboard(main, userData);
  }
}

async function loadDashboardStats(userData) {
  try {
    const restaurantId = userData.uid;
    const recipesSnap = await getDocs(query(collection(db, 'recipes'), where('restaurantId', '==', restaurantId)));
    const tasksSnap = await getDocs(query(collection(db, 'prepTasks'), where('restaurantId', '==', restaurantId)));
    const inventorySnap = await getDocs(query(collection(db, 'inventory'), where('restaurantId', '==', restaurantId)));
    const r = document.getElementById('stat-recipes');
    const t = document.getElementById('stat-tasks');
    const i = document.getElementById('stat-inventory');
    if (r) r.textContent = recipesSnap.size;
    if (t) t.textContent = tasksSnap.size;
    if (i) i.textContent = inventorySnap.size;
  } catch(e) {}
}

let activeCategory = 'All';
let allRecipes = [];

window.filterCategory = function(cat) {
  activeCategory = cat;
  const filters = document.getElementById('category-filters');
  if (filters) {
    filters.querySelectorAll('button').forEach(b => {
      b.style.background = b.dataset.cat === cat ? 'var(--green)' : 'var(--white)';
      b.style.color = b.dataset.cat === cat ? '#fff' : 'var(--ink-soft)';
      b.style.borderColor = b.dataset.cat === cat ? 'var(--green)' : 'var(--border)';
      b.style.fontWeight = b.dataset.cat === cat ? '500' : '400';
    });
  }
  renderRecipeList(allRecipes);
}

function renderRecipeList(recipes) {
  const list = document.getElementById('recipes-list');
  const categoryOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks','General'];
  const filtered = activeCategory === 'All' ? recipes : recipes.filter(r => (r.category||'General') === activeCategory);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-title">No recipes in this category</div></div>`;
    return;
  }

  // Group by category in order
  if (activeCategory === 'All') {
    const groups = {};
    filtered.forEach(r => {
      const cat = r.category || 'General';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(r);
    });
    const sortedGroups = Object.entries(groups).sort(([a], [b]) => {
      const ai = categoryOrder.indexOf(a);
      const bi = categoryOrder.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    list.innerHTML = sortedGroups.map(([cat, items]) => `
      <div style="margin-bottom:8px;">
        <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);padding:8px 0 10px;border-bottom:2px solid var(--green);margin-bottom:12px;display:flex;align-items:center;gap:10px;">
          ${cat}
          <span style="font-size:0.75rem;font-weight:400;color:var(--ink-muted);font-family:var(--font-body);">${items.length} item${items.length>1?'s':''}</span>
        </div>
        ${items.map(r => recipeCard(r)).join('')}
      </div>
    `).join('');
  } else {
    list.innerHTML = filtered.map(r => recipeCard(r)).join('');
  }
}

async function loadRecipes(userData) {
  const list = document.getElementById('recipes-list');
  try {
    const q = isAdmin
      ? query(collection(db, 'recipes'), orderBy('createdAt', 'desc'))
      : query(collection(db, 'recipes'), where('restaurantId', '==', userData.uid));
    const snap = await getDocs(q);
    if (snap.empty) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="2" width="18" height="20" rx="3"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="12" y2="16"/></svg></div>
          <div class="empty-state-title">No recipes yet</div>
          <div class="empty-state-sub">${isAdmin ? 'Add your first recipe above' : 'Chef Nek will add your recipes soon'}</div>
        </div>`;
      return;
    }

    // Store all recipes and build filters
    allRecipes = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Build category filter buttons
    const categoryOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];
    const cats = ['All', ...new Set(allRecipes.map(r => r.category || 'General').filter(Boolean))].sort((a,b) => {
      if (a==='All') return -1; if (b==='All') return 1;
      return (categoryOrder.indexOf(a)===-1?99:categoryOrder.indexOf(a)) - (categoryOrder.indexOf(b)===-1?99:categoryOrder.indexOf(b));
    });
    const filterDiv = document.getElementById('category-filters');
    if (filterDiv) {
      filterDiv.innerHTML = cats.map(cat => {
        const isActive = cat === activeCategory;
        const border = isActive ? 'var(--green)' : 'var(--border)';
        const bg = isActive ? 'var(--green)' : 'var(--white)';
        const color = isActive ? '#fff' : 'var(--ink-soft)';
        const weight = isActive ? '500' : '400';
        let html = '<div style="display:inline-flex;align-items:center;gap:0;border-radius:100px;overflow:hidden;border:0.5px solid ' + border + ';">';
        html += '<button data-cat="' + cat + '" onclick="filterCategory(\'' + cat + '\')" style="height:34px;padding:0 16px;border:none;background:' + bg + ';color:' + color + ';font-family:var(--font-body);font-size:0.8125rem;font-weight:' + weight + ';cursor:pointer;transition:all 0.15s;white-space:nowrap;">' + cat + '</button>';
        if (cat !== 'All' && isAdmin) {
          const delBorder = isActive ? 'rgba(255,255,255,0.3)' : 'var(--border)';
          const delColor = isActive ? 'rgba(255,255,255,0.8)' : '#A32D2D';
          html += '<button onclick="deleteRecipeCategory(\'' + cat + '\')" style="height:34px;padding:0 10px;border:none;border-left:0.5px solid ' + delBorder + ';background:' + bg + ';color:' + delColor + ';font-size:0.7rem;cursor:pointer;" title="Delete category">x</button>';
        }
        html += '</div>';
        return html;
      }).join('');
    }
    renderRecipeList(allRecipes);
  } catch(e) {
    list.innerHTML = `<div class="card"><p style="color:var(--ink-muted);">Error loading recipes. Please try again.</p></div>`;
  }
}



window.uploadPhoto = async function(input, urlFieldId, previewId) {
  const file = input.files[0];
  if (!file) return;
  const previewDiv = document.getElementById(previewId);
  const previewImg = document.getElementById(previewId + '-img');
  const urlField = document.getElementById(urlFieldId);

  // Show local preview immediately
  const reader = new FileReader();
  reader.onload = e => {
    if (previewImg) previewImg.src = e.target.result;
    if (previewDiv) previewDiv.style.display = 'flex';
    previewDiv.style.alignItems = 'center';
  };
  reader.readAsDataURL(file);

  // Upload to ImgBB free API
  showToast('Uploading photo...', 'success');
  try {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch('https://api.imgbb.com/1/upload?key=2607f98fd74e91661681ef5b362c36f2', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    if (data.success) {
      urlField.value = data.data.url;
      if (previewImg) previewImg.src = data.data.url;
      showToast('Photo uploaded!');
    } else {
      // Fallback — use base64 local preview
      urlField.value = document.getElementById(previewId + '-img').src;
      showToast('Photo ready — save the recipe!');
    }
  } catch(e) {
    // Fallback — use the local preview
    urlField.value = document.getElementById(previewId + '-img') ? document.getElementById(previewId + '-img').src : '';
    showToast('Photo ready — save the recipe!');
  }
}

window.deleteRecipeCategory = async function(catName) {
  if (!confirm('Delete the "' + catName + '" category? This will delete ALL recipes in it. This cannot be undone.')) return;
  try {
    const q = isAdmin
      ? query(collection(db,'recipes'), where('category','==',catName))
      : query(collection(db,'recipes'), where('restaurantId','==',window._userData.uid), where('category','==',catName));
    const snap = await getDocs(q);
    const {deleteDoc: dd} = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    for (const d of snap.docs) await dd(doc(db,'recipes',d.id));
    showToast(catName + ' category deleted!');
    activeCategory = 'All';
    // Reload
    const main = document.querySelector('.page-body') || document.getElementById('main-content');

window.switchMenuRestaurant = async function(restaurantId) {

  updateMenuPreview(); return;
  // Update share link
  const linkEl = document.getElementById('menu-public-link');
  if (linkEl) linkEl.textContent = window.location.origin + '/menu/' + restaurantId;

  const container = document.getElementById('menu-preview-container');
  if (container) container.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  // Load their settings and recipes
  try {
    const settingsDoc = await getDoc(doc(db, 'menuSettings', restaurantId));
    const settings = settingsDoc.exists() ? settingsDoc.data() : {};
    const theme = settings.theme || 'dark-stone';
    const color = settings.accentColor || '#1D9E75';
    // Get their user data
    const userDoc = await getDoc(doc(db, 'users', restaurantId));
    const clientData = userDoc.exists() ? { uid: restaurantId, ...userDoc.data() } : { uid: restaurantId, restaurantName: 'Restaurant' };
    // Load their recipes
    const recipesSnap = await getDocs(query(collection(db, 'recipes'), where('restaurantId','==', restaurantId)));
    const recipes = recipesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const catOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];
    const groups = {};
    recipes.forEach(r => { const cat = r.category||'Other'; if(!groups[cat]) groups[cat]=[]; groups[cat].push(r); });
    const sortedGroups = Object.entries(groups).sort(([a],[b]) => (catOrder.indexOf(a)===-1?99:catOrder.indexOf(a))-(catOrder.indexOf(b)===-1?99:catOrder.indexOf(b)));
    if (container) container.innerHTML = buildMenuHTML(theme, color, clientData, settings, sortedGroups);
    // Add edit overlay buttons if admin
    if (isAdmin) addMenuEditButtons(recipes, restaurantId);
  } catch(e) {
    console.error(e);
  }
}

function injectMenuEditButtons() {
  // Remove any existing edit buttons first
  document.querySelectorAll('.menu-item-edit-btn').forEach(el => el.remove());
  const recipes = window._menuRecipes || [];
  // Find all item name elements in the menu preview and inject edit button next to them
  const preview = document.getElementById('menu-preview-container');
  if (!preview) return;
  recipes.forEach(recipe => {
    if (!recipe.id || !recipe.name) return;
    // Find elements containing this recipe name
    const allEls = preview.querySelectorAll('div, span');
    allEls.forEach(el => {
      if (el.children.length === 0 && el.textContent.trim() === recipe.name.trim()) {
        // Found it - add edit button to parent
        const parent = el.closest('div[style]') || el.parentElement;
        if (parent && !parent.querySelector('.menu-item-edit-btn')) {
          parent.style.position = 'relative';
          const editBtn = document.createElement('button');
          editBtn.className = 'menu-item-edit-btn';
          editBtn.textContent = '✎';
          editBtn.title = 'Edit ' + recipe.name;
          editBtn.style.cssText = 'position:absolute;top:4px;right:4px;background:#F2A623;color:#fff;border:none;border-radius:6px;width:28px;height:28px;font-size:0.75rem;cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.2);';
          editBtn.onclick = (e) => { e.stopPropagation(); openMenuItemEdit(recipe.id); };
          parent.appendChild(editBtn);
        }
      }
    });
  });
}

async function loadPrepCategories(userData) {
  const listEl = document.getElementById('prep-categories-list');
  const alertZone = document.getElementById('critical-alert-zone');
  // Remember which categories are open
  const openPrepCats = new Set();
  document.querySelectorAll('[id^="cat-body-"]').forEach(el => {
    if (el.style.display === 'block') openPrepCats.add(el.id.replace('cat-body-',''));
  });
  const weekStart = window._weekStart;
  const today = new Date().toISOString().split('T')[0];
  const todayIdx = new Date().getDay();
  const todayCol = todayIdx === 0 ? 6 : todayIdx - 1;
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  try {
    const q = isAdmin
      ? collection(db, 'prepCategories')
      : query(collection(db, 'prepCategories'), where('restaurantId','==', userData.uid));
    const catSnap = await getDocs(q);

    if (catSnap.empty) {
      listEl.innerHTML = `
        <div style="text-align:center;padding:48px 20px;">
          <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:8px;">No prep categories yet</div>
          <div style="font-size:0.875rem;color:var(--ink-muted);">${isAdmin ? 'Add your first category above' : 'Chef Nek will set up your prep list soon'}</div>
        </div>`;
      return;
    }

    const cats = catSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.order||0) - (b.order||0));
    let criticalMissed = [];
    let html = '';

    for (const cat of cats) {
      const itemsSnap = await getDocs(
        query(collection(db, 'prepItems'),
          where('categoryId','==', cat.id))
      );
      const items = itemsSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.name||'').localeCompare(b.name||''));

      // Get checks for this week
      const checksSnap = await getDocs(
        query(collection(db, 'prepChecks'),
          where('categoryId','==', cat.id))
      );
      // Filter by weekStart in JS
      const allCheckDocs = checksSnap.docs.filter(d => d.data().weekStart === weekStart);
      const checks = {};
      allCheckDocs.forEach(d => { checks[d.data().itemId + '_' + d.data().dayIdx] = d.data(); });

      // Get approval
      const approvalSnap = await getDocs(
        query(collection(db, 'prepApprovals'),
          where('categoryId','==', cat.id))
      );
      const approvalDocs = approvalSnap.docs.filter(d => d.data().weekStart === weekStart && d.data().dayIdx === todayCol);
      const approved = approvalDocs.length > 0 ? approvalDocs[0].data() : null;

      // Check critical items for today — unchecked = missed
      items.filter(i => i.critical).forEach(i => {
        const checkedToday = checks[i.id + '_' + todayCol];
        if (!checkedToday) criticalMissed.push({ name: i.name, cat: cat.name });
      });

      const doneToday = items.filter(i => checks[i.id + '_' + todayCol]).length;
      const totalItems = items.length;

      html += `
        <div class="prep-category" id="prep-cat-${cat.id}">
          <div class="prep-cat-header" onclick="toggleCat('${cat.id}')">
            <div class="prep-cat-title">
              ${cat.name}
              ${items.filter(i=>i.critical).length > 0 ? `<span style="font-size:0.7rem;background:#FCEBEB;color:#A32D2D;padding:2px 8px;border-radius:20px;font-weight:500;">🚨 ${items.filter(i=>i.critical).length} critical</span>` : ''}
            </div>
            <div class="prep-cat-meta">
              <span class="prep-cat-progress" style="color:${doneToday===totalItems && totalItems>0 ? 'var(--green)' : 'var(--ink-muted)'};">${doneToday===totalItems && totalItems>0 ? '✅' : ''} ${doneToday}/${totalItems} today</span>
              ${approved ? `<span style="font-size:0.75rem;color:var(--green);font-weight:500;">✓ Approved</span>` : ''}
              <span class="prep-cat-chevron" id="chevron-${cat.id}">›</span>
            </div>
          </div>
          <div class="prep-cat-body" id="cat-body-${cat.id}" style="display:none;">
            <div class="prep-cat-assign">
              <span class="prep-cat-assign-label">Assigned to:</span>

window.editPrepItem = function(id, name, qty, critical) {
  const form = document.getElementById('edit-prep-item-' + id);
  if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

window.savePrepItem = async function(id) {
  const name = document.getElementById('edit-item-name-' + id).value.trim();
  const qty = document.getElementById('edit-item-qty-' + id).value.trim();
  const critical = document.getElementById('edit-item-critical-' + id).checked;
  const ingredientsEl = document.getElementById('edit-item-ingredients-' + id);
  const stepsEl = document.getElementById('edit-item-steps-' + id);
  const ingredients = ingredientsEl ? ingredientsEl.value.trim() : '';
  const steps = stepsEl ? stepsEl.value.trim() : '';
  if (!name) { showToast('Item name required', 'error'); return; }
  try {
    await setDoc(doc(db, 'prepItems', id), { name, qty, critical, ingredients, steps }, { merge: true });
    showToast('Item updated!');
    loadPrepCategories(window._userData);
  } catch(e) { showToast('Error updating item', 'error'); }
}

window.viewPrepRecipe = function(itemId) {
  // Find item from current loaded data - search in DOM
  const editForm = document.getElementById('edit-prep-item-' + itemId);
  const nameEl = document.getElementById('edit-item-name-' + itemId);
  const ingredientsEl = document.getElementById('edit-item-ingredients-' + itemId);
  const stepsEl = document.getElementById('edit-item-steps-' + itemId);
  const qtyEl = document.getElementById('edit-item-qty-' + itemId);

  const name = nameEl ? nameEl.value : 'Prep Recipe';
  const qty = qtyEl ? qtyEl.value : '';
  const ingredients = ingredientsEl ? ingredientsEl.value : '';
  const steps = stepsEl ? stepsEl.value : '';

  // Build popup
  const existing = document.getElementById('prep-recipe-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'prep-recipe-modal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px;width:100%;max-width:460px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);';

  // Header
  const header = document.createElement('div');
  header.style.cssText = 'background:linear-gradient(135deg,#1D9E75,#0F6E56);padding:24px;border-radius:20px 20px 0 0;';
  header.innerHTML = '<div style="font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px;">Prep Recipe</div>'
    + '<div style="font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:#fff;">' + name + '</div>'
    + (qty ? '<div style="font-size:0.85rem;color:rgba(255,255,255,0.75);margin-top:4px;">Target: ' + qty + '</div>' : '');

  const closeBtn = document.createElement('button');
  closeBtn.textContent = 'x';
  closeBtn.style.cssText = 'position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:#fff;cursor:pointer;font-size:0.9rem;';
  closeBtn.onclick = () => modal.remove();
  header.style.position = 'relative';
  header.appendChild(closeBtn);

  // Body
  const body = document.createElement('div');
  body.style.cssText = 'padding:24px;';

  if (ingredients) {
    const ingLines = ingredients.split('\n').filter(l => l.trim());
    const ingHtml = '<div style="margin-bottom:20px;">'
      + '<div style="font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:10px;">Ingredients</div>'
      + ingLines.map((line,i) => '<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);">'
        + '<span style="width:22px;height:22px;border-radius:50%;background:var(--green-light);color:var(--green-dark);font-size:0.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + (i+1) + '</span>'
        + '<span style="font-size:0.875rem;color:var(--ink);line-height:1.5;">' + line.trim() + '</span>'
        + '</div>').join('')
      + '</div>';
    body.innerHTML += ingHtml;
  }

  if (steps) {
    const stepLines = steps.split('\n').filter(l => l.trim());
    const stepsHtml = '<div>'
      + '<div style="font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:10px;">How to make it</div>'
      + stepLines.map((line,i) => {
          const cleanLine = line.replace(/^\d+[\.\)]\s*/,'');
          return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);">'
            + '<span style="width:24px;height:24px;border-radius:6px;background:var(--green);color:#fff;font-size:0.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + (i+1) + '</span>'
            + '<span style="font-size:0.875rem;color:var(--ink);line-height:1.6;">' + cleanLine + '</span>'
            + '</div>';
        }).join('')
      + '</div>';
    body.innerHTML += stepsHtml;
  }

  if (!ingredients && !steps) {
    body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--ink-muted);font-size:0.9rem;">No recipe added yet.<br><br>Click <strong>Edit</strong> on this item to add ingredients and steps.</div>';
  }

  box.appendChild(header);
  box.appendChild(body);
  modal.appendChild(box);
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
}

window.deletePrepItem = async function(id) {
  if (!confirm('Delete this prep item?')) return;
  try {
    const { deleteDoc: dd } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    await dd(doc(db, 'prepItems', id));
    showToast('Item deleted');
    loadPrepCategories(window._userData);
  } catch(e) { showToast('Error deleting item', 'error'); }
}

window.toggleCat = function(id) {
  const body = document.getElementById('cat-body-'+id);
  const chev = document.getElementById('chevron-'+id);
  const isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  chev.classList.toggle('open', !isOpen);
}

let _pendingCheck = null;

window.togglePrepCheck = async function(itemId, catId, restaurantId, dayIdx, weekStart, el) {
  try {
    // Walk up to find element with data-checked
    let btn = el;
    while (btn && btn.dataset && btn.dataset.checked === undefined) btn = btn.parentElement;
    const isChecked = btn && btn.dataset.checked === 'true';
    if (isChecked) {
      // Uncheck — revert button to yellow
      const snap = await getDocs(query(collection(db,'prepChecks'), where('itemId','==',itemId)));
      const toDelete = snap.docs.filter(d => d.data().dayIdx === dayIdx && d.data().weekStart === weekStart);
      for (const d of toDelete) {
        const {deleteDoc: dd} = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
        await dd(doc(db,'prepChecks',d.id));
      }
      // Update button directly
      if (btn) {
        btn.dataset.checked = 'false';
        btn.style.cssText = 'width:100%;background:#FFFDE7;border:1.5px solid #F2A623;border-radius:8px;cursor:pointer;min-height:48px;font-family:inherit;display:flex;align-items:center;justify-content:center;';
        btn.innerHTML = '<span style="font-size:0.65rem;color:#854F0B;font-weight:500;">—</span>';
      }
      showToast('Unchecked!');
    } else {
      // Check — show staff picker
      _pendingCheck = { itemId, catId, restaurantId, dayIdx, weekStart, btn };
      showStaffPicker(restaurantId);
    }
  } catch(e) {
    console.error('togglePrepCheck error:', e);
    showToast('Error — try again', 'error');
  }
}

function showStaffPicker(restaurantId) {
  injectStaffPicker();
  setTimeout(() => {
    const overlay = document.getElementById('staff-picker-overlay');
    if (!overlay) return;
    const input = document.getElementById('staff-custom-name');
    if (input) input.value = '';
    overlay.style.cssText = 'display:flex;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:99999;align-items:center;justify-content:center;padding:20px;';
    loadStaffNames(restaurantId);
  }, 50);
}

async function loadStaffNames(restaurantId) {
  const grid = document.getElementById('staff-picker-grid');
  if (!grid) return;
  grid.innerHTML = '<div style="font-size:0.8rem;color:var(--ink-muted);grid-column:span 2;padding:8px 0;">Loading...</div>';
  try {
    const staffSnap = await getDocs(query(collection(db,'staffNames'), where('restaurantId','==',restaurantId)));
    const names = [...new Set(staffSnap.docs.map(d => d.data().name).filter(Boolean))];
    if (names.length === 0) {
      grid.innerHTML = '<div style="font-size:0.8rem;color:var(--ink-muted);grid-column:span 2;padding:4px 0;">Type a name below to get started</div>';
    } else {
      grid.innerHTML = names.map(n => `
        <button class="staff-btn" onclick="selectStaffName('${n.replace(/'/g,"&#39;")}')">
          <div style="font-size:1.1rem;">👤</div>
          <div>${n}</div>
        </button>`).join('');
    }
  } catch(e) {
    grid.innerHTML = '<div style="font-size:0.8rem;color:var(--ink-muted);grid-column:span 2;">Type a name below</div>';
  }
}

window.selectStaffName = async function(name) {
  if (window._invMode) {
    await selectInvStaff(name);
  } else if (window._clSignoffMode) {
    await completeSignoff(name);
  } else if (window._clMode) {
    await completeCLCheck(name);
  } else {
    await completeCheck(name, false);
  }
}

window.confirmStaffName = async function() {
  const input = document.getElementById('staff-custom-name');
  const name = input ? input.value.trim() : '';
  if (!name) { showToast('Please enter your name', 'error'); return; }
  if (window._invMode) {
    try {
      const rid = window._userData?.uid||'';
      const existing = await getDocs(query(collection(db,'staffNames'), where('restaurantId','==',rid), where('name','==',name)));
      if (existing.empty) await addDoc(collection(db,'staffNames'), { name, restaurantId:rid, createdAt: serverTimestamp() });
    } catch(e) {}
    await selectInvStaff(name);
  } else if (window._clSignoffMode) {
    try {
      const rid = window._userData?.uid||'';
      const existing = await getDocs(query(collection(db,'staffNames'), where('restaurantId','==',rid), where('name','==',name)));
      if (existing.empty) await addDoc(collection(db,'staffNames'), { name, restaurantId:rid, createdAt: serverTimestamp() });
    } catch(e) {}
    await completeSignoff(name);
  } else if (window._clMode) {
    try {
      const rid = window._userData?.uid||'';
      const existing = await getDocs(query(collection(db,'staffNames'), where('restaurantId','==',rid), where('name','==',name)));
      if (existing.empty) await addDoc(collection(db,'staffNames'), { name, restaurantId:rid, createdAt: serverTimestamp() });
    } catch(e) {}
    await completeCLCheck(name);
  } else {
    await completeCheck(name, true);
  }
}
async function completeCheck(name, saveNew) {
  if (!_pendingCheck) { showToast('Error — please try again', 'error'); return; }
  const { itemId, catId, restaurantId, dayIdx, weekStart, btn } = _pendingCheck;
  _pendingCheck = null;

  // Hide overlay immediately
  const overlay = document.getElementById('staff-picker-overlay');
  if (overlay) overlay.style.display = 'none';

  // Save name for future
  if (saveNew) {
    try {
      const existing = await getDocs(query(collection(db,'staffNames'), where('restaurantId','==',restaurantId), where('name','==',name)));
      if (existing.empty) {
        await addDoc(collection(db,'staffNames'), { name, restaurantId, createdAt: serverTimestamp() });
      }
    } catch(e) {}
  }

  // Save check to Firebase
  try {
    const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    await addDoc(collection(db,'prepChecks'), {
      itemId, catId, restaurantId, dayIdx, weekStart,
      by: name.trim(), time, checkedAt: serverTimestamp()
    });

    // UPDATE BUTTON DIRECTLY — no reload needed!
    if (btn) {
      const nm = name.split(' ')[0].substring(0,7);
      btn.dataset.checked = 'true';
      btn.style.cssText = 'width:100%;background:#1D9E75;color:#fff;border:2px solid #0F6E56;border-radius:8px;cursor:pointer;padding:4px 2px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:48px;font-family:inherit;gap:2px;';
      btn.innerHTML = '<span style="font-size:0.72rem;font-weight:800;line-height:1;">&#10003;</span>'
        + '<span style="font-size:0.62rem;font-weight:700;line-height:1.2;">' + nm + '</span>'
        + '<span style="font-size:0.54rem;opacity:0.9;line-height:1.2;">' + time + '</span>';
    }

    showToast('✅ ' + name + ' checked this off!');

    // Update the counter badge (e.g. "3/7 today")
    const catBody = document.getElementById('cat-body-' + catId);
    if (catBody) {
      const allBtns = catBody.querySelectorAll('button[data-checked]');
      const doneBtns = catBody.querySelectorAll('button[data-checked="true"]');
      const header = document.querySelector('#prep-cat-' + catId + ' .prep-cat-progress');
      if (header) header.textContent = doneBtns.length + '/' + allBtns.length + ' today';
    }

  } catch(e) {
    console.error('completeCheck error:', e);
    showToast('Error saving — check connection', 'error');
  }
}

let procActiveCategory = 'All';

async function loadProcedures(userData) {
  const listEl = document.getElementById('proc-list');
  const filterEl = document.getElementById('proc-filter');
  if (!listEl) return;
  listEl.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  try {
    const q = isAdmin
      ? collection(db, 'procedures')
      : query(collection(db, 'procedures'), where('restaurantId', '==', userData.uid));
    const snap = await getDocs(q);
    if (snap.empty) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No documents yet</div><div class="empty-state-sub">' + (isAdmin ? 'Click "+ Add document" to upload your first recipe or SOP' : 'Chef Nek will add your recipes and procedures soon') + '</div></div>';
      return;
    }
    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Build category filters
    const cats = ['All', ...new Set(docs.map(d => d.category || 'General'))].sort((a,b) => a === 'All' ? -1 : b === 'All' ? 1 : a.localeCompare(b));
    if (filterEl) {
      filterEl.innerHTML = cats.map(cat => {
        const isActive = cat === procActiveCategory;
        const escaped = cat.replace(/'/g, "\'");
        return '<button onclick="filterProcedures(\'' + escaped + '\')" style="height:34px;padding:0 16px;border-radius:100px;border:0.5px solid ' + (isActive ? 'var(--green)' : 'var(--border)') + ';background:' + (isActive ? 'var(--green)' : 'var(--white)') + ';color:' + (isActive ? '#fff' : 'var(--ink-soft)') + ';font-family:var(--font-body);font-size:0.8rem;cursor:pointer;white-space:nowrap;">' + cat + '</button>';
      }).join('');
    }
    window._allProcedures = docs;
    renderProcedureList(docs);
  } catch(e) {
    listEl.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading documents.</p></div>';
  }
}

window.filterProcedures = function(cat) {
  procActiveCategory = cat;
  const docs = window._allProcedures || [];
  renderProcedureList(docs);
  // Update filter buttons
  const filterEl = document.getElementById('proc-filter');
  if (filterEl) {
    filterEl.querySelectorAll('button').forEach(btn => {
      const isActive = btn.textContent === cat;
      btn.style.background = isActive ? 'var(--green)' : 'var(--white)';
      btn.style.color = isActive ? '#fff' : 'var(--ink-soft)';
      btn.style.borderColor = isActive ? 'var(--green)' : 'var(--border)';
    });
  }
}

function renderProcedureList(docs) {
  const listEl = document.getElementById('proc-list');

    listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No documents in this category</div></div>';
    return;

  // Group by category
  const groups = {};
  filtered.forEach(d => {
    const cat = d.category || 'General';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(d);
  });
  listEl.innerHTML = Object.entries(groups).sort(([a],[b]) => a.localeCompare(b)).map(([cat, items]) => `
    <div style="margin-bottom:24px;">

                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#5B3DB5" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="1" width="14" height="18" rx="2"/><line x1="6" y1="7" x2="14" y2="7"/><line x1="6" y1="10" x2="14" y2="10"/><line x1="6" y1="13" x2="10" y2="13"/></svg>
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:600;color:var(--ink);font-size:0.9rem;margin-bottom:4px;line-height:1.3;">${doc.title}</div>
                ${doc.desc ? '<div style="font-size:0.78rem;color:var(--ink-muted);line-height:1.5;margin-bottom:6px;">' + doc.desc + '</div>' : ''}

                  <span style="font-size:0.68rem;background:#F5F0FF;color:#5B3DB5;padding:2px 8px;border-radius:20px;font-weight:500;">${doc.category || 'General'}</span>
                  ${doc.url ? '<span style="font-size:0.68rem;color:var(--green);font-weight:500;">Doc link</span>' : ''}
                  ${doc.content ? '<span style="font-size:0.68rem;color:var(--ink-muted);">Text content</span>' : ''}

              </div>
              ${isAdmin ? `<button onclick="event.stopPropagation();deleteProcedure('${doc.id}')" style="width:28px;height:28px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:11px;cursor:pointer;flex-shrink:0;">Del</button>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

window.viewProcedure = function(docId) {
  const doc = (window._allProcedures || []).find(d => d.id === docId);
  if (!doc) return;
  // If has URL — open in new tab
  if (doc.url) {
    // Try to convert Google Docs view URL
    let url = doc.url;
    if (url.includes('docs.google.com/document') && !url.includes('/pub')) {
      url = url.replace('/edit', '/preview').replace('/view', '/preview');
    }
    // Show modal with embed + open button
    showProcedureModal(doc, url);
  } else if (doc.content) {
    showProcedureModal(doc, null);
  }
}

function showProcedureModal(doc, url) {
  const existing = document.getElementById('proc-modal');
  if (existing) existing.remove();

  // Detect URL type
  const isWord = url && (url.includes('sharepoint.com') || url.includes('1drv.ms') || url.includes('office.com') || url.includes('.docx') || url.includes('.doc'));
  const isGoogleDoc = url && url.includes('docs.google.com');
  const isPDF = url && url.includes('.pdf');

  // For Word/OneDrive — just open in new tab, can't embed
  if (url && isWord) {
    window.open(url, '_blank');
    return;
  }

  const modal = document.createElement('div');
  modal.id = 'proc-modal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px;width:100%;max-width:820px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2);';

  // Header
  const header = document.createElement('div');
  header.style.cssText = 'background:linear-gradient(135deg,#5B3DB5,#3D2580);padding:20px 24px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;';
  header.innerHTML = '<div style="flex:1;min-width:0;"><div style="font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:4px;">' + (doc.category || 'General') + '</div><div style="font-size:1.2rem;font-weight:700;color:#fff;line-height:1.3;">' + doc.title + '</div>' + (doc.desc ? '<div style="font-size:0.82rem;color:rgba(255,255,255,0.6);margin-top:6px;">' + doc.desc + '</div>' : '') + '</div>';
  const btnGroup = document.createElement('div');
  btnGroup.style.cssText = 'display:flex;gap:8px;align-items:center;flex-shrink:0;';
  if (url) {
    const openBtn = document.createElement('a');
    openBtn.href = url;
    openBtn.target = '_blank';
    openBtn.textContent = 'Open in new tab';
    openBtn.style.cssText = 'height:34px;padding:0 14px;background:rgba(255,255,255,0.18);color:#fff;border-radius:8px;text-decoration:none;font-size:0.8rem;font-weight:500;display:flex;align-items:center;white-space:nowrap;';
    btnGroup.appendChild(openBtn);
  }
  const closeBtn = document.createElement('button');
  closeBtn.textContent = 'x';
  closeBtn.style.cssText = 'width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;cursor:pointer;font-size:1rem;flex-shrink:0;';
  closeBtn.onclick = () => modal.remove();
  btnGroup.appendChild(closeBtn);
  header.appendChild(btnGroup);
  box.appendChild(header);

  // Body
  const body = document.createElement('div');

  if (url && (isGoogleDoc || isPDF)) {
    // Embeddable URL — show in iframe
    body.style.cssText = 'flex:1;overflow:hidden;';
    let embedUrl = url;
    if (isGoogleDoc) {
      embedUrl = url.replace('/edit', '/preview').replace('/view', '/preview');
      if (!embedUrl.includes('/preview')) embedUrl += '/preview';
    }
    const iframe = document.createElement('iframe');
    iframe.src = embedUrl;
    iframe.style.cssText = 'width:100%;height:600px;border:none;';
    iframe.setAttribute('allowfullscreen', '');
    body.appendChild(iframe);
  } else if (url) {
    // Unknown URL type — show open button
    body.style.cssText = 'padding:40px 24px;text-align:center;';
    body.innerHTML = '<div style="font-size:3rem;margin-bottom:16px;">📄</div>'
      + '<div style="font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:8px;">' + doc.title + '</div>'
      + '<div style="font-size:0.875rem;color:var(--ink-muted);margin-bottom:28px;">This document opens in a new tab</div>'
      + '<a href="' + url + '" target="_blank" style="display:inline-block;background:var(--green);color:#fff;padding:12px 32px;border-radius:100px;text-decoration:none;font-size:0.9rem;font-weight:600;">Open document</a>';
  } else {
    // Text content - formatted nicely
    body.style.cssText = 'flex:1;overflow-y:auto;padding:28px;';
    const pre = document.createElement('div');
    pre.style.cssText = 'max-width:640px;margin:0 auto;';
    // Format the content - detect headers (ALL CAPS lines) and steps
    const lines = doc.content.split('\n');
    let html = '';
    lines.forEach(line => {
      const trimmed = line.trim();
      if (!trimmed) { html += '<div style="height:10px;"></div>'; return; }
      // ALL CAPS line = section header
      if (trimmed === trimmed.toUpperCase() && trimmed.length > 2 && /[A-Z]/.test(trimmed)) {
        html += '<div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin:16px 0 8px;border-bottom:2px solid var(--border);padding-bottom:6px;">' + trimmed + '</div>';
      // Numbered steps: 1. or 1)
      } else if (/^\d+[\.\)]/.test(trimmed)) {
        const num = trimmed.match(/^(\d+)/)[1];
        const text = trimmed.replace(/^\d+[\.\)]\s*/, '');
        html += '<div style="display:flex;gap:12px;padding:8px 0;border-bottom:0.5px solid var(--border);">'
          + '<span style="width:24px;height:24px;background:var(--green);color:#fff;border-radius:6px;font-size:0.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + num + '</span>'
          + '<span style="font-size:0.9rem;color:var(--ink);line-height:1.6;">' + text + '</span></div>';
      // Bullet / ingredient lines: - or •
      } else if (/^[-•*]/.test(trimmed)) {
        const text = trimmed.replace(/^[-•*]\s*/, '');
        html += '<div style="display:flex;gap:10px;padding:5px 0;">'
          + '<span style="width:6px;height:6px;border-radius:50%;background:var(--green);margin-top:8px;flex-shrink:0;"></span>'
          + '<span style="font-size:0.9rem;color:var(--ink2);line-height:1.6;">' + text + '</span></div>';
      } else {
        html += '<div style="font-size:0.9rem;color:var(--ink2);line-height:1.7;padding:3px 0;">' + trimmed + '</div>';
      }
    });
    pre.innerHTML = html;
    body.appendChild(pre);
  }

  box.appendChild(body);
  modal.appendChild(box);
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
}

window.deleteProcedure = async function(docId) {
  if (!confirm('Delete this document? This cannot be undone.')) return;
  try {
    const { deleteDoc: dd } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    await dd(doc(db, 'procedures', docId));
    showToast('Document deleted!');
    loadProcedures(window._userData);
  } catch(e) { showToast('Error deleting', 'error'); }
}
