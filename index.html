// ── INVENTORY SEARCH + FILTER ──
let invActiveFilter = 'all';
let invSearchTerm = '';

window.setInvFilter = function(filter) {
  invActiveFilter = filter;
  const btns = ['all','frozen','low','out','ok'];
  btns.forEach(f => {
    const btn = document.getElementById('inv-filter-'+f);
    if (!btn) return;
    const isActive = f === filter;
    btn.style.background = isActive ? 'var(--green)' : 'var(--white)';
    btn.style.color = isActive ? '#fff' : 'var(--ink-soft)';
    btn.style.borderColor = isActive ? 'var(--green)' : 'var(--border)';
    btn.style.fontWeight = isActive ? '500' : '400';
  });
  applyInvFilter();
}

window.filterInventory = function() {
  invSearchTerm = document.getElementById('inv-search').value.toLowerCase().trim();
  const clearBtn = document.getElementById('inv-search-clear');
  if (clearBtn) clearBtn.style.display = invSearchTerm ? 'block' : 'none';
  applyInvFilter();
}

window.clearInvSearch = function() {
  document.getElementById('inv-search').value = '';
  invSearchTerm = '';
  document.getElementById('inv-search-clear').style.display = 'none';
  applyInvFilter();
}

function applyInvFilter() {
  const categories = document.querySelectorAll('.inv-category');
  let totalVisible = 0;

  categories.forEach(cat => {
    const rows = cat.querySelectorAll('.inv-item-row');
    let catVisible = 0;

    rows.forEach(row => {
      const name = row.querySelector('.inv-item-name') ? row.querySelector('.inv-item-name').textContent.toLowerCase() : '';
      const isFrozen = row.querySelector('.inv-item-name') && row.querySelector('.inv-item-name').parentElement.innerHTML.includes('❄️');
      const isOut = row.classList.contains('critical-stock');
      const isLow = row.classList.contains('low-stock');
      const isOk = !isOut && !isLow;

      const matchesSearch = !invSearchTerm || name.includes(invSearchTerm);
      const matchesFilter =
        invActiveFilter === 'all' ||
        (invActiveFilter === 'frozen' && isFrozen) ||
        (invActiveFilter === 'out' && isOut) ||
        (invActiveFilter === 'low' && (isLow || isOut)) ||
        (invActiveFilter === 'ok' && isOk);

      const visible = matchesSearch && matchesFilter;
      row.style.display = visible ? '' : 'none';
      if (visible) catVisible++;
    });

    totalVisible += catVisible;

    // Show/hide category based on matches
    const body = cat.querySelector('[id^="inv-cat-body-"]');
    if (invSearchTerm || invActiveFilter !== 'all') {
      cat.style.display = catVisible > 0 ? '' : 'none';
      if (body && catVisible > 0) body.style.display = 'block';
      // Update chevron
      const chev = cat.querySelector('[id^="inv-chevron-"]');
      if (chev && catVisible > 0) chev.classList.add('open');
    } else {
      cat.style.display = '';
    }
  });

  // Update results label
  const label = document.getElementById('inv-search-results-label');
  if (label) {
    if (invSearchTerm || invActiveFilter !== 'all') {
      label.style.display = 'block';
      label.textContent = totalVisible + ' item' + (totalVisible !== 1 ? 's' : '') + ' found' + (invSearchTerm ? ' for "' + invSearchTerm + '"' : '') + (invActiveFilter !== 'all' ? ' · ' + invActiveFilter + ' filter active' : '');
    } else {
      label.style.display = 'none';
    }
  }
}

async function loadInvCategories(userData) {
  const listEl = document.getElementById('inv-categories-list');
  const alertZone = document.getElementById('inv-alert-zone');
  // Remember which categories are open
  const openInvCats = new Set();
  document.querySelectorAll('[id^="inv-cat-body-"]').forEach(el => {
    if (el.style.display === 'block') openInvCats.add(el.id.replace('inv-cat-body-',''));
  });
  try {
    const invRid = currentRestaurantId() || userData.uid;
    const q = query(collection(db, 'invCategories'), where('restaurantId','==', invRid));
    const catSnap = await getDocs(q);

    if (catSnap.empty) {
      listEl.innerHTML = `
        <div style="text-align:center;padding:48px 20px;">
          <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:8px;">No inventory categories yet</div>
          <div style="font-size:0.875rem;color:var(--ink-muted);">${isAdmin ? 'Add your first category above' : 'Chef Nek will set up your inventory soon'}</div>
        </div>`;
      return;
    }

    const cats = catSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.order||0)-(b.order||0));
    let lowStockAlerts = [];
    let html = '';
    const invAllItems = [];

    for (const cat of cats) {
      const itemsSnap = await getDocs(
        query(collection(db, 'invItems'), where('categoryId','==', cat.id))
      );
      const items = itemsSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.name||'').localeCompare(b.name||''));
      invAllItems.push(...items);
      const lowItems = items.filter(i => i.currentQty <= i.alertAt);
      const criticalItems = items.filter(i => i.currentQty === 0);
      lowItems.forEach(i => lowStockAlerts.push({ name: i.name, cat: cat.name, qty: i.currentQty, unit: i.unit }));

      html += `
        <div class="inv-category" id="inv-cat-${cat.id}">
          <div class="inv-cat-header" onclick="toggleInvCat('${cat.id}')">
            <div class="inv-cat-title">
              ${cat.name}
              ${criticalItems.length > 0 ? `<span style="font-size:0.7rem;background:#FCEBEB;color:#A32D2D;padding:2px 8px;border-radius:20px;font-weight:500;">🚨 ${criticalItems.length} out of stock</span>` : ''}
              ${lowItems.length > 0 && criticalItems.length === 0 ? `<span style="font-size:0.7rem;background:var(--amber-light);color:#854F0B;padding:2px 8px;border-radius:20px;font-weight:500;">⚠ ${lowItems.length} low</span>` : ''}
            </div>
            <div class="inv-cat-meta">
              <span style="font-size:0.8rem;color:var(--ink-muted);">${items.length} items</span>
              <span class="inv-cat-chevron" id="inv-chevron-${cat.id}">›</span>
            </div>
          </div>
          <div class="inv-cat-body" id="inv-cat-body-${cat.id}">
            ${isAdmin ? `
            <div style="padding:8px 18px;background:var(--cream);border-bottom:0.5px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <button onclick="deleteInvCategory('${cat.id}')" style="font-size:11px;padding:3px 10px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;cursor:pointer;">Delete category</button>
            </div>` : ''}
            <div class="inv-header-row">
              <div class="inv-col-label">Item</div>
              <div class="inv-col-label">Unit</div>
              <div class="inv-col-label">Quantity</div>
              <div class="inv-col-label">Status</div>
            </div>
            ${items.map(item => {
              const isLow = item.currentQty <= item.alertAt;
              const isOut = item.currentQty === 0;
              return `
                <div class="inv-item-row ${isOut ? 'critical-stock' : isLow ? 'low-stock' : ''}" id="inv-row-${item.id}" data-alert-at="${item.alertAt||0}">
                  <div>
                    <div class="inv-item-name">
                      ${item.frozen ? '<span style="font-size:0.75rem;background:#E6F1FB;color:#185FA5;padding:2px 8px;border-radius:20px;margin-right:6px;">❄️ Frozen</span>' : ''}
                      ${item.name}
                    </div>
                    ${isAdmin ? `<div style="display:flex;gap:4px;margin-top:4px;">
                      <button onclick="editInvItem('${item.id}')" style="height:18px;padding:0 8px;border-radius:5px;border:0.5px solid var(--border);background:var(--cream);color:var(--ink-soft);font-size:10px;cursor:pointer;">Edit</button>
                      <button onclick="deleteInvItem('${item.id}')" style="height:18px;padding:0 8px;border-radius:5px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:10px;cursor:pointer;">Del</button>
                    </div>` : ''}
                    <div id="edit-inv-item-${item.id}" style="display:none;margin-top:8px;">
                      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;">
                        <input type="text" id="edit-inv-name-${item.id}" value="${item.name}" class="form-input-small" placeholder="Item name">
                        <input type="text" id="edit-inv-unit-${item.id}" value="${item.unit||''}" class="form-input-small" placeholder="Unit">
                        <input type="number" id="edit-inv-alert-${item.id}" value="${item.alertAt||0}" class="form-input-small" placeholder="Alert at qty">
                        <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;cursor:pointer;grid-column:span 2;">
                          <input type="checkbox" id="edit-inv-frozen-${item.id}" ${item.frozen?'checked':''} style="accent-color:#185FA5;width:14px;height:14px;">
                          <span style="color:#185FA5;font-weight:500;">❄️ Frozen item</span>
                        </label>
                      </div>
                      <div style="display:flex;gap:6px;">
                        <button onclick="saveInvItem('${item.id}')" class="form-btn-small">Save</button>
                        <button onclick="document.getElementById('edit-inv-item-${item.id}').style.display='none'" style="height:36px;padding:0 12px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--ink-soft);font-size:0.8rem;cursor:pointer;">Cancel</button>
                      </div>
                    </div>
                  </div>
                  <div class="inv-item-unit">${item.unit||'—'}</div>
                  <div class="inv-qty-controls">
                    <button class="inv-qty-btn" id="inv-minus-${item.id}" onclick="invStep('${item.id}', -1)" ${(item.currentQty||0)===0?'disabled':''} style="${(item.currentQty||0)===0?'opacity:0.3;cursor:not-allowed;':''}">−</button>
                    <span class="inv-qty-val" id="inv-qty-val-${item.id}" data-qty="${item.currentQty||0}" style="color:${isOut?'var(--red)':isLow?'var(--amber)':'var(--ink)'};font-weight:${isOut||isLow?'700':'500'};">${item.currentQty||0}</span>
                    <button class="inv-qty-btn" id="inv-plus-${item.id}" onclick="invStep('${item.id}', 1)">+</button>
                  </div>
                  <div>
                    <div id="inv-counted-${item.id}" style="margin-bottom:4px;"></div>
                    <span class="inv-status" id="inv-status-${item.id}" style="background:${isOut?'#FCEBEB':isLow?'var(--amber-light)':'var(--green-light)'};color:${isOut?'#A32D2D':isLow?'#854F0B':'#0F6E56'};">
                      ${isOut ? '🚨 Out' : isLow ? '⚠ Low' : '✓ OK'}
                    </span>
                  </div>
                </div>`;
            }).join('')}
            ${isAdmin ? `
            <div style="padding:12px 18px;border-top:0.5px solid var(--border);background:var(--cream);">
              <div style="display:grid;grid-template-columns:1fr 1fr 80px 80px;gap:8px;margin-bottom:8px;">
                <input type="text" id="new-inv-item-name-${cat.id}" class="form-input-small" placeholder="Item name (e.g. Chicken breast)">
                <input type="text" id="new-inv-item-unit-${cat.id}" class="form-input-small" placeholder="Unit (e.g. lbs, pcs)">
                <input type="number" id="new-inv-item-qty-${cat.id}" class="form-input-small" placeholder="Qty" min="0">
                <input type="number" id="new-inv-item-alert-${cat.id}" class="form-input-small" placeholder="Alert" min="0">
              </div>
              <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;cursor:pointer;">
                  <input type="checkbox" id="new-inv-item-frozen-${cat.id}" style="accent-color:#185FA5;width:14px;height:14px;">
                  <span style="color:#185FA5;font-weight:500;">❄️ Frozen item</span>
                </label>
                <button onclick="addInvItem('${cat.id}','${cat.restaurantId}')" class="form-btn-small">+ Add item</button>
              </div>
            </div>` : ''}
          </div>
        </div>`;
    }

    listEl.innerHTML = html;

    // Populate counted-by chips
    invAllItems.forEach(item => {
      const chipDiv = document.getElementById('inv-counted-' + item.id);
      if (chipDiv) chipDiv.innerHTML = buildInvCountedChip(item);
    });

    // Restore counter name
    const savedName = sessionStorage.getItem('inv-counter-name');
    const nameInp = document.getElementById('inv-counter-name-input');
    if (savedName && nameInp) nameInp.value = savedName;

    // Restore open categories
    openInvCats.forEach(catId => {
      const body = document.getElementById('inv-cat-body-'+catId);
      const chev = document.getElementById('inv-chevron-'+catId);
      if (body) { body.style.display = 'block'; }
      if (chev) { chev.classList.add('open'); }
    });

    // Show low stock alert banner
    if (lowStockAlerts.length > 0 && alertZone) {
      alertZone.innerHTML = `
        <div style="background:var(--amber-light);border:1px solid #FAC775;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px;">
          <div style="font-size:1.5rem;flex-shrink:0;">⚠️</div>
          <div>
            <div style="font-size:0.9375rem;font-weight:500;color:#854F0B;margin-bottom:6px;">${lowStockAlerts.length} item${lowStockAlerts.length>1?'s':''} need restocking!</div>
            ${lowStockAlerts.map(i=>`<div style="font-size:0.8125rem;color:#854F0B;">• ${i.name} <span style="opacity:0.7;">(${i.cat}) — ${i.qty} ${i.unit||''} left</span></div>`).join('')}
          </div>
        </div>`;
    } else if (alertZone) {
      alertZone.innerHTML = '';
    }

  } catch(e) {
    console.error(e);
    listEl.innerHTML = `<div class="card"><p style="color:var(--ink-muted);">Error loading inventory. Please refresh.</p></div>`;
  }
}

window.setInvCounterName = function(name) {

  sessionStorage.setItem('inv-counter-name', trimmed);

window.invStep = function(itemId, delta) {
  const valEl = document.getElementById('inv-qty-val-' + itemId);
  const currentQty = parseInt(valEl?.dataset.qty || valEl?.textContent || 0);
  const newQty = currentQty + delta;
  if (newQty < 0) return;
  // Get name from session storage or input bar
  let name = sessionStorage.getItem('inv-counter-name') || document.getElementById('inv-counter-name-input')?.value.trim() || '';
  // If still no name, ask once
  if (!name) {
    name = prompt('Your name: (saved for this session)');
    if (!name) return;
    name = name.trim();
    sessionStorage.setItem('inv-counter-name', name);
    // Update the name input bar
    const inp = document.getElementById('inv-counter-name-input');
    if (inp) inp.value = name;
  }
  window.updateInvQty(itemId, newQty, name);
}
window.clearInvCountById = function(btn) {
  window.clearInvCount(btn.dataset.iid);
}

window.clearInvCount = async function(itemId) {
  try {
    await setDoc(doc(db,'invItems',itemId), { lastCountedBy: null, lastCountedAt: null }, { merge: true });
    // Remove chip from DOM instantly
    const chip = document.getElementById('inv-counted-' + itemId);
    if (chip) chip.remove();
    showToast('Count cleared');
  } catch(e) { showToast('Error','error'); }
}

window.updateInvQty = async function(itemId, newQty, countedBy) {
  if (newQty < 0) return;
  try {
    const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const updateData = { currentQty: newQty };
    if (countedBy) { updateData.lastCountedBy = countedBy; updateData.lastCountedAt = time; }
    await setDoc(doc(db, 'invItems', itemId), updateData, { merge: true });
    // Update UI instantly — no full reload
    const valEl = document.getElementById('inv-qty-val-'+itemId);
    const rowEl = document.getElementById('inv-row-'+itemId);
    const minusEl = document.getElementById('inv-minus-'+itemId);
    const alertAt = parseInt(rowEl?.dataset.alertAt || 0);
    const isOut = newQty === 0;
    const isLow = newQty <= alertAt && !isOut;
    if (valEl) {
      valEl.textContent = newQty;
      valEl.dataset.qty = newQty;
      valEl.style.color = isOut ? 'var(--red)' : isLow ? 'var(--amber)' : 'var(--ink)';
      valEl.style.fontWeight = isOut||isLow ? '700' : '500';
    }
    // Update counted-by chip instantly
    if (countedBy) {
      const chipTime = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      const chipDiv = document.getElementById('inv-counted-' + itemId);
      if (chipDiv) chipDiv.innerHTML = buildInvCountedChip({id:itemId, lastCountedBy:countedBy, lastCountedAt:chipTime});
    }
    if (rowEl) {
      rowEl.classList.remove('low-stock','critical-stock');
      if (isOut) rowEl.classList.add('critical-stock');
      else if (isLow) rowEl.classList.add('low-stock');
    }
    // Update status badge
    const statusEl = document.getElementById('inv-status-'+itemId);
    if (statusEl) {
      statusEl.textContent = isOut ? '🚨 Out' : isLow ? '⚠ Low' : '✓ OK';
      statusEl.style.background = isOut ? '#FCEBEB' : isLow ? 'var(--amber-light)' : 'var(--green-light)';
      statusEl.style.color = isOut ? '#A32D2D' : isLow ? '#854F0B' : '#0F6E56';
    }
    if (minusEl) minusEl.disabled = newQty === 0;
  } catch(e) { showToast('Error updating quantity', 'error'); }
}

window.addInvItem = async function(catId, restaurantId) {
  const name = document.getElementById('new-inv-item-name-'+catId).value.trim();
  const unit = document.getElementById('new-inv-item-unit-'+catId).value.trim();
  const currentQty = parseFloat(document.getElementById('new-inv-item-qty-'+catId).value) || 0;
  const alertAt = parseFloat(document.getElementById('new-inv-item-alert-'+catId).value) || 0;
  const frozen = document.getElementById('new-inv-item-frozen-'+catId) ? document.getElementById('new-inv-item-frozen-'+catId).checked : false;
  if (!name) { showToast('Item name required', 'error'); return; }
  try {
    await addDoc(collection(db, 'invItems'), {
      name, unit, currentQty, alertAt, frozen, categoryId: catId, restaurantId, createdAt: serverTimestamp()
    });
    showToast('Item added!');
    document.getElementById('new-inv-item-name-'+catId).value = '';
    document.getElementById('new-inv-item-unit-'+catId).value = '';
    document.getElementById('new-inv-item-qty-'+catId).value = '';
    document.getElementById('new-inv-item-alert-'+catId).value = '';
    if (document.getElementById('new-inv-item-frozen-'+catId)) document.getElementById('new-inv-item-frozen-'+catId).checked = false;
    loadInvCategories(window._userData);
  } catch(e) { showToast('Error adding item', 'error'); }
}

async function createClientAccount() {

  if (btn) { btn.textContent = 'Creating...'; btn.disabled = true; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);

      email, restaurantName: restaurant, ownerName: owner,

      .filter(d => !d.data().isAdmin)
      .map(d => ({id: d.id, ...d.data()}))
      .sort((a,b) => (a.restaurantName||'').localeCompare(b.restaurantName||''));

    if (clients.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No clients yet</div><div class="empty-state-sub">Click "+ Add client" to create the first restaurant account</div></div>';
      return;

    listEl.innerHTML = '';

window.saveProcedure = async function() {
  const title = document.getElementById('proc-title')?.value.trim();
  const category = document.getElementById('proc-category')?.value.trim() || 'General';
  const desc = document.getElementById('proc-desc')?.value.trim() || '';
  const url = document.getElementById('proc-url')?.value.trim() || '';
  const text = document.getElementById('proc-content')?.value.trim() || '';
  if (!title) { showToast('Title required','error'); return; }
  if (!url && !text) { showToast('Add a link or paste content','error'); return; }
  const rid = currentRestaurantId();
  try {
    await addDoc(collection(db,'procedures'), { title, category, desc, url, content: text, restaurantId: rid, createdAt: serverTimestamp() });
    showToast('Document saved!');
    document.getElementById('proc-add-form').style.display = 'none';
    loadProcedures(window._userData);
  } catch(e) { showToast('Error saving','error'); }
}

let procActiveCategory = 'All';
async function loadProcedures(userData) {
  const listEl = document.getElementById('proc-list');
  const filterEl = document.getElementById('proc-filter');
  if (!listEl) return;
  listEl.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  try {
    const rid = currentRestaurantId();
    const snap = await getDocs(query(collection(db,'procedures'), where('restaurantId','==',rid)));
    if (snap.empty) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No documents yet</div><div class="empty-state-sub">' + (isAdmin ? 'Add your first document above' : 'Chef Nek will add your documents soon') + '</div></div>';
      return;
    }
    const docs = snap.docs.map(d=>({id:d.id,...d.data()}));
    window._allProcedures = docs;
    const cats = ['All',...new Set(docs.map(d=>d.category||'General'))].sort((a,b)=>a==='All'?-1:a.localeCompare(b));
    if (filterEl) {
      filterEl.innerHTML = cats.map(cat => {
        const active = cat === procActiveCategory;
        return '<button data-cat="' + cat + '" onclick="filterProcedures(this.dataset.cat)" style="height:34px;padding:0 16px;border-radius:100px;border:0.5px solid ' + (active?'var(--green)':'var(--border)') + ';background:' + (active?'var(--green)':'var(--white)') + ';color:' + (active?'#fff':'var(--ink-soft)') + ';font-family:var(--font-body);font-size:0.8rem;cursor:pointer;">' + cat + '</button>';
      }).join('');
    }
    renderProcedureList(docs);
  } catch(e) { 
    console.error('loadStationGuide error:', e);
    listEl.innerHTML = '<div style="padding:16px;background:#FCEBEB;border-radius:12px;color:#A32D2D;font-size:0.85rem;">Error: ' + e.message + '</div>'; 
  }
}

window.filterProcedures = function(cat) { if(typeof cat === "object") cat = cat.dataset?.cat || "All";
  procActiveCategory = cat;
  document.getElementById('proc-filter')?.querySelectorAll('button').forEach(b => {
    const active = b.textContent === cat;
    b.style.background = active ? 'var(--green)' : 'var(--white)';
    b.style.color = active ? '#fff' : 'var(--ink-soft)';
    b.style.borderColor = active ? 'var(--green)' : 'var(--border)';
  });
  renderProcedureList(window._allProcedures || []);
}

function renderProcedureList(docs) {
  const listEl = document.getElementById('proc-list');
  if (!listEl) return;
  const filtered = procActiveCategory === 'All' ? docs : docs.filter(d=>(d.category||'General')===procActiveCategory);
  if (!filtered.length) { listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No documents here</div></div>'; return; }
  const groups = {};
  filtered.forEach(d => { const c=d.category||'General'; if(!groups[c]) groups[c]=[]; groups[c].push(d); });
  listEl.innerHTML = Object.entries(groups).sort().map(([cat,items]) => `
    <div style="margin-bottom:24px;">
      <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);">${cat}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
        ${items.map(doc => `
          <div class="card" style="cursor:pointer;" onclick="viewProcedure('${doc.id}')">
            <div style="display:flex;align-items:flex-start;gap:12px;">
              <div style="width:40px;height:40px;border-radius:10px;background:#F5F0FF;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#5B3DB5" stroke-width="1.5"><rect x="2" y="1" width="14" height="16" rx="2"/><line x1="5" y1="6" x2="13" y2="6"/><line x1="5" y1="9" x2="13" y2="9"/><line x1="5" y1="12" x2="9" y2="12"/></svg>
              </div>
              <div style="flex:1;">
                <div style="font-weight:600;color:var(--ink);margin-bottom:4px;">${doc.title}</div>
                ${doc.desc ? '<div style="font-size:0.78rem;color:var(--ink-muted);">' + doc.desc + '</div>' : ''}
                <div style="margin-top:6px;"><span style="font-size:0.68rem;background:#F5F0FF;color:#5B3DB5;padding:2px 8px;border-radius:20px;">${doc.category||'General'}</span>${doc.url ? ' <span style="font-size:0.68rem;color:var(--green);">Link</span>' : ''}${doc.content ? ' <span style="font-size:0.68rem;color:var(--ink-muted);">Text</span>' : ''}</div>
              </div>
              ${isAdmin ? `<div style="display:flex;gap:4px;flex-direction:column;">
                  <button onclick="event.stopPropagation();showEditProcedure('${doc.id}')" style="height:26px;padding:0 8px;border-radius:6px;border:0.5px solid var(--green);background:var(--green-light);color:var(--green-dark);font-size:11px;cursor:pointer;font-family:var(--font-body);">Edit</button>
                  <button onclick="event.stopPropagation();deleteProcedure('${doc.id}')" style="height:26px;padding:0 8px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:11px;cursor:pointer;font-family:var(--font-body);">Del</button>
                </div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

window.viewProcedure = function(docId) {
  const proc = (window._allProcedures||[]).find(d=>d.id===docId);
  if (!proc) return;
  if (proc.url) { window.open(proc.url, '_blank'); return; }
  if (!proc.content) return;
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;';
  const header = document.createElement('div');
  header.style.cssText = 'background:linear-gradient(135deg,#5B3DB5,#3D2580);padding:20px 24px;border-radius:20px 20px 0 0;display:flex;justify-content:space-between;align-items:center;';
  header.innerHTML = '<div><div style="font-size:0.7rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.1em;">' + (proc.category||'General') + '</div><div style="font-size:1.1rem;font-weight:700;color:#fff;">' + proc.title + '</div></div>';
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕';
  closeBtn.style.cssText = 'background:rgba(255,255,255,0.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:0.9rem;';
  closeBtn.onclick = () => modal.remove();
  header.appendChild(closeBtn);
  const body = document.createElement('div');
  body.style.cssText = 'padding:24px;';
  const lines = proc.content.split('\n');
  body.innerHTML = lines.map(line => {
    const t = line.trim();
    if (!t) return '<div style="height:8px;"></div>';
    if (t === t.toUpperCase() && t.length > 2 && /[A-Z]/.test(t)) return '<div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin:14px 0 6px;border-bottom:2px solid var(--border);padding-bottom:4px;">' + t + '</div>';
    if (/^[-•*]\s/.test(t)) {
      const txt = t.replace(/^[-•*]\s*/,'');
      return '<div style="display:flex;gap:10px;padding:6px 0;align-items:flex-start;"><span style="color:var(--green);font-size:1.1rem;line-height:1;margin-top:2px;">•</span><span style="font-size:0.875rem;color:var(--ink);line-height:1.6;">' + txt + '</span></div>';
    }
    if (/^\d+[.)]\s/.test(t)) { const txt = t.replace(/^\d+[.)]\s*/,''); const num = t.match(/^\d+/)[0]; return '<div style="display:flex;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);"><span style="width:22px;height:22px;background:var(--green);color:#fff;border-radius:6px;font-size:0.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + num + '</span><span style="font-size:0.875rem;color:var(--ink);line-height:1.6;">' + txt + '</span></div>'; }
    if (/^[-•*]/.test(t)) return '<div style="display:flex;gap:8px;padding:5px 0;"><span style="width:6px;height:6px;border-radius:50%;background:var(--green);margin-top:7px;flex-shrink:0;"></span><span style="font-size:0.875rem;color:var(--ink);line-height:1.6;">' + t.replace(/^[-•*]\s*/,'') + '</span></div>';
    return '<div style="font-size:0.875rem;color:var(--ink);line-height:1.7;padding:2px 0;">' + t + '</div>';
  }).join('');
  box.appendChild(header);
  box.appendChild(body);
  modal.appendChild(box);
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
}

window.deleteProcedure = async function(docId) {
  if (!confirm('Delete this document?')) return;

    await deleteDoc(doc(db,'procedures',docId));
    showToast('Deleted!');
    loadProcedures(window._userData);

// ============================================
// OPENING & CLOSING CHECKLISTS
// ============================================
function renderChecklists(main, userData) {
  const today = new Date();
  window._clTodayKey = today.toISOString().split('T')[0];
  const todayLabel = today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  main.innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Opening & Closing</h1>
      <p class="page-sub">${todayLabel}</p>
    </div>
    <div class="page-body">
      <div style="display:flex;gap:4px;background:var(--cream);border-radius:12px;padding:4px;margin-bottom:20px;">
        <button id="cl-tab-opening" onclick="clSwitchTab('opening')" style="flex:1;height:40px;border-radius:8px;border:none;font-family:var(--font-body);font-size:0.875rem;font-weight:600;cursor:pointer;background:var(--green);color:#fff;">Opening</button>
        <button id="cl-tab-closing" onclick="clSwitchTab('closing')" style="flex:1;height:40px;border-radius:8px;border:none;font-family:var(--font-body);font-size:0.875rem;cursor:pointer;background:transparent;color:var(--ink-muted);">Closing</button>
      </div>
      <div id="cl-panel-opening"></div>
      <div id="cl-panel-closing" style="display:none;"></div>
    </div>`;

  window._clCurrentTab = 'opening';
  clLoadTab('opening', userData);

  // Auto-refresh at midnight so date resets without reopening app
  const now = new Date();
  const msUntilMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1) - now;
  setTimeout(() => {
    // Update today key and reload
    window._clTodayKey = new Date().toISOString().split('T')[0];
    const dateEl = document.querySelector('.page-sub');
    if (dateEl) dateEl.textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    clLoadTab(window._clCurrentTab, window._userData);
    showToast('New day — checklist reset!');
  }, msUntilMidnight);
}

window.clSwitchTab = function(tab) {
  window._clCurrentTab = tab;
  document.getElementById('cl-panel-opening').style.display = tab === 'opening' ? 'block' : 'none';
  document.getElementById('cl-panel-closing').style.display = tab === 'closing' ? 'block' : 'none';
  const ob = document.getElementById('cl-tab-opening');
  const cb = document.getElementById('cl-tab-closing');
  if (ob) { ob.style.background = tab==='opening'?'var(--green)':'transparent'; ob.style.color = tab==='opening'?'#fff':'var(--ink-muted)'; ob.style.fontWeight = tab==='opening'?'600':'400'; }
  if (cb) { cb.style.background = tab==='closing'?'var(--ink)':'transparent'; cb.style.color = tab==='closing'?'#fff':'var(--ink-muted)'; cb.style.fontWeight = tab==='closing'?'600':'400'; }
  clLoadTab(tab, window._userData);
}

async function clLoadTab(type, userData) {
  const panel = document.getElementById('cl-panel-' + type);
  if (!panel) return;
  panel.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';

  const rid = currentRestaurantId() || userData?.uid;
  if (!rid) { panel.innerHTML = '<div class="empty-state"><div class="empty-state-title">No restaurant selected</div></div>'; return; }

  const color = type === 'opening' ? '#1D9E75' : '#C17F3A';
  const today = window._clTodayKey;

  try {
    // Simple single-field query only
    const itemsSnap = await getDocs(query(collection(db,'clItems'), where('restaurantId','==',rid)));
    const items = itemsSnap.docs
      .map(d => ({id:d.id, ...d.data()}))
      .filter(i => i.type === type)
      .sort((a,b) => (a.order||0) - (b.order||0));

    const checksSnap = await getDocs(query(collection(db,'clChecks'), where('restaurantId','==',rid)));
    const todayChecks = {};
    checksSnap.docs.forEach(d => {
      const x = d.data();
      if (x.date === today && x.type === type) todayChecks[x.itemId] = {...x, docId: d.id};
    });

    const done = items.filter(i => todayChecks[i.id]).length;
    panel.innerHTML = '';

    // Progress bar
    const prog = document.createElement('div');
    prog.className = 'card';
    prog.style.marginBottom = '16px';
    prog.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'
      + '<div style="font-family:var(--font-display);font-size:1.3rem;font-weight:700;color:var(--ink);">' + done + '<span style="font-size:0.9rem;color:var(--ink-muted);">/' + items.length + ' done</span></div>'
      + '</div>'
      + '<div style="height:8px;background:var(--cream);border-radius:4px;overflow:hidden;">'
      + '<div style="height:100%;width:' + (items.length ? Math.round(done/items.length*100) : 0) + '%;background:' + color + ';border-radius:4px;transition:width 0.4s;"></div>'
      + '</div>';
    panel.appendChild(prog);

    // ── WHO IS CHECKING bar ──
    const nameBar = document.createElement('div');
    nameBar.style.cssText = 'display:flex;align-items:center;gap:10px;background:var(--white);border:1.5px solid ' + color + ';border-radius:12px;padding:10px 14px;margin-bottom:14px;flex-wrap:wrap;';
    const savedName = sessionStorage.getItem('cl-checker-name') || '';
    nameBar.innerHTML = '<div style="width:32px;height:32px;border-radius:8px;background:' + (color==='#1D9E75'?'var(--green-light)':'#FFF0E0') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-5 6-5s6 1.7 6 5"/></svg></div>'
      + '<span style="font-size:0.82rem;color:var(--ink);font-weight:600;">Checking as:</span>'
      + '<input type="text" id="cl-name-input" placeholder="Enter your name..." value="' + savedName + '" oninput="setCLCheckerName(this.value)" style="height:34px;border-radius:8px;border:1px solid var(--border);background:var(--cream);padding:0 12px;font-family:var(--font-body);font-size:0.875rem;flex:1;min-width:130px;max-width:220px;outline:none;">'
      + '<span style="font-size:0.75rem;color:var(--ink-muted);">Saved for session</span>';
    panel.appendChild(nameBar);

    // Add item button (admin only)
    if (isAdmin) {
      const addBtn = document.createElement('button');
      addBtn.textContent = '+ Add item';
      addBtn.style.cssText = 'height:40px;padding:0 18px;border-radius:10px;border:2px dashed var(--border);background:transparent;color:var(--ink-muted);font-family:var(--font-body);font-size:0.875rem;cursor:pointer;margin-bottom:16px;width:100%;';
      addBtn.onclick = () => clShowAddModal(type, rid, color);
      panel.appendChild(addBtn);
    }

    // Empty state
    if (!items.length) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<div class="empty-state-title">No ' + type + ' items yet</div>'
        + '<div class="empty-state-sub">' + (isAdmin ? 'Click Add item above' : 'Chef Nek will add items') + '</div>';
      panel.appendChild(empty);
      return;
    }

    // Item cards
    items.forEach(item => {
      const chk = todayChecks[item.id];
      const card = document.createElement('div');
      card.style.cssText = 'background:var(--white);border-radius:14px;border:1.5px solid ' + (chk ? color : 'var(--border)') + ';padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;';

      const cb = document.createElement('div');
      cb.style.cssText = 'width:28px;height:28px;border-radius:8px;border:2px solid ' + (chk ? color : 'var(--border)') + ';background:' + (chk ? color : 'transparent') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;';
      cb.innerHTML = chk ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 5,10 12,3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>' : '';
      cb.onclick = () => clToggleCheck(item.id, type, rid, chk, today);

      const info = document.createElement('div');
      info.style.flex = '1';
      info.innerHTML = '<div style="font-size:0.9rem;font-weight:' + (chk?'600':'500') + ';color:var(--ink);">' + item.name + '</div>'
        + (item.note ? '<div style="font-size:0.75rem;color:var(--ink-muted);margin-top:2px;">' + item.note + '</div>' : '')
        + (chk ? '<div style="font-size:0.72rem;color:' + color + ';margin-top:4px;">Done by ' + (chk.by||'?') + ' · ' + (chk.time||'') + '</div>' : '');

      card.appendChild(cb);
      card.appendChild(info);

      // Drag handle (admin)
      if (isAdmin) {
        const handle = document.createElement('div');
        handle.style.cssText = 'font-size:1rem;color:var(--ink-muted);cursor:grab;padding:0 4px;user-select:none;flex-shrink:0;';
        handle.innerHTML = '⠿';
        handle.title = 'Drag to reorder';
        handle.draggable = true;
        handle.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', item.id);
          card.style.opacity = '0.5';
        });
        handle.addEventListener('dragend', () => { card.style.opacity = '1'; });
        card.insertBefore(handle, card.firstChild);

        const btnWrap = document.createElement('div');
        btnWrap.style.cssText = 'display:flex;gap:6px;flex-shrink:0;';

        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.style.cssText = 'height:26px;padding:0 8px;border-radius:6px;border:0.5px solid var(--green);background:var(--green-light);color:var(--green-dark);font-size:11px;cursor:pointer;font-family:var(--font-body);';
        editBtn.onclick = () => clShowEditModal(item, type, rid, color);

        const delBtn = document.createElement('button');
        delBtn.textContent = 'Del';
        delBtn.style.cssText = 'height:26px;padding:0 8px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:11px;cursor:pointer;font-family:var(--font-body);';
        delBtn.onclick = async () => {
          if (!confirm('Delete this item?')) return;
          await deleteDoc(doc(db,'clItems',item.id));
          showToast('Deleted');
          clLoadTab(type, window._userData);
        };

        btnWrap.appendChild(editBtn);
        btnWrap.appendChild(delBtn);
        card.appendChild(btnWrap);
      }

      // Drop target
      card.addEventListener('dragover', (e) => { e.preventDefault(); card.style.borderColor = color; });
      card.addEventListener('dragleave', () => { card.style.borderColor = chk ? color : 'var(--border)'; });
      card.addEventListener('drop', async (e) => {
        e.preventDefault();
        card.style.borderColor = chk ? color : 'var(--border)';
        const draggedId = e.dataTransfer.getData('text/plain');
        if (draggedId === item.id) return;
        // Reorder: swap order values
        const draggedItem = items.find(i => i.id === draggedId);
        const targetItem = item;
        if (!draggedItem || !targetItem) return;
        const newOrder = targetItem.order ?? 0;
        const oldOrder = draggedItem.order ?? 0;
        // Shift items between
        const updates = [];
        items.forEach(it => {
          if (it.id === draggedId) {
            updates.push(setDoc(doc(db,'clItems',it.id), {order: newOrder}, {merge:true}));
          } else if (oldOrder < newOrder && it.order > oldOrder && it.order <= newOrder) {
            updates.push(setDoc(doc(db,'clItems',it.id), {order: it.order - 1}, {merge:true}));
          } else if (oldOrder > newOrder && it.order >= newOrder && it.order < oldOrder) {
            updates.push(setDoc(doc(db,'clItems',it.id), {order: it.order + 1}, {merge:true}));
          }
        });
        await Promise.all(updates);
        clLoadTab(type, window._userData);
      });

      panel.appendChild(card);
    });

    // Sign off button
    if (done === items.length && items.length > 0) {
      const signBtn = document.createElement('button');
      signBtn.style.cssText = 'width:100%;height:48px;border-radius:14px;border:none;background:' + color + ';color:#fff;font-family:var(--font-body);font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:8px;';
      signBtn.textContent = '✓ Sign off ' + type + ' checklist';
      signBtn.onclick = () => clSignOff(type, rid, today);
      panel.appendChild(signBtn);
    }

  } catch(e) {
    console.error('clLoadTab error:', e);
    panel.innerHTML = '<div style="padding:16px;background:#FCEBEB;border-radius:12px;color:#A32D2D;font-size:0.85rem;">Error: ' + e.message + '</div>';
  }
}

async function clToggleCheck(itemId, type, rid, existingChk, today) {
  try {
    if (existingChk) {
      // Uncheck - delete the check doc
      await deleteDoc(doc(db,'clChecks', existingChk.docId));
      showToast('Unchecked');
    } else {
      // Get name from session or ask once
      let name = sessionStorage.getItem('cl-checker-name');
      if (!name) {
        name = prompt('Your name: (saved for this session)');
        if (!name) return;
        sessionStorage.setItem('cl-checker-name', name.trim());
        name = name.trim();
        // Update name bar if visible
        const inp = document.getElementById('cl-name-input');
        if (inp) inp.value = name;
        updateCLNameBadge(name);
      }
      const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      await addDoc(collection(db,'clChecks'), {
        itemId, type, restaurantId: rid, date: today,
        by: name.trim(), time, checkedAt: serverTimestamp()
      });
      showToast('✅ Checked off!');
    }
    clLoadTab(type, window._userData);
  } catch(e) {
    console.error('clToggleCheck error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

window.setCLCheckerName = function(name) {
  const trimmed = name.trim();
  if (trimmed) {
    sessionStorage.setItem('cl-checker-name', trimmed);
    updateCLNameBadge(trimmed);
  } else {
    sessionStorage.removeItem('cl-checker-name');

function updateCLNameBadge(name) {

function renderStationGuide(main, userData) {
  main.innerHTML = `
    <div class="page-header">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div><h1 class="page-title">Station Guide</h1><p class="page-sub">Cooking steps and ingredients for every dish</p></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${isAdmin ? '<button onclick="showAddStationDishCurrent()" class="form-btn-small">+ Add dish</button>' : ''}
          <button onclick="printStationGuide()" class="form-btn-small" style="background:transparent;border:1.5px solid var(--border);color:var(--ink-soft);">🖨️ Print</button>
        </div>
      </div>
    </div>
    <div class="page-body">
      <div id="sg-filter" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;"></div>
      <div id="sg-list"></div>
    </div>`;
  loadStationGuide(userData);
}

async function loadStationGuide(userData) {
  const listEl = document.getElementById('sg-list');
  if (!listEl) return;
  listEl.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  const restaurantId = currentRestaurantId() || userData.uid;
  try {
    const snap = await getDocs(query(collection(db,'stationDishes'), where('restaurantId','==',restaurantId)));
    if (snap.empty) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No dishes yet</div><div class="empty-state-sub">' + (isAdmin ? 'Click Add dish above' : 'Chef Nek will set this up soon') + '</div></div>';
      return;
    }
    const dishes = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.category||'').localeCompare(b.category||''));
    window._sgDishes = dishes;
    const cats = ['All',...new Set(dishes.map(d=>d.category||'General'))].sort((a,b)=>a==='All'?-1:a.localeCompare(b));
    window._sgCat = window._sgCat || 'All';
    const filterEl = document.getElementById('sg-filter');
    if (filterEl) filterEl.innerHTML = cats.map(cat => '<button data-cat="' + cat + '" onclick="filterSG(this.dataset.cat)" style="height:34px;padding:0 16px;border-radius:100px;border:0.5px solid ' + (cat===window._sgCat?'var(--green)':'var(--border)') + ';background:' + (cat===window._sgCat?'var(--green)':'var(--white)') + ';color:' + (cat===window._sgCat?'#fff':'var(--ink-soft)') + ';font-family:var(--font-body);font-size:0.8rem;cursor:pointer;">' + cat + '</button>').join('');
    renderStationList(dishes);
  } catch(e) { listEl.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading.</p></div>'; }
}

window.filterSG = function(cat) {
  window._sgCat = cat;
  document.getElementById('sg-filter')?.querySelectorAll('button').forEach(b => {
    const active = b.textContent === cat;
    b.style.background = active?'var(--green)':'var(--white)';
    b.style.color = active?'#fff':'var(--ink-soft)';
    b.style.borderColor = active?'var(--green)':'var(--border)';
  });
  renderStationList(window._sgDishes||[]);
}

function renderStationList(dishes) {
  const listEl = document.getElementById('sg-list');
  if (!listEl) return;
  const cat = window._sgCat || 'All';
  const filtered = cat==='All' ? dishes : dishes.filter(d=>(d.category||'General')===cat);
  if (!filtered.length) { listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No dishes here</div></div>'; return; }
  const groups = {};
  filtered.forEach(d => { const c=d.category||'General'; if(!groups[c]) groups[c]=[]; groups[c].push(d); });
  listEl.innerHTML = '';
  Object.entries(groups).sort().forEach(([catName, items]) => {
    const sec = document.createElement('div');
    sec.style.marginBottom = '28px';
    sec.innerHTML = '<div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border);">' + catName + '</div>';
    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;';
    items.forEach(dish => {
      const card = document.createElement('div');
      card.style.cssText = 'background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;';
      card.onmouseenter = () => { card.style.transform='translateY(-3px)'; card.style.boxShadow='0 8px 24px rgba(26,26,20,0.1)'; };
      card.onmouseleave = () => { card.style.transform=''; card.style.boxShadow=''; };
      card.onclick = () => openStationDish(dish.id);
      if (dish.photoUrl) card.innerHTML = '<div style="height:150px;overflow:hidden;"><img src="' + dish.photoUrl + '" style="width:100%;height:100%;object-fit:cover;" loading="lazy"></div>';
      const body = document.createElement('div');
      body.style.padding = '14px 16px 16px';
      body.innerHTML = '<div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:4px;">' + dish.name + '</div>';
      if (dish.price) body.innerHTML += '<div style="font-size:0.75rem;color:var(--green);font-weight:600;margin-bottom:6px;">' + dish.price + '</div>';
      if (dish.prepTime) body.innerHTML += '<div style="font-size:0.72rem;color:var(--ink-muted);margin-bottom:8px;">Prep: ' + dish.prepTime + '</div>';
      if (dish.ingredients && dish.ingredients.length) {
        const ings = Array.isArray(dish.ingredients) ? dish.ingredients : [dish.ingredients];
        body.innerHTML += '<div style="margin-bottom:8px;">'
          + ings.slice(0,5).map(ing => '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">'
            + '<span style="color:var(--green);font-size:0.7rem;">•</span>'
            + '<span style="font-size:0.75rem;color:var(--ink-soft);">' + ing + '</span>'
            + '</div>').join('')
          + (ings.length > 5 ? '<div style="font-size:0.72rem;color:var(--ink-muted);margin-top:2px;">+' + (ings.length-5) + ' more...</div>' : '')
          + '</div>';
      }
      if (dish.steps && dish.steps.length) {
        const stepsArr = Array.isArray(dish.steps) ? dish.steps : dish.steps.split('\n').filter(s=>s.trim());
        const steps = stepsArr.slice(0,2);
        body.innerHTML += steps.map((s,i) => '<div style="display:flex;gap:8px;margin-bottom:4px;"><span style="width:18px;height:18px;border-radius:4px;background:var(--amber-light);color:#854F0B;font-size:0.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + (i+1) + '</span><span style="font-size:0.78rem;color:var(--ink-soft);line-height:1.4;">' + s.replace(/^\d+[.)]\s*/,'').substring(0,55) + '</span></div>').join('');
      }
      if (isAdmin) {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);';
        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.style.cssText = 'height:28px;padding:0 10px;border-radius:6px;border:0.5px solid var(--border);background:var(--cream);color:var(--ink-soft);font-size:11px;cursor:pointer;font-family:var(--font-body);';
        editBtn.onclick = (e) => { e.stopPropagation(); showEditStationDish(dish); };
        const delBtn = document.createElement('button');
        delBtn.textContent = 'Delete';
        delBtn.style.cssText = 'height:28px;padding:0 10px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:11px;cursor:pointer;font-family:var(--font-body);';
        delBtn.onclick = async (e) => { e.stopPropagation(); if(!confirm('Delete?')) return; await deleteDoc(doc(db,'stationDishes',dish.id)); showToast('Deleted!'); loadStationGuide(window._userData); };
        row.appendChild(editBtn);
        row.appendChild(delBtn);
        body.appendChild(row);
      }
      card.appendChild(body);
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    listEl.appendChild(sec);
  });
}

window.uploadAMIPhoto = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('ami-photo-preview');
  const img = document.getElementById('ami-photo-preview-img');
  const urlInput = document.getElementById('ami-photo');
  const reader = new FileReader();
  reader.onload = e => {
    if (img) img.src = e.target.result;
    if (preview) preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
  showToast('Uploading photo...');
  try {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch('https://api.imgbb.com/1/upload?key=2607f98fd74e91661681ef5b362c36f2', { method:'POST', body:formData });
    const data = await res.json();
    if (data.success) {
      if (urlInput) urlInput.value = data.data.url;
      if (img) img.src = data.data.url;
      showToast('Photo uploaded!');
    }
  } catch(e) { showToast('Photo ready!'); }
}

async function saveMenuItem() {
  const name = document.getElementById('ami-name')?.value.trim();
  const catSel = document.getElementById('ami-category');
  let category = catSel?.value === 'custom'
    ? document.getElementById('ami-custom-cat')?.value.trim()
    : catSel?.value;
  const price = document.getElementById('ami-price')?.value.trim();
  const notes = document.getElementById('ami-notes')?.value.trim();
  const photoUrl = document.getElementById('ami-photo')?.value.trim();
  const restaurantId = isAdmin
    ? document.getElementById('ami-restaurant')?.value
    : window._userData?.uid;

  if (!name) { showToast('Item name required','error'); return; }
  if (!restaurantId) { showToast('Select a restaurant','error'); return; }
  if (!category) category = 'General';

  try {
    await addDoc(collection(db,'recipes'), {
      name, category, price, notes, photoUrl,
      restaurantId, createdAt: serverTimestamp()
    });
    showToast('✅ ' + name + ' added to menu!');
    document.getElementById('add-menu-item-modal')?.remove();
    // Refresh the menu preview
    if (window.updateMenuPreview) window.updateMenuPreview();
    if (window.loadMenuDesign) window.loadMenuDesign(window._userData);
  } catch(e) {
    console.error(e);
    showToast('Error saving item','error');
  }
}

async function previewMigration() {
  const fromId = document.getElementById('mig-from')?.value;
  const toId = document.getElementById('mig-to')?.value;
  const preview = document.getElementById('mig-preview');
  if (!fromId || !toId) { showToast('Select both accounts','error'); return; }
  if (fromId === toId) { showToast('Source and destination must be different','error'); return; }
  preview.style.display = 'block';
  preview.textContent = 'Counting data...';
  try {
    const counts = {};
    if (document.getElementById('mig-cl')?.checked) {
      const snap = await getDocs(query(collection(db,'clItems'), where('restaurantId','==',fromId)));
      counts['Opening/Closing items'] = snap.size;
    }
    if (document.getElementById('mig-sg')?.checked) {
      const snap = await getDocs(query(collection(db,'stationDishes'), where('restaurantId','==',fromId)));
      counts['Station Guide dishes'] = snap.size;
    }
    if (document.getElementById('mig-proc')?.checked) {
      const snap = await getDocs(query(collection(db,'procedures'), where('restaurantId','==',fromId)));
      counts['Procedures'] = snap.size;
    }
    if (document.getElementById('mig-prep')?.checked) {
      const snap = await getDocs(query(collection(db,'prepCategories'), where('restaurantId','==',fromId)));
      counts['Prep categories'] = snap.size;
    }
    if (document.getElementById('mig-inv')?.checked) {
      const snap = await getDocs(query(collection(db,'invCategories'), where('restaurantId','==',fromId)));
      counts['Inventory categories'] = snap.size;
    }
    if (document.getElementById('mig-recipes')?.checked) {
      const snap = await getDocs(query(collection(db,'recipes'), where('restaurantId','==',fromId)));
      counts['Recipe book items'] = snap.size;
    }
    if (document.getElementById('mig-fc')?.checked) {
      const snap = await getDocs(query(collection(db,'foodCostRecipes'), where('restaurantId','==',fromId)));
      counts['Food cost recipes'] = snap.size;
    }
    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    if (total === 0) {
      preview.innerHTML = '⚠️ No data found under the source account for selected types.';
      preview.style.background = '#FFF8E1';
      preview.style.color = '#854F0B';
    } else {
      preview.style.background = 'var(--green-light)';
      preview.style.color = 'var(--green-dark)';
      preview.innerHTML = '✅ Found <strong>' + total + ' items</strong> to move:<br>'
        + Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>'• ' + v + ' ' + k).join('<br>');
    }
  } catch(e) { preview.textContent = 'Error: ' + e.message; }
}

async function runMigration() {
  const fromId = document.getElementById('mig-from')?.value;
  const toId = document.getElementById('mig-to')?.value;
  const result = document.getElementById('mig-result');
  const btn = document.getElementById('mig-move-btn');
  if (!fromId || !toId) { showToast('Select both accounts','error'); return; }
  if (fromId === toId) { showToast('Source and destination must be different','error'); return; }
  if (!confirm('Move all selected data from source to destination? This cannot be undone.')) return;
  
  if (btn) { btn.textContent = 'Moving...'; btn.disabled = true; }
  let moved = 0;

  try {
    // Helper: move all docs in a collection
    async function migrateCollection(collName) {
      const snap = await getDocs(query(collection(db, collName), where('restaurantId','==',fromId)));
      for (const d of snap.docs) {
        await setDoc(doc(db, collName, d.id), {restaurantId: toId}, {merge:true});
        moved++;
      }
      return snap.size;
    }

    if (document.getElementById('mig-cl')?.checked) await migrateCollection('clItems');
    if (document.getElementById('mig-sg')?.checked) await migrateCollection('stationDishes');
    if (document.getElementById('mig-proc')?.checked) await migrateCollection('procedures');
    if (document.getElementById('mig-prep')?.checked) {
      const catSnap = await getDocs(query(collection(db,'prepCategories'), where('restaurantId','==',fromId)));
      for (const d of catSnap.docs) {
        await setDoc(doc(db,'prepCategories',d.id), {restaurantId: toId}, {merge:true});
        moved++;
      }
    }
    if (document.getElementById('mig-inv')?.checked) {
      // Migrate inventory categories
      const invCatSnap = await getDocs(query(collection(db,'invCategories'), where('restaurantId','==',fromId)));
      for (const d of invCatSnap.docs) {
        await setDoc(doc(db,'invCategories',d.id), {restaurantId: toId}, {merge:true});
        moved++;
      }
      // Migrate inventory items (linked by categoryId — also update restaurantId if stored)
      const invItemSnap = await getDocs(query(collection(db,'invItems'), where('restaurantId','==',fromId)));
      for (const d of invItemSnap.docs) {
        await setDoc(doc(db,'invItems',d.id), {restaurantId: toId}, {merge:true});
        moved++;
      }
    }
    if (document.getElementById('mig-recipes')?.checked) {
      const recipeSnap = await getDocs(query(collection(db,'recipes'), where('restaurantId','==',fromId)));
      for (const d of recipeSnap.docs) {
        await setDoc(doc(db,'recipes',d.id), {restaurantId: toId}, {merge:true});
        moved++;
      }
    }
    if (document.getElementById('mig-fc')?.checked) {
      const fcSnap = await getDocs(query(collection(db,'foodCostRecipes'), where('restaurantId','==',fromId)));
      for (const d of fcSnap.docs) {
        await setDoc(doc(db,'foodCostRecipes',d.id), {restaurantId: toId}, {merge:true});
        moved++;
      }
    }

    if (result) {
      result.style.display = 'block';
      result.style.background = 'var(--green-light)';
      result.style.color = 'var(--green-dark)';
      result.innerHTML = '🎉 Done! Moved <strong>' + moved + ' items</strong> successfully.<br><span style="font-size:0.78rem;font-weight:400;">Reload the page to see the changes.</span>';
    }
    if (btn) { btn.textContent = '✅ Done!'; btn.style.background = 'var(--green-dark)'; }
    showToast('Data moved successfully!');
  } catch(e) {
    console.error(e);
    showToast('Error during migration: ' + e.message, 'error');
    if (btn) { btn.textContent = 'Move data'; btn.disabled = false; }
  }
}

window.uploadMenuLogo = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => previewLogoFromUrl(e.target.result);
  reader.readAsDataURL(file);
  showToast('Uploading logo...');
  try {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch('https://api.imgbb.com/1/upload?key=2607f98fd74e91661681ef5b362c36f2', {method:'POST',body:formData});
    const data = await res.json();
    if (data.success) {
      const url = data.data.url;
      document.getElementById('logo-url-input').value = url;
      previewLogoFromUrl(url);
      const rid = window._menuViewingRestaurantId || currentRestaurantId();
      await setDoc(doc(db,'menuSettings',rid), {logoUrl: url}, {merge:true});
      showToast('Logo uploaded & saved!');
      if (window.updateMenuPreview) window.updateMenuPreview();
    }
  } catch(e) { showToast('Upload error','error'); }
}

window.previewLogoFromUrl = function(url) {
  const img = document.getElementById('logo-preview-img');
  const placeholder = document.getElementById('logo-placeholder');
  if (!url || !url.startsWith('http') && !url.startsWith('data:')) {
    if (img) { img.style.display='none'; img.src=''; }
    if (placeholder) placeholder.style.display='block';
    return;
  }
  if (img) { img.src=url; img.style.display='block'; img.onload=()=>{ if(placeholder) placeholder.style.display='none'; }; }
}

window.clearMenuLogo = async function() {
  const inp = document.getElementById('logo-url-input');
  const img = document.getElementById('logo-preview-img');
  const placeholder = document.getElementById('logo-placeholder');
  if (inp) inp.value='';
  if (img) { img.src=''; img.style.display='none'; }
  if (placeholder) placeholder.style.display='block';
  try {
    const rid = window._menuViewingRestaurantId || currentRestaurantId();
    await setDoc(doc(db,'menuSettings',rid), {logoUrl: ''}, {merge:true});
    showToast('Logo removed');
    if (window.updateMenuPreview) window.updateMenuPreview();
  } catch(e) {}
}

// ── CLOVER DATA FETCHER ──
async function fetchCloverData(merchantId, apiToken) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayTs = today.getTime();
  const tomorrowTs = todayTs + 86400000;

  const headers = { 'Authorization': 'Bearer ' + apiToken };

  // Fetch today's orders with line items
  const ordersUrl = CLOVER_BASE + merchantId + '/orders?expand=lineItems&filter=clientCreatedTime%3E%3D' + todayTs + '&filter=clientCreatedTime%3C' + tomorrowTs + '&limit=200';
  const ordersRes = await fetch(ordersUrl, { headers });
  if (!ordersRes.ok) throw new Error('Clover API error: ' + ordersRes.status);
  const ordersData = await ordersRes.json();
  const orders = ordersData.elements || [];

  // Calculate revenue
  let totalRevenue = 0;
  const itemCounts = {};
  orders.forEach(order => {
    totalRevenue += (order.total || 0);
    if (order.lineItems && order.lineItems.elements) {
      order.lineItems.elements.forEach(li => {
        const name = li.name || 'Unknown';
        if (!itemCounts[name]) itemCounts[name] = { count: 0, revenue: 0, name };
        itemCounts[name].count += (li.quantity || 1);
        itemCounts[name].revenue += (li.price || 0) * (li.quantity || 1);
      });
    }
  });

  // Top 5 items by count
  const topItems = Object.values(itemCounts).sort((a,b)=>b.count-a.count).slice(0,5);

  // Yesterday's revenue for comparison
  const yestStart = todayTs - 86400000;
  const yestUrl = CLOVER_BASE + merchantId + '/orders?filter=clientCreatedTime%3E%3D' + yestStart + '&filter=clientCreatedTime%3C' + todayTs + '&limit=200';
  const yestRes = await fetch(yestUrl, { headers });
  let yesterdayRevenue = 0;
  if (yestRes.ok) {
    const yestData = await yestRes.json();
    (yestData.elements||[]).forEach(o => { yesterdayRevenue += (o.total||0); });
  }

  return {
    revenue: totalRevenue / 100,  // Clover stores in cents
    orderCount: orders.length,
    topItems: topItems.map(i => ({...i, revenue: i.revenue/100})),
    yesterdayRevenue: yesterdayRevenue / 100,
    lastUpdated: new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})
  };
}

window.syncCloverMenu = async function(merchantId, apiToken) {

    const url = CLOVER_BASE + merchantId + '/items?limit=200';
    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + apiToken } });
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    const items = data.elements || [];
    if (!items.length) { showToast('No items found in Clover','error'); return; }

    const rid = currentRestaurantId();
    // Get existing Chef Nek Pro recipes
    const existingSnap = await getDocs(query(collection(db,'recipes'), where('restaurantId','==',rid)));
    const existingNames = new Set(existingSnap.docs.map(d=>d.data().name?.toLowerCase()));

    // Find new items not in Chef Nek Pro
    const newItems = items.filter(i => i.name && !existingNames.has(i.name.toLowerCase()));

    if (!newItems.length) { showToast('All Clover items already in Chef Nek Pro ✅'); return; }

    // Show sync modal
    showCloverSyncModal(newItems, rid);
  } catch(e) {
    showToast('Sync error: ' + e.message, 'error');
  }
}

async function testPOSConnection() {
  const sys = POS_SYSTEMS[window._currentPOSSystem];
  if (!sys) return;
  const values = sys.fields.map((_, i) => document.getElementById('pos-field-'+i)?.value.trim() || '');
  const resultEl = document.getElementById('pos-test-result');
  if (values.some(v => !v)) { showToast('Fill all fields first','error'); return; }
  if (resultEl) { resultEl.style.display='block'; resultEl.style.background='#FFF8E1'; resultEl.style.color='#854F0B'; resultEl.textContent='Testing connection...'; }
  try {
    let ok = false, msg = '';
    if (window._currentPOSSystem === 'clover') {
      const res = await fetch(CLOVER_BASE + values[0], { headers: { 'Authorization':'Bearer '+values[1] } });
      ok = res.ok;
      msg = ok ? 'Connected! Merchant: '+(await res.json()).name : 'Failed ('+res.status+')';
    } else if (window._currentPOSSystem === 'square') {
      const res = await fetch('https://connect.squareup.com/v2/locations/'+values[0], { headers: { 'Authorization':'Bearer '+values[1], 'Square-Version':'2024-01-18' } });
      ok = res.ok;
      msg = ok ? 'Connected! Location: '+(await res.json()).location?.name : 'Failed ('+res.status+')';
    } else {
      ok = true; msg = 'Credentials saved — will verify on first data pull';
    }
    if (resultEl) { resultEl.style.background=ok?'#E0F5EC':'#FCEBEB'; resultEl.style.color=ok?'#0A6B3A':'#A32D2D'; resultEl.textContent=(ok?'✅ ':'❌ ')+msg; }
  } catch(e) {
    if (resultEl) { resultEl.style.background='#FCEBEB'; resultEl.style.color='#A32D2D'; resultEl.textContent='❌ '+e.message; }
  }
}

window.savePOSCredentials = async function(clientId) {
  const sys = POS_SYSTEMS[window._currentPOSSystem];
  if (!sys) return;
  const values = sys.fields.map((_, i) => document.getElementById('pos-field-'+i)?.value.trim() || '');
  if (sys.fields.length && values.some(v => !v)) { showToast('Fill all fields','error'); return; }
  const btn = document.getElementById('pos-save-btn');
  if (btn) { btn.textContent='Saving...'; btn.disabled=true; }
  try {
    const update = { posSystem: window._currentPOSSystem };
    sys.keys.forEach((k, i) => { update[k] = values[i] || ''; });
    await setDoc(doc(db,'users',clientId), update, {merge:true});
    showToast('🔌 '+sys.name+' connected!');
    document.getElementById('pos-connector-modal')?.remove();
    loadClients();
  } catch(e) {
    showToast('Error saving','error');
    if (btn) { btn.textContent='Save & connect'; btn.disabled=false; }
  }
}

window.loadPOSWidget = async function(userData, containerId) {
  const sys = userData.posSystem || (userData.cloverMerchantId ? 'clover' : null);

// ── SQUARE WIDGET ──
window.loadSquareWidget = async function(locationId, accessToken, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '<div style="text-align:center;padding:20px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  try {
    const today = new Date().toISOString().split('T')[0];
    const res = await fetch('https://connect.squareup.com/v2/orders/search', {
      method: 'POST',
      headers: { 'Authorization':'Bearer '+accessToken, 'Square-Version':'2024-01-18', 'Content-Type':'application/json' },
      body: JSON.stringify({ location_ids:[locationId], query:{ filter:{ date_time_filter:{ created_at:{ start_at:today+'T00:00:00Z', end_at:today+'T23:59:59Z' }}}} })
    });
    if (!res.ok) throw new Error('Square API '+res.status);
    const data = await res.json();
    const orders = data.orders || [];
    let revenue = 0;
    const itemMap = {};
    orders.forEach(o => {
      revenue += (o.total_money?.amount||0);
      (o.line_items||[]).forEach(li => {
        const n = li.name||'Item'; const qty = parseInt(li.quantity||1);
        if (!itemMap[n]) itemMap[n] = {count:0,revenue:0,name:n};
        itemMap[n].count += qty; itemMap[n].revenue += (li.total_money?.amount||0);
      });
    });
    const topItems = Object.values(itemMap).sort((a,b)=>b.count-a.count).slice(0,5).map(i=>({...i,revenue:i.revenue/100}));
    renderPOSDashboard(el, {revenue:revenue/100, orderCount:orders.length, topItems, yesterdayRevenue:0, lastUpdated:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}, '⬛ Square', '#1A1A14', containerId);
  } catch(e) {
    if (el) el.innerHTML = '<div style="padding:14px;background:#FCEBEB;border-radius:12px;font-size:0.82rem;color:#A32D2D;">❌ Square: '+e.message+'</div>';
  }
}

async function loadFoodCostRecipes(userData) {
  const listEl = document.getElementById('fc-recipe-list');
  const summaryEl = document.getElementById('fc-summary');
  if (!listEl) return;
  try {
    const rid = currentRestaurantId() || userData.uid;
    const snap = await getDocs(query(collection(db,'foodCostRecipes'), where('restaurantId','==',rid)));
    if (snap.empty) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No recipes yet</div><div class="empty-state-sub">Click "+ Add recipe" to start calculating your food costs</div></div>';
      return;
    }

    const recipes = snap.docs.map(d => ({id:d.id,...d.data()})).sort((a,b)=>(a.name||'').localeCompare(b.name||''));

    // Summary stats
    const withCost = recipes.filter(r => r.sellingPrice && r.totalCost);
    const avgFoodCost = withCost.length ? withCost.reduce((s,r)=>s+(r.totalCost/r.sellingPrice*100),0)/withCost.length : 0;
    const totalRevPotential = recipes.reduce((s,r)=>s+(r.sellingPrice||0),0);
    const atRisk = recipes.filter(r => r.sellingPrice && r.totalCost && (r.totalCost/r.sellingPrice*100) > 35).length;

    if (summaryEl) {
      summaryEl.innerHTML = `
        <div class="stat-card">
          <div class="stat-card-label">Avg food cost</div>
          <div class="stat-card-value" style="color:${avgFoodCost<=35?'var(--green)':'#E24B4A'};">${avgFoodCost.toFixed(1)}%</div>
          <div style="font-size:0.72rem;color:var(--ink-muted);margin-top:2px;">Target: 28–35%</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Total recipes</div>
          <div class="stat-card-value">${recipes.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Over budget</div>
          <div class="stat-card-value" style="color:${atRisk>0?'#E24B4A':'var(--green)'};">${atRisk}</div>
          <div style="font-size:0.72rem;color:var(--ink-muted);margin-top:2px;">food cost &gt; 35%</div>
        </div>`;
    }

    // Group by category
    const groups = {};
    recipes.forEach(r => {
      const cat = r.category || 'Uncategorized';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(r);
    });

    listEl.innerHTML = Object.entries(groups).sort().map(([cat, items]) => `
      <div style="margin-bottom:28px;">
        <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);">${cat}</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${items.map(recipe => {
            const foodCostPct = recipe.sellingPrice && recipe.totalCost ? (recipe.totalCost / recipe.sellingPrice * 100) : null;
            const profit = recipe.sellingPrice && recipe.totalCost ? recipe.sellingPrice - recipe.totalCost : null;
            const status = foodCostPct === null ? 'incomplete' : foodCostPct <= 28 ? 'great' : foodCostPct <= 35 ? 'ok' : 'high';
            const statusColors = { great:['#0A6B3A','#E0F5EC'], ok:['#B5860A','#FFF8E1'], high:['#A32D2D','#FCEBEB'], incomplete:['var(--ink-muted)','var(--cream)'] };
            const statusLabels = { great:'✅ Great margin', ok:'⚠️ Watch cost', high:'🚨 Too high', incomplete:'📝 Add ingredients' };
            const [statusColor, statusBg] = statusColors[status];
            return `
              <div class="card" style="cursor:pointer;" onclick="openFoodCostRecipe('${recipe.id}')">
                <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
                  <!-- Recipe name & category -->
                  <div style="flex:1;min-width:150px;">
                    <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);">${recipe.name}</div>
                    <div style="font-size:0.75rem;color:var(--ink-muted);margin-top:2px;">${recipe.ingredients?.length||0} ingredients</div>
                  </div>
                  <!-- Numbers -->
                  <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;">
                    <div style="text-align:center;">
                      <div style="font-size:0.65rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px;">Selling</div>
                      <div style="font-size:1rem;font-weight:700;color:var(--ink);">${recipe.sellingPrice ? '$'+Number(recipe.sellingPrice).toFixed(2) : '—'}</div>
                    </div>
                    <div style="text-align:center;">
                      <div style="font-size:0.65rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px;">Cost</div>
                      <div style="font-size:1rem;font-weight:700;color:var(--ink);">${recipe.totalCost ? '$'+Number(recipe.totalCost).toFixed(2) : '—'}</div>
                    </div>
                    <div style="text-align:center;">
                      <div style="font-size:0.65rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px;">Profit</div>
                      <div style="font-size:1rem;font-weight:700;color:var(--green);">${profit !== null ? '$'+profit.toFixed(2) : '—'}</div>
                    </div>
                    <!-- Food cost % badge (BIG) -->
                    <div style="width:70px;height:70px;border-radius:14px;background:${statusBg};border:2px solid ${statusColor};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">
                      <div style="font-size:1.2rem;font-weight:900;color:${statusColor};">${foodCostPct !== null ? foodCostPct.toFixed(0)+'%' : '?'}</div>
                      <div style="font-size:0.55rem;color:${statusColor};font-weight:600;text-align:center;line-height:1.2;">food cost</div>
                    </div>
                  </div>
                  <!-- Status + actions -->
                  <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
                    <span style="font-size:0.68rem;background:${statusBg};color:${statusColor};padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap;">${statusLabels[status]}</span>
                    ${isAdmin ? `<div style="display:flex;gap:6px;">
                      <button onclick="event.stopPropagation();openFoodCostRecipe('${recipe.id}')" style="height:26px;padding:0 10px;border-radius:6px;border:0.5px solid var(--green);background:var(--green-light);color:var(--green-dark);font-size:11px;cursor:pointer;">Edit</button>
                      <button onclick="event.stopPropagation();deleteFoodCostRecipe('${recipe.id}')" style="height:26px;padding:0 10px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:11px;cursor:pointer;">Del</button>
                    </div>` : ''}
                  </div>
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`).join('');
  } catch(e) {
    console.error(e);
    if (listEl) listEl.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading.</p></div>';
  }
}
