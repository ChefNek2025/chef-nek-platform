<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — Chef Nek Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #FAF7F2; min-height: 100vh; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(29,158,117,0.2); border-top-color: #1D9E75; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.875rem; color: #8A8A7A; }
    .error-state { text-align: center; padding: 60px 20px; }
    .error-state h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #1A1A14; margin-bottom: 8px; }
    .error-state p { color: #8A8A7A; font-size: 0.875rem; }
    /* Menu container - gets populated by JS */
    #menu-root { min-height: 100vh; }
    /* Powered by footer */
    .powered-by { text-align: center; padding: 24px; background: #1A1A14; }
    .powered-by a { font-size: 0.72rem; color: rgba(255,255,255,0.3); text-decoration: none; letter-spacing: 0.08em; }
    .powered-by a span { color: #1D9E75; }
    @media print {
      .powered-by { display: none; }
      body { background: white; }
    }
  </style>
</head>
<body>

<div id="menu-root">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading menu...</div>
  </div>
</div>

<div class="powered-by">
  <a href="https://chef-nek-pro.vercel.app">Powered by <span>Chef Nek Pro</span></a>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyCbX-lJSCX2XU4UKOA-6RvvOdBiU_CFTl0",
  authDomain: "chef-nek-pro-dad86.firebaseapp.com",
  projectId: "chef-nek-pro-dad86"
});
const db = getFirestore(app);

// Get restaurant ID from URL
const params = new URLSearchParams(window.location.search);
const rid = params.get('rid');

async function loadPublicMenu() {
  const root = document.getElementById('menu-root');
  if (!rid) {
    root.innerHTML = '<div class="error-state"><h2>Menu not found</h2><p>No restaurant ID provided.</p></div>';
    return;
  }

  try {
    // Load restaurant info
    const userDoc = await getDoc(doc(db, 'users', rid));
    const restaurant = userDoc.exists() ? userDoc.data() : {};
    const restaurantName = restaurant.restaurantName || 'Our Menu';

    // Load menu settings
    const settingsDoc = await getDoc(doc(db, 'menuSettings', rid));
    const settings = settingsDoc.exists() ? settingsDoc.data() : {};

    // Load recipes
    const recipesSnap = await getDocs(query(
      collection(db, 'recipes'),
      where('restaurantId', '==', rid)
    ));
    const recipes = recipesSnap.docs.map(d => ({id: d.id, ...d.data()}));

    if (recipes.length === 0) {
      root.innerHTML = '<div class="error-state"><h2>' + restaurantName + '</h2><p>Menu coming soon!</p></div>';
      return;
    }

    // Apply theme
    const theme = settings.theme || 'light-cream';
    const accent = settings.accentColor || '#1D9E75';
    const font = settings.font || 'Playfair Display';
    const layout = settings.layout || 'classic';

    // Theme colors
    const themes = {
      'dark-stone':   { bg: '#1A1A14', card: '#252520', text: '#F5F0E8', sub: 'rgba(245,240,232,0.5)', border: 'rgba(255,255,255,0.08)', header: '#1A1A14' },
      'light-cream':  { bg: '#FAF7F2', card: '#FFFFFF', text: '#1A1A14', sub: '#8A8A7A', border: 'rgba(26,26,20,0.08)', header: '#FAF7F2' },
      'forest-green': { bg: '#0F2A1A', card: '#162B1D', text: '#E8F5EC', sub: 'rgba(232,245,236,0.5)', border: 'rgba(255,255,255,0.08)', header: '#0F2A1A' },
      'warm-amber':   { bg: '#2A1A08', card: '#331F0A', text: '#F5E8D0', sub: 'rgba(245,232,208,0.5)', border: 'rgba(255,255,255,0.08)', header: '#2A1A08' },
      'pure-white':   { bg: '#FFFFFF', card: '#F8F8F8', text: '#1A1A14', sub: '#8A8A7A', border: '#E8E8E8', header: '#FFFFFF' },
      'midnight':     { bg: '#0A0A12', card: '#12121E', text: '#E8E8F5', sub: 'rgba(232,232,245,0.5)', border: 'rgba(255,255,255,0.08)', header: '#0A0A12' },
    };
    const t = themes[theme] || themes['light-cream'];

    // Group by category
    const categories = {};
    recipes.forEach(r => {
      const cat = r.category || 'Main Menu';
      if (!categories[cat]) categories[cat] = [];
      categories[cat].push(r);
    });

    // Build menu HTML
    document.title = restaurantName + ' — Menu';
    document.body.style.background = t.bg;

    let html = '';

    // Header
    html += '<div style="background:' + t.header + ';padding:48px 24px 40px;text-align:center;border-bottom:1px solid ' + t.border + ';">';
    if (settings.logoUrl) {
      html += '<img src="' + settings.logoUrl + '" style="height:70px;object-fit:contain;margin-bottom:16px;display:block;margin-left:auto;margin-right:auto;">';
    }
    html += '<h1 style="font-family:' + font + ',serif;font-size:2.2rem;font-weight:700;color:' + t.text + ';margin-bottom:8px;">' + restaurantName + '</h1>';
    if (settings.tagline) {
      html += '<p style="font-size:0.9rem;color:' + t.sub + ';font-style:italic;">' + settings.tagline + '</p>';
    }
    html += '</div>';

    // Menu body
    html += '<div style="max-width:720px;margin:0 auto;padding:32px 20px;">';

    Object.entries(categories).sort().forEach(([catName, items]) => {
      // Category header
      html += '<div style="margin-bottom:32px;">';
      html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">';
      html += '<div style="flex:1;height:1px;background:' + accent + ';opacity:0.3;"></div>';
      html += '<h2 style="font-family:' + font + ',serif;font-size:1.1rem;font-weight:700;color:' + accent + ';letter-spacing:0.08em;text-transform:uppercase;">' + catName + '</h2>';
      html += '<div style="flex:1;height:1px;background:' + accent + ';opacity:0.3;"></div>';
      html += '</div>';

      if (layout === 'grid') {
        // Grid layout with photos
        html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;">';
        items.forEach(item => {
          html += '<div style="background:' + t.card + ';border-radius:16px;overflow:hidden;border:1px solid ' + t.border + ';">';
          if (item.photoUrl) {
            html += '<img src="' + item.photoUrl + '" style="width:100%;height:140px;object-fit:cover;" loading="lazy">';
          }
          html += '<div style="padding:14px;">';
          html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">';
          html += '<div style="font-family:' + font + ',serif;font-size:1rem;font-weight:700;color:' + t.text + ';">' + item.name + '</div>';
          if (item.price) html += '<div style="font-size:1rem;font-weight:700;color:' + accent + ';white-space:nowrap;">$' + item.price + '</div>';
          html += '</div>';
          if (item.description) html += '<div style="font-size:0.78rem;color:' + t.sub + ';margin-top:6px;line-height:1.6;">' + item.description + '</div>';
          html += '</div></div>';
        });
        html += '</div>';
      } else {
        // Classic list layout
        items.forEach(item => {
          html += '<div style="display:flex;gap:14px;padding:16px 0;border-bottom:1px solid ' + t.border + ';">';
          if (item.photoUrl) {
            html += '<img src="' + item.photoUrl + '" style="width:72px;height:72px;object-fit:cover;border-radius:10px;flex-shrink:0;" loading="lazy">';
          }
          html += '<div style="flex:1;">';
          html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;">';
          html += '<div style="font-family:' + font + ',serif;font-size:1.05rem;font-weight:700;color:' + t.text + ';">' + item.name + '</div>';
          if (item.price) html += '<div style="font-size:1.05rem;font-weight:700;color:' + accent + ';white-space:nowrap;">$' + item.price + '</div>';
          html += '</div>';
          if (item.description) html += '<div style="font-size:0.82rem;color:' + t.sub + ';line-height:1.65;">' + item.description + '</div>';
          if (item.servings) html += '<div style="font-size:0.72rem;color:' + t.sub + ';margin-top:4px;opacity:0.7;">Serves ' + item.servings + '</div>';
          html += '</div></div>';
        });
      }

      html += '</div>'; // end category
    });

    html += '</div>'; // end body

    root.innerHTML = html;

  } catch(e) {
    console.error(e);
    document.getElementById('menu-root').innerHTML = '<div class="error-state"><h2>Unable to load menu</h2><p>Please try again or contact the restaurant.</p></div>';
  }
}

loadPublicMenu();
</script>

</body>
</html>
