async function loadMenuDesign(userData) {
  const container = document.getElementById('menu-preview-container');
  const restaurantId = window._menuViewingRestaurantId || currentRestaurantId() || userData.uid;

  try {
    // Load settings
    const settingsDoc = await getDoc(doc(db, 'menuSettings', restaurantId));
    const settings = settingsDoc.exists() ? settingsDoc.data() : {};
    const color = settings.accentColor || '#1D9E75';
    menuAccentColor = color;
    const theme = settings.theme || 'dark-stone';
    window._selectedTheme = theme;
    // Highlight selected theme
    setTimeout(() => { if(window.selectTheme) window.selectTheme(theme); }, 100);

    // Pre-fill settings form
    if (document.getElementById('menu-tagline')) document.getElementById('menu-tagline').value = settings.tagline || '';
    if (document.getElementById('menu-address')) document.getElementById('menu-address').value = settings.address || '';
    if (document.getElementById('menu-phone')) document.getElementById('menu-phone').value = settings.phone || '';
    if (document.getElementById('menu-hours')) document.getElementById('menu-hours').value = settings.hours || '';
    if (document.getElementById('menu-instagram')) document.getElementById('menu-instagram').value = settings.instagram || '';
    if (document.getElementById('menu-hero-photo')) document.getElementById('menu-hero-photo').value = settings.heroPhoto || '';

    // Highlight selected color
    const colorEl = document.getElementById('color-'+color.replace('#',''));
    if (colorEl) { colorEl.style.border = '3px solid var(--ink)'; colorEl.style.transform = 'scale(1.2)'; }

    // Load recipes
    const recipesSnap = await getDocs(
      query(collection(db, 'recipes'), where('restaurantId','==', restaurantId))
    );
    const recipes = recipesSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    if (recipes.length === 0) {
      container.innerHTML = `
        <div class="menu-preview" style="padding:40px;text-align:center;">
          <div style="font-size:2rem;margin-bottom:12px;">🍽️</div>
          <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:8px;">No recipes yet</div>
          <div style="font-size:0.875rem;color:var(--ink-muted);">Add recipes to your recipe book first — they'll appear here automatically</div>
        </div>`;
      return;
    }

    // Group by category
    const catOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];
    const groups = {};
    recipes.forEach(r => {
      const cat = r.category || 'Other';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(r);
    });
    const sortedGroups = Object.entries(groups).sort(([a],[b]) => {
      return (catOrder.indexOf(a)===-1?99:catOrder.indexOf(a)) - (catOrder.indexOf(b)===-1?99:catOrder.indexOf(b));
    });

    // Build menu HTML based on theme
    const menuHTML = buildMenuHTML(theme, color, userData, settings, sortedGroups);
    container.innerHTML = menuHTML;



  } catch(e) {
    console.error(e);
    container.innerHTML = `<div class="card"><p style="color:var(--ink-muted);">Error loading menu. Please refresh.</p></div>`;
  }
}

let invActiveFilter = 'all';
let invSearchTerm = '';

window.setInvFilter = function(filter) {
  invActiveFilter = filter;
  const btns = ['all','frozen','low','out','ok'];
  btns.forEach(f => {
    const btn = document.getElementById('inv-filter-'+f);
    if (!btn) return;
    const isActive = f === filter;
    btn.style.background = isActive ? 'var(--green)' : 'var(--white)';
    btn.style.color = isActive ? '#fff' : 'var(--ink-soft)';
    btn.style.borderColor = isActive ? 'var(--green)' : 'var(--border)';
    btn.style.fontWeight = isActive ? '500' : '400';
  });
  applyInvFilter();
}

window.filterInventory = function() {
  invSearchTerm = document.getElementById('inv-search').value.toLowerCase().trim();
  const clearBtn = document.getElementById('inv-search-clear');
  if (clearBtn) clearBtn.style.display = invSearchTerm ? 'block' : 'none';
  applyInvFilter();
}

window.clearInvSearch = function() {
  document.getElementById('inv-search').value = '';
  invSearchTerm = '';
  document.getElementById('inv-search-clear').style.display = 'none';
  applyInvFilter();
}

function applyInvFilter() {
  const categories = document.querySelectorAll('.inv-category');
  let totalVisible = 0;

  categories.forEach(cat => {
    const rows = cat.querySelectorAll('.inv-item-row');
    let catVisible = 0;

    rows.forEach(row => {
      const name = row.querySelector('.inv-item-name') ? row.querySelector('.inv-item-name').textContent.toLowerCase() : '';
      const isFrozen = row.querySelector('.inv-item-name') && row.querySelector('.inv-item-name').parentElement.innerHTML.includes('❄️');
      const isOut = row.classList.contains('critical-stock');
      const isLow = row.classList.contains('low-stock');
      const isOk = !isOut && !isLow;

      const matchesSearch = !invSearchTerm || name.includes(invSearchTerm);
      const matchesFilter =
        invActiveFilter === 'all' ||
        (invActiveFilter === 'frozen' && isFrozen) ||
        (invActiveFilter === 'out' && isOut) ||
        (invActiveFilter === 'low' && (isLow || isOut)) ||
        (invActiveFilter === 'ok' && isOk);

      const visible = matchesSearch && matchesFilter;
      row.style.display = visible ? '' : 'none';
      if (visible) catVisible++;
    });

    totalVisible += catVisible;

    // Show/hide category based on matches
    const body = cat.querySelector('[id^="inv-cat-body-"]');
    if (invSearchTerm || invActiveFilter !== 'all') {
      cat.style.display = catVisible > 0 ? '' : 'none';
      if (body && catVisible > 0) body.style.display = 'block';
      // Update chevron
      const chev = cat.querySelector('[id^="inv-chevron-"]');
      if (chev && catVisible > 0) chev.classList.add('open');
    } else {
      cat.style.display = '';
    }
  });

  // Update results label
  const label = document.getElementById('inv-search-results-label');
  if (label) {
    if (invSearchTerm || invActiveFilter !== 'all') {
      label.style.display = 'block';
      label.textContent = totalVisible + ' item' + (totalVisible !== 1 ? 's' : '') + ' found' + (invSearchTerm ? ' for "' + invSearchTerm + '"' : '') + (invActiveFilter !== 'all' ? ' · ' + invActiveFilter + ' filter active' : '');
    } else {
      label.style.display = 'none';
    }
  }
}

window.updateInvQty = async function(itemId, newQty) {
  if (newQty < 0) return;
  try {
    await setDoc(doc(db, 'invItems', itemId), { currentQty: newQty }, { merge: true });
    // Update UI instantly — no full reload
    const valEl = document.getElementById('inv-qty-val-'+itemId);
    const rowEl = document.getElementById('inv-row-'+itemId);
    const minusEl = document.getElementById('inv-minus-'+itemId);
    const alertAt = parseInt(rowEl?.dataset.alertAt || 0);
    const isOut = newQty === 0;
    const isLow = newQty <= alertAt && !isOut;
    if (valEl) {
      valEl.textContent = newQty;
      valEl.style.color = isOut ? 'var(--red)' : isLow ? 'var(--amber)' : 'var(--ink)';
      valEl.style.fontWeight = isOut||isLow ? '700' : '500';
    }
    if (rowEl) {
      rowEl.classList.remove('low-stock','critical-stock');
      if (isOut) rowEl.classList.add('critical-stock');
      else if (isLow) rowEl.classList.add('low-stock');
    }
    // Update status badge
    const statusEl = document.getElementById('inv-status-'+itemId);
    if (statusEl) {
      statusEl.textContent = isOut ? '🚨 Out' : isLow ? '⚠ Low' : '✓ OK';
      statusEl.style.background = isOut ? '#FCEBEB' : isLow ? 'var(--amber-light)' : 'var(--green-light)';
      statusEl.style.color = isOut ? '#A32D2D' : isLow ? '#854F0B' : '#0F6E56';
    }
    if (minusEl) minusEl.disabled = newQty === 0;
  } catch(e) { showToast('Error updating quantity', 'error'); }
}

window.addInvItem = async function(catId, restaurantId) {
  const name = document.getElementById('new-inv-item-name-'+catId).value.trim();

let _pendingInv = null;

window.invAdjustFromSelect = function(itemId, currentQty, alertAt) {
  const sel = document.getElementById('inv-qty-select-'+itemId);
  if (!sel || !sel.value) { showToast('Pick an option first','error'); return; }
  const val = sel.value;
  let newQty = currentQty;
  if (val.startsWith('+')) newQty = currentQty + parseInt(val);
  else if (val.startsWith('-')) newQty = Math.max(0, currentQty - parseInt(val.slice(1)));
  else if (val.startsWith('=')) newQty = parseInt(val.slice(1));
  sel.value = '';
  _pendingInv = { itemId, newQty, alertAt };
  showInvStaffPicker(itemId);
}

window.invAdjust = function(itemId, currentQty, alertAt, amount) {
  const newQty = amount > 0 ? currentQty + amount : Math.max(0, currentQty + amount);
  _pendingInv = { itemId, newQty, alertAt };
  showInvStaffPicker(itemId);
}

function showInvStaffPicker(itemId) {
  injectStaffPicker();
  const overlay = document.getElementById('staff-picker-overlay');
  const label = document.getElementById('staff-picker-item-name');
  const input = document.getElementById('staff-custom-name');
  if (label) label.textContent = 'Who is updating this?';
  if (input) input.value = '';

}

window.selectInvStaff = async function(name) {
  if (!_pendingInv) return;
  const { itemId, newQty, alertAt } = _pendingInv;
  _pendingInv = null;
  window._invMode = false;
  const overlay = document.getElementById('staff-picker-overlay');
  if (overlay) overlay.style.display = 'none';
  await updateInvQtyWithStaff(itemId, newQty, alertAt, name);
}

async function updateInvQtyWithStaff(itemId, newQty, alertAt, name) {
  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const restaurantId = window._userData?.uid || '';
  try {
    await setDoc(doc(db,'invItems',itemId), {
      currentQty: newQty, lastBy: name.trim(), lastTime: time, updatedAt: serverTimestamp()
    }, {merge:true});
    try {
      await addDoc(collection(db,'invChecks'), {
        itemId, restaurantId, by: name.trim(), time, newQty, checkedAt: serverTimestamp()
      });
    } catch(e) {}
    showToast(name + ' updated to ' + newQty);
    // Update DOM directly
    const valEl = document.getElementById('inv-qty-val-'+itemId);
    const checkerEl = document.getElementById('inv-checker-'+itemId);
    const rowEl = document.getElementById('inv-row-'+itemId);
    const isOut = newQty === 0;
    const isLow = alertAt > 0 && newQty <= alertAt && !isOut;
    if (valEl) { valEl.textContent = newQty; valEl.style.color = isOut?'#E24B4A':isLow?'#F2A623':'var(--green)'; }
    if (checkerEl) checkerEl.innerHTML = '<span style="font-size:0.7rem;color:var(--green);">'+String.fromCharCode(10003)+' '+name+'</span><br><span style="font-size:0.65rem;color:var(--ink-muted);">'+time+'</span>';
    if (rowEl) { rowEl.classList.remove('inv-item-out','inv-item-low'); if(isOut) rowEl.classList.add('inv-item-out'); else if(isLow) rowEl.classList.add('inv-item-low'); }
  } catch(e) { showToast('Error updating','error'); }
}

function updateMenuPreview() {
  const container = document.getElementById('menu-preview-container');
  if (!container) return;
  container.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  const restaurantId = window._menuViewingRestaurantId || window._userData?.uid;
  if (!restaurantId) return;
  Promise.all([
    getDocs(query(collection(db,'recipes'), where('restaurantId','==',restaurantId))),
    getDoc(doc(db,'menuSettings',restaurantId))
  ]).then(([recipesSnap, settingsDoc]) => {
    const recipes = recipesSnap.docs.map(d=>({id:d.id,...d.data()}));
    const settings = settingsDoc.exists() ? settingsDoc.data() : {};
    const theme = settings.theme || 'clean-professional';
    const color = menuAccentColor || settings.accentColor || '#1D9E75';
    const userData = window._userData;
    const restaurantName = settings.restaurantName || userData?.restaurantName || 'Restaurant';
    if (recipes.length === 0) {
      container.innerHTML = '<div class="empty-state"><div style="font-size:2.5rem;margin-bottom:12px;">—</div><div class="empty-state-title">No recipes yet</div><div class="empty-state-sub">Add recipes to your recipe book first — they will appear here automatically</div></div>';
      return;
    }
    const groups = {};
    recipes.forEach(r => {
      const cat = r.category || 'General';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(r);
    });
    const categoryOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Desserts','Drinks'];
    const sortedGroups = Object.entries(groups).sort(([a],[b]) => {
      const ai = categoryOrder.indexOf(a) === -1 ? 99 : categoryOrder.indexOf(a);
      const bi = categoryOrder.indexOf(b) === -1 ? 99 : categoryOrder.indexOf(b);
      return ai - bi;
    });
    const allItems = recipes;
    const menuHTML = buildMenuHTML(theme, color, userData, settings, sortedGroups, allItems, restaurantName);
    container.innerHTML = menuHTML;
    if (window._menuEditMode) setTimeout(() => addMenuEditButtons(recipes, restaurantId), 100);
  }).catch(e => {
    container.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading menu. Please refresh.</p></div>';
  });
}

window.saveMenuSettings = async function() {
  const restaurantId = window._menuViewingRestaurantId || window._userData?.uid;
  if (!restaurantId) return;
  const settings = {
    restaurantName: (document.getElementById('menu-name') || document.getElementById('ms-name'))?.value.trim() || window._userData?.restaurantName || '',
    tagline: (document.getElementById('menu-tagline') || document.getElementById('ms-tagline'))?.value.trim() || '',
    phone: (document.getElementById('menu-phone') || document.getElementById('ms-phone'))?.value.trim() || '',
    hours: (document.getElementById('menu-hours') || document.getElementById('ms-hours'))?.value.trim() || '',
    address: (document.getElementById('menu-address') || document.getElementById('ms-address'))?.value.trim() || '',
    theme: window._selectedTheme || document.querySelector('.theme-option[style*="green"]')?.dataset?.theme || undefined,
    accentColor: menuAccentColor || undefined,
    font: window._selectedFont || undefined,
    layout: window._selectedLayout || undefined,
  };
  // Remove undefined keys
  Object.keys(settings).forEach(k => settings[k] === undefined && delete settings[k]);
  try {
    await setDoc(doc(db,'menuSettings',restaurantId), settings, {merge:true});
    showToast('Menu settings saved!');
    updateMenuPreview();
  } catch(e) { showToast('Error saving','error'); }
}

window.switchProcOption = function(option) {

  const textBtn = document.getElementById('opt-text-btn');

    if (linkBtn) { linkBtn.style.background = 'var(--white)'; linkBtn.style.color = 'var(--ink)'; linkBtn.style.fontWeight = '600'; }
    if (textBtn) { textBtn.style.background = 'transparent'; textBtn.style.color = 'var(--ink-muted)'; textBtn.style.fontWeight = '500'; }
  } else {
    if (linkPanel) linkPanel.style.display = 'none';

    if (textBtn) { textBtn.style.background = 'var(--white)'; textBtn.style.color = 'var(--ink)'; textBtn.style.fontWeight = '600'; }
    if (linkBtn) { linkBtn.style.background = 'transparent'; linkBtn.style.color = 'var(--ink-muted)'; linkBtn.style.fontWeight = '500'; }
  }
}

  const desc = document.getElementById('proc-desc')?.value.trim() || '';
  const url = document.getElementById('proc-url')?.value.trim() || '';
  const content = document.getElementById('proc-content')?.value.trim() || '';
  const rid = currentRestaurantId() || restaurantId;
  if (!title) { showToast('Title required', 'error'); return; }
  if (!url && !content) { showToast('Add a link or paste content', 'error'); return; }
  try {
    await addDoc(collection(db, 'procedures'), {
      title, category, desc, url, content: content,
      restaurantId: rid, createdAt: serverTimestamp(), createdBy: window._userData?.ownerName || 'Admin'
    });
    showToast('Document saved!');
    document.getElementById('proc-add-form').style.display = 'none';
    loadProcedures(window._userData);
  } catch(e) { showToast('Error saving', 'error'); }
}

let procActiveCategory = 'All';

async function loadProcedures(userData) {
  const listEl = document.getElementById('proc-list');
  const filterEl = document.getElementById('proc-filter');
  if (!listEl) return;
  listEl.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  try {
    const rid = currentRestaurantId();
    const q = query(collection(db, 'procedures'), where('restaurantId', '==', rid));
    const snap = await getDocs(q);
    if (snap.empty) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No documents yet</div><div class="empty-state-sub">' + (isAdmin ? 'Click "+ Add document" to upload your first recipe or SOP' : 'Chef Nek will add your recipes and procedures soon') + '</div></div>';
      return;
    }
    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Build category filters
    const cats = ['All', ...new Set(docs.map(d => d.category || 'General'))].sort((a,b) => a === 'All' ? -1 : b === 'All' ? 1 : a.localeCompare(b));
    if (filterEl) {
      filterEl.innerHTML = cats.map(cat => {
        const isActive = cat === procActiveCategory;
        const escaped = cat.replace(/'/g, "\'");
        return '<button onclick="filterProcedures(\'' + escaped + '\')" style="height:34px;padding:0 16px;border-radius:100px;border:0.5px solid ' + (isActive ? 'var(--green)' : 'var(--border)') + ';background:' + (isActive ? 'var(--green)' : 'var(--white)') + ';color:' + (isActive ? '#fff' : 'var(--ink-soft)') + ';font-family:var(--font-body);font-size:0.8rem;cursor:pointer;white-space:nowrap;">' + cat + '</button>';
      }).join('');
    }
    window._allProcedures = docs;
    renderProcedureList(docs);
  } catch(e) {
    listEl.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading documents.</p></div>';
  }
}

window.filterProcedures = function(cat) {
  procActiveCategory = cat;
  const docs = window._allProcedures || [];
  renderProcedureList(docs);
  // Update filter buttons
  const filterEl = document.getElementById('proc-filter');
  if (filterEl) {
    filterEl.querySelectorAll('button').forEach(btn => {
      const isActive = btn.textContent === cat;
      btn.style.background = isActive ? 'var(--green)' : 'var(--white)';
      btn.style.color = isActive ? '#fff' : 'var(--ink-soft)';
      btn.style.borderColor = isActive ? 'var(--green)' : 'var(--border)';
    });
  }
}

function renderProcedureList(docs) {
  const listEl = document.getElementById('proc-list');
  if (!listEl) return;
  const filtered = procActiveCategory === 'All' ? docs : docs.filter(d => (d.category || 'General') === procActiveCategory);
  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No documents in this category</div></div>';
    return;
  }
  // Group by category
  const groups = {};
  filtered.forEach(d => {
    const cat = d.category || 'General';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(d);
  });
  listEl.innerHTML = Object.entries(groups).sort(([a],[b]) => a.localeCompare(b)).map(([cat, items]) => `
    <div style="margin-bottom:24px;">
      <div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);">${cat}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">
        ${items.map(doc => `
          <div class="card" style="cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:1px solid var(--border);" onclick="viewProcedure('${doc.id}')" onmouseenter="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 24px rgba(26,26,20,0.1)'" onmouseleave="this.style.transform='';this.style.boxShadow=''">
            <div style="display:flex;align-items:flex-start;gap:12px;">
              <div style="width:44px;height:44px;border-radius:10px;background:#F5F0FF;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#5B3DB5" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="1" width="14" height="18" rx="2"/><line x1="6" y1="7" x2="14" y2="7"/><line x1="6" y1="10" x2="14" y2="10"/><line x1="6" y1="13" x2="10" y2="13"/></svg>
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:600;color:var(--ink);font-size:0.9rem;margin-bottom:4px;line-height:1.3;">${doc.title}</div>
                ${doc.desc ? '<div style="font-size:0.78rem;color:var(--ink-muted);line-height:1.5;margin-bottom:6px;">' + doc.desc + '</div>' : ''}
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                  <span style="font-size:0.68rem;background:#F5F0FF;color:#5B3DB5;padding:2px 8px;border-radius:20px;font-weight:500;">${doc.category || 'General'}</span>
                  ${doc.url ? '<span style="font-size:0.68rem;color:var(--green);font-weight:500;">Doc link</span>' : ''}
                  ${doc.content ? '<span style="font-size:0.68rem;color:var(--ink-muted);">Text content</span>' : ''}
                </div>
              </div>
              ${isAdmin ? `<div style="display:flex;gap:5px;flex-shrink:0;"><button onclick="event.stopPropagation();editProcedure('${doc.id}')" style="height:28px;padding:0 10px;border-radius:6px;border:0.5px solid var(--border);background:var(--cream);color:var(--ink-soft);font-size:11px;cursor:pointer;font-family:var(--font-body);">Edit</button><button onclick="event.stopPropagation();deleteProcedure('${doc.id}')" style="width:28px;height:28px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:11px;cursor:pointer;flex-shrink:0;">Del</button></div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

window.viewProcedure = function(docId) {
  const doc = (window._allProcedures || []).find(d => d.id === docId);
  if (!doc) return;
  // If has URL — open in new tab
  if (doc.url) {
    // Try to convert Google Docs view URL
    let url = doc.url;
    if (url.includes('docs.google.com/document') && !url.includes('/pub')) {
      url = url.replace('/edit', '/preview').replace('/view', '/preview');
    }
    // Show modal with embed + open button
    showProcedureModal(doc, url);
  } else if (doc.content) {
    showProcedureModal(doc, null);
  }
}

function showProcedureModal(doc, url) {
  const existing = document.getElementById('proc-modal');
  if (existing) existing.remove();

  // Detect URL type
  const isWord = url && (url.includes('sharepoint.com') || url.includes('1drv.ms') || url.includes('office.com') || url.includes('.docx') || url.includes('.doc'));
  const isGoogleDoc = url && url.includes('docs.google.com');
  const isPDF = url && url.includes('.pdf');

  // For Word/OneDrive — just open in new tab, can't embed
  if (url && isWord) {
    window.open(url, '_blank');
    return;
  }

  const modal = document.createElement('div');
  modal.id = 'proc-modal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px;width:100%;max-width:820px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2);';

  // Header
  const header = document.createElement('div');
  header.style.cssText = 'background:linear-gradient(135deg,#5B3DB5,#3D2580);padding:20px 24px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;';
  header.innerHTML = '<div style="flex:1;min-width:0;"><div style="font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:4px;">' + (doc.category || 'General') + '</div><div style="font-size:1.2rem;font-weight:700;color:#fff;line-height:1.3;">' + doc.title + '</div>' + (doc.desc ? '<div style="font-size:0.82rem;color:rgba(255,255,255,0.6);margin-top:6px;">' + doc.desc + '</div>' : '') + '</div>';
  const btnGroup = document.createElement('div');
  btnGroup.style.cssText = 'display:flex;gap:8px;align-items:center;flex-shrink:0;';
  if (url) {
    const openBtn = document.createElement('a');
    openBtn.href = url;
    openBtn.target = '_blank';
    openBtn.textContent = 'Open in new tab';
    openBtn.style.cssText = 'height:34px;padding:0 14px;background:rgba(255,255,255,0.18);color:#fff;border-radius:8px;text-decoration:none;font-size:0.8rem;font-weight:500;display:flex;align-items:center;white-space:nowrap;';
    btnGroup.appendChild(openBtn);
  }
  const closeBtn = document.createElement('button');
  closeBtn.textContent = 'x';
  closeBtn.style.cssText = 'width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;cursor:pointer;font-size:1rem;flex-shrink:0;';
  closeBtn.onclick = () => modal.remove();
  btnGroup.appendChild(closeBtn);
  header.appendChild(btnGroup);
  box.appendChild(header);

  // Body
  const body = document.createElement('div');

  if (url && (isGoogleDoc || isPDF)) {
    // Embeddable URL — show in iframe
    body.style.cssText = 'flex:1;overflow:hidden;';
    let embedUrl = url;
    if (isGoogleDoc) {
      embedUrl = url.replace('/edit', '/preview').replace('/view', '/preview');
      if (!embedUrl.includes('/preview')) embedUrl += '/preview';
    }
    const iframe = document.createElement('iframe');
    iframe.src = embedUrl;
    iframe.style.cssText = 'width:100%;height:600px;border:none;';
    iframe.setAttribute('allowfullscreen', '');
    body.appendChild(iframe);
  } else if (url) {
    // Unknown URL type — show open button
    body.style.cssText = 'padding:40px 24px;text-align:center;';
    body.innerHTML = '<div style="font-size:3rem;margin-bottom:16px;">📄</div>'
      + '<div style="font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:8px;">' + doc.title + '</div>'
      + '<div style="font-size:0.875rem;color:var(--ink-muted);margin-bottom:28px;">This document opens in a new tab</div>'
      + '<a href="' + url + '" target="_blank" style="display:inline-block;background:var(--green);color:#fff;padding:12px 32px;border-radius:100px;text-decoration:none;font-size:0.9rem;font-weight:600;">Open document</a>';
  } else {
    // Text content - formatted nicely
    body.style.cssText = 'flex:1;overflow-y:auto;padding:28px;';
    const pre = document.createElement('div');
    pre.style.cssText = 'max-width:640px;margin:0 auto;';
    // Format the content - detect headers (ALL CAPS lines) and steps
    const lines = doc.content.split('\n');
    let html = '';
    lines.forEach(line => {
      const trimmed = line.trim();
      if (!trimmed) { html += '<div style="height:10px;"></div>'; return; }
      // ALL CAPS line = section header
      if (trimmed === trimmed.toUpperCase() && trimmed.length > 2 && /[A-Z]/.test(trimmed)) {
        html += '<div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin:16px 0 8px;border-bottom:2px solid var(--border);padding-bottom:6px;">' + trimmed + '</div>';
      // Numbered steps: 1. or 1)
      } else if (/^\d+[\.\)]/.test(trimmed)) {
        const num = trimmed.match(/^(\d+)/)[1];
        const text = trimmed.replace(/^\d+[\.\)]\s*/, '');
        html += '<div style="display:flex;gap:12px;padding:8px 0;border-bottom:0.5px solid var(--border);">'
          + '<span style="width:24px;height:24px;background:var(--green);color:#fff;border-radius:6px;font-size:0.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + num + '</span>'
          + '<span style="font-size:0.9rem;color:var(--ink);line-height:1.6;">' + text + '</span></div>';
      // Bullet / ingredient lines: - or •
      } else if (/^[-•*]/.test(trimmed)) {
        const text = trimmed.replace(/^[-•*]\s*/, '');
        html += '<div style="display:flex;gap:10px;padding:5px 0;">'
          + '<span style="width:6px;height:6px;border-radius:50%;background:var(--green);margin-top:8px;flex-shrink:0;"></span>'
          + '<span style="font-size:0.9rem;color:var(--ink2);line-height:1.6;">' + text + '</span></div>';
      } else {
        html += '<div style="font-size:0.9rem;color:var(--ink2);line-height:1.7;padding:3px 0;">' + trimmed + '</div>';
      }
    });
    pre.innerHTML = html;
    body.appendChild(pre);
  }

  box.appendChild(body);
  modal.appendChild(box);
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
}

window.editProcedure = function(docId) {
  const proc = (window._allProcedures || []).find(d => d.id === docId);
  if (!proc) return;
  const existing = document.getElementById('proc-edit-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'proc-edit-modal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,0.2);';

    + '<div><label style="font-size:0.75rem;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px;">Title *</label><input type="text" id="proc-edit-title" class="form-input-small" style="width:100%;" value="' + proc.title + '"></div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'
    + '<div><label style="font-size:0.75rem;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px;">Category</label><input type="text" id="proc-edit-category" class="form-input-small" style="width:100%;" value="' + (proc.category||'') + '"></div>'

    + '</div>'

    + '<input type="url" id="proc-edit-url" class="form-input-small" style="width:100%;" placeholder="https://docs.google.com/..." value="' + (proc.url||'') + '"></div>'
    + '<div id="proc-edit-text-panel" style="display:' + (currentMode==='text'?'block':'none') + ';">'
    + '<label style="font-size:0.75rem;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px;">Content</label>'
    + '<textarea id="proc-edit-content" class="form-input-small" style="width:100%;height:180px;resize:vertical;">' + (proc.content||'') + '</textarea></div>'
    + '</div>'
    + '</div>';

  const btns = document.createElement('div');

  const saveBtn = document.createElement('button');

  saveBtn.style.cssText = 'flex:1;height:44px;background:var(--green);color:#fff;border:none;border-radius:10px;font-family:var(--font-body);font-size:0.9rem;font-weight:600;cursor:pointer;';
  saveBtn.onclick = () => saveProcedureEdit(docId);
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancel';

  btns.appendChild(saveBtn);
  btns.appendChild(cancelBtn);

window.switchProcEditMode = function(mode) {
  const linkPanel = document.getElementById('proc-edit-link-panel');
  const textPanel = document.getElementById('proc-edit-text-panel');
  const linkBtn = document.getElementById('proc-edit-link-btn');
  const textBtn = document.getElementById('proc-edit-text-btn');
  if (mode === 'link') {
    if (linkPanel) linkPanel.style.display = 'block';
    if (textPanel) textPanel.style.display = 'none';
    if (linkBtn) { linkBtn.style.background='var(--white)'; linkBtn.style.color='var(--ink)'; linkBtn.style.fontWeight='600'; }
    if (textBtn) { textBtn.style.background='transparent'; textBtn.style.color='var(--ink-muted)'; textBtn.style.fontWeight='500'; }
  } else {
    if (linkPanel) linkPanel.style.display = 'none';
    if (textPanel) textPanel.style.display = 'block';
    if (textBtn) { textBtn.style.background='var(--white)'; textBtn.style.color='var(--ink)'; textBtn.style.fontWeight='600'; }
    if (linkBtn) { linkBtn.style.background='transparent'; linkBtn.style.color='var(--ink-muted)'; linkBtn.style.fontWeight='500'; }
  }
}

window.saveProcedureEdit = async function(docId) {
  const title = document.getElementById('proc-edit-title')?.value.trim();
  const category = document.getElementById('proc-edit-category')?.value.trim() || 'General';
  const desc = document.getElementById('proc-edit-desc')?.value.trim() || '';
  const url = document.getElementById('proc-edit-url')?.value.trim() || '';
  const content = document.getElementById('proc-edit-content')?.value.trim() || '';
  if (!title) { showToast('Title required', 'error'); return; }
  if (!url && !content) { showToast('Add a link or paste content', 'error'); return; }
  try {
    await setDoc(doc(db, 'procedures', docId), { title, category, desc, url, content }, { merge: true });
    showToast('Document updated!');
    document.getElementById('proc-edit-modal')?.remove();
    loadProcedures(window._userData);
  } catch(e) { showToast('Error saving', 'error'); }
}

window.deleteProcedure = async function(docId) {
  if (!confirm('Delete this document? This cannot be undone.')) return;
  try {
    await deleteDoc(doc(db, 'procedures', docId));
    showToast('Document deleted!');
    loadProcedures(window._userData);
  } catch(e) { showToast('Error deleting', 'error'); }
}

        <button id="cl-tab-opening" onclick="switchCLTab('opening')" style="flex:1;height:44px;border-radius:12px;border:none;font-family:var(--font-body);font-size:0.875rem;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#1D9E75,#0F6E56);color:#fff;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="4" r="2"/><path d="M3 14c0-4 10-4 10 0"/><line x1="8" y1="8" x2="8" y2="11"/></svg>
          Opening Checklist
        </button>
        <button id="cl-tab-closing" onclick="switchCLTab('closing')" style="flex:1;height:44px;border-radius:12px;border:none;font-family:var(--font-body);font-size:0.875rem;font-weight:500;cursor:pointer;background:transparent;color:var(--ink-muted);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 2l4 6-4 6"/><path d="M2 8h8"/></svg>
          Closing Checklist
        </button>
      </div>

      <!-- OPENING PANEL -->
      <div id="cl-panel-opening">
        <div id="cl-opening-content"></div>
      </div>

      <!-- CLOSING PANEL -->
      <div id="cl-panel-closing" style="display:none;">
        <div id="cl-closing-content"></div>
      </div>
    </div>
  `;
  window._clTab = 'opening';
  // Add print button to checklist header
  setTimeout(() => {
    const badge = document.getElementById('cl-status-badge');
    if (badge) {
      const pb = document.createElement('button');
      pb.className = 'no-print';
      pb.style.cssText = 'height:36px;padding:0 14px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-family:var(--font-body);font-size:0.82rem;cursor:pointer;';
      pb.textContent = 'Print';
      pb.onclick = () => printPage('checklists');
      badge.parentElement.appendChild(pb);
    }
  }, 100);
  window._clTodayKey = todayKey;
  loadChecklistItems('opening', userData);
}

window.switchCLTab = function(tab) {
  window._clTab = tab;
  const openPanel = document.getElementById('cl-panel-opening');
  const closePanel = document.getElementById('cl-panel-closing');
  const openBtn = document.getElementById('cl-tab-opening');
  const closeBtn = document.getElementById('cl-tab-closing');
  if (tab === 'opening') {
    if (openPanel) openPanel.style.display = 'block';
    if (closePanel) closePanel.style.display = 'none';
    if (openBtn) { openBtn.style.background = 'linear-gradient(135deg,#1D9E75,#0F6E56)'; openBtn.style.color = '#fff'; openBtn.style.fontWeight = '600'; }
    if (closeBtn) { closeBtn.style.background = 'transparent'; closeBtn.style.color = 'var(--ink-muted)'; closeBtn.style.fontWeight = '500'; }
  } else {
    if (openPanel) openPanel.style.display = 'none';
    if (closePanel) closePanel.style.display = 'block';
    if (closeBtn) { closeBtn.style.background = 'linear-gradient(135deg,#1C1208,#2A1A0A)'; closeBtn.style.color = '#fff'; closeBtn.style.fontWeight = '600'; }
    if (openBtn) { openBtn.style.background = 'transparent'; openBtn.style.color = 'var(--ink-muted)'; openBtn.style.fontWeight = '500'; }
  }
  loadChecklistItems(tab, window._userData);
}

async function loadChecklistItems(type, userData) {
  const contentEl = document.getElementById('cl-' + type + '-content');
  if (!contentEl) return;
  contentEl.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  const restaurantId = currentRestaurantId() || userData.uid;
  const todayKey = window._clTodayKey;
  try {
    const itemsSnap = await getDocs(query(collection(db,'clItems'), where('type','==',type), where('restaurantId','==',restaurantId)));
    const items = itemsSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));
    const checksSnap = await getDocs(query(collection(db,'clChecks'), where('restaurantId','==',restaurantId), where('type','==',type), where('date','==',todayKey)));
    const checks = {};
    checksSnap.docs.forEach(d => { const data=d.data(); checks[data.itemId] = data; });
    const signoffSnap = await getDocs(query(collection(db,'clSignoffs'), where('restaurantId','==',restaurantId), where('type','==',type), where('date','==',todayKey)));
    const signoff = signoffSnap.docs.length > 0 ? signoffSnap.docs[0].data() : null;
    const doneCount = items.filter(i=>checks[i.id]).length;
    const totalCount = items.length;
    const allDone = totalCount > 0 && doneCount === totalCount;
    const pendingCount = items.filter(i=>!checks[i.id]).length;
    const label = document.getElementById('cl-today-label');
    if (label) label.textContent = doneCount + '/' + totalCount + ' done';
    const color = type === 'opening' ? '#1D9E75' : '#C17F3A';
    const darkColor = type === 'opening' ? '#0F6E56' : '#8B5A1A';
    contentEl.innerHTML = '';

    // ── PROGRESS CARD ──
    const progressCard = document.createElement('div');
    progressCard.className = 'card';
    progressCard.style.cssText = 'margin-bottom:16px;background:linear-gradient(135deg,' + (type==='opening'?'#1A2A1E,#0D1A14':'#2A1A08,#1A0D04') + ');border-color:rgba(255,255,255,0.06);';
    const pct = totalCount > 0 ? Math.round((doneCount/totalCount)*100) : 0;
    progressCard.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">'
      + '<div><div style="font-size:0.72rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:4px;">' + (type==='opening'?'Opening':'Closing') + ' Progress</div>'
      + '<div style="font-family:var(--font-display);font-size:2rem;font-weight:700;color:#fff;line-height:1;">' + doneCount + '<span style="font-size:1rem;color:rgba(255,255,255,0.4);">/' + totalCount + '</span></div></div>'
      + '<div style="width:64px;height:64px;border-radius:50%;background:conic-gradient(' + color + ' ' + pct + '%, rgba(255,255,255,0.08) 0);display:flex;align-items:center;justify-content:center;">'
      + '<div style="width:48px;height:48px;border-radius:50%;background:#1A1A14;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:0.9rem;font-weight:700;color:#fff;">' + pct + '%</div></div></div>'
      + '<div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;">'
      + '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,' + color + ',' + darkColor + ');border-radius:3px;transition:width 0.5s ease;"></div></div>'
      + (signoff ? '<div style="margin-top:12px;font-size:0.78rem;color:rgba(255,255,255,0.5);">Approved by <strong style="color:rgba(255,255,255,0.8);">' + signoff.by + '</strong> at ' + signoff.time + '</div>' : '');
    contentEl.appendChild(progressCard);

    // ── ACTION BAR: Bulk check + Add ──
    const actionBar = document.createElement('div');
    actionBar.style.cssText = 'display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;';
    if (pendingCount > 0) {
      const bulkBtn = document.createElement('button');
      bulkBtn.style.cssText = 'flex:1;min-width:160px;height:44px;border-radius:12px;border:1.5px solid ' + color + ';background:transparent;color:' + color + ';font-family:var(--font-body);font-size:0.875rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;';
      bulkBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,8 5,12 15,2"/></svg> Check All (' + pendingCount + ' remaining)';
      bulkBtn.onclick = () => {
        window._pendingCL = { itemId: '__bulk__', type, restaurantId, todayKey, items, checks };
        window._clMode = true;
        injectStaffPicker();
        const overlay = document.getElementById('staff-picker-overlay');
        const lbl = document.getElementById('staff-picker-item-name');
        if (lbl) lbl.textContent = 'Who is completing all tasks?';
        const inp = document.getElementById('staff-custom-name');
        if (inp) inp.value = '';
        if (overlay) overlay.style.cssText = 'display:flex;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:99999;align-items:center;justify-content:center;padding:20px;';
        loadStaffNames(restaurantId);
      };
      actionBar.appendChild(bulkBtn);
    }
    if (isAdmin) {
      const addBtn = document.createElement('button');
      addBtn.style.cssText = 'height:44px;padding:0 20px;border-radius:12px;border:2px dashed var(--border);background:transparent;color:var(--ink-muted);font-family:var(--font-body);font-size:0.875rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;';
      addBtn.textContent = '+ Add item';
      addBtn.onmouseenter = () => { addBtn.style.borderColor = color; addBtn.style.color = color; };
      addBtn.onmouseleave = () => { addBtn.style.borderColor = 'var(--border)'; addBtn.style.color = 'var(--ink-muted)'; };
      addBtn.onclick = () => showAddCLItem(type, restaurantId, color);
      actionBar.appendChild(addBtn);
    }
    if (actionBar.children.length > 0) contentEl.appendChild(actionBar);

    // ── ITEMS LIST ──
    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<div class="empty-state-title">No ' + type + ' items yet</div><div class="empty-state-sub">' + (isAdmin ? 'Click Add item to set up your ' + type + ' checklist' : 'Chef Nek will set up your checklist soon') + '</div>';
      contentEl.appendChild(empty);
    } else {
      const list = document.createElement('div');
      list.id = 'cl-drag-list-' + type;
      list.style.cssText = 'display:flex;flex-direction:column;gap:10px;';
      items.forEach((item) => {
        const chk = checks[item.id];
        const card = document.createElement('div');
        card.id = 'cl-item-' + item.id;
        card.dataset.itemId = item.id;
        card.draggable = isAdmin;
        card.style.cssText = 'background:var(--white);border-radius:14px;border:1.5px solid ' + (chk ? color : 'var(--border)') + ';overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;cursor:default;';
        // Drag events (admin only)
        if (isAdmin) {
          card.addEventListener('dragstart', (e) => {
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', item.id);
            card.style.opacity = '0.4';
            window._clDragId = item.id;
          });
          card.addEventListener('dragend', () => { card.style.opacity = '1'; });
          card.addEventListener('dragover', (e) => { e.preventDefault(); card.style.boxShadow = '0 0 0 2px ' + color; });
          card.addEventListener('dragleave', () => { card.style.boxShadow = ''; });
          card.addEventListener('drop', async (e) => {
            e.preventDefault();
            card.style.boxShadow = '';
            const dragId = window._clDragId;
            if (!dragId || dragId === item.id) return;
            // Reorder: swap positions in the list
            const allCards = Array.from(document.getElementById('cl-drag-list-' + type).children);
            const fromIdx = allCards.findIndex(c => c.dataset.itemId === dragId);
            const toIdx = allCards.findIndex(c => c.dataset.itemId === item.id);
            if (fromIdx === -1 || toIdx === -1) return;
            // DOM reorder
            const dragCard = allCards[fromIdx];
            if (fromIdx < toIdx) {
              card.parentNode.insertBefore(dragCard, card.nextSibling);
            } else {
              card.parentNode.insertBefore(dragCard, card);
            }
            // Save new order to Firestore
            const newOrder = Array.from(document.getElementById('cl-drag-list-' + type).children).map(c => c.dataset.itemId);
            try {
              for (let i = 0; i < newOrder.length; i++) {
                await setDoc(doc(db, 'clItems', newOrder[i]), { order: i }, { merge: true });
              }
              showToast('Order saved!');
            } catch(err) { showToast('Error saving order','error'); }
          });
        }
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:14px 16px;';
        // Drag handle (admin)
        if (isAdmin) {
          const handle = document.createElement('div');
          handle.style.cssText = 'display:flex;flex-direction:column;gap:3px;cursor:grab;padding:2px;flex-shrink:0;opacity:0.3;';
          handle.title = 'Drag to reorder';
          handle.innerHTML = '<div style="width:16px;height:2px;background:var(--ink-muted);border-radius:1px;"></div><div style="width:16px;height:2px;background:var(--ink-muted);border-radius:1px;"></div><div style="width:16px;height:2px;background:var(--ink-muted);border-radius:1px;"></div>';
          handle.addEventListener('mouseenter', () => handle.style.opacity = '0.7');
          handle.addEventListener('mouseleave', () => handle.style.opacity = '0.3');
          row.appendChild(handle);
        }
        // Checkbox — clicking toggles individual item
        const cb = document.createElement('div');
        cb.style.cssText = 'width:28px;height:28px;border-radius:8px;border:2px solid ' + (chk ? color : 'var(--border)') + ';background:' + (chk ? color : 'transparent') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;cursor:pointer;';
        cb.innerHTML = chk ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 5,10 12,3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '';
        cb.onclick = () => toggleCLCheck(item.id, type, restaurantId, !chk);
        // Info
        const info = document.createElement('div');
        info.style.cssText = 'flex:1;min-width:0;';
        info.innerHTML = '<div style="font-size:0.9rem;font-weight:' + (chk?'600':'500') + ';color:' + (chk?'var(--ink)':'var(--ink-soft)') + ';">' + item.name + '</div>'
          + (item.note ? '<div style="font-size:0.75rem;color:var(--ink-muted);margin-top:2px;">' + item.note + '</div>' : '')
          + (chk ? '<div style="font-size:0.72rem;color:' + color + ';margin-top:4px;font-weight:500;">Done by ' + chk.by + ' · ' + chk.time + '</div>' : '');
        // Critical badge
        const actions = document.createElement('div');
        actions.style.cssText = 'display:flex;align-items:center;gap:6px;flex-shrink:0;';
        if (item.critical) {
          const badge = document.createElement('span');
          badge.style.cssText = 'font-size:0.65rem;font-weight:700;background:' + (chk?'var(--green-light)':'#FCEBEB') + ';color:' + (chk?'var(--green-dark)':'#A32D2D') + ';padding:2px 8px;border-radius:20px;';
          badge.textContent = chk ? 'Done' : 'Critical';
          actions.appendChild(badge);
        }
        if (isAdmin) {
          const editBtn = document.createElement('button');
          editBtn.textContent = 'Edit';
          editBtn.style.cssText = 'height:26px;padding:0 10px;border-radius:6px;border:0.5px solid var(--border);background:var(--cream);color:var(--ink-soft);font-size:11px;cursor:pointer;font-family:var(--font-body);';
          editBtn.onclick = (e) => { e.stopPropagation(); showEditCLItem(item, type, restaurantId, color); };
          const delBtn = document.createElement('button');
          delBtn.textContent = 'Del';
          delBtn.style.cssText = 'height:26px;padding:0 10px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:11px;cursor:pointer;font-family:var(--font-body);';
          delBtn.onclick = async (e) => { e.stopPropagation(); await deleteCLItem(item.id, type, restaurantId); };
          actions.appendChild(editBtn);
          actions.appendChild(delBtn);
        }
        row.appendChild(cb);
        row.appendChild(info);
        row.appendChild(actions);
        card.appendChild(row);
        list.appendChild(card);
      });
      contentEl.appendChild(list);

      // ── SIGN-OFF ──
      if (allDone && !signoff) {
        const signBtn = document.createElement('button');
        signBtn.style.cssText = 'width:100%;height:52px;border-radius:14px;border:none;background:linear-gradient(135deg,' + color + ',' + darkColor + ');color:#fff;font-family:var(--font-body);font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:12px;letter-spacing:0.02em;';
        signBtn.textContent = 'Sign Off - Enter your name to complete';
        signBtn.onclick = () => signOffChecklist(type, restaurantId);
        contentEl.appendChild(signBtn);
      } else if (signoff) {
        const signedDiv = document.createElement('div');
        signedDiv.style.cssText = 'text-align:center;padding:16px;background:var(--green-light);border-radius:14px;margin-top:12px;border:1px solid rgba(29,158,117,0.2);';
        signedDiv.innerHTML = '<div style="font-size:0.85rem;font-weight:600;color:var(--green-dark);">Approved by ' + signoff.by + ' at ' + signoff.time + '</div>';
        contentEl.appendChild(signedDiv);
      }
    }
  } catch(e) {
    console.error(e);
    contentEl.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading checklist.</p></div>';
  }
}

function showAddCLItem(type, restaurantId, color) {

  modal.id = 'cl-add-modal';

    + '</div>'

    + '<button onclick="document.getElementById(&quot;cl-edit-modal&quot;).remove()" style="height:44px;padding:0 16px;border-radius:10px;border:0.5px solid var(--border);background:transparent;color:var(--ink-muted);cursor:pointer;font-family:var(--font-body);">Cancel</button>'

window.saveCLItem = async function(type, restaurantId) {
  const name = document.getElementById('cl-new-name')?.value.trim();
  const note = document.getElementById('cl-new-note')?.value.trim() || '';
  const critical = document.getElementById('cl-new-critical')?.checked || false;
  if (!name) { showToast('Task name required','error'); return; }
  try {
    const snap = await getDocs(query(collection(db,'clItems'), where('type','==',type), where('restaurantId','==',restaurantId)));
    await addDoc(collection(db,'clItems'), { name, note, critical, type, restaurantId, order: snap.size, createdAt: serverTimestamp() });
    showToast('Item added!');
    document.getElementById('cl-add-modal')?.remove();
    loadChecklistItems(type, window._userData);
  } catch(e) { showToast('Error saving','error'); }
}

window.updateCLItem = async function(itemId, type, restaurantId) {
  const name = document.getElementById('cl-edit-name')?.value.trim();
  const note = document.getElementById('cl-edit-note')?.value.trim() || '';
  const critical = document.getElementById('cl-edit-critical')?.checked || false;
  if (!name) { showToast('Task name required','error'); return; }
  try {
    await setDoc(doc(db,'clItems',itemId), { name, note, critical }, { merge: true });
    showToast('Item updated!');
    document.getElementById('cl-edit-modal')?.remove();
    loadChecklistItems(type, window._userData);
  } catch(e) { showToast('Error updating','error'); }
}

async function deleteCLItem(itemId, type, restaurantId) {
  if (!confirm('Delete this checklist item?')) return;
  try {
    await deleteDoc(doc(db,'clItems',itemId));
    showToast('Item deleted!');
    loadChecklistItems(type, window._userData);
  } catch(e) { showToast('Error deleting','error'); }
}

window.toggleCLCheck = async function(itemId, type, restaurantId, isDone) {
  const todayKey = window._clTodayKey;
  try {
    if (isDone) {
      // Instant check - no name needed yet
      const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      await addDoc(collection(db,'clChecks'), {
        itemId, type, restaurantId, date: todayKey,
        by: 'pending', time, checkedAt: serverTimestamp()
      });
      showToast('Checked!');
      loadChecklistItems(type, window._userData);
    } else {
      // Uncheck
      const snap = await getDocs(query(collection(db,'clChecks'), where('itemId','==',itemId), where('date','==',todayKey)));
      for (const d of snap.docs) await deleteDoc(doc(db,'clChecks',d.id));
      showToast('Unchecked!');
      loadChecklistItems(type, window._userData);
    }
  } catch(e) { showToast('Error','error'); }
}
window.completeCLCheck = async function(name) {
  if (!window._pendingCL) return;
  const { itemId, type, restaurantId, todayKey, items, checks } = window._pendingCL;
  window._pendingCL = null;
  window._clMode = false;
  const overlay = document.getElementById('staff-picker-overlay');
  if (overlay) overlay.style.display = 'none';
  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  try {
    if (itemId === '__bulk__') {
      // Check ALL pending items at once
      const pending = items.filter(i => !checks[i.id]);
      for (const item of pending) {
        await addDoc(collection(db,'clChecks'), { itemId: item.id, type, restaurantId, date: todayKey, by: name.trim(), time, checkedAt: serverTimestamp() });
      }
      showToast(name + ' checked off all ' + pending.length + ' tasks!');
    } else {
      await addDoc(collection(db,'clChecks'), { itemId, type, restaurantId, date: todayKey, by: name.trim(), time, checkedAt: serverTimestamp() });
      showToast(name + ' checked this off!');
    }
    loadChecklistItems(type, window._userData);
  } catch(e) { showToast('Error saving','error'); }
}

window.signOffChecklist = async function(type, restaurantId) {
  // Ask for name once at the end
  window._pendingSignoff = { type, restaurantId };
  window._clSignoffMode = true;
  injectStaffPicker();
  const overlay = document.getElementById('staff-picker-overlay');
  const label = document.getElementById('staff-picker-item-name');
  if (label) label.textContent = 'Enter your name to sign off this checklist';
  const input = document.getElementById('staff-custom-name');
  if (input) input.value = '';
  overlay.style.cssText = 'display:flex;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:99999;align-items:center;justify-content:center;padding:20px;';
  loadStaffNames(restaurantId);
}

window.completeSignoff = async function(name) {
  if (!window._pendingSignoff) return;
  const { type, restaurantId } = window._pendingSignoff;
  window._pendingSignoff = null;
  window._clSignoffMode = false;
  const overlay = document.getElementById('staff-picker-overlay');
  if (overlay) overlay.style.display = 'none';
  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const todayKey = window._clTodayKey;
  try {
    // Update all pending checks with this name
    const snap = await getDocs(query(collection(db,'clChecks'),
      where('restaurantId','==',restaurantId),
      where('type','==',type),
      where('date','==',todayKey),
      where('by','==','pending')
    ));
    for (const d of snap.docs) {
      await setDoc(doc(db,'clChecks',d.id), { by: name.trim() }, { merge: true });
    }
    await addDoc(collection(db,'clSignoffs'), {
      type, restaurantId, date: todayKey, by: name.trim(), time, signedAt: serverTimestamp()
    });
    showToast(name + ' signed off the ' + (type==='opening'?'opening':'closing') + ' checklist!');
    loadChecklistItems(type, window._userData);
  } catch(e) { showToast('Error','error'); }
}

function renderStationGuide(main, userData) {
  const printBtnHtml = '<button class="no-print" onclick="printPage(\'stationguide\')" style="height:44px;padding:0 16px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15);border-radius:10px;font-family:var(--font-body);font-size:0.875rem;cursor:pointer;">Print guide</button>';
  const addBtn = isAdmin ? '<button onclick="showAddStationDish(\'' + currentRestaurantId() + '\')" style="height:44px;padding:0 20px;background:var(--amber);color:var(--ink);border:none;border-radius:10px;font-family:var(--font-body);font-size:0.875rem;font-weight:700;cursor:pointer;">+ Add dish</button>' : '';
  main.innerHTML = '<div style="background:linear-gradient(135deg,#1A1208,#2A1E04);padding:28px 32px;margin:-24px -24px 0;position:relative;overflow:hidden;">'
    + '<div style="position:absolute;top:0;right:0;width:300px;height:200px;background:radial-gradient(circle,rgba(242,166,35,0.2),transparent 70%);pointer-events:none;"></div>'
    + '<div style="position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">'
    + '<div><div style="font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:6px;">Kitchen Reference</div>'
    + '<h1 style="font-family:var(--font-display);font-size:1.8rem;font-weight:700;color:#fff;margin-bottom:4px;">Station Guide</h1>'
    + '<div style="font-size:0.85rem;color:rgba(255,255,255,0.45);">Cooking steps, ingredients and photos for every dish</div></div>'
    + '<div style="display:flex;gap:8px;">' + addBtn + printBtnHtml + '</div></div>'
    + '<div class="page-body" style="margin-top:24px;">'
    + '<div id="sg-filter" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;"></div>'
    + '<div id="sg-list"></div></div>';
  loadStationGuide(userData);
}

async function loadStationGuide(userData) {
  const listEl = document.getElementById('sg-list');
  const filterEl = document.getElementById('sg-filter');
  if (!listEl) return;
  listEl.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  const restaurantId = currentRestaurantId() || userData.uid;
  try {
    const q = query(collection(db,'stationDishes'), where('restaurantId','==',restaurantId));
    const snap = await getDocs(q);
    if (snap.empty) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No dishes yet</div><div class="empty-state-sub">' + (isAdmin ? 'Click Add dish to build your station guide' : 'Chef Nek will set up your station guide soon') + '</div></div>';
      return;
    }
    const dishes = snap.docs.map(d => ({id:d.id,...d.data()})).sort((a,b)=>(a.category||'').localeCompare(b.category||''));
    window._sgDishes = dishes;
    // Category filters
    const cats = ['All', ...new Set(dishes.map(d=>d.category||'General'))].sort((a,b)=>a==='All'?-1:b==='All'?1:a.localeCompare(b));
    window._sgActiveCategory = window._sgActiveCategory || 'All';
    if (filterEl) {
      filterEl.innerHTML = cats.map(cat => {
        const isActive = cat === window._sgActiveCategory;
        const safeCat = cat.replace(/'/g, '_');
        return '<button onclick="filterSG(&quot;' + safeCat + '&quot;)" style="height:34px;padding:0 16px;border-radius:100px;border:0.5px solid ' + (isActive?'var(--green)':'var(--border)') + ';background:' + (isActive?'var(--green)':'var(--white)') + ';color:' + (isActive?'#fff':'var(--ink-soft)') + ';font-family:var(--font-body);font-size:0.8rem;cursor:pointer;white-space:nowrap;">' + cat + '</button>';
      }).join('');
    }
    renderStationList(dishes);
  } catch(e) {
    listEl.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading station guide.</p></div>';
  }
}

window.filterSG = function(cat) {
  window._sgActiveCategory = cat;
  const dishes = window._sgDishes || [];
  // Update filter buttons
  document.getElementById('sg-filter')?.querySelectorAll('button').forEach(btn => {
    const isActive = btn.textContent === cat;
    btn.style.background = isActive ? 'var(--green)' : 'var(--white)';
    btn.style.color = isActive ? '#fff' : 'var(--ink-soft)';
    btn.style.borderColor = isActive ? 'var(--green)' : 'var(--border)';
  });
  renderStationList(dishes);
}

function renderStationList(dishes) {
  const listEl = document.getElementById('sg-list');
  if (!listEl) return;
  const cat = window._sgActiveCategory || 'All';
  const filtered = cat === 'All' ? dishes : dishes.filter(d=>(d.category||'General')===cat);
  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-state-title">No dishes in this category</div></div>';
    return;
  }
  // Group by category
  const groups = {};
  filtered.forEach(d => {
    const c = d.category || 'General';
    if (!groups[c]) groups[c] = [];
    groups[c].push(d);
  });
  listEl.innerHTML = '';
  Object.entries(groups).sort(([a],[b])=>a.localeCompare(b)).forEach(([catName, items]) => {
    const section = document.createElement('div');
    section.style.cssText = 'margin-bottom:32px;';
    section.innerHTML = '<div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border);">' + catName + '</div>';
    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;';
    items.forEach(dish => {
      const card = document.createElement('div');
      card.style.cssText = 'background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;';
      card.onmouseenter = () => { card.style.transform='translateY(-3px)'; card.style.boxShadow='0 8px 24px rgba(26,26,20,0.1)'; };
      card.onmouseleave = () => { card.style.transform=''; card.style.boxShadow=''; };
      card.onclick = () => openStationDish(dish.id);
      // Photo
      if (dish.photoUrl) {
        card.innerHTML += '<div style="height:160px;overflow:hidden;position:relative;"><img src="' + dish.photoUrl + '" style="width:100%;height:100%;object-fit:cover;" loading="lazy"><div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(26,26,20,0.4),transparent 60%);"></div></div>';
      } else {
        card.innerHTML += '<div style="height:120px;background:linear-gradient(135deg,#F5E6C8,#EDD8A8);display:flex;align-items:center;justify-content:center;"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="rgba(26,26,20,0.2)" stroke-width="1.5"><circle cx="20" cy="20" r="14"/><path d="M14 26 C14 22 26 22 26 26"/><circle cx="20" cy="16" r="4"/></svg></div>';
      }
      // Body
      const body = document.createElement('div');
      body.style.cssText = 'padding:14px 16px 16px;';
      body.innerHTML = '<div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:4px;">' + dish.name + '</div>';
      if (dish.prepTime) body.innerHTML += '<div style="font-size:0.72rem;color:var(--ink-muted);margin-bottom:8px;">Prep time: ' + dish.prepTime + '</div>';
      // Preview first 2 steps
      if (dish.steps) {
        const stepLines = dish.steps.split('\n').filter(s=>s.trim()).slice(0,2);
        body.innerHTML += '<div style="margin-top:8px;">' + stepLines.map((s,i) => '<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:4px;"><span style="width:18px;height:18px;border-radius:4px;background:var(--amber-light);color:var(--terra);font-size:0.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + (i+1) + '</span><span style="font-size:0.78rem;color:var(--ink-soft);line-height:1.4;">' + s.replace(/^\d+[\.\)]\s*/,'').substring(0,60) + (s.length>60?'...':'') + '</span></div>').join('') + (dish.steps.split('\n').filter(s=>s.trim()).length > 2 ? '<div style="font-size:0.72rem;color:var(--green);font-weight:500;margin-top:4px;">+ ' + (dish.steps.split('\n').filter(s=>s.trim()).length-2) + ' more steps</div>' : '') + '</div>';
      }
      // Admin actions
      if (isAdmin) {
        const actions = document.createElement('div');
        actions.style.cssText = 'display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);';
        const editBtn = document.createElement('button');
        editBtn.textContent = 'Edit';
        editBtn.style.cssText = 'height:28px;padding:0 12px;border-radius:6px;border:0.5px solid var(--border);background:var(--cream);color:var(--ink-soft);font-size:11px;cursor:pointer;font-family:var(--font-body);';
        editBtn.onclick = (e) => { e.stopPropagation(); showEditStationDish(dish); };
        const delBtn = document.createElement('button');
        delBtn.textContent = 'Delete';
        delBtn.style.cssText = 'height:28px;padding:0 12px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:11px;cursor:pointer;font-family:var(--font-body);';
        delBtn.onclick = async (e) => { e.stopPropagation(); await deleteStationDish(dish.id); };
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        body.appendChild(actions);
      }
      // ── Print-only full details ──
      const printSection = document.createElement('div');
      printSection.className = 'sg-print-detail';
      printSection.style.cssText = 'display:none;padding:0 16px 16px;border-top:1px solid #eee;margin-top:8px;';
      let printHTML = '';
      if (dish.ingredients) {
        printHTML += '<div style="margin-bottom:10px;"><div style="font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#666;margin-bottom:6px;">Ingredients</div>';
        dish.ingredients.split('\n').filter(l=>l.trim()).forEach(line => {
          printHTML += '<div style="font-size:0.82rem;padding:3px 0;border-bottom:0.5px solid #f0f0f0;">'+line.replace(/^[-•*]\s*/,'')+'</div>';
        });
        printHTML += '</div>';
      }
      if (dish.steps) {
        printHTML += '<div><div style="font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#666;margin-bottom:6px;">Steps</div>';
        dish.steps.split('\n').filter(l=>l.trim()).forEach((line,i) => {
          printHTML += '<div style="font-size:0.82rem;padding:4px 0;border-bottom:0.5px solid #f0f0f0;display:flex;gap:8px;"><span style="font-weight:700;color:#1D9E75;min-width:18px;">'+(i+1)+'.</span>'+line.replace(/^\d+[.)]\s*/,'')+'</div>';
        });
        printHTML += '</div>';
      }
      printSection.innerHTML = printHTML;
      card.appendChild(printSection);
      grid.appendChild(card);
    });
    section.appendChild(grid);
    listEl.appendChild(section);
  });
}

window.openStationDish = function(id) {
  const dish = (window._sgDishes||[]).find(d=>d.id===id);
  if (!dish) return;
  const existing = document.getElementById('sg-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'sg-modal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);';
  const box = document.createElement('div');
  box.style.cssText = 'background:var(--white);border-radius:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.25);';
  // Header with photo
  const header = document.createElement('div');
  header.style.cssText = 'position:relative;';
  if (dish.photoUrl) {
    header.innerHTML = '<div style="height:220px;overflow:hidden;border-radius:24px 24px 0 0;"><img src="' + dish.photoUrl + '" style="width:100%;height:100%;object-fit:cover;"></div>';
  } else {
    header.innerHTML = '<div style="height:120px;background:linear-gradient(135deg,#1A1208,#2A1E04);border-radius:24px 24px 0 0;"></div>';
  }
  // Close btn
  const closeBtn = document.createElement('button');
  closeBtn.innerHTML = 'x';
  closeBtn.style.cssText = 'position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.3);border:none;color:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;';
  closeBtn.onclick = () => modal.remove();
  header.appendChild(closeBtn);
  box.appendChild(header);
  // Content
  const body = document.createElement('div');
  body.style.cssText = 'padding:24px;';
  // Title + meta
  body.innerHTML = '<div style="font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--ink);margin-bottom:4px;">' + dish.name + '</div>';
  if (dish.category) body.innerHTML += '<span style="font-size:0.72rem;background:var(--amber-light);color:var(--terra);padding:2px 10px;border-radius:20px;font-weight:600;">' + dish.category + '</span>';
  if (dish.prepTime) body.innerHTML += ' <span style="font-size:0.75rem;color:var(--ink-muted);margin-left:6px;">Prep: ' + dish.prepTime + '</span>';
  // Ingredients
  if (dish.ingredients) {
    body.innerHTML += '<div style="margin-top:20px;"><div style="font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:10px;">Ingredients</div>';
    const ingLines = dish.ingredients.split('\n').filter(l=>l.trim());
    body.innerHTML += ingLines.map(line => '<div style="display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:0.5px solid var(--border);"><span style="width:6px;height:6px;border-radius:50%;background:var(--green);margin-top:6px;flex-shrink:0;"></span><span style="font-size:0.875rem;color:var(--ink2);line-height:1.5;">' + line.replace(/^[-•*]\s*/,'') + '</span></div>').join('') + '</div>';
  }
  // Steps
  if (dish.steps) {
    body.innerHTML += '<div style="margin-top:20px;"><div style="font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:10px;">How to make it</div>';
    const stepLines = dish.steps.split('\n').filter(l=>l.trim());
    body.innerHTML += stepLines.map((line,i) => {
      const text = line.replace(/^\d+[\.\)]\s*/,'');
      return '<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid var(--border);"><span style="width:28px;height:28px;border-radius:8px;background:var(--amber);color:var(--ink);font-size:0.75rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + (i+1) + '</span><span style="font-size:0.9rem;color:var(--ink);line-height:1.65;">' + text + '</span></div>';
    }).join('') + '</div>';
  }
  box.appendChild(body);
  modal.appendChild(box);
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
}

window.uploadSGPhoto = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('sg-photo-status');
  const previewDiv = document.getElementById('sg-photo-preview');
  const previewImg = document.getElementById('sg-photo-preview-img');
  const urlInput = document.getElementById('sg-photo');
  if (previewDiv) previewDiv.style.display = 'flex';
  const reader = new FileReader();
  reader.onload = async function(e) {
    if (previewImg) previewImg.src = e.target.result;
    if (statusEl) statusEl.textContent = 'Uploading...';
    try {
      const base64 = e.target.result.split(',')[1];
      const res = await fetch('https://api.imgbb.com/1/upload?key=2607f98fd74e91661681ef5b362c36f2', {
        method: 'POST',
        body: new URLSearchParams({ image: base64, name: file.name })
      });
      const data = await res.json();
      if (data.success) {
        if (urlInput) urlInput.value = data.data.url;
        if (previewImg) previewImg.src = data.data.url;
        if (statusEl) statusEl.textContent = 'Uploaded!';
        showToast('Photo uploaded!');
      } else {
        if (urlInput) urlInput.value = e.target.result;
        if (statusEl) statusEl.textContent = 'Photo ready';
      }
    } catch(err) {
      if (urlInput) urlInput.value = e.target.result;
      if (statusEl) statusEl.textContent = 'Photo ready';
    }
  };
  reader.readAsDataURL(file);
  input.value = '';
}

window.clearSGPhoto = function() {
  const urlInput = document.getElementById('sg-photo');
  const previewDiv = document.getElementById('sg-photo-preview');
  const previewImg = document.getElementById('sg-photo-preview-img');
  if (urlInput) urlInput.value = '';
  if (previewImg) previewImg.src = '';
  if (previewDiv) previewDiv.style.display = 'none';
}

onAuthStateChanged(auth, async (user) => {
  // If showing public menu, don't interfere with auth
  if (_hashRid) return;
  if (user) {
    currentUser = user;
    try {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      let userData;
      if (userDoc.exists()) {
        userData = { uid: user.uid, ...userDoc.data() };
      } else if (user.email === ADMIN_EMAIL) {
        userData = { uid: user.uid, email: user.email, restaurantName: 'Chef Nek Admin', ownerName: 'Chef Nek', isAdmin: true };
        await setDoc(doc(db, 'users', user.uid), { email: user.email, restaurantName: 'Chef Nek Admin', ownerName: 'Chef Nek', isAdmin: true, createdAt: serverTimestamp() });
      } else {
        renderLogin();
        return;
      }
      isAdmin = userData.email === ADMIN_EMAIL || userData.isAdmin === true;
      // Check if account is suspended (non-admin only)
      if (!isAdmin && userData.status === 'suspended') {
        renderLogin();
        setTimeout(() => {
          const errEl = document.getElementById('login-error');
          if (errEl) {
            errEl.textContent = 'Your account has been suspended. Please contact Chef Nek to restore access.';
            errEl.style.display = 'block';
          }
        }, 100);
        await signOut(auth);
        return;
      }
      window._userData = userData;
      renderApp(userData);
    } catch(e) {
      console.error('Auth error:', e);
      // If it's a permission error but email matches admin, still let them in
      if (user.email === ADMIN_EMAIL) {
        isAdmin = true;
        window._userData = { uid: user.uid, email: user.email, restaurantName: 'Chef Nek Admin', ownerName: 'Chef Nek', isAdmin: true };
        renderApp(window._userData);
      } else {
        showToast('Sign in error: ' + (e.message || 'Please try again'), 'error');
        renderLogin();
      }
    }
  } else {
    currentUser = null;
    renderLogin();
  }
});

async function createClientAccount() {
  const restaurant = document.getElementById('new-client-restaurant')?.value.trim();
  const owner = document.getElementById('new-client-owner')?.value.trim();
  const email = document.getElementById('new-client-email')?.value.trim();
  const password = document.getElementById('new-client-password')?.value.trim();
  const btn = document.getElementById('add-client-btn');
  if (!restaurant || !owner || !email || !password) { showToast('Please fill all fields', 'error'); return; }
  if (password.length < 6) { showToast('Password must be 6+ characters', 'error'); return; }
  if (btn) { btn.textContent = 'Creating...'; btn.disabled = true; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, 'users', cred.user.uid), {
      email, restaurantName: restaurant, ownerName: owner,
      isAdmin: false, createdAt: serverTimestamp()
    });
    // Sign back in as admin
    await signInWithEmailAndPassword(auth, ADMIN_EMAIL, window._adminPass || '');
    showToast(restaurant + ' account created!');
    document.getElementById('add-client-modal')?.remove();
    loadClients();
  } catch(e) {
    if (btn) { btn.textContent = 'Create account'; btn.disabled = false; }
    showToast(e.message || 'Error creating account', 'error');
  }
}

window.toggleClientStatus = async function(uid, name, currentStatus) {
  const newStatus = currentStatus === 'active' ? 'suspended' : 'active';
  const action = newStatus === 'suspended' ? 'Suspend' : 'Activate';
  if (!confirm(action + ' ' + (name||'this client') + '? ' + (newStatus==='suspended'?'They will not be able to log in.':'They will regain full access.'))) return;
  try {
    await setDoc(doc(db,'users',uid), { status: newStatus }, { merge: true });
    showToast((name||'Client') + ' ' + (newStatus==='suspended'?'suspended':'activated') + '!');
    loadClients();
  } catch(e) { showToast('Error updating status','error'); }
}

window.togglePaymentStatus = async function(uid, name, currentStatus) {
  const newStatus = currentStatus === 'paid' ? 'unpaid' : 'paid';
  try {
    await setDoc(doc(db,'users',uid), { paymentStatus: newStatus }, { merge: true });
    showToast((name||'Client') + ' marked as ' + newStatus + '!');
    loadClients();
  } catch(e) { showToast('Error updating payment','error'); }
}

window.printReceipt = function() {
  const receiptEl = document.getElementById('receipt-printable');
  if (!receiptEl) return;
  const win = window.open('','_blank','width=600,height=800');
  win.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>Receipt - Chef Nek Pro</title>'
    + '<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:white;}'
    + '@media print{@page{margin:0.3in;size:portrait;}}</style></head><body>');
  win.document.write(receiptEl.outerHTML);
  win.document.write('</body></html>');
  win.document.close();
  setTimeout(() => { win.focus(); win.print(); }, 500);
}

window.emailReceipt = function(email, receiptNum, amount, restaurant, period) {
  if (!email) { showToast('No email address for this client','error'); return; }
  // Open default mail client with pre-filled receipt
  const subject = encodeURIComponent('Chef Nek Pro — Payment Receipt ' + receiptNum);
  const nl = '%0A';
  const body = encodeURIComponent('Hi ' + restaurant + ', Please find your payment receipt below. Receipt No: ' + receiptNum + ' | Service: Chef Nek Pro Platform - ' + period + ' | Amount: $' + amount + '.00 | Status: PAID | Thank you! Chef Nek - hailu.nekatibeb2025@gmail.com');
  window.open('mailto:' + email + '?subject=' + subject + '&body=' + body);
  showToast('Opening email client...');
}

async function resetClientPassword(email, name) {
  if (!confirm('Send password reset email to ' + email + '?')) return;
  try {
    await sendPasswordResetEmail(auth, email);
    showToast('Reset email sent to ' + (name||email) + '!');
  } catch(e) { showToast('Error sending reset email', 'error'); }
}

async function deleteClient(uid, name) {
  if (!confirm('Delete ' + (name||'this client') + '? This cannot be undone.')) return;
  try {
    await deleteDoc(doc(db, 'users', uid));
    showToast((name||'Client') + ' deleted');
    loadClients();
  } catch(e) { showToast('Error deleting client', 'error'); }
}
