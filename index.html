<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Nek Pro — Platform</title>
<!-- PWA Support -->
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chef Nek Pro">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Chef Nek Pro">
<link rel="manifest" href="manifest.json">
<!-- App Icons -->
<link rel="apple-touch-icon" href="https://i.ibb.co/srCVgm3/IMG-8789.jpg">
<link rel="icon" type="image/png" href="https://i.ibb.co/srCVgm3/IMG-8789.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --amber: #F2A623;
    --amber-light: #FAEEDA;
    --cream: #FAF7F2;
    --ink: #1A1A14;
    --ink-soft: #4A4A3A;
    --ink-muted: #8A8A7A;
    --border: rgba(26,26,20,0.1);
    --white: #FFFFFF;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }
  html, body { height: 100%; font-family: var(--font-body); background: var(--cream); color: var(--ink); }
  #root { height: 100%; }

  /* ── LOADING ── */
  .loading-screen {
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: var(--cream);
  }
  .loading-logo { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--ink); }
  .loading-logo span { color: var(--green); }
  .loading-spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid var(--green-light);
    border-top-color: var(--green);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LOGIN PAGE ── */
  .login-page {
    min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
  }
  @media(max-width:768px) { .login-page { grid-template-columns: 1fr; } }
  .login-left {
    background: var(--green);
    display: flex; flex-direction: column;
    justify-content: center; padding: 60px;
    position: relative; overflow: hidden;
  }
  .login-left::before {
    content: ''; position: absolute;
    width: 400px; height: 400px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    top: -100px; right: -100px;
  }
  .login-left::after {
    content: ''; position: absolute;
    width: 300px; height: 300px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    bottom: -80px; left: -80px;
  }
  .login-brand { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 12px; }
  .login-brand span { opacity: 0.75; }
  .login-tagline { font-size: 1.1rem; font-weight: 300; color: rgba(255,255,255,0.8); line-height: 1.65; max-width: 340px; margin-bottom: 48px; }
  .login-feature { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .login-feature-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.6); flex-shrink: 0; }
  .login-feature-text { font-size: 0.9rem; color: rgba(255,255,255,0.75); }
  .login-right {
    display: flex; flex-direction: column;
    justify-content: center; padding: 60px;
    background: var(--white);
  }
  .login-form-title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
  .login-form-sub { font-size: 0.9rem; color: var(--ink-muted); margin-bottom: 36px; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--ink-soft); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-input {
    width: 100%; height: 48px; padding: 0 16px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-family: var(--font-body); font-size: 0.9375rem;
    color: var(--ink); background: var(--cream); outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--green); background: var(--white); }
  .form-input.error { border-color: var(--red); }
  .form-btn {
    width: 100%; height: 50px;
    background: var(--green); color: #fff;
    font-family: var(--font-body); font-size: 1rem; font-weight: 500;
    border: none; border-radius: 10px; cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    margin-top: 8px;
  }
  .form-btn:hover { background: var(--green-dark); transform: translateY(-1px); }
  .form-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .form-error { background: var(--red-light); color: var(--red); font-size: 0.875rem; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }

  /* ── APP LAYOUT ── */
  .app-layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  @media(max-width:768px) { .app-layout { grid-template-columns: 1fr; } }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--ink); display: flex; flex-direction: column;
    padding: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-logo-text { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: #fff; }
  .sidebar-logo-text span { color: var(--green); }
  .sidebar-restaurant { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-restaurant-label { font-size: 0.7rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .sidebar-restaurant-name { font-size: 0.9rem; font-weight: 500; color: #fff; }
  .sidebar-nav { flex: 1; padding: 16px 12px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    font-size: 0.875rem; color: rgba(255,255,255,0.6);
    cursor: pointer; margin-bottom: 2px;
    transition: background 0.15s, color 0.15s;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
  .nav-item.active { background: var(--green); color: #fff; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-section-label { font-size: 0.7rem; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 0.08em; padding: 12px 12px 6px; }
  .sidebar-bottom { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .signout-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    font-size: 0.875rem; color: rgba(255,255,255,0.4);
    cursor: pointer; width: 100%; border: none; background: none;
    transition: color 0.15s;
  }
  .signout-btn:hover { color: rgba(255,255,255,0.8); }

  /* ── MAIN CONTENT ── */
  .main-content { background: var(--cream); overflow-y: auto; }
  .page-header { padding: 32px 36px 0; margin-bottom: 28px; }
  .page-title { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .page-sub { font-size: 0.9rem; color: var(--ink-muted); }
  .page-body { padding: 0 36px 36px; }
  @media(max-width:768px) { .page-header { padding: 20px 20px 0; } .page-body { padding: 0 20px 20px; } }

  /* ── STAT CARDS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border-radius: 14px; padding: 20px; border: 0.5px solid var(--border); }
  .stat-card-label { font-size: 0.75rem; font-weight: 500; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .stat-card-value { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--ink); line-height: 1; }
  .stat-card-value.green { color: var(--green); }
  .stat-card-value.amber { color: var(--amber); }
  .stat-card-sub { font-size: 0.8rem; color: var(--ink-muted); margin-top: 4px; }

  /* ── CARDS ── */
  .card { background: var(--white); border-radius: 16px; border: 0.5px solid var(--border); padding: 24px; margin-bottom: 20px; }
  .card-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 16px; }

  /* ── QUICK LINKS ── */
  .quick-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .quick-card {
    background: var(--cream); border-radius: 14px; padding: 20px;
    border: 0.5px solid var(--border); cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column; gap: 10px;
    text-align: left;
  }
  .quick-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(26,26,20,0.08); }
  .quick-card-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .quick-card-icon svg { width: 18px; height: 18px; }
  .quick-card-title { font-size: 0.9375rem; font-weight: 500; color: var(--ink); }
  .quick-card-sub { font-size: 0.8rem; color: var(--ink-muted); }

  /* ── ADMIN CLIENT LIST ── */
  .client-table { width: 100%; border-collapse: collapse; }
  .client-table th { text-align: left; font-size: 0.75rem; font-weight: 500; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 0 12px 12px; }
  .client-table td { padding: 12px; border-top: 0.5px solid var(--border); font-size: 0.9rem; color: var(--ink-soft); vertical-align: middle; }
  .client-table tr:hover td { background: var(--cream); }
  .client-name-cell { font-weight: 500; color: var(--ink); }
  .status-badge { display: inline-block; font-size: 0.75rem; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .status-active { background: var(--green-light); color: var(--green-dark); }
  .status-new { background: var(--amber-light); color: #854F0B; }

  /* ── ADD CLIENT FORM ── */
  .add-client-form { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:600px) { .add-client-form { grid-template-columns: 1fr; } }
  .form-btn-small {
    height: 42px; padding: 0 20px;
    background: var(--green); color: #fff;
    font-family: var(--font-body); font-size: 0.875rem; font-weight: 500;
    border: none; border-radius: 8px; cursor: pointer;
    transition: background 0.2s; white-space: nowrap;
  }
  .form-btn-small:hover { background: var(--green-dark); }
  .form-btn-small:disabled { opacity: 0.6; cursor: not-allowed; }
  .form-input-small {
    width: 100%; height: 42px; padding: 0 14px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: var(--font-body); font-size: 0.875rem;
    color: var(--ink); background: var(--cream); outline: none;
    transition: border-color 0.2s;
  }
  .form-input-small:focus { border-color: var(--green); background: var(--white); }

  /* ── SUCCESS / ERROR TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 14px 20px; border-radius: 12px;
    font-size: 0.9rem; font-weight: 500;
    animation: slideUp 0.3s ease; z-index: 1000;
    max-width: 320px;
  }
  .toast.success { background: var(--green); color: #fff; }
  .toast.error { background: var(--red); color: #fff; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 48px 20px; }
  .empty-state-icon { width: 56px; height: 56px; border-radius: 16px; background: var(--green-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .empty-state-icon svg { width: 24px; height: 24px; }
  .empty-state-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .empty-state-sub { font-size: 0.875rem; color: var(--ink-muted); }


  /* ── PREP LIST PRO STYLES ── */
  .prep-week-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .week-label { font-size:0.9rem; font-weight:500; color:var(--ink); }
  .week-btn { height:34px; padding:0 14px; border-radius:8px; border:0.5px solid var(--border); background:var(--white); color:var(--ink-soft); font-size:0.8125rem; cursor:pointer; transition:background 0.15s; }
  .week-btn:hover { background:var(--green-light); color:var(--green-dark); }
  .prep-category { background:var(--white); border-radius:16px; border:0.5px solid var(--border); margin-bottom:16px; overflow:hidden; }
  .prep-cat-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; cursor:pointer; user-select:none; transition:background 0.15s; border-radius:16px; }
  .prep-cat-chevron { font-size:18px; color:var(--ink-muted); transition:transform 0.2s; font-weight:300; }
  .prep-cat-chevron.open { transform:rotate(90deg); color:var(--green); }
  .prep-cat-header:hover { background:var(--cream); }
  .prep-cat-title { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:10px; }
  .prep-cat-meta { display:flex; align-items:center; gap:10px; }
  .prep-cat-progress { font-size:0.8rem; color:var(--ink-muted); }

  .prep-cat-body { border-top:0.5px solid var(--border); }
  .prep-cat-assign { padding:10px 18px; background:var(--cream); display:flex; align-items:center; gap:10px; border-bottom:0.5px solid var(--border); flex-wrap:wrap; }
  .prep-cat-assign-label { font-size:0.8rem; color:var(--ink-muted); }
  .prep-cat-assign-name { font-size:0.8rem; font-weight:500; color:var(--ink); }
  .prep-item-row { display:grid; grid-template-columns:1fr 80px repeat(7,32px); gap:4px; align-items:center; padding:8px 18px; border-bottom:0.5px solid var(--border); }
  .prep-item-row:last-child { border-bottom:none; }
  .prep-item-row.critical-row { background:#FCEBEB; border-left:3px solid #E24B4A; }
  .prep-item-name { font-size:0.875rem; color:var(--ink); display:flex; align-items:center; gap:6px; }
  .prep-item-qty { font-size:0.8rem; color:var(--ink-muted); text-align:center; }
  .day-header { font-size:0.7rem; font-weight:500; color:var(--ink-muted); text-align:center; text-transform:uppercase; }
  .day-check { width:28px; height:28px; border-radius:6px; border:1.5px solid var(--border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; margin:0 auto; }
  .day-check.checked { background:var(--green); border-color:var(--green); }
  .day-check.checked svg { display:block; }
  .day-check.today { border-color:var(--green); border-width:2px; }
  .day-check svg { display:none; width:12px; height:12px; }
  .prep-cat-footer { padding:12px 18px; background:var(--cream); border-top:0.5px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .approve-btn { height:36px; padding:0 18px; background:var(--green); color:#fff; border:none; border-radius:8px; font-size:0.8125rem; font-weight:500; cursor:pointer; transition:background 0.15s; }
  .approve-btn:hover { background:var(--green-dark); }
  .approve-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .approved-stamp { display:flex; align-items:center; gap:6px; font-size:0.8rem; color:var(--green-dark); font-weight:500; }
  .prep-header-row { display:grid; grid-template-columns:1fr 80px repeat(7,32px); gap:4px; padding:6px 18px; background:var(--cream); border-bottom:0.5px solid var(--border); }
  .critical-alert { background:#FCEBEB; border:1px solid #F09595; border-radius:12px; padding:14px 18px; margin-bottom:16px; display:flex; align-items:flex-start; gap:12px; }

  /* ── MENU DESIGN STYLES ── */
  .menu-preview { background:var(--white); border-radius:16px; border:0.5px solid var(--border); overflow:hidden; }
  .menu-preview-header { padding:32px; text-align:center; }
  .menu-preview-cat { padding:0 24px 24px; }
  .menu-preview-cat-title { font-family:var(--font-display); font-size:1.1rem; font-weight:700; padding:12px 0; border-bottom:2px solid; margin-bottom:16px; }
  .menu-preview-item { display:flex; align-items:flex-start; gap:14px; padding:12px 0; border-bottom:0.5px solid var(--border); }
  .menu-preview-item:last-child { border-bottom:none; }
  .menu-preview-item-photo { width:70px; height:60px; object-fit:cover; border-radius:8px; flex-shrink:0; }
  .menu-preview-item-info { flex:1; }
  .menu-preview-item-name { font-weight:600; font-size:0.9rem; color:var(--ink); margin-bottom:3px; }
  .menu-preview-item-desc { font-size:0.8rem; color:var(--ink-muted); line-height:1.5; }
  .menu-preview-item-price { font-weight:700; font-size:1rem; white-space:nowrap; flex-shrink:0; }
  .qr-box { background:var(--white); border:0.5px solid var(--border); border-radius:16px; padding:24px; text-align:center; }

  /* ── INVENTORY PRO STYLES ── */
  .inv-category { background:var(--white); border-radius:16px; border:0.5px solid var(--border); margin-bottom:16px; overflow:hidden; }
  .inv-cat-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; cursor:pointer; user-select:none; transition:background 0.15s; }
  .inv-cat-header:hover { background:var(--cream); }
  .inv-cat-title { font-family:var(--font-display); font-size:1rem; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:10px; }
  .inv-cat-meta { display:flex; align-items:center; gap:10px; }
  .inv-cat-chevron { font-size:18px; color:var(--ink-muted); transition:transform 0.2s; font-weight:300; }
  .inv-cat-chevron.open { transform:rotate(90deg); color:var(--green); }
  .inv-cat-body { border-top:0.5px solid var(--border); display:none; }
  .inv-item-row { display:grid; grid-template-columns:1fr 100px 120px 80px; gap:8px; align-items:center; padding:10px 18px; border-bottom:0.5px solid var(--border); }
  .inv-item-row:last-child { border-bottom:none; }
  .inv-item-row.low-stock { background:#FFF8EC; border-left:3px solid var(--amber); }
  .inv-item-row.critical-stock { background:#FCEBEB; border-left:3px solid var(--red); }
  .inv-item-name { font-size:0.875rem; color:var(--ink); font-weight:500; }
  .inv-item-unit { font-size:0.8rem; color:var(--ink-muted); text-align:center; }
  .inv-qty-controls { display:flex; align-items:center; gap:6px; justify-content:center; }
  .inv-qty-btn { width:26px; height:26px; border-radius:6px; border:0.5px solid var(--border); background:var(--cream); color:var(--ink); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .inv-qty-btn:hover { background:var(--green-light); color:var(--green-dark); }
  .inv-qty-val { font-size:0.9rem; font-weight:500; color:var(--ink); min-width:32px; text-align:center; }
  .inv-status { font-size:0.75rem; font-weight:500; padding:3px 10px; border-radius:20px; text-align:center; }
  .inv-header-row { display:grid; grid-template-columns:1fr 100px 120px 80px; gap:8px; padding:8px 18px; background:var(--cream); border-bottom:0.5px solid var(--border); }
  .inv-col-label { font-size:0.75rem; font-weight:500; color:var(--ink-muted); text-align:center; }
  .inv-col-label:first-child { text-align:left; }

  /* ── PRINT STYLES ── */
  @media print {
    .sidebar, .mobile-header, .no-print { display: none !important; }
    .app-layout { grid-template-columns: 1fr !important; }
    .main-content { overflow: visible !important; }
    .card { break-inside: avoid; border: 1px solid #ccc !important; }
    .page-header { padding: 0 0 16px !important; }
    .page-body { padding: 0 !important; }
    body { background: white !important; }
    .print-header { display: block !important; }
  }
  .print-header { display: none; }
  .print-btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 36px; padding: 0 16px;
    background: var(--white); color: var(--ink-soft);
    border: 0.5px solid var(--border); border-radius: 8px;
    font-family: var(--font-body); font-size: 0.8125rem;
    font-weight: 500; cursor: pointer;
    transition: background 0.15s;
  }
  .print-btn:hover { background: var(--green-light); color: var(--green-dark); border-color: var(--green); }
  .print-btn svg { width: 14px; height: 14px; }
  /* ── MOBILE NAV ── */
  .mobile-header { display: none; background: var(--ink); padding: 14px 20px; align-items: center; justify-content: space-between; }

window.navigate = function(page) {
  currentPage = page;
  const navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(item => item.classList.remove('active'));
  const activeItem = Array.from(navItems).find(item => item.getAttribute('onclick') === `navigate('${page}')`);
  if (activeItem) activeItem.classList.add('active');
  renderPage(window._userData);
}

  window._userData = userData;

async function loadDashboardStats(userData) {
  try {
    const restaurantId = userData.uid;
    const recipesSnap = await getDocs(query(collection(db, 'recipes'), where('restaurantId', '==', restaurantId)));
    const tasksSnap = await getDocs(query(collection(db, 'prepTasks'), where('restaurantId', '==', restaurantId)));
    const inventorySnap = await getDocs(query(collection(db, 'inventory'), where('restaurantId', '==', restaurantId)));
    const r = document.getElementById('stat-recipes');
    const t = document.getElementById('stat-tasks');
    const i = document.getElementById('stat-inventory');
    if (r) r.textContent = recipesSnap.size;
    if (t) t.textContent = tasksSnap.size;
    if (i) i.textContent = inventorySnap.size;
  } catch(e) {}
}

let activeCategory = 'All';
let allRecipes = [];

window.filterCategory = function(cat) {
  activeCategory = cat;
  const filters = document.getElementById('category-filters');
  if (filters) {
    filters.querySelectorAll('button').forEach(b => {
      b.style.background = b.dataset.cat === cat ? 'var(--green)' : 'var(--white)';
      b.style.color = b.dataset.cat === cat ? '#fff' : 'var(--ink-soft)';
      b.style.borderColor = b.dataset.cat === cat ? 'var(--green)' : 'var(--border)';
      b.style.fontWeight = b.dataset.cat === cat ? '500' : '400';
    });
  }
  renderRecipeList(allRecipes);
}

function renderRecipeList(recipes) {
  const list = document.getElementById('recipes-list');
  const categoryOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks','General'];
  const filtered = activeCategory === 'All' ? recipes : recipes.filter(r => (r.category||'General') === activeCategory);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-title">No recipes in this category</div></div>`;
    return;
  }

  // Group by category in order
  if (activeCategory === 'All') {
    const groups = {};
    filtered.forEach(r => {
      const cat = r.category || 'General';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(r);
    });
    const sortedGroups = Object.entries(groups).sort(([a], [b]) => {
      const ai = categoryOrder.indexOf(a);
      const bi = categoryOrder.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    list.innerHTML = sortedGroups.map(([cat, items]) => `
      <div style="margin-bottom:8px;">
        <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);padding:8px 0 10px;border-bottom:2px solid var(--green);margin-bottom:12px;display:flex;align-items:center;gap:10px;">
          ${cat}
          <span style="font-size:0.75rem;font-weight:400;color:var(--ink-muted);font-family:var(--font-body);">${items.length} item${items.length>1?'s':''}</span>
        </div>
        ${items.map(r => recipeCard(r)).join('')}
      </div>
    `).join('');
  } else {
    list.innerHTML = filtered.map(r => recipeCard(r)).join('');
  }
}

async function loadRecipes(userData) {
  const list = document.getElementById('recipes-list');
  try {
    const q = isAdmin
      ? query(collection(db, 'recipes'), orderBy('createdAt', 'desc'))
      : query(collection(db, 'recipes'), where('restaurantId', '==', userData.uid));
    const snap = await getDocs(q);
    if (snap.empty) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="2" width="18" height="20" rx="3"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="12" y2="16"/></svg></div>
          <div class="empty-state-title">No recipes yet</div>
          <div class="empty-state-sub">${isAdmin ? 'Add your first recipe above' : 'Chef Nek will add your recipes soon'}</div>
        </div>`;
      return;
    }

    // Store all recipes and build filters
    allRecipes = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Build category filter buttons
    const categoryOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];
    const cats = ['All', ...new Set(allRecipes.map(r => r.category || 'General').filter(Boolean))].sort((a,b) => {
      if (a==='All') return -1; if (b==='All') return 1;
      return (categoryOrder.indexOf(a)===-1?99:categoryOrder.indexOf(a)) - (categoryOrder.indexOf(b)===-1?99:categoryOrder.indexOf(b));
    });
    const filterDiv = document.getElementById('category-filters');
    if (filterDiv) {
      filterDiv.innerHTML = cats.map(cat => `
        <button data-cat="${cat}" onclick="filterCategory('${cat}')" style="height:34px;padding:0 16px;border-radius:100px;border:0.5px solid ${cat===activeCategory?'var(--green)':'var(--border)'};background:${cat===activeCategory?'var(--green)':'var(--white)'};color:${cat===activeCategory?'#fff':'var(--ink-soft)'};font-family:var(--font-body);font-size:0.8125rem;font-weight:${cat===activeCategory?'500':'400'};cursor:pointer;transition:all 0.15s;white-space:nowrap;">
          ${cat}
        </button>`).join('');
    }
    renderRecipeList(allRecipes);
  } catch(e) {
    list.innerHTML = `<div class="card"><p style="color:var(--ink-muted);">Error loading recipes. Please try again.</p></div>`;
  }
}



window.uploadPhoto = async function(input, urlFieldId, previewId) {
  const file = input.files[0];
  if (!file) return;
  const previewDiv = document.getElementById(previewId);
  const previewImg = document.getElementById(previewId + '-img');
  const urlField = document.getElementById(urlFieldId);

  // Show local preview immediately
  const reader = new FileReader();
  reader.onload = e => {
    if (previewImg) previewImg.src = e.target.result;
    if (previewDiv) previewDiv.style.display = 'flex';
    previewDiv.style.alignItems = 'center';
  };
  reader.readAsDataURL(file);

  // Upload to ImgBB free API
  showToast('Uploading photo...', 'success');
  try {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch('https://api.imgbb.com/1/upload?key=2607f98fd74e91661681ef5b362c36f2', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    if (data.success) {
      urlField.value = data.data.url;
      if (previewImg) previewImg.src = data.data.url;
      showToast('Photo uploaded!');
    } else {
      // Fallback — use base64 local preview
      urlField.value = document.getElementById(previewId + '-img').src;
      showToast('Photo ready — save the recipe!');
    }
  } catch(e) {
    // Fallback — use the local preview
    urlField.value = document.getElementById(previewId + '-img') ? document.getElementById(previewId + '-img').src : '';
    showToast('Photo ready — save the recipe!');
  }
}

window.handleSectionSelect = function(select) {
  const customInput = document.getElementById('task-section');
  if (select.value === 'custom') {
    customInput.style.display = 'block';
    select.style.display = 'none';
    customInput.focus();
    customInput.value = '';
    // Add back button
    if (!document.getElementById('section-back-btn')) {
      const btn = document.createElement('button');
      btn.id = 'section-back-btn';
      btn.textContent = '← Back';
      btn.style.cssText = 'height:42px;padding:0 12px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--ink-soft);font-size:12px;cursor:pointer;margin-top:4px;';
      btn.onclick = function() {
        customInput.style.display = 'none';
        select.style.display = 'block';
        select.value = '';
        btn.remove();
      };
      customInput.parentElement.appendChild(btn);
    }
  } else {
    customInput.value = select.value;
    customInput.style.display = 'none';
  }
}

window.saveRecipe = async function(id) {
  const name = document.getElementById('edit-name-' + id).value.trim();
  const category = document.getElementById('edit-category-' + id).value;
  const servings = document.getElementById('edit-servings-' + id).value.trim();
  const price = document.getElementById('edit-price-' + id).value.trim();
  const photoUrl = document.getElementById('edit-photo-' + id).value.trim();
  const notes = document.getElementById('edit-notes-' + id).value.trim();
  if (!name) { showToast('Recipe name is required', 'error'); return; }
  try {
    await setDoc(doc(db, 'recipes', id), { name, category, servings, price, photoUrl, notes }, { merge: true });
    showToast('Recipe updated!');
    loadRecipes(window._userData);
  } catch(e) { showToast('Error updating recipe', 'error'); }
}

window.deleteRecipe = async function(id) {
  if (!confirm('Delete this recipe? This cannot be undone.')) return;
  try {
    const { deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    await deleteDoc(doc(db, 'recipes', id));
    showToast('Recipe deleted');
    loadRecipes(window._userData);
  } catch(e) { showToast('Error deleting recipe', 'error'); }
}

window.addRecipe = async function() {
  const name = document.getElementById('recipe-name').value.trim();
  const category = document.getElementById('recipe-category').value;
  const servings = document.getElementById('recipe-servings').value.trim();
  const price = document.getElementById('recipe-price').value.trim();
  const photoUrl = document.getElementById('recipe-photo').value.trim();
  const notes = document.getElementById('recipe-notes').value.trim();
  const restaurantId = document.getElementById('recipe-restaurant').value;
  if (!name || !restaurantId) { showToast('Recipe name and restaurant are required', 'error'); return; }
  try {
    await addDoc(collection(db, 'recipes'), { name, category, servings, price, photoUrl, notes, restaurantId, createdAt: serverTimestamp() });
    showToast('Recipe added successfully!');
    loadRecipes(window._userData);
    document.getElementById('recipe-name').value = '';
    document.getElementById('recipe-category').value = '';
    document.getElementById('recipe-servings').value = '';
    document.getElementById('recipe-price').value = '';
    document.getElementById('recipe-photo').value = '';
    document.getElementById('recipe-notes').value = '';
  } catch(e) { showToast('Error adding recipe', 'error'); }
}

let menuViewingRestaurantId = null;

window.switchMenuRestaurant = async function(restaurantId) {
  if (!restaurantId) return;
  menuViewingRestaurantId = restaurantId;
  updateMenuPreview(); return;
  // Update share link
  const linkEl = document.getElementById('menu-public-link');
  if (linkEl) linkEl.textContent = window.location.origin + '/menu/' + restaurantId;
  // Reload menu preview for selected restaurant
  const container = document.getElementById('menu-preview-container');
  if (container) container.innerHTML = '<div style="text-align:center;padding:40px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';
  // Load their settings and recipes
  try {
    const settingsDoc = await getDoc(doc(db, 'menuSettings', restaurantId));
    const settings = settingsDoc.exists() ? settingsDoc.data() : {};
    const theme = settings.theme || 'dark-stone';
    const color = settings.accentColor || '#1D9E75';
    // Get their user data
    const userDoc = await getDoc(doc(db, 'users', restaurantId));
    const clientData = userDoc.exists() ? { uid: restaurantId, ...userDoc.data() } : { uid: restaurantId, restaurantName: 'Restaurant' };
    // Load their recipes
    const recipesSnap = await getDocs(query(collection(db, 'recipes'), where('restaurantId','==', restaurantId)));
    const recipes = recipesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const catOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];
    const groups = {};
    recipes.forEach(r => { const cat = r.category||'Other'; if(!groups[cat]) groups[cat]=[]; groups[cat].push(r); });
    const sortedGroups = Object.entries(groups).sort(([a],[b]) => (catOrder.indexOf(a)===-1?99:catOrder.indexOf(a))-(catOrder.indexOf(b)===-1?99:catOrder.indexOf(b)));
    if (container) container.innerHTML = buildMenuHTML(theme, color, clientData, settings, sortedGroups);
  } catch(e) {
    console.error(e);
  }
}

async function loadPrepCategories(userData) {
  const listEl = document.getElementById('prep-categories-list');
  const alertZone = document.getElementById('critical-alert-zone');
  // Remember which categories are open
  const openPrepCats = new Set();
  document.querySelectorAll('[id^="cat-body-"]').forEach(el => {
    if (el.style.display === 'block') openPrepCats.add(el.id.replace('cat-body-',''));
  });
  const weekStart = window._weekStart;
  const today = new Date().toISOString().split('T')[0];
  const todayIdx = new Date().getDay();
  const todayCol = todayIdx === 0 ? 6 : todayIdx - 1;
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  try {
    const q = isAdmin
      ? collection(db, 'prepCategories')
      : query(collection(db, 'prepCategories'), where('restaurantId','==', userData.uid));
    const catSnap = await getDocs(q);

    if (catSnap.empty) {
      listEl.innerHTML = `
        <div style="text-align:center;padding:48px 20px;">
          <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:8px;">No prep categories yet</div>
          <div style="font-size:0.875rem;color:var(--ink-muted);">${isAdmin ? 'Add your first category above' : 'Chef Nek will set up your prep list soon'}</div>
        </div>`;
      return;
    }

    const cats = catSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.order||0) - (b.order||0));
    let criticalMissed = [];
    let html = '';

    for (const cat of cats) {
      const itemsSnap = await getDocs(
        query(collection(db, 'prepItems'),
          where('categoryId','==', cat.id))
      );
      const items = itemsSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.name||'').localeCompare(b.name||''));

      // Get checks for this week
      const checksSnap = await getDocs(
        query(collection(db, 'prepChecks'),
          where('categoryId','==', cat.id))
      );
      // Filter by weekStart in JS
      const allCheckDocs = checksSnap.docs.filter(d => d.data().weekStart === weekStart);
      const checks = {};
      allCheckDocs.forEach(d => { checks[d.data().itemId + '_' + d.data().dayIdx] = d.data(); });

      // Get approval
      const approvalSnap = await getDocs(
        query(collection(db, 'prepApprovals'),
          where('categoryId','==', cat.id))
      );
      const approvalDocs = approvalSnap.docs.filter(d => d.data().weekStart === weekStart && d.data().dayIdx === todayCol);
      const approved = approvalDocs.length > 0 ? approvalDocs[0].data() : null;

      // Check critical items for today
      items.filter(i => i.critical).forEach(i => {
        if (!checks[i.id + '_' + todayCol]) criticalMissed.push({ name: i.name, cat: cat.name });
      });

      const doneToday = items.filter(i => checks[i.id + '_' + todayCol]).length;
      const totalItems = items.length;

      html += `
        <div class="prep-category" id="prep-cat-${cat.id}">
          <div class="prep-cat-header" onclick="toggleCat('${cat.id}')">
            <div class="prep-cat-title">
              ${cat.name}
              ${items.filter(i=>i.critical).length > 0 ? `<span style="font-size:0.7rem;background:#FCEBEB;color:#A32D2D;padding:2px 8px;border-radius:20px;font-weight:500;">🚨 ${items.filter(i=>i.critical).length} critical</span>` : ''}
            </div>
            <div class="prep-cat-meta">
              <span class="prep-cat-progress" style="color:${doneToday===totalItems && totalItems>0 ? 'var(--green)' : 'var(--ink-muted)'};">${doneToday===totalItems && totalItems>0 ? '✅' : ''} ${doneToday}/${totalItems} today</span>
              ${approved ? `<span style="font-size:0.75rem;color:var(--green);font-weight:500;">✓ Approved</span>` : ''}
              <span class="prep-cat-chevron" id="chevron-${cat.id}">›</span>
            </div>
          </div>
          <div class="prep-cat-body" id="cat-body-${cat.id}" style="display:none;">
            <div class="prep-cat-assign">
              <span class="prep-cat-assign-label">Assigned to:</span>
              <span class="prep-cat-assign-name">${cat.assignedTo || 'Not assigned'}</span>
              ${isAdmin ? `<button onclick="editCatAssignee('${cat.id}','${cat.assignedTo||''}')" style="font-size:11px;padding:3px 10px;border-radius:6px;border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--ink-soft);">Edit</button>
              <button onclick="deletePrepCategory('${cat.id}')" style="font-size:11px;padding:3px 10px;border-radius:6px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;cursor:pointer;">Delete category</button>` : ''}
            </div>
            <div class="prep-header-row">
              <div style="font-size:0.75rem;font-weight:500;color:var(--ink-muted);">Item</div>
              <div class="day-header">Qty</div>
              ${days.map((d,i) => `<div class="day-header" style="${i===todayCol?'color:var(--green);font-weight:700;':''}">${d}</div>`).join('')}
            </div>
            ${items.map(item => {
              const isCritical = item.critical;
              const rowChecks = days.map((_,i) => checks[item.id+'_'+i]);
              return `
                <div class="prep-item-row ${isCritical && !checks[item.id+'_'+todayCol] ? 'critical-row' : ''}">
                  <div class="prep-item-name">
                    ${isCritical ? '<span style="font-size:0.7rem;background:#E24B4A;color:#fff;padding:1px 6px;border-radius:10px;">🚨</span>' : ''}
                    ${item.name}
                    ${isAdmin ? `<span style="margin-left:6px;display:inline-flex;gap:4px;">
                      <button onclick="editPrepItem('${item.id}','${item.name}','${item.qty||''}',${item.critical||false})" style="height:20px;padding:0 8px;border-radius:5px;border:0.5px solid var(--border);background:var(--cream);color:var(--ink-soft);font-size:10px;cursor:pointer;">Edit</button>
                      <button onclick="deletePrepItem('${item.id}')" style="height:20px;padding:0 8px;border-radius:5px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;font-size:10px;cursor:pointer;">Del</button>
                    </span>` : ''}
                  </div>
                  <div class="prep-item-qty">${item.qty||'—'}</div>
                  ${days.map((_,dayIdx) => {
                    const chk = checks[item.id+'_'+dayIdx];
                    return `<div class="day-check ${chk?'checked':''} ${dayIdx===todayCol?'today':''}" onclick="togglePrepCheck('${item.id}','${cat.id}','${cat.restaurantId}',${dayIdx},'${weekStart}',this)" title="${chk ? 'Done by '+chk.by+' at '+chk.time : ''}">
                      <svg viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>`;
                  }).join('')}
                </div>
                <div id="edit-prep-item-${item.id}" style="display:none;padding:8px 18px;background:var(--cream);border-bottom:0.5px solid var(--border);">
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
                    <input type="text" id="edit-item-name-${item.id}" value="${item.name}" class="form-input-small" placeholder="Item name">
                    <input type="text" id="edit-item-qty-${item.id}" value="${item.qty||''}" class="form-input-small" placeholder="Qty">
                  </div>
                  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;cursor:pointer;">
                      <input type="checkbox" id="edit-item-critical-${item.id}" ${item.critical?'checked':''} style="accent-color:#E24B4A;width:14px;height:14px;">
                      <span style="color:#A32D2D;font-weight:500;">🚨 Critical</span>
                    </label>
                    <button onclick="savePrepItem('${item.id}')" class="form-btn-small">Save</button>
                    <button onclick="document.getElementById('edit-prep-item-${item.id}').style.display='none'" style="height:36px;padding:0 12px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--ink-soft);font-size:0.8rem;cursor:pointer;">Cancel</button>
                  </div>
                </div>`;
            }).join('')}
            ${isAdmin ? `
            <div style="padding:10px 18px;border-top:0.5px solid var(--border);">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <input type="text" id="new-item-name-${cat.id}" class="form-input-small" placeholder="Add item (e.g. Cook chicken strips)">
                <input type="text" id="new-item-qty-${cat.id}" class="form-input-small" placeholder="Qty (e.g. 10 lbs)">
              </div>
              <div style="display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;">
                <label style="display:flex;align-items:center;gap:6px;font-size:0.8125rem;color:var(--ink-soft);cursor:pointer;">
                  <input type="checkbox" id="new-item-critical-${cat.id}" style="accent-color:#E24B4A;width:14px;height:14px;">
                  <span style="color:#A32D2D;font-weight:500;">🚨 Critical</span>
                </label>
                <button onclick="addPrepItem('${cat.id}','${cat.restaurantId}')" class="form-btn-small">+ Add item</button>
              </div>
            </div>` : ''}
            <div class="prep-cat-footer">
              <div style="font-size:0.8rem;color:var(--ink-muted);">
                ${approved ? `✓ Approved by <strong>${approved.by}</strong> at ${approved.time}` : 'Not yet approved today'}
              </div>
              ${!approved ? `
                <button class="approve-btn" onclick="approvePrepCategory('${cat.id}','${cat.restaurantId}','${weekStart}',${todayCol})" ${items.filter(i=>i.critical).some(i=>!checks[i.id+'_'+todayCol]) ? 'disabled title="Complete all critical items first"' : ''}>
                  ✓ Approve today's prep
                </button>` : `
                <span class="approved-stamp">✅ Approved for today</span>`}
            </div>
          </div>
        </div>`;
    }

    listEl.innerHTML = html;

    // Restore open categories
    openPrepCats.forEach(catId => {
      const body = document.getElementById('cat-body-'+catId);
      const chev = document.getElementById('chevron-'+catId);
      if (body) { body.style.display = 'block'; }
      if (chev) { chev.classList.add('open'); }
    });

    // Show critical alert
    if (criticalMissed.length > 0 && alertZone) {
      alertZone.innerHTML = `
        <div class="critical-alert">
          <div style="font-size:1.5rem;flex-shrink:0;">🚨</div>
          <div>
            <div style="font-size:0.9375rem;font-weight:500;color:#A32D2D;margin-bottom:6px;">${criticalMissed.length} critical item${criticalMissed.length>1?'s':''} not done today!</div>
            ${criticalMissed.map(i=>`<div style="font-size:0.8125rem;color:#A32D2D;">• ${i.name} <span style="opacity:0.7;">(${i.cat})</span></div>`).join('')}
          </div>
        </div>`;
    } else if (alertZone) {
      alertZone.innerHTML = '';
    }

  } catch(e) {
    console.error('Prep list error:', e);
    if (e.code === 'failed-precondition' || e.message.includes('index')) {
      listEl.innerHTML = `
        <div class="card" style="text-align:center;padding:32px;">
          <div style="font-size:1.1rem;font-weight:500;color:var(--ink);margin-bottom:8px;">Setting up database...</div>
          <div style="font-size:0.875rem;color:var(--ink-muted);margin-bottom:16px;">First time setup requires a moment. Please wait 30 seconds and refresh.</div>
          <button onclick="loadPrepCategories(window._userData)" class="form-btn-small">Try again</button>
        </div>`;
    } else {
      listEl.innerHTML = `
        <div class="card" style="text-align:center;padding:32px;">
          <div style="font-size:1.1rem;font-weight:500;color:var(--ink);margin-bottom:8px;">Could not load prep list</div>
          <div style="font-size:0.875rem;color:var(--ink-muted);margin-bottom:16px;">${e.message}</div>
          <button onclick="loadPrepCategories(window._userData)" class="form-btn-small">Try again</button>
        </div>`;
    }
  }
}

window.editPrepItem = function(id, name, qty, critical) {

window.savePrepItem = async function(id) {
  const name = document.getElementById('edit-item-name-' + id).value.trim();
  const qty = document.getElementById('edit-item-qty-' + id).value.trim();
  const critical = document.getElementById('edit-item-critical-' + id).checked;

    await setDoc(doc(db, 'prepItems', id), { name, qty, critical }, { merge: true });

window.deletePrepItem = async function(id) {

  try {
    const { deleteDoc: dd } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    await dd(doc(db, 'prepItems', id));
    showToast('Item deleted');

}

window.toggleCat = function(id) {
  const body = document.getElementById('cat-body-'+id);
  const chev = document.getElementById('chevron-'+id);
  const isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  chev.classList.toggle('open', !isOpen);
}

window.togglePrepCheck = async function(itemId, catId, restaurantId, dayIdx, weekStart, el) {
  const isChecked = el.classList.contains('checked');
  try {
    if (isChecked) {
      const snap = await getDocs(query(collection(db,'prepChecks'),
        where('itemId','==',itemId)));
      // filter in JS
      const toDelete = snap.docs.filter(d => d.data().dayIdx === dayIdx && d.data().weekStart === weekStart);
      for (const d of toDelete) {
        const {deleteDoc: dd} = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
        await dd(doc(db,'prepChecks',d.id));
      }
      el.classList.remove('checked');
    } else {
      const name = prompt('Your name:');
      if (!name) return;
      const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      await addDoc(collection(db,'prepChecks'),{
        itemId, catId, restaurantId, dayIdx, weekStart,
        by: name.trim(), time, checkedAt: serverTimestamp()
      });
      el.classList.add('checked');
      el.title = 'Done by '+name+' at '+time;
    }
    loadPrepCategories(window._userData);
  } catch(e) { showToast('Error updating check', 'error'); }
}

window.approvePrepCategory = async function(catId, restaurantId, weekStart, dayIdx) {

  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  try {
    await addDoc(collection(db,'prepApprovals'),{
      catId, categoryId: catId, restaurantId, weekStart, dayIdx,
      by: name.trim(), time, approvedAt: serverTimestamp()
    });
    showToast('✅ Prep approved by '+name+'!');
    loadPrepCategories(window._userData);
  } catch(e) { showToast('Error approving', 'error'); }
}

window.uploadMenuLogo = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('logo-preview');
    const img = document.getElementById('logo-preview-img');
    if (preview) preview.style.display = 'block';
    if (img) img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  showToast('Uploading logo...');
  try {
    const formData = new FormData();
    formData.append('image', file);
    const res = await fetch('https://api.imgbb.com/1/upload?key=2607f98fd74e91661681ef5b362c36f2', { method:'POST', body:formData });
    const data = await res.json();
    if (data.success) {
      menuLogoUrl = data.data.url;
      const urlInput = document.getElementById('menu-logo-url');
      if (urlInput) urlInput.value = menuLogoUrl;
      showToast('Logo uploaded!');
    }
  } catch(e) {
    const img = document.getElementById('logo-preview-img');
    if (img) menuLogoUrl = img.src;
    showToast('Logo ready!');
  }
}

window.previewLogoUrl = function(url) {
  menuLogoUrl = url;
  if (url) {
    const preview = document.getElementById('logo-preview');
    const img = document.getElementById('logo-preview-img');
    if (preview) preview.style.display = 'block';
    if (img) img.src = url;
  }
}

// ── LIVE PREVIEW UPDATE ──
window.updateMenuPreview = async function() {
  const selectEl = document.getElementById('menu-restaurant-select');
  const restaurantId = (isAdmin && selectEl && selectEl.value) ? selectEl.value : window._userData.uid;
  if (!restaurantId) return;
  const container = document.getElementById('menu-preview-container');
  if (!container) return;
  try {
    const settingsDoc = await getDoc(doc(db, 'menuSettings', restaurantId));
    const settings = settingsDoc.exists() ? settingsDoc.data() : {};
    const theme = window._selectedTheme || settings.theme || 'dark-stone';
    const color = menuAccentColor || settings.accentColor || '#1D9E75';
    const userDoc = await getDoc(doc(db, 'users', restaurantId));
    const clientData = userDoc.exists() ? { uid: restaurantId, ...userDoc.data() } : { uid: restaurantId, restaurantName: 'Restaurant' };
    const recipesSnap = await getDocs(query(collection(db, 'recipes'), where('restaurantId','==', restaurantId)));
    const recipes = recipesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const catOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];
    const groups = {};
    recipes.forEach(r => { const cat = r.category||'Other'; if(!groups[cat]) groups[cat]=[]; groups[cat].push(r); });
    const sortedGroups = Object.entries(groups).sort(([a],[b]) => (catOrder.indexOf(a)===-1?99:catOrder.indexOf(a))-(catOrder.indexOf(b)===-1?99:catOrder.indexOf(b)));
    container.innerHTML = buildMenuHTML(theme, color, clientData, settings, sortedGroups);
  } catch(e) { console.error('Preview update error:', e); }
}

    el.style.borderColor = 'var(--border)';

  if (el) { el.style.borderColor = 'var(--green)'; el.style.background = 'var(--green-light)'; }

}

async function loadMenuDesign(userData) {
  const container = document.getElementById('menu-preview-container');
  const restaurantId = userData.uid;

  try {
    // Load settings
    const settingsDoc = await getDoc(doc(db, 'menuSettings', restaurantId));
    const settings = settingsDoc.exists() ? settingsDoc.data() : {};
    const color = settings.accentColor || '#1D9E75';
    menuAccentColor = color;
    const theme = settings.theme || 'dark-stone';
    window._selectedTheme = theme;
    // Highlight selected theme
    setTimeout(() => { if(window.selectTheme) window.selectTheme(theme); }, 100);

    // Pre-fill settings form
    if (document.getElementById('menu-tagline')) document.getElementById('menu-tagline').value = settings.tagline || '';
    if (document.getElementById('menu-address')) document.getElementById('menu-address').value = settings.address || '';
    if (document.getElementById('menu-phone')) document.getElementById('menu-phone').value = settings.phone || '';
    if (document.getElementById('menu-hours')) document.getElementById('menu-hours').value = settings.hours || '';
    if (document.getElementById('menu-instagram')) document.getElementById('menu-instagram').value = settings.instagram || '';
    if (document.getElementById('menu-hero-photo')) document.getElementById('menu-hero-photo').value = settings.heroPhoto || '';

    // Highlight selected color
    const colorEl = document.getElementById('color-'+color.replace('#',''));
    if (colorEl) { colorEl.style.border = '3px solid var(--ink)'; colorEl.style.transform = 'scale(1.2)'; }

    // Load recipes
    const recipesSnap = await getDocs(
      query(collection(db, 'recipes'), where('restaurantId','==', restaurantId))
    );
    const recipes = recipesSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    if (recipes.length === 0) {
      container.innerHTML = `
        <div class="menu-preview" style="padding:40px;text-align:center;">
          <div style="font-size:2rem;margin-bottom:12px;">🍽️</div>
          <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:8px;">No recipes yet</div>
          <div style="font-size:0.875rem;color:var(--ink-muted);">Add recipes to your recipe book first — they'll appear here automatically</div>
        </div>`;
      return;
    }

    // Group by category
    const catOrder = ['Wraps','Salads','Breakfast','Sandwiches','Burgers','Mains','Sides','Sauces','Vegan','Vegetarian','Desserts','Drinks'];
    const groups = {};
    recipes.forEach(r => {
      const cat = r.category || 'Other';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(r);
    });
    const sortedGroups = Object.entries(groups).sort(([a],[b]) => {
      return (catOrder.indexOf(a)===-1?99:catOrder.indexOf(a)) - (catOrder.indexOf(b)===-1?99:catOrder.indexOf(b));
    });

    // Build menu HTML based on theme
    const menuHTML = buildMenuHTML(theme, color, userData, settings, sortedGroups);
    container.innerHTML = menuHTML;



  } catch(e) {
    console.error(e);
    container.innerHTML = `<div class="card"><p style="color:var(--ink-muted);">Error loading menu. Please refresh.</p></div>`;
  }
}

// ── INVENTORY SEARCH + FILTER ──
let invActiveFilter = 'all';
let invSearchTerm = '';

window.setInvFilter = function(filter) {
  invActiveFilter = filter;
  const btns = ['all','frozen','low','out','ok'];
  btns.forEach(f => {
    const btn = document.getElementById('inv-filter-'+f);
    if (!btn) return;
    const isActive = f === filter;
    btn.style.background = isActive ? 'var(--green)' : 'var(--white)';
    btn.style.color = isActive ? '#fff' : 'var(--ink-soft)';
    btn.style.borderColor = isActive ? 'var(--green)' : 'var(--border)';
    btn.style.fontWeight = isActive ? '500' : '400';
  });
  applyInvFilter();
}

window.filterInventory = function() {
  invSearchTerm = document.getElementById('inv-search').value.toLowerCase().trim();
  const clearBtn = document.getElementById('inv-search-clear');
  if (clearBtn) clearBtn.style.display = invSearchTerm ? 'block' : 'none';
  applyInvFilter();
}

window.clearInvSearch = function() {
  document.getElementById('inv-search').value = '';
  invSearchTerm = '';
  document.getElementById('inv-search-clear').style.display = 'none';
  applyInvFilter();
}

function applyInvFilter() {
  const categories = document.querySelectorAll('.inv-category');
  let totalVisible = 0;

  categories.forEach(cat => {
    const rows = cat.querySelectorAll('.inv-item-row');
    let catVisible = 0;

    rows.forEach(row => {
      const name = row.querySelector('.inv-item-name') ? row.querySelector('.inv-item-name').textContent.toLowerCase() : '';
      const isFrozen = row.querySelector('.inv-item-name') && row.querySelector('.inv-item-name').parentElement.innerHTML.includes('❄️');
      const isOut = row.classList.contains('critical-stock');
      const isLow = row.classList.contains('low-stock');
      const isOk = !isOut && !isLow;

      const matchesSearch = !invSearchTerm || name.includes(invSearchTerm);
      const matchesFilter =
        invActiveFilter === 'all' ||
        (invActiveFilter === 'frozen' && isFrozen) ||
        (invActiveFilter === 'out' && isOut) ||
        (invActiveFilter === 'low' && (isLow || isOut)) ||
        (invActiveFilter === 'ok' && isOk);

      const visible = matchesSearch && matchesFilter;
      row.style.display = visible ? '' : 'none';
      if (visible) catVisible++;
    });

    totalVisible += catVisible;

    // Show/hide category based on matches
    const body = cat.querySelector('[id^="inv-cat-body-"]');
    if (invSearchTerm || invActiveFilter !== 'all') {
      cat.style.display = catVisible > 0 ? '' : 'none';
      if (body && catVisible > 0) body.style.display = 'block';
      // Update chevron
      const chev = cat.querySelector('[id^="inv-chevron-"]');
      if (chev && catVisible > 0) chev.classList.add('open');
    } else {
      cat.style.display = '';
    }
  });

  // Update results label
  const label = document.getElementById('inv-search-results-label');
  if (label) {
    if (invSearchTerm || invActiveFilter !== 'all') {
      label.style.display = 'block';
      label.textContent = totalVisible + ' item' + (totalVisible !== 1 ? 's' : '') + ' found' + (invSearchTerm ? ' for "' + invSearchTerm + '"' : '') + (invActiveFilter !== 'all' ? ' · ' + invActiveFilter + ' filter active' : '');
    } else {
      label.style.display = 'none';
    }
  }
}

                <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;cursor:pointer;">

                  <span style="color:#185FA5;font-weight:500;">❄️ Frozen item</span>
                </label>
                <button onclick="addInvItem('${cat.id}','${cat.restaurantId}')" class="form-btn-small">+ Add item</button>
              </div>
            </div>` : ''}
          </div>
        </div>`;
    }

    listEl.innerHTML = html;

    // Restore open categories
    openInvCats.forEach(catId => {
      const body = document.getElementById('inv-cat-body-'+catId);
      const chev = document.getElementById('inv-chevron-'+catId);
      if (body) { body.style.display = 'block'; }
      if (chev) { chev.classList.add('open'); }
    });

    // Show low stock alert banner
    if (lowStockAlerts.length > 0 && alertZone) {
      alertZone.innerHTML = `
        <div style="background:var(--amber-light);border:1px solid #FAC775;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px;">
          <div style="font-size:1.5rem;flex-shrink:0;">⚠️</div>
          <div>
            <div style="font-size:0.9375rem;font-weight:500;color:#854F0B;margin-bottom:6px;">${lowStockAlerts.length} item${lowStockAlerts.length>1?'s':''} need restocking!</div>
            ${lowStockAlerts.map(i=>`<div style="font-size:0.8125rem;color:#854F0B;">• ${i.name} <span style="opacity:0.7;">(${i.cat}) — ${i.qty} ${i.unit||''} left</span></div>`).join('')}
          </div>
        </div>`;
    } else if (alertZone) {
      alertZone.innerHTML = '';
    }

  } catch(e) {
    console.error(e);
    listEl.innerHTML = `<div class="card"><p style="color:var(--ink-muted);">Error loading inventory. Please refresh.</p></div>`;
  }
}

window.toggleInvCat = function(id) {
  const body = document.getElementById('inv-cat-body-'+id);
  const chev = document.getElementById('inv-chevron-'+id);
  const isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  chev.classList.toggle('open', !isOpen);
}

window.updateInvQty = async function(itemId, newQty) {
  if (newQty < 0) return;
  try {
    await setDoc(doc(db, 'invItems', itemId), { currentQty: newQty }, { merge: true });
    loadInvCategories(window._userData);
  } catch(e) { showToast('Error updating quantity', 'error'); }
}

window.addInvItem = async function(catId, restaurantId) {
  const name = document.getElementById('new-inv-item-name-'+catId).value.trim();
  const unit = document.getElementById('new-inv-item-unit-'+catId).value.trim();
  const currentQty = parseFloat(document.getElementById('new-inv-item-qty-'+catId).value) || 0;
  const alertAt = parseFloat(document.getElementById('new-inv-item-alert-'+catId).value) || 0;
  const frozen = document.getElementById('new-inv-item-frozen-'+catId) ? document.getElementById('new-inv-item-frozen-'+catId).checked : false;
  if (!name) { showToast('Item name required', 'error'); return; }
  try {
    await addDoc(collection(db, 'invItems'), {
      name, unit, currentQty, alertAt, frozen, categoryId: catId, restaurantId, createdAt: serverTimestamp()
    });
    showToast('Item added!');
    document.getElementById('new-inv-item-name-'+catId).value = '';
    document.getElementById('new-inv-item-unit-'+catId).value = '';
    document.getElementById('new-inv-item-qty-'+catId).value = '';
    document.getElementById('new-inv-item-alert-'+catId).value = '';
    if (document.getElementById('new-inv-item-frozen-'+catId)) document.getElementById('new-inv-item-frozen-'+catId).checked = false;
    loadInvCategories(window._userData);
  } catch(e) { showToast('Error adding item', 'error'); }
}

window.editInvItem = function(id) {
  const form = document.getElementById('edit-inv-item-'+id);
  if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

window.saveInvItem = async function(id) {
  const name = document.getElementById('edit-inv-name-'+id).value.trim();
  const unit = document.getElementById('edit-inv-unit-'+id).value.trim();
  const alertAt = parseFloat(document.getElementById('edit-inv-alert-'+id).value) || 0;
  const frozen = document.getElementById('edit-inv-frozen-'+id) ? document.getElementById('edit-inv-frozen-'+id).checked : false;
  if (!name) { showToast('Item name required', 'error'); return; }
  try {
    await setDoc(doc(db, 'invItems', id), { name, unit, alertAt, frozen }, { merge: true });
    showToast('Item updated!');
    loadInvCategories(window._userData);
  } catch(e) { showToast('Error updating item', 'error'); }
}

window.deleteInvItem = async function(id) {
  if (!confirm('Delete this item?')) return;
  try {
    const { deleteDoc: dd } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    await dd(doc(db, 'invItems', id));
    showToast('Item deleted');
    loadInvCategories(window._userData);

}

window.deleteInvCategory = async function(catId) {

    const { deleteDoc: dd } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');

    await setDoc(doc(db, 'inventory', itemId), { currentQty: newQty }, { merge: true });

// CLIENTS PAGE (ADMIN ONLY)
// ============================================
function renderClients(main, userData) {
  main.innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Manage clients</h1>
      <p class="page-sub">Add and manage your restaurant clients</p>
    </div>
    <div class="page-body">
      <div class="card">
        <div class="card-title">Add new client</div>
        <div class="add-client-form">
          <input type="text" id="client-restaurant" class="form-input-small" placeholder="Restaurant name">
          <input type="text" id="client-owner" class="form-input-small" placeholder="Owner name">
          <input type="email" id="client-email" class="form-input-small" placeholder="Email address">
          <input type="password" id="client-password" class="form-input-small" placeholder="Temporary password">
        </div>
        <button class="form-btn-small" style="margin-top:10px;" id="add-client-btn" onclick="addClient()">Create client account</button>
      </div>
      <div class="card">
        <div class="card-title">Your clients</div>
        <div id="clients-list">
          <div class="loading-spinner" style="margin:0 auto;"></div>
        </div>
      </div>
    </div>
  `;
  loadClients();
}

async function loadClients() {
  const list = document.getElementById('clients-list');
  try {
    const snap = await getDocs(collection(db, 'users'));
    const clients = snap.docs.filter(d => !d.data().isAdmin).map(d => ({ id: d.id, ...d.data() }));
    if (clients.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-state-title">No clients yet</div><div class="empty-state-sub">Add your first client above</div></div>`;
      return;
    }
    list.innerHTML = `
      <table class="client-table">
        <thead><tr>
          <th>Restaurant</th><th>Owner</th><th>Email</th><th>Status</th>
        </tr></thead>
        <tbody>
          ${clients.map(c => `
            <tr>
              <td class="client-name-cell">${c.restaurantName || '—'}</td>
              <td>${c.ownerName || '—'}</td>
              <td>${c.email || '—'}</td>
              <td><span class="status-badge ${c.status === 'new' ? 'status-new' : 'status-active'}">${c.status || 'Active'}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    list.innerHTML = `<p style="color:var(--ink-muted);">Error loading clients.</p>`;
  }
}

window.addClient = async function() {
  const restaurantName = document.getElementById('client-restaurant').value.trim();
  const ownerName = document.getElementById('client-owner').value.trim();
  const email = document.getElementById('client-email').value.trim();
  const password = document.getElementById('client-password').value.trim();
  if (!restaurantName || !email || !password) { showToast('Restaurant name, email and password required', 'error'); return; }
  const btn = document.getElementById('add-client-btn');
  btn.disabled = true; btn.textContent = 'Creating...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, 'users', cred.user.uid), {
      restaurantName, ownerName, email, isAdmin: false,
      status: 'new', createdAt: serverTimestamp()
    });
    await signInWithEmailAndPassword(auth, ADMIN_EMAIL, window._adminPassword);
    showToast('Account created for ' + restaurantName + '!');
    loadClients();
    document.getElementById('client-restaurant').value = '';
    document.getElementById('client-owner').value = '';
    document.getElementById('client-email').value = '';
    document.getElementById('client-password').value = '';
  } catch(e) {
    showToast(e.message, 'error');
  }
  btn.disabled = false; btn.textContent = 'Create client account';
}

// ============================================
// LOAD RESTAURANTS FOR SELECT DROPDOWNS
// ============================================
async function loadRestaurantsForSelect(selectId) {
  const select = document.getElementById(selectId);
  if (!select) return;
  try {
    const snap = await getDocs(collection(db, 'users'));
    const clients = snap.docs.filter(d => !d.data().isAdmin);
    clients.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.data().restaurantName || d.data().email;
      select.appendChild(opt);
    });
  } catch(e) {}
}

// ============================================
// AUTH HANDLERS
// ============================================
window.handleLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value.trim();
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!email || !password) { errorEl.textContent = 'Please enter your email and password.'; errorEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  errorEl.style.display = 'none';
  try {
    window._adminPassword = password;
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    errorEl.textContent = 'Incorrect email or password. Please try again.';
    errorEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

window.handleRegister = async function() {
  const restaurantName = document.getElementById('reg-restaurant').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value.trim();
  const errorEl = document.getElementById('reg-error');
  const btn = document.getElementById('reg-btn');
  if (!restaurantName || !email || !password) { errorEl.textContent = 'All fields are required.'; errorEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Creating account...';
  errorEl.style.display = 'none';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, 'users', cred.user.uid), {
      restaurantName, email, isAdmin: false,
      status: 'new', createdAt: serverTimestamp()
    });
  } catch(e) {
    errorEl.textContent = e.message;
    errorEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Create account';
  }
}


window.handleForgotPassword = async function() {
  const email = document.getElementById('reset-email').value.trim();
  const errorEl = document.getElementById('reset-error');
  const successEl = document.getElementById('reset-success');
  const btn = document.getElementById('reset-btn');
  if (!email || !email.includes('@')) {
    errorEl.textContent = 'Please enter a valid email address.';
    errorEl.style.display = 'block';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Sending...';
  errorEl.style.display = 'none';
  try {
    await sendPasswordResetEmail(auth, email);
    successEl.style.display = 'block';
    btn.textContent = 'Email sent!';
    btn.style.background = 'var(--green-dark)';
  } catch(e) {
    errorEl.textContent = 'No account found with that email. Please check and try again.';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
}

window.handleSignOut = async function() {
  await signOut(auth);
  currentPage = 'dashboard';
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

window.printPage = function(type) {
  const titles = {
    recipes: 'Recipe Book',
    preplist: "Today's Prep List",
    inventory: 'Inventory List'
  };
  const restaurantName = window._userData ? (window._userData.restaurantName || '') : '';
  const date = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  // Add print header temporarily
  const header = document.createElement('div');
  header.className = 'print-header';
  header.id = 'temp-print-header';

    <div style="text-align:center;padding:0 0 20px;border-bottom:2px solid #1D9E75;margin-bottom:20px;">

      <div style="font-size:1.1rem;color:#1D9E75;margin:4px 0;">${restaurantName}</div>
      <div style="font-size:0.875rem;color:#8A8A7A;">${titles[type]} — ${date}</div>
    </div>

}

// ============================================
// PWA INSTALL PROMPT
// ============================================
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  const existing = document.getElementById('install-banner');
  if (existing) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:14px 20px;border-radius:14px;display:flex;align-items:center;gap:14px;font-family:var(--font-body);font-size:0.875rem;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,0.3);max-width:340px;width:90%;';
  banner.innerHTML = `
    <div>
      <div style="font-weight:500;margin-bottom:2px;">Install Chef Nek Pro</div>
      <div style="font-size:0.8rem;color:rgba(255,255,255,0.6);">Add to your home screen for quick access</div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <button onclick="installApp()" style="height:34px;padding:0 14px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:0.8rem;font-weight:500;cursor:pointer;">Install</button>
      <button onclick="document.getElementById('install-banner').remove()" style="height:34px;padding:0 10px;background:rgba(255,255,255,0.1);color:#fff;border:none;border-radius:8px;font-size:0.8rem;cursor:pointer;">✕</button>
    </div>
  `;
  document.body.appendChild(banner);
}

window.installApp = async function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner')?.remove();
  if (outcome === 'accepted') showToast('Chef Nek Pro installed! Check your home screen.');
}

window.addEventListener('appinstalled', () => {
  showToast('Chef Nek Pro installed successfully!');
  document.getElementById('install-banner')?.remove();
});

// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

// ============================================
// AUTH STATE LISTENER — app entry point
// ============================================
onAuthStateChanged(auth, async (user) => {
  // Safety timeout — if loading takes more than 8 seconds, show login
  const loadingTimeout = setTimeout(() => {
    const root = document.getElementById('root');
    if (root && root.querySelector('.loading-screen')) {
      console.log('Loading timeout — showing login');
      renderLogin();
    }
  }, 8000);

  if (user) {
    currentUser = user;
    try {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      let userData;
      if (userDoc.exists()) {
        userData = { uid: user.uid, email: user.email, ...userDoc.data() };
      } else {
        userData = { uid: user.uid, email: user.email, restaurantName: 'Chef Nek Admin', isAdmin: true };
        await setDoc(doc(db, 'users', user.uid), { email: user.email, isAdmin: true, restaurantName: 'Chef Nek Admin' });
      }
      clearTimeout(loadingTimeout);
      isAdmin = userData.isAdmin || user.email === ADMIN_EMAIL;
      renderApp(userData);
    } catch(e) {
      renderLogin();
    }
  } else {
    currentUser = null;
    renderLogin();
  }
});
