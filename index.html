    list.innerHTML = '<div style="text-align:center;padding:16px;background:var(--cream);border-radius:10px;border:2px dashed var(--border);font-size:0.82rem;color:var(--ink-muted);">No ingredients yet — click "+ Add" to start</div>';
    return;
  }
  list.innerHTML = window._fcIngredients.map((ing, i) => `
    <div style="display:grid;grid-template-columns:1fr 110px auto;gap:8px;align-items:center;">
      <input type="text" value="${(ing.name||'').replace(/"/g,'&quot;')}" onchange="window._fcIngredients[${i}].name=this.value"
        class="form-input-small" placeholder="Ingredient name (e.g. Chicken breast)">
      <div style="position:relative;">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:0.85rem;color:var(--ink-muted);pointer-events:none;">$</span>
        <input type="number" value="${ing.cost||''}" step="0.01" min="0"
          onchange="window._fcIngredients[${i}].cost=parseFloat(this.value)||0;recalcFoodCost()"
          class="form-input-small" style="padding-left:24px;width:100%;" placeholder="0.00">
      </div>
      <button onclick="removeIngRow(${i})" style="width:32px;height:36px;border-radius:8px;border:0.5px solid #F09595;background:#FCEBEB;color:#A32D2D;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;">×</button>
    </div>`).join('');
}

window.addIngredientRow = function() {
  if (!window._fcIngredients) window._fcIngredients = [];
  window._fcIngredients.push({name:'', cost:0});
  renderIngRows();
  // Focus the new name input
  const inputs = document.querySelectorAll('#fc-ing-list input[type="text"]');
  if (inputs.length) inputs[inputs.length-1].focus();
}

window.removeIngRow = function(idx) {
  window._fcIngredients.splice(idx, 1);
  renderIngRows();
  recalcFoodCost();
}

window.recalcFoodCost = function() {
  const resultCard = document.getElementById('fc-result-card');
  if (!resultCard) return;
  const selling = parseFloat(document.getElementById('fc-selling-price')?.value) || 0;
  const ingredientCost = (window._fcIngredients||[]).reduce((s,i)=>s+(parseFloat(i.cost)||0),0);
  const labor    = parseFloat(document.getElementById('fc-labor')?.value)     || 0;
  const gas      = parseFloat(document.getElementById('fc-gas')?.value)       || 0;
  const packaging= parseFloat(document.getElementById('fc-packaging')?.value) || 0;
  const rent     = parseFloat(document.getElementById('fc-rent')?.value)      || 0;
  const other    = parseFloat(document.getElementById('fc-other')?.value)     || 0;
  const overheadTotal = labor + gas + packaging + rent + other;
  const totalCost = ingredientCost + overheadTotal;
  const foodCostPct = selling > 0 ? (totalCost/selling*100) : null;
  const profit = selling > 0 ? selling - totalCost : null;
  const status = foodCostPct === null ? null : foodCostPct <= 35 ? (foodCostPct<=28?'great':'ok') : 'high';
  const colors = { great:['#0A6B3A','#E0F5EC','Great margin! You are well within target.'],
                   ok:   ['#B5860A','#FFF8E1','Good — watch your costs to stay in target.'],
                   high: ['#A32D2D','#FCEBEB','Food cost too high! Reduce ingredients or raise price.'] };

  if (!selling) {
    resultCard.innerHTML = '<div style="text-align:center;font-size:0.82rem;color:var(--ink-muted);">Enter a selling price to see your food cost</div>';
    return;
  }

  const [color, bg, tip] = colors[status] || ['var(--ink-muted)','var(--cream)','Add a selling price above'];
  resultCard.style.background = bg;
  resultCard.style.borderColor = color;
  resultCard.innerHTML = '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">'
    // Big % circle
    + '<div style="width:80px;height:80px;border-radius:50%;border:3px solid '+color+';display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">'
    + '<div style="font-size:1.4rem;font-weight:900;color:'+color+';line-height:1;">'+(foodCostPct!==null?foodCostPct.toFixed(1)+'%':'?')+'</div>'
    + '<div style="font-size:0.58rem;color:'+color+';font-weight:600;">FOOD COST</div>'
    + '</div>'
    // Numbers breakdown
    + '<div style="flex:1;">'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;">'
    + '<div style="text-align:center;padding:8px;background:rgba(255,255,255,0.6);border-radius:8px;">'
    + '<div style="font-size:0.62rem;color:var(--ink-muted);text-transform:uppercase;margin-bottom:2px;">Selling</div>'
    + '<div style="font-size:0.95rem;font-weight:700;color:var(--ink);">$'+selling.toFixed(2)+'</div></div>'
    + '<div style="text-align:center;padding:8px;background:rgba(255,255,255,0.6);border-radius:8px;">'
    + '<div style="font-size:0.62rem;color:var(--ink-muted);text-transform:uppercase;margin-bottom:2px;">Cost</div>'
    + '<div style="font-size:0.95rem;font-weight:700;color:'+color+';">$'+totalCost.toFixed(2)+'</div></div>'
    + '<div style="text-align:center;padding:8px;background:rgba(255,255,255,0.6);border-radius:8px;">'
    + '<div style="font-size:0.62rem;color:var(--ink-muted);text-transform:uppercase;margin-bottom:2px;">Profit</div>'
    + '<div style="font-size:0.95rem;font-weight:700;color:#0A6B3A;">$'+(profit!==null?profit.toFixed(2):'0.00')+'</div></div>'
    + '</div>'
    // Tip
    + '<div style="font-size:0.75rem;color:'+color+';font-weight:500;">'+tip+'</div>'
    + '</div></div>'
    // Progress bar
    + '<div style="margin-top:12px;">'
    + '<div style="display:flex;justify-content:space-between;font-size:0.65rem;color:var(--ink-muted);margin-bottom:4px;"><span>0%</span><span style="color:#0A6B3A;font-weight:600;">Target: 28–35%</span><span>50%</span></div>'
    + '<div style="height:8px;background:#E0E0E0;border-radius:4px;overflow:hidden;position:relative;">'
    + '<div style="position:absolute;left:0;top:0;bottom:0;width:28%;background:rgba(10,107,58,0.15);"></div>'
    + '<div style="position:absolute;left:28%;top:0;bottom:0;width:7%;background:rgba(10,107,58,0.25);border-right:2px dashed #0A6B3A;"></div>'
    + '<div style="height:100%;width:'+Math.min(foodCostPct||0,100)+'%;background:'+color+';border-radius:4px;transition:width 0.4s;"></div>'
    + '</div></div>';
}

window.resetOverhead = function() {
  const defaults = {labor:1.50, gas:0.50, packaging:0.30, rent:0.75, other:0};
  Object.entries(defaults).forEach(([key,val]) => {
    const el = document.getElementById('fc-'+key);
    if (el) el.value = val;
  });
  recalcFoodCost();
  showToast('Overhead reset to defaults');
}

window.saveFoodCostRecipe = async function(recipeId) {
  const name = document.getElementById('fc-recipe-name')?.value.trim();
  const category = document.getElementById('fc-recipe-cat')?.value.trim() || 'General';
  const sellingPrice = parseFloat(document.getElementById('fc-selling-price')?.value) || 0;
  if (!name) { showToast('Recipe name required','error'); return; }
  const ingredients = (window._fcIngredients||[]).filter(i=>i.name||i.cost);
  const totalCost = ingredients.reduce((s,i)=>s+(parseFloat(i.cost)||0),0);
  const rid = currentRestaurantId();
  const btn = document.getElementById('fc-save-btn');
  if (btn) { btn.textContent='Saving...'; btn.disabled=true; }
  try {
    const overhead = {
      labor:    parseFloat(document.getElementById('fc-labor')?.value)     || 0,
      gas:      parseFloat(document.getElementById('fc-gas')?.value)       || 0,
      packaging:parseFloat(document.getElementById('fc-packaging')?.value) || 0,
      rent:     parseFloat(document.getElementById('fc-rent')?.value)      || 0,
      other:    parseFloat(document.getElementById('fc-other')?.value)     || 0,
    };
    const overheadTotal = Object.values(overhead).reduce((s,v)=>s+v,0);
    const ingredientCost = ingredients.reduce((s,i)=>s+(parseFloat(i.cost)||0),0);
    const totalCost = ingredientCost + overheadTotal;
    const data = { name, category, sellingPrice, ingredients, ingredientCost, overhead, overheadTotal, totalCost, restaurantId:rid, updatedAt:serverTimestamp() };
    if (recipeId) {
      await setDoc(doc(db,'foodCostRecipes',recipeId), data, {merge:true});
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db,'foodCostRecipes'), data);
    }
    showToast('Recipe saved!');
    document.getElementById('fc-recipe-modal')?.remove();
    loadFoodCostRecipes(window._userData);
  } catch(e) {
    showToast('Error saving','error');
    if (btn) { btn.textContent='Save recipe'; btn.disabled=false; }
  }
}

window.deleteFoodCostRecipe = async function(recipeId) {
  if (!confirm('Delete this recipe?')) return;
  try {
    await deleteDoc(doc(db,'foodCostRecipes',recipeId));
    showToast('Deleted!');
    loadFoodCostRecipes(window._userData);
  } catch(e) { showToast('Error','error'); }
}

window._tlDate = new Date().toISOString().split('T')[0];
window._tlSession = 'AM';

window.changeTempDate = function(delta) {
  const d = new Date(window._tlDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  window._tlDate = d.toISOString().split('T')[0];
  const display = document.getElementById('tl-date-display');
  if (display) display.textContent = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  loadTempLogData();
}

window.switchTempSession = function(session) {
  window._tlSession = session;
  ['AM','PM','EVE'].forEach(s => {
    const btn = document.getElementById('tl-tab-'+s.toLowerCase());
    if (!btn) return;
    const active = s === session;
    btn.style.background = active ? 'var(--white)' : 'transparent';
    btn.style.color = active ? 'var(--ink)' : 'var(--ink-muted)';
    btn.style.fontWeight = active ? '600' : '400';
  });
  loadTempLogData();
}

async function loadTempLogData() {
  const rid = currentRestaurantId();
  const grid = document.getElementById('tl-equipment-grid');
  const foodChecks = document.getElementById('tl-food-checks');
  if (!grid) return;

  grid.innerHTML = '<div style="text-align:center;padding:20px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';

  try {
    // Load custom equipment or use defaults
    const equipSnap = await getDocs(query(collection(db,'tempEquipment'), where('restaurantId','==',rid)));
    const equipment = equipSnap.empty
      ? DEFAULT_EQUIPMENT
      : equipSnap.docs.map(d=>({...d.data(),id:d.id}));

    // Load today's readings for this session
    const readingsSnap = await getDocs(query(
      collection(db,'tempReadings'),
      where('restaurantId','==',rid),
      where('date','==',window._tlDate),
      where('session','==',window._tlSession)
    ));
    const readings = {};
    readingsSnap.docs.forEach(d => { const r=d.data(); readings[r.equipmentId]=r; });

    // Compliance check
    let allGood = true;
    let checked = 0;

    grid.innerHTML = '';
    equipment.forEach(eq => {
      const reading = readings[eq.id];
      const temp = reading?.temp;
      const isRecorded = temp !== undefined && temp !== null;
      if (isRecorded) checked++;

      let status = 'pending';
      let statusColor = 'var(--ink-muted)';
      let statusBg = 'var(--cream)';
      let statusLabel = 'Not recorded';

      if (isRecorded) {
        const t = parseFloat(temp);
        if (eq.type === 'cold') {
          if (t <= eq.max) { status='safe'; statusColor='#185FA5'; statusBg='#EEF4FF'; statusLabel='✓ Safe'; }
          else { status='danger'; statusColor='#A32D2D'; statusBg='#FCEBEB'; statusLabel='🚨 TOO HIGH'; allGood=false; }
        } else {
          if (t >= eq.min) { status='safe'; statusColor='#0A6B3A'; statusBg='#E0F5EC'; statusLabel='✓ Safe'; }
          else { status='danger'; statusColor='#A32D2D'; statusBg='#FCEBEB'; statusLabel='🚨 TOO LOW'; allGood=false; }
        }
      }

      const card = document.createElement('div');
      card.style.cssText = 'background:var(--white);border-radius:16px;border:1.5px solid '+(status==='danger'?'#E24B4A':status==='safe'?'var(--green)':'var(--border)')+';padding:16px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;transition:border-color 0.2s;';

      // Left — icon + name
      card.innerHTML = '<div style="display:flex;align-items:center;gap:12px;flex:1;min-width:150px;">'
        + '<div style="width:48px;height:48px;border-radius:12px;background:'+statusBg+';display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">'+eq.icon+'</div>'
        + '<div><div style="font-weight:700;color:var(--ink);">'+eq.name+'</div>'
        + '<div style="font-size:0.75rem;color:var(--ink-muted);">Target: '+eq.target+'°F · Range: '+eq.min+'–'+eq.max+'°F</div></div>'
        + '</div>';

      // Middle — temp input
      const inputWrap = document.createElement('div');
      inputWrap.style.cssText = 'display:flex;align-items:center;gap:8px;flex-shrink:0;';

      const tempInput = document.createElement('input');
      tempInput.type = 'number';
      tempInput.id = 'tl-input-'+eq.id;
      tempInput.value = isRecorded ? temp : '';
      tempInput.placeholder = eq.target+'°F';
      tempInput.style.cssText = 'width:90px;height:44px;border-radius:10px;border:1.5px solid var(--border);font-family:var(--font-body);font-size:1.1rem;font-weight:700;text-align:center;outline:none;color:var(--ink);';
      tempInput.oninput = () => {
        const val = parseFloat(tempInput.value);
        if (isNaN(val)) return;
        const isSafe = eq.type==='cold' ? val<=eq.max : val>=eq.min;
        tempInput.style.borderColor = isSafe ? 'var(--green)' : '#E24B4A';
        tempInput.style.color = isSafe ? 'var(--green-dark)' : '#A32D2D';
      };

      const unit = document.createElement('span');
      unit.textContent = '°F';
      unit.style.cssText = 'font-size:0.875rem;color:var(--ink-muted);font-weight:500;';
      inputWrap.appendChild(tempInput);
      inputWrap.appendChild(unit);
      card.appendChild(inputWrap);

      // Right — status badge + save button
      const right = document.createElement('div');
      right.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;gap:6px;';

      const badge = document.createElement('span');
      badge.style.cssText = 'font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:100px;background:'+statusBg+';color:'+statusColor+';white-space:nowrap;';
      badge.textContent = statusLabel;
      right.appendChild(badge);

      if (reading?.by) {
        const by = document.createElement('div');
        by.style.cssText = 'font-size:0.68rem;color:var(--ink-muted);';
        by.textContent = 'By ' + reading.by + ' · ' + (reading.time||'');
        right.appendChild(by);
      }

      const saveBtn = document.createElement('button');
      saveBtn.textContent = isRecorded ? 'Update' : 'Log temp';
      saveBtn.style.cssText = 'height:34px;padding:0 14px;border-radius:8px;background:var(--green);color:#fff;border:none;font-family:var(--font-body);font-size:0.8rem;font-weight:600;cursor:pointer;';
      saveBtn.onclick = () => saveTempReading(eq.id, eq.name, eq.type, eq.min, eq.max);
      right.appendChild(saveBtn);
      card.appendChild(right);
      grid.appendChild(card);
    });

    // Compliance badge
    const badge = document.getElementById('tl-compliance-badge');
    if (badge) {
      const total = equipment.length;
      if (checked === 0) {
        badge.style.background = 'rgba(255,255,255,0.1)';
        badge.style.color = 'rgba(255,255,255,0.5)';
        badge.textContent = 'Not started';
      } else if (!allGood) {
        badge.style.background = 'rgba(226,75,74,0.2)';
        badge.style.color = '#F87171';
        badge.textContent = '🚨 Temp violation!';
      } else if (checked < total) {
        badge.style.background = 'rgba(242,166,35,0.2)';
        badge.style.color = '#FBBF24';
        badge.textContent = checked + '/' + total + ' logged';
      } else {
        badge.style.background = 'rgba(10,107,58,0.3)';
        badge.style.color = '#4ADE80';
        badge.textContent = '✓ All compliant';
      }
    }

    // Load food spot checks
    loadFoodTempChecks(rid, readings);

    // Load 7-day history
    loadTempHistory(rid);

  } catch(e) {
    console.error(e);
    if (grid) grid.innerHTML = '<div class="card"><p style="color:var(--ink-muted);">Error loading.</p></div>';
  }
}

window.saveTempReading = async function(equipId, equipName, type, min, max) {
  const input = document.getElementById('tl-input-'+equipId);
  const temp = parseFloat(input?.value);
  if (isNaN(temp)) { showToast('Enter a temperature first','error'); return; }

  const rid = currentRestaurantId();
  const name = prompt('Your name:');
  if (!name) return;

  const isSafe = type==='cold' ? temp<=max : temp>=min;
  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  try {
    // Check for existing reading to update
    const existing = await getDocs(query(
      collection(db,'tempReadings'),
      where('restaurantId','==',rid),
      where('date','==',window._tlDate),
      where('session','==',window._tlSession),
      where('equipmentId','==',equipId)
    ));

    const data = {
      restaurantId:rid, date:window._tlDate, session:window._tlSession,
      equipmentId:equipId, equipmentName:equipName,
      temp, type, isSafe, by:name.trim(), time, savedAt:serverTimestamp()
    };

    if (existing.empty) {
      await addDoc(collection(db,'tempReadings'), data);
    } else {
      await setDoc(doc(db,'tempReadings',existing.docs[0].id), data, {merge:true});
    }

    if (!isSafe) {
      showToast('🚨 TEMP VIOLATION logged — corrective action needed!', 'error');
      // Log corrective action prompt
      const action = prompt('⚠️ Temperature out of range! What corrective action was taken?');
      if (action) {
        await addDoc(collection(db,'tempCorrections'), {
          restaurantId:rid, date:window._tlDate, session:window._tlSession,
          equipmentId:equipId, equipmentName:equipName,
          temp, action:action.trim(), by:name.trim(), time, savedAt:serverTimestamp()
        });
      }
    } else {
      showToast('✅ Temperature logged!');
    }
    loadTempLogData();
  } catch(e) { showToast('Error saving','error'); console.error(e); }
}

window.checkFoodTemp = function(input) {
  const temp = parseFloat(input.value);
  if (isNaN(temp)) return;
  const row = input.closest('div[style]');
  const typeEl = row?.querySelector('select');
  const type = typeEl?.value;
  let safe = false;
  if (type === 'cooked') safe = temp >= 165;
  else if (type === 'hot-hold') safe = temp >= 140;
  else safe = temp <= 40;
  input.style.borderColor = safe ? 'var(--green)' : '#E24B4A';
  input.style.color = safe ? 'var(--green-dark)' : '#A32D2D';
}

async function loadTempHistory(rid) {
  const histEl = document.getElementById('tl-history');
  if (!histEl) return;
  try {
    // Last 7 days
    const dates = [];
    for (let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      dates.push(d.toISOString().split('T')[0]);
    }
    const snap = await getDocs(query(
      collection(db,'tempReadings'),
      where('restaurantId','==',rid),
      where('date','in', dates)
    ));
    const byDate = {};
    snap.docs.forEach(d => {
      const r = d.data();
      if (!byDate[r.date]) byDate[r.date]={total:0,violations:0,logged:0};
      byDate[r.date].logged++;
      if (!r.isSafe) byDate[r.date].violations++;
    });

    histEl.innerHTML = '<div style="font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:12px;">📅 7-Day Compliance Overview</div>'
      + '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;">'
      + dates.map(date => {
          const d = byDate[date];
          const label = new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'});
          const dayNum = new Date(date+'T12:00:00').getDate();
          const hasViolation = d && d.violations > 0;
          const isLogged = d && d.logged > 0;
          const isToday = date === new Date().toISOString().split('T')[0];
          return '<div onclick="window._tlDate=\''+date+'\';loadTempLogData()" style="text-align:center;padding:8px 4px;border-radius:10px;background:'+(hasViolation?'#FCEBEB':isLogged?'#E0F5EC':'var(--cream)')+';border:1.5px solid '+(isToday?'var(--green)':hasViolation?'#E24B4A':isLogged?'var(--green)':'var(--border)')+';cursor:pointer;">'
            + '<div style="font-size:0.62rem;color:var(--ink-muted);text-transform:uppercase;">' + label + '</div>'
            + '<div style="font-size:1rem;font-weight:700;color:var(--ink);margin:2px 0;">' + dayNum + '</div>'
            + '<div style="font-size:0.9rem;">' + (hasViolation?'🚨':isLogged?'✅':'—') + '</div>'
            + '</div>';
        }).join('')
      + '</div>'
      + '<div style="margin-top:8px;font-size:0.72rem;color:var(--ink-muted);text-align:center;">Tap any day to view that day\'s log</div>';
  } catch(e) {}
}

window.loadSalesChart = async function(days) {
  window._chartDays = days || 7;
  const container = document.getElementById('sales-chart-container');
  const summary = document.getElementById('sales-chart-summary');
  if (!container) return;

  // Update toggle buttons
  const btn7 = document.getElementById('chart-btn-7');
  const btn30 = document.getElementById('chart-btn-30');
  if (btn7) {
    const active7 = days === 7;
    btn7.style.background = active7 ? 'var(--green)' : 'transparent';
    btn7.style.color = active7 ? '#fff' : 'var(--ink-muted)';
    btn7.style.borderColor = active7 ? 'var(--green)' : 'var(--border)';
    btn7.style.fontWeight = active7 ? '600' : '400';
  }
  if (btn30) {
    const active30 = days === 30;
    btn30.style.background = active30 ? 'var(--green)' : 'transparent';
    btn30.style.color = active30 ? '#fff' : 'var(--ink-muted)';
    btn30.style.borderColor = active30 ? 'var(--green)' : 'var(--border)';
    btn30.style.fontWeight = active30 ? '600' : '400';
  }

  container.innerHTML = '<div style="text-align:center;padding:30px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>';

  const rid = currentRestaurantId();
  if (!rid) {
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--ink-muted);font-size:0.85rem;">Select a restaurant to view sales</div>';
    return;
  }

  try {
    // Build date range
    const dates = [];
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      dates.push(d.toISOString().split('T')[0]);
    }

    // Load sales data from cloverData collection
    const snap = await getDocs(query(
      collection(db, 'cloverData'),
      where('restaurantId', '==', rid)
    ));

    // Build data map
    const dataMap = {};
    snap.docs.forEach(d => {
      const x = d.data();
      if (x.date && dates.includes(x.date)) {
        dataMap[x.date] = x.revenue || 0;
      }
    });

    const revenues = dates.map(d => dataMap[d] || 0);
    const maxRev = Math.max(...revenues, 1);
    const totalRev = revenues.reduce((s, v) => s + v, 0);
    const avgRev = revenues.filter(v => v > 0).length > 0
      ? totalRev / revenues.filter(v => v > 0).length : 0;
    const bestDay = revenues.indexOf(Math.max(...revenues));
    const daysWithData = revenues.filter(v => v > 0).length;

    // ── BUILD SVG BAR CHART ──
    const chartW = 560;
    const chartH = 160;
    const padL = 50;
    const padR = 10;
    const padT = 10;
    const padB = 40;
    const innerW = chartW - padL - padR;
    const innerH = chartH - padT - padB;

    const barCount = dates.length;
    const barW = Math.max(4, Math.floor((innerW / barCount) * 0.6));
    const barGap = innerW / barCount;

    // Y axis labels
    const ySteps = 4;
    const yGridLines = [];
    for (let i = 0; i <= ySteps; i++) {
      const val = (maxRev / ySteps) * i;
      const y = padT + innerH - (innerH * (val / maxRev));
      yGridLines.push({ val, y });
    }

    let svg = `<svg viewBox="0 0 ${chartW} ${chartH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;overflow:visible;">`;

    // Grid lines
    yGridLines.forEach(({ val, y }) => {
      svg += `<line x1="${padL}" y1="${y}" x2="${chartW - padR}" y2="${y}" stroke="#E8E8E0" stroke-width="1" stroke-dasharray="4,3"/>`;
      const label = val >= 1000 ? '$' + (val/1000).toFixed(1) + 'k' : '$' + Math.round(val);
      svg += `<text x="${padL - 6}" y="${y + 4}" text-anchor="end" font-size="10" fill="#8A8A7A" font-family="sans-serif">${label}</text>`;
    });

    // Bars + labels
    revenues.forEach((rev, i) => {
      const x = padL + i * barGap + (barGap - barW) / 2;
      const barH2 = maxRev > 0 ? (rev / maxRev) * innerH : 0;
      const y = padT + innerH - barH2;
      const isToday = i === dates.length - 1;
      const isBest = i === bestDay && rev > 0;
      const color = isBest ? '#F2A623' : isToday ? '#1D9E75' : rev > 0 ? '#5BA889' : '#E8E8E0';

      // Bar with rounded top
      if (barH2 > 0) {
        const r = Math.min(4, barW / 2);
        svg += `<path d="M${x},${y + r} Q${x},${y} ${x + r},${y} L${x + barW - r},${y} Q${x + barW},${y} ${x + barW},${y + r} L${x + barW},${y + barH2} L${x},${y + barH2} Z" fill="${color}" opacity="${isToday ? '1' : '0.85'}"/>`;
      } else {
        svg += `<rect x="${x}" y="${padT + innerH - 2}" width="${barW}" height="2" rx="1" fill="${color}"/>`;
      }

      // Value label on top of bar
      if (rev > 0) {
        const label = rev >= 1000 ? '$' + (rev/1000).toFixed(1) + 'k' : '$' + Math.round(rev);
        svg += `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" font-size="9" fill="${isBest ? '#B5860A' : '#1D9E75'}" font-weight="600" font-family="sans-serif">${label}</text>`;
      }

      // X axis label
      const date = new Date(dates[i] + 'T12:00:00');
      const dayLabel = days <= 7
        ? date.toLocaleDateString('en-US', { weekday: 'short' })
        : date.getDate().toString();
      svg += `<text x="${x + barW/2}" y="${padT + innerH + 18}" text-anchor="middle" font-size="10" fill="${isToday ? 'var(--green)' : '#8A8A7A'}" font-weight="${isToday ? '700' : '400'}" font-family="sans-serif">${dayLabel}</text>`;

      if (isToday) {
        svg += `<text x="${x + barW/2}" y="${padT + innerH + 30}" text-anchor="middle" font-size="8" fill="var(--green)" font-family="sans-serif">today</text>`;
      }
    });

    // Trend line (only if we have data)
    if (daysWithData >= 2) {
      const points = revenues.map((rev, i) => {
        const x = padL + i * barGap + barGap / 2;
        const y = padT + innerH - (maxRev > 0 ? (rev / maxRev) * innerH : 0);
        return `${x},${y}`;
      }).join(' ');
      svg += `<polyline points="${points}" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>`;
    }

    svg += '</svg>';

    // No data message overlay
    if (daysWithData === 0) {
      container.innerHTML = '<div style="text-align:center;padding:32px 20px;">'
        + '<div style="font-size:2rem;margin-bottom:10px;">📊</div>'
        + '<div style="font-weight:600;color:var(--ink);margin-bottom:6px;">No sales data yet</div>'
        + '<div style="font-size:0.82rem;color:var(--ink-muted);line-height:1.6;">Connect Clover or Square to pull live data,<br>or use Manual Entry on the dashboard.</div>'
        + '</div>';
    } else {
      container.innerHTML = svg;
    }

    // Summary stats
    if (summary) {
      const prevRevenues = [];
      if (daysWithData > 0) {
        // Compare to previous period
        const prevDates = [];
        for (let i = days * 2 - 1; i >= days; i--) {
          const d = new Date(); d.setDate(d.getDate() - i);
          prevDates.push(d.toISOString().split('T')[0]);
        }
        const prevSnap = await getDocs(query(collection(db,'cloverData'), where('restaurantId','==',rid)));
        prevSnap.docs.forEach(d => {
          const x = d.data();
          if (x.date && prevDates.includes(x.date)) prevRevenues.push(x.revenue || 0);
        });
      }

      const prevTotal = prevRevenues.reduce((s,v) => s+v, 0);
      const trendPct = prevTotal > 0 ? ((totalRev - prevTotal) / prevTotal * 100) : null;
      const trendUp = trendPct !== null && trendPct >= 0;
      const bestDate = bestDay >= 0 ? new Date(dates[bestDay] + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) : '—';

      summary.innerHTML = `
        <div style="text-align:center;">
          <div style="font-size:0.65rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">Total (${days}d)</div>
          <div style="font-size:1.2rem;font-weight:800;color:var(--ink);">$${totalRev.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
          ${trendPct !== null ? `<div style="font-size:0.72rem;color:${trendUp?'var(--green)':'#E24B4A'};font-weight:600;">${trendUp?'▲':'▼'} ${Math.abs(trendPct).toFixed(1)}% vs prev</div>` : ''}
        </div>
        <div style="text-align:center;">
          <div style="font-size:0.65rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">Daily avg</div>
          <div style="font-size:1.2rem;font-weight:800;color:var(--ink);">$${Math.round(avgRev).toLocaleString()}</div>
          <div style="font-size:0.72rem;color:var(--ink-muted);">${daysWithData} days with data</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:0.65rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">Best day</div>
          <div style="font-size:1rem;font-weight:700;color:#B5860A;">${daysWithData > 0 ? '$' + revenues[bestDay].toLocaleString() : '—'}</div>
          <div style="font-size:0.72rem;color:var(--ink-muted);">${daysWithData > 0 ? bestDate : 'No data yet'}</div>
        </div>`;
    }

  } catch(e) {
    console.error('loadSalesChart error:', e);
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--ink-muted);font-size:0.82rem;">Could not load chart: ' + e.message + '</div>';
  }
}

function parseMenuText(rawText) {
  const lines = rawText.split("\n").map(l => l.trim()).filter(l => l.length > 0);
  const items = [];
  let currentCat = 'General';
  lines.forEach(line => {
    // Category: ends with colon and has no price
    if (line.endsWith(':') && !line.includes('$')) {
      currentCat = line.slice(0, -1).trim();
      return;
    }
    // Split on em dash, en dash, or double dash
    const parts = line.split(/\s*[—–]\s*|\s*--\s*/);
    if (parts.length < 1) return;
    const name = parts[0].trim();
    if (!name || name.length < 2) return;
    let price = '';
    let notes = '';
    for (let i = 1; i < parts.length; i++) {
      const p = parts[i].trim();
      if (p.startsWith('$') || /^[0-9]/.test(p)) {
        price = p.replace('$', '').trim();
      } else if (p.length > 3) {
        notes = p;
      }
    }
    items.push({ name, category: currentCat, price, notes });
  });
  return items;
}

window.previewMenuImport = function() {
  const text = document.getElementById('import-menu-text') ? document.getElementById('import-menu-text').value : '';
  const items = parseMenuText(text);
  const preview = document.getElementById('import-preview');
  if (!preview) return;
  if (!items.length) {
    preview.innerHTML = '<div style="color:var(--ink-muted);font-size:0.82rem;padding:10px;">No items detected — check your format</div>';
    return;
  }
  let lastCat = '';
  let html = '<div style="background:var(--cream);border-radius:12px;padding:14px;">'
    + '<div style="font-size:0.75rem;font-weight:700;color:var(--ink-soft);margin-bottom:10px;">' + items.length + ' items found:</div>';
  items.forEach(item => {
    if (item.category !== lastCat) {
      lastCat = item.category;
      html += '<div style="font-size:0.68rem;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:0.08em;margin:10px 0 4px;">' + item.category + '</div>';
    }
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border);">'
      + '<div style="font-size:0.82rem;color:var(--ink);">' + item.name + '</div>'
      + (item.price ? '<div style="font-size:0.8rem;font-weight:700;color:var(--green);white-space:nowrap;margin-left:10px;">$' + item.price + '</div>' : '')
      + '</div>';
  });
  html += '</div>';
  preview.innerHTML = html;
}

window.runMenuImport = async function(restaurantId, restaurantName) {
  const ta = document.getElementById('import-menu-text');
  const items = parseMenuText(ta ? ta.value : '');
  if (!items.length) { showToast('No items found — check format', 'error'); return; }

  const btn = document.getElementById('do-import-btn');
  const bar = document.getElementById('import-progress-bar');
  const fill = document.getElementById('import-progress-fill');
  const statusEl = document.getElementById('import-status');

  if (btn) { btn.disabled = true; btn.textContent = 'Importing ' + items.length + ' items...'; }
  if (bar) bar.style.display = 'block';
  if (statusEl) statusEl.style.display = 'none';

  let done = 0, failed = 0;
  for (const item of items) {
    try {
      await addDoc(collection(db, 'recipes'), {
        name: item.name, category: item.category,
        price: item.price, notes: item.notes,
        restaurantId: restaurantId,
        createdAt: serverTimestamp()
      });
      done++;
    } catch(e) {
      console.error('Import error:', e);
      failed++;
    }
    if (fill) fill.style.width = Math.round((done + failed) / items.length * 100) + '%';
    await new Promise(r => setTimeout(r, 100));
  }

  if (statusEl) {
    statusEl.style.display = 'block';
    if (failed === 0) {
      statusEl.style.background = '#E0F5EC';
      statusEl.style.color = '#0A6B3A';
      statusEl.textContent = '✅ ' + done + ' items imported to ' + restaurantName + ' Recipe Book!';
      if (btn) { btn.textContent = '✅ Done!'; }
      showToast(done + ' items imported!');
    } else {
      statusEl.style.background = '#FCEBEB';
      statusEl.style.color = '#A32D2D';
      statusEl.textContent = done + ' imported, ' + failed + ' failed.';
      if (btn) { btn.disabled = false; btn.textContent = '📥 Retry'; }
    }
  }
}

window.copyUID = function(uid) {

    showToast('UID copied to clipboard!');
  }).catch(() => {
    // Fallback for older browsers
    const el = document.createElement('textarea');
    el.value = uid;

    document.body.removeChild(el);

  });
}

window.printStationGuide = function() {
  const dishes = window._sgDishes;
  if (!dishes || !dishes.length) { showToast('No dishes to print','error'); return; }

  // Group by category
  const groups = {};
  dishes.forEach(d => {
    const cat = d.category || 'General';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(d);
  });

  const restaurantName = window._userData?.restaurantName || 'Restaurant';
  const date = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  let html = '<!DOCTYPE html><html><head><meta charset="utf-8">'
    + '<title>Station Guide — ' + restaurantName + '</title>'
    + '<style>'
    + '* { box-sizing:border-box; margin:0; padding:0; }'
    + 'body { font-family:Arial,sans-serif; color:#1A1A14; padding:24px; }'
    + 'h1 { font-size:20pt; font-weight:900; margin-bottom:2px; }'
    + '.sub { font-size:10pt; color:#666; margin-bottom:20px; }'
    + '.cat-header { font-size:13pt; font-weight:700; color:#fff; background:#1A1A14; padding:8px 14px; border-radius:6px; margin:20px 0 12px; page-break-before:auto; }'
    + '.dish-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:8px; }'
    + '.dish-card { border:1px solid #E0E0D8; border-radius:10px; padding:12px; background:#FAFAF8; page-break-inside:avoid; }'
    + '.dish-name { font-size:9.5pt; font-weight:700; color:#1A1A14; margin-bottom:3px; }'
    + '.dish-price { font-size:8pt; color:#1D9E75; font-weight:600; margin-bottom:6px; }'
    + '.ing-label { font-size:7.5pt; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }'
    + '.ing { font-size:8.5pt; color:#333; display:flex; align-items:flex-start; gap:5px; margin-bottom:3px; }'
    + '.ing::before { content:"•"; color:#1D9E75; flex-shrink:0; }'
    + '.footer { margin-top:24px; padding-top:10px; border-top:1px solid #E0E0D8; font-size:8pt; color:#999; text-align:center; }'
    + '@media print { @page{margin:0.4in;} .cat-header{-webkit-print-color-adjust:exact;print-color-adjust:exact;} }'
    + '</style></head><body>'
    + '<h1>Station Guide</h1>'
    + '<div class="sub">' + restaurantName + ' · ' + date + ' · Chef Nek Pro</div>';

  Object.entries(groups).sort().forEach(([cat, items]) => {
    html += '<div class="cat-header">' + cat + ' <span style="font-size:9pt;opacity:0.7;">(' + items.length + ' dishes)</span></div>';
    html += '<div class="dish-grid">';
    items.forEach(dish => {
      const ings = Array.isArray(dish.ingredients) ? dish.ingredients
        : (dish.ingredients || '').split(',').map(s => s.trim()).filter(Boolean);
      html += '<div class="dish-card">'
        + '<div class="dish-name">' + dish.name + '</div>'
        + (dish.price ? '<div class="dish-price">' + dish.price + '</div>' : '')
        + (ings.length ? '<div class="ing-label">Ingredients</div>'
          + ings.map(ing => '<div class="ing">' + ing + '</div>').join('') : '')
        + '</div>';
    });
    html += '</div>';
  });

  html += '<div class="footer">Printed by Chef Nek Pro · ' + restaurantName + '</div>';
  html += '</body></html>';

  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const win = window.open(url,'_blank');
  if (win) {
    win.onload = () => { setTimeout(() => { win.print(); URL.revokeObjectURL(url); }, 400); };
  }
}

window._invSortMode = 'default';
window.sortInventory = function(mode) {
  window._invSortMode = mode;
  // Update button styles
  ['default','az','lowstock','uncounted'].forEach(m => {
    const btn = document.getElementById('inv-sort-'+m);
    if (!btn) return;
    const active = m === mode;
    btn.style.background = active ? 'var(--green)' : 'transparent';
    btn.style.color = active ? '#fff' : 'var(--ink-muted)';
    btn.style.borderColor = active ? 'var(--green)' : 'var(--border)';
    btn.style.fontWeight = active ? '600' : '400';
  });

  // Re-sort categories visually
  const listEl = document.getElementById('inv-categories-list');
  if (!listEl) return;
  const cats = Array.from(listEl.children).filter(el => el.dataset.catname);

  cats.sort((a,b) => {
    if (mode === 'az') return (a.dataset.catname||'').localeCompare(b.dataset.catname||'');
    if (mode === 'lowstock') return parseInt(b.dataset.lowcount||0) - parseInt(a.dataset.lowcount||0);
    if (mode === 'uncounted') return parseInt(b.dataset.uncounted||0) - parseInt(a.dataset.uncounted||0);
    return parseInt(a.dataset.order||0) - parseInt(b.dataset.order||0);
  });

  cats.forEach(el => listEl.appendChild(el));
}

      items.forEach(item => {
        html += '<div style="display:flex;gap:14px;padding:14px 0;border-bottom:1px solid rgba(26,26,20,0.06);">';
        if(item.photoUrl) html += '<img src="'+item.photoUrl+'" style="width:70px;height:70px;object-fit:cover;border-radius:10px;flex-shrink:0;" loading="lazy">';
        html += '<div style="flex:1;"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;"><div style="font-family:'+font+',Georgia,serif;font-size:1rem;font-weight:700;color:#1A1A14;">'+item.name+'</div>';
        if(item.price) html += '<div style="font-size:1rem;font-weight:700;color:'+accent+';white-space:nowrap;">$'+item.price+'</div>';
        html += '</div>';
        if(item.notes) html += '<div style="font-size:0.8rem;color:#8A8A7A;margin-top:4px;line-height:1.6;">'+item.notes.substring(0,100)+'</div>';
        html += '</div></div>';
      });
      html += '</div>';
    });
    html += '</div><div style="text-align:center;padding:20px;"><a href="https://chef-nek-pro.vercel.app" style="font-size:0.72rem;color:#8A8A7A;text-decoration:none;">Powered by Chef Nek Pro</a></div></div>';
    root.innerHTML = html;
  } catch(e) {
    root.innerHTML = '<div style="text-align:center;padding:60px 20px;"><h2>Unable to load menu</h2><p style="color:#8A8A7A;margin-top:8px;">Please try again.</p></div>';
  }
}

onAuthStateChanged(auth, async (user) => {
  if (_hashRid) return;
  // Safety timeout — if loading takes more than 8 seconds, show login
  const loadingTimeout = setTimeout(() => {
    const root = document.getElementById('root');
    if (root && root.querySelector('.loading-screen')) {
      console.log('Loading timeout — showing login');
      renderLogin();
    }
  }, 8000);

  if (user) {
    currentUser = user;
    try {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      let userData;
      if (userDoc.exists()) {
        userData = { uid: user.uid, email: user.email, ...userDoc.data() };
      } else {
        userData = { uid: user.uid, email: user.email, restaurantName: 'Chef Nek Admin', isAdmin: true };
        await setDoc(doc(db, 'users', user.uid), { email: user.email, isAdmin: true, restaurantName: 'Chef Nek Admin' });
      }
      clearTimeout(loadingTimeout);
      isAdmin = userData.isAdmin || user.email === ADMIN_EMAIL;
      renderApp(userData);
    } catch(e) {
      renderLogin();
    }
  } else {
    currentUser = null;
    renderLogin();
  }
});

</script>
